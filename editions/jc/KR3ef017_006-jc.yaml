body:
  text: 卷四少腹硬滿綱仲景曰太陽病六七日表症仍在而反下之脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之目成無己曰此太陽自入腑者也趙嗣真曰此亦病發於陽誤下熱入之症少腹居下焦為膀胱之室厥陰經脈所聚衛任血海所出瘀血留結其中故硬滿綱仲景曰太陽病發汗而復大下之不大便五六日舌上燥而渴日晡小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之目柯琴曰此轉屬陽明而尚未離乎太陽故是下後熱入水結所致而非胃家實病綱仲景曰病人脅下素有痞連在臍旁痛引小腹入陰筋者此名臟結死目柯琴曰臍為立命之原臍旁者天樞之位氣交之際陽明脈所合少陽脈所出肝脾腎三臟之陰凝結於此所以痛引小腹入陰筋也少腹者厥陰之部兩陰交盡之處陰筋者宗筋也今人多有陰筋上衝小腹而痛死者名曰疝氣即是此類然痛止便蘇者金匱所云入臟則死入腑則愈也治之以茴香吳萸等味而痊亦可明臟結之治法矣鰲按從陰筋上衝小腹至胸自下而上也臟結從脅下痞痛引小腹入陰筋自上而下也柯氏以臟結即疝氣之類非是今存其說者正以辨臟結疝氣之異也綱仲景曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之目柯琴曰水氣留而不行則小便不利而少腹因滿制小青龍以兩解表裡之邪其加減法於少腹滿者去麻黃加茯苓以泄水也綱仲景曰太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血結症也抵當湯主之傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸目成無己曰少腹滿者臍下滿也少腹者下焦所治邪氣自上而下至於下焦結而不利故少腹滿也胸中滿心下滿皆是氣腹滿則有由燥屎者至於少腹滿則由邪氣聚於下焦津液不得通氣血不得行或溺或血留滯下焦是生脹滿而硬痛也若從心下至少腹皆硬滿而痛是邪實須大陷胸湯若但少腹硬滿而痛小便利者是蓄血症小便不利者是溺澀症鰲按水結血結俱是膀胱病故皆少腹硬滿次條則少腹滿而未硬未發狂只以小便自利預知其有蓄血故用丸以緩之綱仲景曰太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃仁承氣湯目張兼善曰此少腹硬滿為物聚於下可知矣物者血也滲之利之參酌隨宜可為上工鰲按此條少腹雖急結尚未硬滿故不用抵當只須承氣奔豚綱仲景曰太陽發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯桂枝加桂湯更加桂二兩目魏荔彤曰燒針令汗其人陰必素虛則火邪易入其人陽必素虛則汗易出今汗出陽愈虛矣其虛者以陽性浮而易升於上故陰得動於下於是乘針孔風寒一入起核發赤而腎家陰邪從少腹上衝心寒水之勢直犯天君如豚忽奔豈不危哉崇明何氏云奔豚一症乃寒邪從針孔入風邪不能外出直犯太陽本府引動腎中素有陰寒因發而上衝亦似有理楊士瀛曰夫奔豚者如豕突之狀氣從少腹上衝心而痛凡作奔豚者其氣在臍下築然而動也宜茯苓大棗湯或理中湯去朮加桂痛甚加吳萸亦佳燒針條用桂枝加桂湯若痛甚手足厥逆當歸四逆湯加桂萸惟桂大能泄奔豚凡藥中不可缺也煩躁綱仲景曰傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也目朱肱曰傷寒煩躁太陽與少陰經居多蓋太陽少陰為表裡也趙嗣真曰煩為擾擾躁為憤躁合言之煩躁為熱分言之煩與躁有陰陽之別煩陽而躁陰也煩為熱之輕躁為熱之重更有煩疼煩悶煩渴虛煩皆以煩為熱也有不煩而躁者怫怫然便作躁悶此為陰盛格陽也雖大躁欲於泥水中臥但飲水不得入口者是矣若煩躁是先煩漸至躁也若躁煩是發躁而漸復煩也柯琴曰太陽主表故寒邪傷人即太陽先受太陽脈浮若見浮不見傷寒之緊即靜也欲吐嘔逆之機煩躁是陽氣重脈急數陰陽俱緊之互文傳者即內經人傷於寒而傳為熱之傳乃太陽之氣生熱而傳於表即發於陽者傳七日之謂非太陽與陽明少陽經絡相傳也綱仲景曰傷寒六七日無大熱其人煩躁者此為陽去入陰故也目張云岐曰陰氣少陽氣勝則熱而煩故太陽經傷寒多煩而躁也陽虛陰盛亦發煩躁陽氣弱為陰所乘而躁故少陰病亦煩躁學者當以外症與脈別之有汗之而煩者有下之而煩者有病已解而反微煩者此由病新愈不勝谷損谷則愈柯氏曰此論陽邪自表入里症也傷寒一日即見煩躁是陽邪外發之機六七日乃陰陽自和之際反見煩躁是陽邪內陷之兆陰者指里而言非指三陰也綱仲景曰太陽病關節疼痛而煩脈沉而細者此名濕痹目鰲按煩本陽重濕病不宜煩而曰煩者太陽之氣為濕所遏不能宣暢故煩也綱仲景曰欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯目王肯堂曰煩者熱也謂煩熱也與發熱若同而異煩熱為熱所煩無時而歇非若發熱時發時止也經有煩有微煩有煩熱復煩反煩煩滿煩渴胸中煩心中煩內煩虛煩大煩欲解皆以煩為熱也然陰寒而煩者亦不少也蓋在表而煩者則有脈浮惡風寒體強痛之症在裡而煩者則有潮熱譫語腹滿不大便小便赤澀之症在半表半裡而煩者則有往來寒熱胸脅疼痛之症其邪在胸膈以上而煩者則有胸滿懊憹可吐之症其陰寒而煩者則有惡寒而蜷下利厥逆脈微與吐蛔之症大煩欲解者其脈必和但脈不應者難治若足冷脈沉細而微者此陰症之類也急用參附溫之若內傷勞役陰虛火動而煩者其人身倦無力自汗尺脈浮虛也宜補中益氣湯加炒黃連知柏生地麥冬之類若不得睡而心煩者兼服硃砂安神丸納其浮溜之火而安神明也此特大概耳虛煩胸中煩心中煩三者不因汗吐下而煩則是傳經之邪不作膈實但多和解而已經用小柴胡湯黃連阿膠湯豬膚湯是也若經汗吐下而煩則是熱邪內陷以為虛煩心中嗢嗢然欲吐憒憒然無奈者是也但多湧吐而已經用梔子豉湯梔子乾薑湯梔子厚朴湯是也蓋有不經汗吐下邪結胸中則為膈實與瓜蒂散及陽明心煩與調胃承氣湯此又煩之實者也傷寒二三日悸而煩者虛也建中湯少陽之邪入腑煩而悸者熱也大抵先煩而後悸是熱先悸而後煩是虛胃實不大便心煩若吐下後者大小承氣症也若不曾吐下者調胃承氣症也閔芝慶曰諸經皆有煩惟太陽獨甚耳蓋煩者內邪內擾汗者陽氣外發浮者陽盛之脈也夫脈浮則陽自內發故可必其先煩見其煩必當待其有汗勿遽妄投湯劑也鰲按二條言傷寒後餘熱衛解而營未解者浮數本麻黃脈仲景卻與桂枝者因發汗解麻黃症已罷脈浮數者因內煩而然不得仍拘為麻黃脈況麻黃純陽不可治煩桂枝有芍藥能安營分正以治煩也夫桂枝本治煩服之而外熱因汗解內熱又發故曰復煩也綱仲景曰一服汗者服麻黃湯也停後服汗多亡陽遂虛惡風煩躁不得眠也汗多者溫粉撲之傷寒脈浮緩發熱惡寒無汗煩躁身不疼但重乍有輕時無少陰症者大青龍湯發之目柯琴曰首條麻黃湯禁也麻黃為發汗重劑故慎重如此二條發熱惡寒與桂枝同身疼不汗與麻黃同惟煩躁是本症所獨故制此方以治風熱相搏耳綱仲景曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之目成無己曰煩躁之由各有不同有因邪在表有因邪在裡有因火劫有因陽虛有因陰盛皆不同也經曰當汗不汗其人煩躁如本條太陽中風脈浮緊不汗出而煩躁是邪在表也不大便五六日繞臍痛煩躁發作有時此有燥屎也是邪在裡也以火熏之不得汗其人必躁太陽病二日反躁火熨其背令大汗出大熱入胃煩躁者是火劫也陽微發躁不得與之下後復發汗晝日煩躁不得眠夜則安靜及發汗若下之病仍不去煩躁者是陽虛也少陰病吐利手足冷煩躁欲死是陰盛也諸如此者症之常也非逆也設或結胸症悉具煩躁者死發熱下利厥逆躁不得臥者死少陰病吐利煩躁四逆者死少陰病四逆惡寒而身蜷脈不至不煩而躁者死少陰病五六日自利復煩躁不得臥寐者死是數者又皆為不治之症綱仲景曰太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之目危亦林曰汗為心液汗多則離中水虧無以濟火故煩腎中水衰不能制火故躁綱仲景曰太陽病以火熏之不得汗其人必躁過經不解必圊血名為火邪目方中行曰火熏不得汗而圊血是陽邪下陷入陰分故在過經不解時夫不得汗過經圊血而猶不解可知劫汗而得汗其患速不得汗者其患遲名為火邪則但治其火而不慮前此之風寒矣劫汗得汗而患速者指傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安一條言也綱仲景曰火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之其脈沉者營氣微也營氣微者加燒針則血凝不行更發熱而煩躁也目戴原禮曰煩躁陰陽經皆有之陽明經胃有燥屎故煩此當下之太陽經已得汗而煩者五苓散少陽亦或有煩小柴胡湯陰煩少陰為多由陽氣傳入陰經陰得陽而煩自利而渴煩不得眠者辰砂五苓散若不是陽氣傳陰陰氣犯陰經吐利手足厥冷而煩經云陽虛陰乘之故煩又云陰盛發躁欲坐井中吳茱萸湯甚者四逆湯加蔥白二莖外有虛煩一症乃是病愈後陰陽未復時發煩熱竹葉石膏湯痰多睡不寧者溫膽湯嘔者橘皮湯李杲曰治陰虛發熱煩渴引飲肌熱躁熱至夜尤甚其脈洪大按之無力者此血虛發躁當歸補血湯主之若以白虎與之則誤矣如輕手脈來浮大按之即無者乃無根蒂之脈為散脈也此虛極而元氣將脫也切不可發表攻熱如誤治之則死須用大劑人參生脈散柯琴曰以火誤治陰陽俱虛竭矣煩躁者驚狂之漸起臥不安之象也急用此湯以安神救逆綱仲景曰太陽病二日煩躁反熨其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振慄自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也目柯琴曰此火逆之輕者太陽病經二日不汗出而煩躁本大青龍症乃不發汗而反以火熨火邪入胃胃中水竭躁煩不止此時必用調胃承氣湯下之庶胃氣不至於絕也綱仲景曰結胸症悉具煩躁者亦死目魏荔彤曰結胸症具備而煩躁獨甚津液內枯驅之使透表汗即出而陽必盡下之雖病去陰隨脫而陽亦亡故不下亦將死也下則速其死而已此條乃跟上條脈見浮大而言必結胸症具脈兼見浮大而又煩躁必不同胸初結之煩躁也且合數者方可卜其死不然煩躁亦前條結胸諸症中之一也何遽云死也其浮大之脈必無根方為死徵若有根仍宜從表治即煩躁亦未必死既云結胸症具則脈已變遲遲則難言兼浮更難言兼大忽而浮大非陽邪欲透表則正陽上越耳鰲按亦字承上條結胸症其脈浮大者不可下下之則死來故曰亦也咳嗽綱仲景曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之傷寒心下有水氣咳而微喘發熱不渴小青龍湯主之服湯已渴者此病去欲解也少陰病腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳者真武湯加五味子細辛乾薑主之目朱震亨曰傷寒太陽症咳嗽小青龍小柴胡也大抵熱在上焦其人必飲水水停心下則肺為之浮肺主於咳水氣乘之故咳而微喘少陽少陰俱有咳症韓祗和曰前二條是由停飲而咳者也雖皆為停飲所作而小青龍所主為水飲與表寒相合而咳者真武湯所主為水飲與裡寒相合而咳者不可不知也夫或表寒或裡寒協水飲則必動肺以形寒寒飲則傷肺故也肺主氣形寒飲冷則傷肺使氣上而不下逆而不收衝擊膈咽令喉中淫淫如癢習習如梗是令咳也甚者續而不已連連不止坐臥不安語言不竟動引百骸聲聞四近矣龔信曰水氣太陽寒水之氣也咳者水氣射肺也皮毛者肺之合表寒不解寒水已留其合矣心下之水氣又上至於肺則肺寒內外合邪故咳也水氣在心下則咳為必然喘為或然亦如柴胡湯症但見一症即是不必悉具綱仲景曰傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之少陰病四逆泄利下重其人或咳或悸或小便不利或腹中痛者四逆散主之目趙嗣真曰此二條是邪氣自表傳裡而咳者也雖皆為邪氣傳裡而小柴胡所主為陽邪傳裡動肺而咳四逆散所主為陰邪傳裡動肺而咳又不可不識也夫或陽邪或陰邪自表傳裡則必動肺以臟真高於肺故也停飲而咳表邪傳裡而咳固已又有肺寒而咳者內經曰肺之令人咳何也皮毛者肺之合也皮毛先受寒氣寒氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為咳嗽者是肺寒而咳也陶華曰咳者謦咳俗謂之嗽肺主氣肺為邪所乘氣逆而不下故令咳也有肺寒而咳者有停飲而咳者有邪在半表半裡而咳者治各不同其水咳三症不可不辨小青龍治太陽之表水也十棗湯治太陽之裡水也真武湯治水症之水氣也蓋水與表寒合用小青龍汗之水與裡寒合用真武湯溫之里癖合水動肺而咳用十棗湯下之太陽病身熱咳嗽乾嘔喘而利小青龍湯惡寒身痛只依本方身涼咳嗽乾嘔微利心下痞滿引脅下痛十棗湯四肢沉重腹痛下利咳嗽或嘔真武湯綱仲景曰咳而小便利者不可發汗發汗則四肢厥逆冷目成無己曰咳為肺疾治之必發散方可然必不可發汗如本條是也吳綬曰凡表寒咳嗽脈浮惡寒身疼拘急而無汗也麻黃湯或三拗湯汗之痰唾如膠者金沸草散汗之若有熱者參蘇飲去木香人參加麻黃桑皮杏仁汗之若虛弱人感冒風寒而咳嗽有痰或惡風頭疼乾嘔者人參杏仁湯傷寒二三日傳少陽經脈弦口苦發熱而咳嗽者小柴胡湯去人參薑棗加五味乾薑若發熱胸中煩滿而咳加炒栝蔞若胸脅痞滿發熱而咳加枳殼桔梗凡陰症手足冷脈沉細而咳嗽四逆湯加五味大抵傷寒咳嗽非比雜症按仲景治例有嗽者不分陰陽二症俱用五味乾薑也若五味收肺氣而止嗽乾薑入肺經而散逆氣也凡初秋暴雨冷及天行暴寒其熱喜伏於內咳嗽曲折不可得氣息喉啞失聲干嗽喉中如梗者射干湯李中梓曰有聲無痰曰咳有聲有痰曰嗽朱撝曰夫咳嗽之疾一也或曰咳者有聲而無痰嗽者有痰而無聲又曰咳為陽嗽為陰皆無考據咳嗽非獨寒也六氣皆能為嗽焉風嗽者頭目眩暈痰涎不利宜通聖散汗之搜風丸清之火嗽者口燥舌乾喘逆唾血宜涼膈散加當歸桔梗治之大金花丸解之暑嗽者面赤手冷頭有自汗宜白虎湯除之濕嗽者面腫上喘宜大橘皮湯止之甚者三花神祐丸下之燥嗽者往來寒熱涕唾稠黏宜柴胡飲子治之寒嗽者手足厥逆宜寧肺散收之彼謬醫不分六氣執以為寒驟用枯礬粟殼雖老亦無悟矣鰲按朱氏六氣為嗽之論乃統雜病言之而傷寒咳嗽其原亦有由六氣者治法固可參考喘綱仲景曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之目劉完素曰肺主氣形寒飲冷則傷肺故其氣逆而上行沖沖而氣急喝喝而息數抬肩張口掀肚搖身是也傷寒之喘有由邪氣在表氣不利而喘者有由寒水之氣射肺而喘者各不同也傷寒止於邪氣在表而喘者心腹必濡而不堅設或腹滿而喘則又為可下之症鰲按本症重在發熱身疼無汗而喘其喘者因風寒外束陽氣不伸而鬱於內也太陽為開本症又宜開故仲景立麻黃法以開之綱仲景曰太陽病桂枝症醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之喘家作桂枝湯加厚朴杏仁佳目鰲按來蘇集謂桂枝症上覆冠太陽字見諸經皆有桂枝症是桂枝不獨為太陽設固已愚竊謂太陽病下復接桂枝症字亦可見太陽治方不獨一桂枝湯而此則為桂枝湯之症非別方之症且可見喘而汗出者以邪束於外陽擾於內也總之此條為微熱在表而大熱入里之症故仲景制此輕清苦寒之劑喘本為麻黃症既制葛根芩連方治之又以桂枝加樸杏為治皆不用麻黃何也蓋因妄下後表雖不解畢竟腠理已疏故不用麻黃而用桂枝且桂枝方中有芍藥若單加杏仁喘雖微恐不勝任故必佐以厚朴斯喘隨汗解也杏仁治喘勝品綱仲景曰太陽與陽明合病喘而胸滿者不可下麻黃湯主之陽明症脈浮無汗而喘者發汗則愈宜麻黃湯目朱肱曰傷寒喘只有太陽陽明兩症柯琴曰三陽俱受氣於胸中而部位則屬陽明若喘屬太陽嘔屬陽明故胸滿而喘者尚未離乎太陽雖有陽明可下之症而不可下也鰲按病雖已入陽明脈浮無汗而喘故為未離太陽也故仍用麻黃湯綱仲景曰發汗後不可更行桂枝湯無汗而喘大熱者可與麻黃杏子甘草石膏湯下後不可更行桂枝湯若無汗而喘大熱者可與麻黃杏子甘草石膏湯目陶華曰傷寒發喘有邪在表者有邪在裡者有水氣在表者心腹濡而不堅外症無汗法當汗之在裡者心腹脹滿外症有汗法當下之其由水氣者心下怔忡小青龍去麻黃加杏仁湯經云喘而汗出宜利之汗不出而喘宜發之其或直視譫語汗出如油喘而不休死症也水氣喘咳乃太陽汗後飲水多而水停心下也既用小青龍去麻黃加杏仁矣其或兼小腹痛者則小青龍去麻黃加茯苓陰病喘促返陰丹喻昌曰誤用桂枝固衛寒不得泄氣逆變喘本當用大青龍乃於湯中除去桂枝薑棗者一誤不堪再誤也然治之終不出麻杏甘石之外見內飲水多外行水灌皆足以斂邪閉汗不獨誤行桂枝湯為然也太陽中風與太陽傷寒一從桂枝一從麻黃分途異治由中風之誤下而喘者用厚朴杏仁加入桂枝湯中觀之則傷寒之誤下而喘者用石膏加入麻黃湯中乃天造地設兩不移易之定法仲師所以諄諄告戒者正恐人以傷寒已得汗之證認為傷風有汗而誤用桂枝故特出誤汗誤下兩條示以同歸麻黃一治之要益見榮衛分途而成法不可混施也鰲按喻注飲水過多水氣上逆其說甚是而以水灌為沃其皮膚則謬此二條無字舊本俱訛在大熱字上柯氏韻伯始改正之綱仲景曰發汗後飲水多者必喘以水灌之亦喘目柯琴曰未發汗因風寒而喘者是麻黃症下後微喘者桂枝加樸杏症喘而汗出者葛根芩連症此汗後津液不足飲水多而喘者五苓散症水灌亦喘者形寒飲涼皆能傷肺氣迫上行是以喘鰲按漢時治病服藥而外有水治火治之法以水灌之料即是水治但不知如何用法若喻以為沃其皮膚恐未盡然綱仲景曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之加減法若喘者去麻黃加杏仁去皮尖傷寒心下有水氣咳而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也目朱肱曰麻黃主喘何故去之答曰此治心下有水而喘不當汗也故去之鰲按此二條之喘皆因心下有水氣小青龍與小柴胡俱為樞機之劑故皆設或然症各立加減法咳與喘皆水氣射肺也綱仲景曰直視譫語喘滿者死汗出發潤喘不休者此為肺絕身汗如油喘而不休者此為命絕目成無己曰此皆邪氣內盛正氣欲脫氣壅上逆也皆不治之症嘔吐綱仲景曰傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也目張云岐曰嘔有聲者也俗謂之啘吐吐出其物也故有乾嘔而無干吐是以於嘔則曰食谷欲嘔於吐則曰飲食入口即吐則嘔吐之有輕重可知矣傷寒之嘔有責於熱者有責於寒者至於吐則悉言虛冷經曰太陰病腹滿而吐食不下自利益甚時腹自痛又曰胃中虛冷故吐可見其概矣鰲按此言寒邪初感太陽先受第一日也初受之日已有吐意已伏嘔逆之機故兼有煩躁之症急數之脈也將者將然未然之詞綱仲景曰太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒目王履曰嘔家之為病氣逆者必散之痰飲者必下之千金曰嘔家多服生薑此是嘔家聖藥是要散其逆氣也金匱又曰嘔家用半夏以去其水水去嘔則止是要下其痰飲也嘔多雖有陽明症不可下者謂其氣逆而未收斂為實也其嘔而脈弱小便複利身有微熱見厥者為難治謂其虛寒之甚也寵安常曰雖有已發未發之分而症有惡寒體痛嘔吐脈有陰陽俱緊便可斷為太陽傷寒而非中風也其體痛者由寒邪外束也其嘔逆者寒邪內侵也綱仲景曰傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之目鰲按此是內外症俱微將解未去之候也故曰微惡寒見寒之輕曰肢節煩疼見非身腰疼痛曰微嘔見喜嘔之兆曰支結見非痞滿只發熱而煩為熱多耳故制此輕劑和解之綱仲景曰酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也凡服桂枝湯吐者其後必吐膿血也目魏荔彤曰酒客脈浮汗自出似風傷衛實非風傷衛然酒客汗自出脈數而大則有之未必浮也浮則為風傷衛矣況酒客焉有惡風一症是雖發熱汗出酒客之常並無惡風必傷風而後惡風自以酒客傷風為正義也所以用桂枝湯必斟酌方效也濕熱家或中風脈雖浮必兼濡澀而帶數於脈可以知其熱也雖頭項強痛必兼身重骨節煩疼掣痛不可屈伸近之則痛劇雖汗出必兼短氣雖惡風必兼小便不利於此症可以知其濕也辨之既明何至必於吐後始知其誤服桂枝哉則濕熱之中風用桂枝之內必佐以五苓之治法矣鰲按酒客必有濕熱故得甘必吐不可與桂枝柯韻伯謂當用葛根芩連解肌之法是也次條乃由酒客推廣言之見一切濕壅於中熱淫於內者俱禁用桂枝或使濕熱湧越有傷陽絡以致吐膿血也舊本俱將膿血條敘在酒客條上恐義不圓綱仲景曰病人有寒復發汗胃中冷必吐蛔目柯琴曰有寒未病時原有寒也內寒之人復感外邪當溫中以逐寒若發其汗汗生於穀穀氣外散胃脘陽虛無穀氣以養其蛔故蛔動而上從口出也蛔多不止者死吐蛔不能食者亦死鰲按韻伯此論即非傷寒凡胃虛蛔動者無不然綱仲景曰太陽與陽明合病不下利但嘔者葛根加半夏湯主之目柯琴曰太陽陽明合病太陽少陽合病陽明少陽合病必自下利則下利似乎合病當然之症今不利而嘔又似乎與少陽合病葛根湯加半夏兼解少陽半里之邪便不得為三陽合病綱仲景曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之目李中梓曰嘔者聲物俱出吐者無聲出物噦者有聲無物鰲按此條幹嘔是水氣為患水氣未入於胃故乾嘔綱仲景曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之目龐安常曰按此條及乾薑附子渴症不嘔不渴為里無熱可知嘔為裡熱明矣鰲按曰嘔逆曰乾嘔細玩通節語氣總以見表之風邪已解而里之水氣不和綱仲景曰傷寒汗出解之後胃中不和心下痞硬乾嘔食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之目柯琴曰陽邪居胃之上口故心下痞硬乾嘔而食臭水邪居胃之下口故腹中雷鳴而下利火用不宣則痞硬水用不宣則乾嘔邪熱不殺穀則食臭土虛不能制水故腸鳴綱仲景曰太陽病二日煩躁反熨其背而大汗出大熱入胃胃中水竭煩躁必發譫語十餘日振慄自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也目樓英曰此火逆之輕症也欲小便不得而反嘔欲失溲此非無小便也其津液在上焦欲還入胃口故也綱仲景曰發汗後水液不得入口為逆若更發汗必吐不止目柯琴曰陽重之人大發其汗有升無降故水藥拒隔而不得入若認為中風乾嘔傷寒嘔逆而更汗之則吐不止胃氣大傷矣此熱在胃口須用梔子湯綱仲景曰中風發熱六七日不解而煩有表裡症渴欲飲水水入則吐者名曰水逆五苓散主之多服暖水汗出愈目趙獻可曰水入則吐者心下有水氣因離中之真水不足則膻中之火用不宣邪水凝結於內水飲拒絕於外既不能外輸於元府又不能上輸於口舌亦不能下輸於膀胱此水逆所由名也綱仲景曰傷寒本自汗下醫復吐下之寒格若食入口即吐乾薑黃連黃芩人參湯主之目柯琴曰治之小誤變症亦輕故制方用瀉心之半上焦寒格故用薑參心下蓄熱故用芩連嘔家不喜甘故去甘草不食則不吐是心下無水氣故不用薑夏要知寒熱相阻則為格症寒熱相結則為痞症可吐綱仲景曰下利日十餘行其脈反遲寸口脈微滑此可吐之利則止少陰病飲食入口即吐心中溫溫欲吐復不能吐者宜吐之宿食在上脘者當吐之病手足逆冷脈乍結以客氣在胸中心下滿而煩飲食不能食者病在胸中當吐之目吳綬曰凡病在膈上者脈大胸滿多痰者食在胃口脈滑者俱宜吐之華佗謂傷寒三四日邪在胸中者宜吐之凡吐用瓜蒂散或淡鹽湯或溫茶湯如人弱者人參蘆湯亦可痰多者以二陳湯一甌乘熱與之以指探喉中即吐也凡老人怯弱勞病內傷虛人並婦人胎前產後血虛脈弱小者皆不可吐凡藥發吐者如防風桔梗山楂只用一味煎湯溫服之則吐若誤吐則損人上焦元氣為患不小可不慎哉王肯堂曰大法春宜吐凡用吐湯中病即止不必盡劑也病如桂枝症頭不疼項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為有寒當吐之或云此以內有久痰宜吐之也不可吐綱仲景曰太陽病當惡寒發熱今自汗出反不惡寒發熱關上脈細數者以醫吐之過也若得病一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣者此為吐之內煩也少陰病飲食入口即吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也若膈上有寒飲乾嘔者不可吐也當溫之少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚目王肯堂曰四肢厥逆虛家新產脈微皆不可吐喻昌曰解肌之法解肌表風邪全不傷動脾胃乃天然不易之法也若舍此而妄用吐法吐雖有發散之義故不惡寒發熱一二日病在太陽吐之則腹中飢口不能食三四日病在陽明吐之則不喜糜粥欲食冷食皆胃氣受傷之故也然且朝食暮吐脾中之真陽亦傷而不能消穀是外感雖除脾胃內傷卒未易復故為小逆魏荔彤曰關上脈細數方注為細則為虛數則為熱此脈兼一二日三四日二段言下方分別其症而未出治法余謂治胸當小陷胸治胃則桂枝去桂加茯苓甘草湯症也如胃果虛則人參乾薑皆可用矣次條津液內枯作煩發煩不過虛熱二字熱勝於虛者乃炙甘草湯症也熱大盛以白虎佐之至於虛勝於熱則又建中湯茯苓甘草湯之症矣仲景何能預定乎渴綱仲景曰太陽病發熱而渴不惡寒者為溫病目李中梓曰渴之為病或因熱耗津液或因汗下過多各不同也鰲按此概言太陽之溫症四時有之非專指春溫也所以名之曰溫者以內外皆熱也發熱為外熱渴為內熱所以別於中風傷寒也綱仲景曰形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出而愈目許叔微曰此乃夾虛傷寒症也脈弱者陰不足陽氣陷於陰分故必渴渴者液虛故也綱仲景曰傷寒心下有水氣咳而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也目成無己曰凡得病反能飲水此為欲愈之病其不曉病者但聞病者能飲水自瘥小渴者乃強與飲之因成大禍不可復救然則悸動也支結也喘咳噎噦乾嘔下利腫滿小便不利數者皆是飲水過傷當須識此勿誤也柯琴曰此正欲明服湯後渴者是解候也恐人服止渴藥反滋水氣故先提不渴二字作眼後提出渴者以明之若寒既欲解而更服之不惟不能止渴且重亡津液轉屬陽明而成胃實矣綱仲景曰中風發熱六七日不解而煩有表裡症渴欲飲水水入則吐者名曰水逆五苓散主之多服暖水汗出愈目朱肱曰初戒太陽症無汗而渴者不可與白虎湯問曰太陽病湯終不可與白虎湯耶曰太陽症得汗後脈洪大而渴者方可與之脈浮而渴屬太陽若陽明少陽少陰俱有渴症張元素曰此症因於發汗過多水入則吐者以心下有水氣故水飲拒絕於外也五苓者本因水氣不舒而設是小發汗不是生津液是逐水氣不是利水道綱仲景曰太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之太陽病其人發熱汗出不惡寒而渴者此轉屬陽明也渴欲飲水者少少與之但以法救之宜五苓散目朱肱曰凡病非大渴不可與水若小渴咽乾者只小呷滋潤之令胃中和若大渴煩躁者能飲一斗只與五升若全不與則乾燥無由作汗發喘而死常人見因渴飲水得汗小渴遂劇與之致停飲心下滿結喘死者甚眾當以五苓散或陷胸丸主之金匱云得時氣至五六日而渴欲飲水不得多不當與也何也以腹中熱尚少不能消之便更作病矣至七八日大渴欲飲水猶當依症與之常令不足勿極意也凡人但見仲景云得病反能飲水此為欲愈遂小渴者乃強飲之因成其禍不可勝數大抵傷寒水氣皆因飲水過多所致水停心下氣上乘心則為悸為喘結於胸脅則為水結胸胃中虛冷則為嘔為噦冷氣相薄則為噎上迫於肺則為咳漬入腸中則為利邪熱所薄蓄於下焦則為小便不利少腹滿或裡急溢於皮膚間則為腫也王好古曰邪氣在表猶未作熱故不渴邪氣初傳入里熱氣散漫未收熏蒸焦膈搏耗津液遂成渴也病人渴欲飲水少少與之但以法救者恐飲水過多積不能消復為停飲諸疾也柯琴曰前條上半截與後條同義前條在大汗後後條在未汗前即是太陽溫病要知太陽溫病即是陽明來路其徑最捷不若傷寒中風止從亡津液而後轉屬也飲水是溫病大法庶不犯汗吐下溫之誤五苓又是治飲多之法前條便是轉屬陽明症綱仲景曰太陽病飲水多小便利者必心下悸小便少者必苦裡急也傷寒汗出而心下悸渴者五苓散主之不渴者茯苓甘草湯主之本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之目陶華曰渴者里有熱也津液為熱所耗傷寒六七日傳至厥陰為消渴者謂飲水多而小便少乃熱能消水也朱氏云脈浮而渴屬太陽有汗而渴屬陽明自利而渴屬少陰至於厥陰則又熱之極矣太陽無汗若渴忌白虎宜柴胡陽明多汗而渴宜竹葉石膏若先嘔後渴則為欲解當與之水先渴後嘔則為水停赤茯苓湯當依此議勿令誤也鰲按第二條渴不渴雙頂心下悸是汗出後既心下悸矣而又有或渴或不渴者二方皆因心下水氣而設也綱仲景曰太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼身體則枯燥但頭汗出齊頸而還其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭則腹滿而喘口渴咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治目鰲按此言火灸之變即火逆症因火灸不如法以致變生種種惟以小便利者為可治則知火逆之症必以陰為主最忌陰竭猶之傷寒病以陽為主最忌陽亡也故中間陽盛陰虛四字是火逆症之綱領陽盛則傷血陰虛則亡津又傷寒書之大綱領也綱仲景曰濕家但頭汗出背強欲得被覆向火若下之則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲口燥煩也目李梃曰熱在表則不渴熱入里則渴耗奪津液而然也然有渴必有煩者腎主水熱深則水竭而渴肝木挾心火以生煩故厥陰六七日飲水多而小便少者謂之消渴渴欲飲水為欲愈傳經已盡也鰲按背強惡寒尚屬太陽寒濕本當汗解不汗而下必致陽氣擾上焦而滿傷中焦而噦傷下焦而小便不利既三焦受病矣口燥煩而舌上苔由丹田之有熱不能飲水是濕猶在中當從五苓散去桂枝易肉桂綱仲景曰太陽中暑其人汗出惡寒身熱而渴也目柯琴曰中暑夾寒有得之乘涼者陰寒先著於肌膚而暑氣內傷於心脈故惡寒身熱汗出而渴也清暑益氣湯東垣得之矣驚綱仲景曰傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可側轉者柴胡加龍骨牡蠣湯主之傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之風溫脈浮自汗身重多眠若被火者微則發黃劇則如驚癇時瘛瘲目成無己曰傷寒中有單言驚者有單言悸者理不得淆故兩分之其兼言驚悸者則少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚一條而已驚壞病也由誤下火逆溫針所致仲景之法不過隨其逆而調之悸綱仲景曰發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之發汗後其人臍下悸欲作奔豚茯苓桂枝甘草大棗湯主之目黃仲理曰心下悸欲按者心氣虛臍下悸者腎水乘火而上克以發汗多而心液虛心氣餒故悸豚為水畜奔則昂首疾馳酷有水勢上干之象然水勢尚在下焦欲作云者尚未發也綱仲景曰傷寒二三日心下悸而煩者小建中湯主之少陰病四逆泄利下重其人或咳或悸或小便不利或腹中痛者四逆散主之目成無己曰此二條都是氣虛而悸其氣虛者由陽氣內弱心下空虛正氣內動而為悸也柯琴曰心悸而煩者是少陽中樞受寒而木邪挾相火為患則君火虛離中真火不藏故悸離中真火不足故煩綱仲景曰太陽病飲水多小便利者必心下悸小便少者必苦裡急也目韓祗和曰此是停飲為悸者也其停飲者由水停心下心為火而惡水水故內停心亦不安而為悸也綱仲景曰太陽病若下之身重心下悸者不可發汗少陽病不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸目趙嗣真曰此汗下後正氣內虛邪氣交擊而令悸與他條氣虛而悸者不同且更甚焉或鎮固或化散皆須定其浮氣也綱仲景曰傷寒厥而心下悸者宜先治水當用茯苓甘草湯卻治其厥不爾水漬入胃必作利也目劉完素曰厥為邪之深者猶先治水況其邪氣之淺焉者乎金匱云食少飲多水停心下甚者則悸飲之為悸甚於他邪雖有餘邪必先治悸何也以水停心下若水氣散則無所不至侵於肺則為喘為咳傳於胃則為噦為噎溢於皮膚則為腫漬於腸胃則為利下之不可緩也
