body:
  text: 卷九直視綱仲景曰傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服譫語直視喘滿者死下利者亦死目成無己曰此皆邪氣盛而正氣脫也其或有目中不了了睛不和無表裡症大便難身微熱者是非直視也此為內實也可用大承氣大柴胡下之直視為不治之疾目中不了了為可治之候二者形症相近宜熟審之陳士鐸曰傷寒陽明症中有直視譫語喘滿者死下利者亦死之文此必諸症一齊同見苟有一症未兼尚不直視倘三症皆見必死症矣雖然直視譫語多由胃火之盛自焚其心而腎水不能來濟火愈盛而無制喘滿者火炎而氣欲上脫下利者火降而氣欲下脫也此猶屬欲脫未脫之危症治之得法猶可望生急以援脫散救之人參麥冬白芍各一兩石膏五錢竹茹三錢水煎服此方用人參以救脫石膏平火麥冬平喘白芍止利竹茹清心自然氣不絕而可救真奇方也嘔綱仲景曰傷寒嘔多雖有陽明症不可攻之黃芩生薑半夏湯目朱肱曰無陽則厥無陰則嘔嘔者足陽明之經足陽明之氣本不行今厥而上行故為氣逆氣逆則嘔仲景云嘔多雖不大便不可下可與小柴胡湯上焦得通津液得下胃氣和浹濈然汗出而解大抵嘔症不一各有治法要之小柴胡尤相當耳與小柴明胸脅滿而嘔日晡發潮熱者可小柴胡加芒硝也若嘔不止心下急鬱郁微煩與大柴明大便秘方加大黃大柴胡治嘔最妙為內有枳實去穢壓虛氣須是去大黃如本條之症宜用官局桔梗湯最良亦用枳實耳戴原禮曰陽明病雖顯然有可下症者兼嘔多猶屬上焦未可遽下宜小柴胡湯若獨見太陽症或吐瀉者恐膈間有痰飲停滯且以二陳湯定之候嘔吐定徐進解藥若先嘔卻渴者豬苓湯先渴卻嘔者治膈間之水小半夏茯苓湯嘔而吐涎沫者吳茱萸湯太陰厥陰間有嘔吐太陰理中湯厥陰四逆湯並加生薑以上陰症乃陰中之陰宜用熱劑陽入陰者能為利而不為嘔嘔屬上而近於外也陽之所入者深故利也又有陽症新瘥而嘔別無所因此餘熱在胃脘也宜竹葉石膏湯或橘皮竹茹湯大抵得之太陽而嘔者必是合病乃病漸入內非正太陽也蓋太陽見嘔非合陽明則合少陽其嘔為熱忌用暖劑有人初病其太陽症而嘔一家少長相似與養胃湯俱立效此時行之氣適然是為傷寒雜病又非可以正經傷寒以律之也李中梓曰嘔多水氣在上焦也雖有胃實症只宜小柴胡以通液誤攻必至利不止綱仲景曰傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也目王肯堂曰宜大柴胡湯陶華曰嘔者聲物俱有而旋出吐者無聲有物而頓出較其輕重則嘔甚於吐大都表邪傳裡裡氣上逆故嘔吐而水穀不下其有胃熱脈弦數口苦煩渴而嘔吐者有胃寒脈弦遲逆冷不食小便利而嘔吐者有水氣在膈間怔忡先渴而後嘔者有膿血喉中腥氣奔逆上衝不從治之嘔膿血儘自愈者是四者不可不辨鰲按此條之嘔即在不能食可知其胃家素實與乾嘔不同也綱仲景曰發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之目朱肱曰古人治嘔多用半夏生薑孫真人云生薑是嘔家聖藥仲景治嘔皆用之金匱治諸嘔吐谷不下者小半夏湯小半夏加茯苓湯小半夏加橘皮湯皆可選用嘔而發熱者小柴胡湯嘔而發渴者豬苓湯先渴卻嘔者為水停心下茯苓湯若少陰症而嘔者真武湯去附子加生薑傷寒瘥後嘔有餘熱在胃脘竹葉湯加生薑若病人直患嘔吐而復腳弱或疼乃是腳氣當作腳氣治柯琴曰虛煩是陽明壞病若少氣若嘔又從虛煩中想出煩必傷氣加甘草以益氣虛熱相搏必欲嘔加生薑以散邪綱仲景曰陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛目魏荔彤曰脅下硬滿較他條胸脅滿不去少甚矣不大便而嘔舌上白苔是陽明病胃已成實而邪復轉傳少陽也此諸症中惟不大便為正陽陽明其餘盡少陽陽明所應有之病但俱屬欲轉少陽而未全成少陽也與以小柴胡湯仍以和解為用使正陽之邪由少陽而出胃不成實陽明得罷耳二三日寒邪在陽明少久方能變熱乃同陽邪逆沖而嘔而咳然終無陽邪之烈所以咳而不咽痛又帶有陰邪之滯膩所以嘔也吐綱仲景曰傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈急數者為傳也目龐安常曰頗欲吐就受寒之一日已見是將來嘔逆之機已伏於此綱仲景曰少陰症飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之宜四逆湯目韓祗和曰此本少陰腎臟之病但曰脈弦弦猶帶少陽之象曰胸中實胸中者陽明之分況實則必有宿滯故不盡從少陰溫治之法亦不可從陽明攻下之法而用吐法也朱肱曰曾經汗下關脈遲胃中虛冷而吐者乾薑黃芩黃連人參湯寒多不飲水而吐者理中湯去朮加生薑吐利手足逆冷煩躁甚者吳茱萸湯若傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯噦綱仲景曰陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈弦浮者與小柴胡湯脈但浮無餘症者與麻黃湯若不尿腹滿加噦者不治目朱肱曰傷寒咳逆此症極惡仲景經中不載孫真人云咳逆尋遍方論無此名稱窮其狀咳逆者噦逆之名蓋古人以咳逆為噦耳大抵咳逆者古人所謂噦是也啘者今人所謂乾嘔是也扁鵲中藏經治傷寒咳逆丁香散丁香柿蒂各一分甘草良薑各半錢沸湯點作一服乘熱猛吃極效三因有竹茹湯等方亦有丁香散竹茹湯治陽症也本事方治傷寒後咳逆豆蔻湯治陰症丁香茴香肉豆蔻等藥若陽症不可用凡咳逆多有先熱而後吃生冷或涼藥多相激而成蓋陰陽二氣相搏也成無己曰䭇則但胸喉間氣塞滯不得下通然而無聲也噦則吃吃有聲二者相近皆胃之疾但有輕重耳虛寒相搏及飲冷水令汗大出水得寒氣冷必先搏其人即䭇言胃氣虛弱也傷寒大吐下後極虛復發汗出者其人外氣怫鬱復與之水以發其汗因得噦即是觀之皆胃疾可知矣然䭇為水寒相搏宜小青龍去麻黃加附子噦則熱氣壅鬱氣不得通而成輕者但和解如潮熱時時噦與小柴胡是也重者必攻下如噦而腹滿視其前後知何部不利利之則愈是也傷寒有此病已極矣非若渴煩等輕緩之候也鰲按時時噦內不解也至腹部滿加噦比時時噦更加甚矣綱仲景曰陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦若胃中虛冷不能食者飲水必噦目成無己曰觀此噦為胃疾可知矣大抵妄下後胃則虛氣因逆所以成噦魏荔彤曰陽明病至不能食即有手足濈然汗出等症之假熱便不可誤為胃實之熱而攻之致胃陽愈陷而脫寒邪愈盛而沖蓋必作噦症穀氣將絕也仲師再明為胃中虛冷之故以其人本屬胃冷而虛並非胃熱之實欲醫於能食不能食辨胃之寒熱也且胃中之虛冷不惟決於能食不能食且決於能飲不能飲若胃中真實虛冷固不能食矣且飲水必噦可與以陰寒攻破之劑乎此雖有表症且不治表而治里雖有陽明假熱之症寧容不治真寒而治假熱乎所宜明辨而慎出之者也綱仲景曰傷寒大吐大下之極虛復極汗者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中虛冷故也目成無己曰胃虛得水虛寒相搏故噦也吳茱萸湯理中湯活人用橘皮乾薑湯半夏生薑湯羌活附子湯陶華曰噦者即乾嘔之甚者也其聲濁惡而長亦是有聲而無物病至於噦則難治蓋因胃氣本虛汗下太過或復飲水水寒相搏虛逆而成又有熱氣壅鬱上下氣不通而噦者輕則和解疏利甚則溫散若不尿腹滿而噦與咳逆脈散無倫者雖神醫不能措手矣綱仲景曰傷寒噦而腹滿視其前後知何部不利利之則愈目王肯堂曰仲景無方活人前部宜豬苓湯後部宜調胃承氣湯鰲按前數條由胃冷之故此條由胃熱之故乾嘔綱仲景曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯目朱肱曰問有乾嘔者何也答曰大凡嘔者飲食不下乾嘔者今人所謂啘也或因汗出或因有水或因下利脾胃有熱故使乾嘔宜官局桔梗湯最佳仲景治汗自出乾嘔者桂枝症也身涼汗出兩脅痛乾嘔者十棗湯也少陰不利脈微與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯也少陰下利裡寒外熱脈微欲絕乾嘔者通脈四逆湯也乾嘔吐涎沫頭痛者吳茱萸湯也張元素曰或問小青龍與小柴胡症皆嘔而發汗表裡之症大概彷彿何故二方用藥之不同曰傷寒表不解裡熱未甚不渴欲飲水不能多不當與之以腹中熱尚少而不能消水停飲蓄積故作諸症然水寒作病非溫熱不能解故用小青龍發汗散水原其理初無里症因水寒以致然也夫小柴胡症系傷寒發熱熱邪傳入在於半表半裡之間熱氣內攻故生諸症緣二症雖曰表裡俱病其中寒熱不同故用藥有薑桂柴苓之不同也陶華曰乾嘔者空嘔而無物出者也大抵熱在胃脘與穀氣並熱熱氣上熏心下痞結則有此症太陽汗出乾嘔桂枝湯主自汗也少陰下利乾嘔姜附湯主下利也厥陰吐沫乾嘔吳萸湯主涎沫也邪去則吐自止矣至如水氣二症又當以表裡別之傷寒表不解而心下有水氣乾嘔身熱微喘或自利者小青龍湯主之不發熱但惡寒咳而利乾嘔者亦水氣也十棗湯下之欲吐綱仲景曰太陽病過經十餘日心下溫溫欲吐而胸口痛大便反溏腹微滿鬱郁微煩先其時極吐下者與調胃承氣湯目朱肱曰吐有冷熱二症寸口脈數手心熱煩渴而吐以有熱在胃脘五苓散主之傷寒有表症渴欲飲水水入口即吐者名水逆由心經受熱而小腸不利也宜五苓散發汗後水漿不得入口為逆若更發汗必吐下不止小半夏加茯苓湯大半夏加橘皮湯柯琴曰過經十餘日病不在太陽矣仍曰太陽病者此太陽壞病也心下者胃口也心下溫溫欲吐者胃口有遺熱而胃氣不和也故用本湯微和之咳逆綱仲景曰傷寒咳逆上氣脈散者死目張元素曰咳逆者火熱奔急上行而肺陰不內也便秘者大承氣湯便軟者瀉心湯王好古曰傷寒咳逆脈散死仲景之言不虛偽大抵原因失下生咳逆喉中陰不內便軟惟宜用瀉心便硬尤宜大承氣二藥神攻作者誰東垣潔古為良劑少陰咳逆者此失下也陰消將盡陽逆上行使陰不內也然陰既盡陽亦將盡也故為陽極脈微將盡者宜瀉心湯如不用瀉心涼膈散去硝黃清肺散亦可若脈左浮右沉實非表也里極則反出於表也何以然咳逆舌強右脈實者知少陰里也飲水過多心下痞而咳逆者五苓散主之別無惡候是也惡候生或兼以舌攣語言不正而反昏冒與咽痛者少陰也速下之宜大承氣也何以脈浮為表脈浮之實大沉之損小是為表也浮之實大沉之亦然即非表也邪入已深矣內熱當沉反浮陽極復之表也王肯堂曰陰症者內已伏陰陰氣太甚腎水擅權肝氣不生胃火已病丁火又消所以遊行相火寒邪迫而萃集於胸中亦欲盡也故令人發熱大渴引飲病人獨覺熱他人按執之身體肌肉骨髓血脈俱寒此火即無根之火也故用丁香乾薑之類熱藥溫胃其火自下吳綬曰咳逆者氣上逆而為吃忒也方書或以為咳嗽者非本條言死謂其形損也吃忒有因胃實失下者其氣皆從胃至胸嗌之間而為吃忒易老治法失下胃熱內實便硬者承氣湯便軟者瀉心湯胃虛有熱橘皮竹茹湯有痰飲半夏生薑湯或茯苓半夏湯若胃冷橘皮乾薑湯加味理中湯要略云其氣自臍下直衝於胸嗌間吃忒者此陰症也其病不在胃也且病下虛內以伏陰或誤用寒涼遂致冷極於下迫其相火上衝萃集胸中以為吃忒亦欲盡也若不識此為水極似火誤用涼藥下咽立敗矣凡治須用羌活附子散加味附子湯急溫其下真陽一回火降而吃忒自止也如冷極吃忒不止者或兼以硫黃乳香散齅法或灸期門中脘關元氣海但要取手足溫暖而脈生陽回陰退則活矣陶華曰咳逆者俗名吃忒才發聲於喉間則遽止吃吃然連續連聲然而短促不長古人謂即噦者非也噦與乾嘔相似但其聲濁惡而長皆有聲而無物病至於噦則危矣大抵䭇近於噦䭇者但胸間氣塞不得下通噦則惡濁之聲達於外矣經曰陽脈浮則為氣䭇又曰脈滑則為噦此為醫家責虛取實之過也設若咳逆脈散無倫則難治與傷寒咳而氣逆固不同也若將吃忒紊於噦與咳而氣逆則誤人多矣臨病必明辨焉喘綱仲景曰陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也陽明脈浮無汗而喘者發汗則愈宜麻黃湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之目戴原禮曰喘嗽有陰陽太陽經有喘有嗽少陽有嗽無喘有喘非少陽也其見少陽症而嗽者宜小柴胡湯加五味六分乾薑四分陽明有喘無嗽有嗽非正陽明也其陽明症喘有潮熱者大承氣湯陰症喘惟少陰有之若四肢沉重疼痛小便如常大便自利而嗽者真武湯去芍藥加五味乾薑各五分細辛三分此陰中之陰若四肢厥逆腹中痛泄利下重而喘四逆湯加五味乾薑各五分下利嘔渴身煩不得眠而喘者豬苓湯此陰中之陽諸陰喘促最為危症返陰丹主之喘促四肢逆冷小渴與水反劇飲之致停飲心下滿結者喘死甚眾當以五苓散或陷胸丸主之吳綬曰凡表有寒發喘者脈浮緊惡寒身疼無汗也麻黃湯主之若表有風發喘者脈浮緩惡風自汗也宜桂枝湯加厚朴杏仁魏荔彤曰首條風寒兩傷之症也風寒之氣每相兼而中傷於人在太陽有大青龍症由太陽轉屬陽明亦然故此條自為風寒兩傷之陽明也二條乃太陽陽明之症入陽明未深故用麻黃仍令其邪自表出不致歸於胃也綱仲景曰傷寒四五日脈沉而喘沉則為里而反發其汗津液越出大便為難表虛里實久則譫語目成無己曰邪氣入內之時得脈沉而喘滿里症具也則當下之反發汗令津液越出胃中乾燥致大便難而譫語宜大承氣湯綱仲景曰陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之病人小便不利大便乍難乍易時有微熱喘冒不得臥者有燥屎也宜大承氣湯目吳綬曰凡陽明內實不大便腹滿短氣發潮熱而喘者大柴胡加厚朴杏仁湯或小承氣湯也凡陰症厥逆脈沉細而微氣促而喘無汗者四逆湯加五味杏仁也凡虛人脈伏手足逆冷而喘者五味子湯也風暴冒風寒脈浮無汗而喘宜蘇沉九寶湯也凡熱盛有痰脈弦數而喘不可汗不可下小柴胡加知母貝母栝蔞仁胸滿者加枳殼桔梗心下滿者加枳實黃連舌燥飲水而喘者加知母石膏古人云諸喘為惡故非輕也華佗曰盛則為喘蓋非肺氣盛也乃肺中之邪火盛也所以瀉白者瀉肺中之火也非瀉肺也又瀉心湯乃瀉心下之痞滿者也衛生寶鑑曰凡看文字有餘當認作不足者蓋受病為不足病氣為有餘也渴綱仲景曰陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥複利其小便故也目張元素曰其陽明汗多此陽明病未解而渴胃中津液乾燥若與豬苓複利其小便是為實實虛虛之弊朱肱曰太陽症無汗而渴者不可與白虎湯陽明症汗多而渴者不可與五苓散或曰太陽渴終不可與白虎湯耶答曰太陽症得汗後脈洪大而渴方可與之也或曰陽明渴終不可與五苓散耶答曰陽明症小便不利汗少脈浮而渴者方可與之也趙嗣真曰活人切戒太陽無汗而渴不可與白虎陽明汗多而渴不可與豬苓愚詳仲景論治渴藥有不可與之戒有二傷寒脈浮發熱無汗渴欲飲水無表症者白虎加人參湯表不解不可與活人不雲表不解但云無汗不可與則誤矣經云陽明汗多而渴不可與豬苓湯活人改作五苓散蓋豬苓專滲泄五苓兼汗利安得而改之經既云汗多而渴者不可與豬苓湯而太陽傷寒汗出而渴復用五苓散者蓋渴雖同汗下之多寡則異太陽屬表未至汗多胃燥故用五苓滲熱和表非若陽明屬裡汗之而胃即燥也經又云陽明發熱汗多急下之均是陽明汗多前症戒利小便此症不戒利大便何也蓋渴者邪氣散漫在經未收斂入胃作實此症不渴則內已作實外又發熱恐熱邪內竭津液故急下之且豬苓五苓又有可疑者太陽病脈浮小便不利微熱消渴者五苓散陽明脈浮發熱渴欲飲水小便不利者豬苓湯脈症皆同何故用藥之不同耶然太陽邪在表發汗不解故用五苓和表行津液陽明邪已入里熱客下焦故用豬苓滲瀉其熱噫白虎豬苓五苓等藥若能症察於機微治明於權變則可與不可與庶得仲景之妙外有自利而渴條下注云傷寒熱入於臟流於少陰之經少陰主腎惡燥故渴而引飲注用豬苓湯白頭翁湯又後下利問中重出自利而渴條下卻云腎虛故引水自救通用四逆白通豬苓等湯一問以渴為熱一問以渴為虛冰炭不侔何憑分別又且分隸兩門設使後人臨病檢閱前後兩不相同疑誤豈小今詳定少陰病咳而下利嘔渴心煩不得眠及厥陰症下利慾飲水是皆傳經之邪熱脈必沉細數仲景故以滑石黃連等清利之其或少陰自利而渴欲吐不吐心煩但欲寐是真入本經之陰邪也脈必沉微仲景故以附子乾薑溫之本問何不如此明示脈症合為一門而明辨之庶一見而兩得焉清之溫之隨其攸利又何疑誤之有王肯堂曰治宜白虎加人參湯小柴胡湯去半夏加栝蔞竹葉渴有隨病治之之法如渴而頭汗小便不利兼脅滿往來寒熱者柴胡桂枝幹薑湯茵陳蒿湯表不解心下有水氣乾嘔發熱兼咳嗽噎喘小青龍湯又心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯俱宜去半夏加花粉如夏月汗出惡寒身熱足冷而渴者為中暑白虎加人參湯及酒黃連表解不惡寒而渴者白虎湯渴而脅滿及往來寒熱其症未經汗者小柴胡去半夏倍人參加栝蔞湯汗下後渴者柴胡桂枝幹薑湯渴而心下硬痛潮熱不大便而結胸大陷胸湯但硬不痛為痞與瀉心湯不解反渴而小便不利五苓散病在陽明應汗反以冷水噀之灌之其熱益煩肉上粟起意欲冷水反不渴者服文蛤散若不瘥五苓湯中風發熱六七日不解而煩有表裡症渴欲飲水水入則吐者名水逆五苓散如渴欲飲水若太陽發汗後大汗出煩躁不得眠者及厥陰病氣起衝心心疼吐蛔者少少與之飲如得時氣病者五六日而渴欲飲水不能多不當與之以腹中熱尚少不能消之更與水作病也至七八日大渴欲飲水者猶當依症與之常令不足勿極意也若飲而腹滿小便不利若喘若噦不可與之耳忽大汗出是為欲愈也綱仲景曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之目吳綬曰凡渴當分六經而治太陽經標熱在表則不渴若熱傳入膀胱之本則煩渴脈浮數小便不利也五苓散切不可與白虎湯陽明病脈長標熱無汗而渴葛根解肌湯或六神通解散倍葛根以汗之若陽熱傳於胃中本熱惡熱濈濈汗出而渴脈浮洪數者人參白虎湯五苓不中與也若陽明本熱蒸蒸而熱潮熱煩渴舌燥口乾飲水大便實者大柴胡湯或調胃承氣湯若內未實尚未可下宜小柴胡增損與之少陽脈弦數口苦咽乾發熱而渴者小柴胡去半夏加花粉太陰自利則不渴惟少陰有口苦飲水小便色白者此下有寒也脈沉者附子湯若身寒厥逆脈滑而口渴者此里有熱也人參白虎湯凡陰症煩躁口渴不能用水脈沉足冷者四逆湯冷飲之凡傷寒時氣等症欲飲水者為欲愈蓋得水則能和其胃氣汗出而解不與水則乾燥無由作汗遂致悶亂而死凡與水須察病人強弱邪熱輕重多少與之寧不及毋太過其水須汲井中者為良凡熱病熱甚大便實者以元明粉一二錢加入水中飲之最妙凡中暑煩渴者加辰砂天水散調水中飲之尤妙如虛人煩渴不飲水燈心煎湯浸水中與之凡口渴者細茶湯白梅湯綠豆湯皆可飲梨藕西瓜皆可食凡用冰須以冷水洗去鹽沫方可戴原禮曰有陽症不渴陰症反渴者有陽明不甚渴太陰乃大渴者不可不知治渴一也有堅腎水而渴止者有利小便而渴愈者堅腎水則用花粉之屬利小便則用二苓之類蓋太陰以利小便為先陽明以利小便為戒少陽以半表裡可下之或大渴不止小柴胡加花粉堅其腎水腎水堅自還滲入大腸大便微通熱去而渴解若病在太陽太陽為膀胱腎經非利小便則熱無從去渴何由愈哉外有非太陽症煩躁發渴此乃陰盛格陽不當潤其渴惟當治其陰鰲按引飲曰燥不引飲曰干李梴曰熱在表不渴熱入里則渴耗奪津液也然有渴必有煩腎主水熱深則水竭而渴肝木挾心火以生煩故厥陰六七日飲水多小便少者謂之消渴漱水不欲咽綱仲景曰陽明病口燥但欲漱水不欲咽者此必衄目朱肱曰此必有頭疼身熱之症若病人無表症不惡寒熱胸腹滿唇燥但欲漱水不欲咽者此為有瘀血必發狂也輕者犀角地黃湯重者抵當湯王肯堂曰此症屬陽明凡內有熱者欲飲水今欲水而不欲咽是熱在經而里無熱也陽明經氣血俱多經中熱甚逼血妄行故知必作衄也張介賓曰凡陽明病口燥但欲漱水而不欲咽者以熱在經而里無熱也必將為衄不可與涼藥蓋飲水一症本以內熱甚而陽毒甚者最為相宜若似乎止宜於實邪不宜乎虛邪也不知虛症亦有不同如陽虛無火其不宜水不待言也其有陰虛火盛者元氣既弱精血又枯多見舌裂唇焦大渴喜冷三焦如焚二便秘結等症使非藉水何以濟急故先宜以冰水解其標而繼以甘溫培其本水藥兼進無不可也其有內真寒外假熱陰盛格陽等症察其元氣則非用甘溫必不足以挽回察其喉舌則些微辛熱又不可以近口有如是者則但將甘溫大補之劑或用獨參湯水浸極冷飲之此以假冷之味解上焦之假熱而真溫之性復下焦之真陽是非用水而實亦用水之意余用此活人多矣妙甚惟是假熱之症症雖熱而脈則微口雖渴而便不閉者此而欲水必不可與若誤犯之其敗泄元陽為害不小喻昌曰口中乾燥與渴異漱水不欲咽知不渴也陽明氣血俱多以漱水不欲咽知邪入血分陽明之脈起於鼻故知血得熱而妄行必由鼻而出也魏荔彤曰如陽明病表熱汗自出則胃燥而開竅之口亦必燥然但欲漱而不欲咽此則胃中之血隨熱上行所以言必衄也此雖為陽明熱盛之變然血既溢而衄則非亡津液而胃陰絕可知即衄後未可定其必解而熱勢已泄胃實自未必成矣綱仲景曰無表症不寒熱胸腹滿唇燥口乾漱水不咽小便多此為瘀血必發狂輕者桃仁承氣湯重者抵當丸目楊士瀛曰唇燥口乾血症類有之必欲取水不灌漱也然漱水而不咽何哉蓋渴者易為飲陽熱入里胃中液干患不與水耳惟夫上焦瘀血下焦蓄血乘肺若燥渴症獨無是以漱而不欲咽也漱水條例惟血症有焉鼻燥口舌燥咽燥綱仲景曰脈浮發熱口乾鼻燥能食者則衄陽明病口燥但欲漱水不欲咽者此必衄陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛目朱肱曰脾臟有熱則津液枯少故令口燥而舌乾李杲曰若飲食勞役所傷其外症必顯在口必口失穀味必腹中不和必不欲言縱勉強對答聲必怯弱口沃沫多吐鼻中清涕或有或無即陰症也外傷風寒則其外症必顯在鼻氣不利聲重濁不清其言壅塞盛而有力口中必和傷寒則面赤鼻壅塞而干傷風則鼻流清涕而已傷食則惡食龐安常曰鼻頭色青者腹中痛苦冷者死微黑者水氣黃色者小便難白色者氣虛赤色者肺熱鮮明者有留飲也鼻孔乾燥燥者陽明熱必將衄血也鼻孔乾燥黑如煙煤陽毒熱深也鼻孔冷滑而黑陰毒冷極也鼻息鼾睡者風濕也鼻塞濁涕者風熱也鼻孔搧張為肺風肺絕而不可以治也此龐氏察鼻法綱仲景曰陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也目鰲按此為陽明初病屬在裡之表也口為胃竅咽為胃門故不兼少陽而有口苦咽乾之症綱仲景曰傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之目鰲按此不言躁但口渴心煩陽邪將入里也此雖有表裡症其實表輕里甚故用白虎湯也綱仲景曰傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之陽明病若渴欲飲水口乾舌燥者白虎加人參湯主之目成無己曰此條是熱耗津液而滑者已干也若熱聚於胃則舌為之黃是熱已深也金匱曰舌黃未下者下之黃自去若舌上色黃者又為熱之極也黃帝針經曰熱病口乾舌黑者死以心為君主黑為腎水克心火邪熱已極故知必死也張介賓曰舌上黑苔生芒刺者熱極深也宜涼膈散承氣湯大柴胡之屬酌宜下之若苔色雖黑滑而不澀者便非實邪亦非火症非惟不可下且不可清也柯琴曰煩躁舌乾大渴為陽明熱結不散也故當救里以滋津液二條白虎所治皆陽明燥症揭為陽明主方信為有見此為陽明自淺入深之症前此口苦咽燥惡熱熱雖在裡尚未犯心至憒憒怵惕懊憹雖入心尚未及胃今燥渴引飲則邪已入胃然尚未燥硬用本湯瀉胃火而扶元氣全不涉吐汗下三法矣綱仲景曰少陰病得之二三日不大便口燥咽乾者急下之宜大承氣湯目柯琴曰熱淫於內胃火上炎故口燥咽乾也急下之火歸於坎津液自升也綱仲景曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重梔子豉湯主之目陶華曰邪熱聚於胃腑消耗津液故口乾燥熱而渴也蓋陽明氣血俱多經中熱甚有迫血妄行而作鼻衄漱水不欲咽者犀角地黃湯無衄血表症加之胸腹滿而如狂則為蓄血在內桃仁承氣湯少陽口燥咽乾小柴胡湯調之綱仲景曰少陰病自利清水色純青心下必痛口乾舌燥者急下之宜大承氣湯目柯琴曰自利清水疑其為寒矣而利清水時必心下痛必口燥舌乾是土燥火炎脾氣不濡胃氣反厚水去而谷不去故純青也舌苔綱仲景曰陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也目成無己曰此條舌苔是邪氣在半表半裡者也舌者心之苗本紅而澤傷寒三四日舌上有膜白滑如苔甚者或燥或澀或黃或黑是數者熱氣淺深之謂也邪氣在表者舌上即無苔邪傳裡津液摶結則舌上生苔也張云岐曰舌上白苔邪未入肝屬半表半裡以小柴胡和解之若舌生黃熱已入胃調胃承氣湯舌上黑苔或生芒刺是腎水克心火急以大承氣下之此熱已極也綱仲景曰舌上如苔者以丹田有熱胸中有寒也目成無己曰此條是邪氣初傳入里者也王履曰胸中有寒者謂寒氣初傳入里也舌乃心苗應南方色本紅邪在表舌無苔邪在裡津液摶結舌生苔而滑熱漸深舌苔燥而澀熱聚胃舌苔黃承氣湯下之熱極深病極篤舌苔黑經曰熱病口乾舌黑者死水刑火也張介賓曰邪在表則無苔及傳裡則津液乾燥而舌苔生若邪猶未深在半表裡間或邪客胸中者其苔不黑不澀止宜小柴胡和之若陽邪傳裡胃中有熱則舌苔澀宜梔子豉湯清之若煩躁欲飲水數升者白虎加人參湯大都舌上黃苔而焦色者胃腑有邪熱也或清之或微下之然必大便燥實脈沉有力而大渴者方可下若微渴而脈不實便不堅苔不幹燥芒刺者不可下也綱仲景曰陽明病若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之目成無己曰此條是邪氣客於胸中者也魏荔彤曰此症既汗之不可燒針之不可若以為里症而當下然熱未積深胃未成實若下之胃中正氣空虛於中脘客邪動衝於上焦心中懊憹陽為陰寒所陷舌上生苔熱為陰寒所迫此誤治陽明之變又其一也蓋本條汗針下三者皆誤惟其不明湧越之一法也今其人雖表邪尚在而咽燥口苦腹滿而喘純是表邪變熱壅逆上焦之象邪在上自應從上達之以梔子豉湯主之仍是太陽香豉治表梔子泄熱之法而陽明一治於五苓再治於梔子豉可見非拘拘專治陽明者可愈陽明病也綱仲景曰臟結無陽症不往來寒熱其人反靜舌上苔滑者不可攻也目成無己曰此條是邪未全成熱猶帶表寒者也及其邪傳為熱則舌上之苔不滑而澀也鰲按臟結者漸積凝結而為陰五臟之陽盡已竭絕也然舌苔雖滑猶不至黃黑芒刺故尚未可攻附錄相舌秘法陳士鐸曰傷寒病凡見舌系白苔者邪火未甚也小柴胡解之黃色者心熱也用黃連山梔黃而帶灰色者胃熱也石膏知母黃而帶紅者小腸膀胱熱也用山梔若紅而白者肺熱也黃芩蘇葉黑而帶紅者腎虛挾邪也生地元參又入柴胡紅而有黑星者胃熱極也元參葛根紅而有白點者心中有邪也柴胡黃連心肝同治也紅而有大紅點者胃熱帶濕也茵陳五苓散蓋水濕必歸膀胱以散邪非肉桂不能引入膀胱但只可一二分不可多入白而帶黑點亦胃熱也宜石膏黃而有黑者肝經實熱也山梔柴胡白而黃者邪將入里也山梔柴胡解之不使入里柴胡乃半表半裡不可不用之藥也舌中白而外黃者邪入大腸也五苓散以分水水分則泄止矣舌中黃而外白者邪在內而非外在上而非下只可加柴胡枳殼不可輕用大黃舌根黃而光白亦胃熱帶濕也石膏為君少加豬苓澤瀉舌黃而隔一瓣一瓣者邪熱深入大腸急用大黃茵陳不可用抵當十棗若下已遲則不得不用之然亦須辨水與血下水十棗下血抵當也舌有紅中如蟲蝕者水未升而火來乘也黃連柴胡和解紅而裂如人字者邪初入心也石膏黃連舌根黑而尖帶紅者腎中有邪未散也柴胡山梔舌根黑而尖白者胃火乘腎也石膏元參知母不必問其渴與不渴及下利也舌根黑而尖黃者邪將入腎也其腹痛拒按急用大黃否亦只用山梔柴胡舌純紅獨尖黑者腎虛邪火來乘也元參或一二兩多有生者忌石膏中心紅暈四圍邊旁純黑者君相二火炎騰也急用大黃加生地兩許十可救五六中央灰色四邊微紅者邪結大腸也下之則愈不應則死以腎水枯槁不可竟用熟地補腎蓋邪未散補則愈加脹急必邪下而後以生地滋之然亦不可多用也純灰色中間獨兩暈黑者亦邪將入腎也急用元參兩許少加柴胡外紅而內黑者火極似水也急用柴胡山梔大黃枳實若更見刺則火亢之極矣尤須多用前藥總之內黑而外白內黑而外黃皆前症也與上同治十中亦可生四五惟舌中淡黑而外或淡紅外或淡白內或淡黃較前少輕俱可以前法治之十可生七八舌純紅而露黑紋數條者此水來乘火乃陰症也其舌苔必滑必惡寒惡水水下喉必吐倘見純黑之舌乃必死也不必治水極似火火極似水一帶純黑俱不可治傷寒知驗舌之法便有把握庶不致臨症差誤耳李中梓曰舌純黑有二種皆死症也有火極似水者為熱極大承氣湯有水來剋火者為寒極脈症必寒附子理中湯舌上白苔小柴胡湯舌上滑苔小柴胡去半夏加人參栝蔞湯心下逆滿硬痛附心痛綱仲景曰病心下硬滿者不可攻之攻之利遂不止者死利止者愈得病二三日脈弱無太陽柴胡症煩躁心下硬至四五日雖能食以小承氣湯少少與微和之傷寒吐下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯目吳綬曰凡心下滿者正在心之下胃之上也此自滿而非下之所致若因下早而心下滿者此為痞氣另有條也凡心下滿者以手按之揉之則散而軟者此虛氣也不發熱者木香和中湯發熱者小柴胡湯去黃芩減人參一半加姜炒黃連枳實各一錢若按之汨汨有聲者此有停水也若按之硬痛者有宿食也若不按而痛其人喜忘者蓄血也各有本條宜詳審而治之凡少陽脈弦口苦發熱心下滿者小柴胡加枳實黃連各一錢王肯堂曰有不因汗下而心下滿者經曰邪氣在胸心滿而煩飢不欲食當吐之又曰脈浮而大心下反硬有熱屬臟者攻之此言屬臟者宿屎在臟也不令發汗二者一用吐一用下因其邪之高下也又有不可下者即首條是也是邪在表裡之間留於心下未全入腑故戒不可下也有因汗下後心下滿而微痛者又有下後心下硬滿成結胸與痞者皆宜詳考之綱仲景曰陽明中風脈弦浮大短氣腹滿脅下及心痛鼻乾無汗嗜臥身黃小便難有潮熱時時噦者小柴胡湯傷寒五六日大下之後心中結痛者未欲解也梔子豉湯主之少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯目成無己曰傷寒五六日邪氣在裡之時若大下後身熱去心胸空者為欲解若大下後身熱去而心結痛者結胸也身熱不去心中結痛者虛煩也結胸者熱結胸中也為實是熱氣已收斂於內則外身熱去虛煩者熱客胸中也未結而實散漫為煩是以身熱不去六七日為欲解之時以熱為虛煩故云未欲解也以梔豉湯吐除之王肯堂曰身熱不去四字要玩結胸而身不熱知熱在表故可用大小陷胸湯丸以逐下之今熱仍在表故宜越之也成注未透懊憹綱仲景曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒而譫語若加燒針心怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之目成無己曰懊者懊惱憹者鬱悶鬱郁然不舒暢憒憒然無可奈比之煩悶而甚者也由下後表中陽邪乘虛內陷鬱而不發結伏於心胸之間故如是也本條之胃中空虛客氣動膈心中懊憹及下之益煩心中懊憹如飢即是陽氣內陷為諸懊憹也其治法或吐之或下之綱仲景曰發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之目成無己曰此條是邪熱鬱於胸中當須吐之以湧其結熱者也柯琴曰虛煩陽明之壞病也便從梔豉湯隨症治之猶太陽壞病多用桂枝湯加減也首句雖兼汗吐下而大意單指下後言以陽明病多誤在早下也反覆二句切肖不得眠之狀為虛煩二字傳神此火性搖動心無依著故也心居胃上即陽明之表凡心病皆陽明表邪故制梔豉湯以越之鰲按因虛煩故不得眠因不得眠故反覆顛倒因反覆顛倒故心中益覺懊憹數語形容盡致當作一氣讀總由陽明火熱之邪上炎搖動心君也綱仲景曰陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之目魏荔彤曰胃之實不實仍以熱之在裡在外為驗也如陽明表邪所變之熱已全入里而潮熱濈然汗出此宜作胃實而言下如所變熱未全入里乃以為胃實而遽下則其外仍熱究不能隨下藥而盪滌於是雖熱而不潮手足雖溫而無汗即不致如太陽誤下成結胸而懊憹不食但頭汗出其鬱熱之氣為陰寒之藥所格俱凝塞於胸膈之上病症昭然矣但病仍帶表既不可再下且已入里又不可復發汗故用梔豉表裡兼治也鰲按此與上條皆下後變症上焦之熱未除故心中懊憹也綱仲景曰陽明病無汗小便不利心中懊憹者必發黃陽明病下之心中懊憹而煩胃中有燥屎者可攻之腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯目許叔微曰此二條是邪熱結於胃中當須攻之以滌其內熱者也魏荔彤曰前既以小承氣試之又懊憹而煩胃中有燥屎明矣可用大承氣攻之勿疑懊憹而煩為胃虛而不敢用以坐誤也煩躁附怫鬱綱仲景曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒而譫語若加燒針心怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之目成無己曰內熱曰煩謂心中郁煩也外熱曰躁謂氣外熱躁也內熱謂有根之火故但煩不躁及先煩後躁者皆可治外熱為無根之火故但躁不煩及先躁後煩者皆不可治也所謂煩躁者謂先煩漸至躁也所謂躁煩者謂先發躁迤邐復煩也從煩至躁為熱未有不漸煩而躁者也先躁後煩謂怫鬱怫然更作煩悶此為陰盛格陽大躁若欲於泥水中臥水不得入口是也此氣欲絕而爭如燈將滅而暴明黃仲理曰煩躁者懊憹不得眠也懊憹者鬱悶不舒之貌煩者氣也火入於肺也躁者血也火入於腎也李梴曰心熱則煩腎熱則躁煩輕躁重先煩漸躁為陽症不煩便躁為陰症煩主氣躁主血肺主皮毛氣熱則煩腎主津液血熱則躁故仲景用梔子以治肺豆豉以治腎也綱仲景曰傷寒下後心煩腹滿起臥不安者梔子厚朴湯主之目朱震亨曰煩躁者氣隨火而升也陶華曰傷寒煩躁有陰陽虛實之別心熱則煩陽實陰虛腎熱則躁陰實陽虛煩乃熱輕躁乃熱重也綱仲景曰得病二三日脈弱無太陽柴胡症煩躁心下硬至四五日雖能食以小承氣少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯目李杲曰梔子治肺煩香豉治腎躁少氣虛滿者加甘草嘔噦者加生薑橘皮下後腹滿而煩梔子厚朴枳實湯身熱微煩梔子甘草乾薑湯火入肺煩也火入腎躁也煩躁俱在上者腎子通於肺母也發潤如油喘而不休總言肺絕鼻者肺之外候肺氣通於鼻鼻中氣出粗大是肺熱也發者血之餘腎氣主之發潤如油火迫腎水至高之分是水將絕也仲景以發潤喘大為肺絕兼其腎而言之發在高巔之上雖屬腎肺為五臟之至高故言肺絕兼腎也大抵肺腎相通肺既已絕腎不言而知其絕矣或曰煩者心為之煩躁者心為之躁何煩為肺躁為腎耶夫心者君火也與邪熱相接上下通熱金以之而躁水以之而虧獨存者火耳故肺腎與心合而為煩躁焉此煩雖肺躁雖腎實心火為之也若有宿食而煩躁者梔子大黃湯陶華曰有人傷寒八九日無汗身熱時時譫語因下後大便不通已三日矣非躁非煩非寒非痛終夜不得臥但心中無曉會處許學士診之曰此懊憹怫鬱二症俱作也胃中有燥屎服承氣湯下燥屎二十枚得利而解故仲景云小便不利大便難時有微熱怫鬱有燥屎也怫鬱者陽氣蒸越形於頭面體膚之間聚赤而不散也其症有分別如大便硬而氣短燥渴者實也大柴胡湯汗下後有此症飲水而噦者胃虛也桂苓人參湯加茯苓初得病發汗不徹並於陽明續自微汗出面色赤者陽氣怫鬱也解肌湯或汗不徹其脈浮緊者麻黃湯或小便不利時有微熱大便作難怫鬱不得臥此有燥屎作實也承氣湯虛煩綱仲景曰發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹者梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之目許叔微曰虛煩者心中鬱郁而煩也若止云煩者為表熱及邪熱傳裡故有胸中煩心中煩虛煩之別故凡煩皆熱以梔豉湯隨症治之所以湧去其熱也柯琴曰梔豉湯本為治煩躁設又可治虛煩以此知陽明之虛與太陽之虛不同陽明之煩與太陽之煩有別矣綱仲景曰下後更煩按之心下濡者為虛煩也宜梔子豉湯病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當吐之宜瓜蒂散目張云岐曰虛煩之狀心中溫溫然欲吐憒憒然無奈欲嘔不嘔擾擾亂亂是名煩也非吐則不能已此二條均是煩也藥均是吐也而有輕重之不同汗吐下後邪氣乘虛而入為煩者謂之虛煩梔豉湯是吐劑之輕者不因汗吐下邪結胸中則為膈實瓜蒂散是吐劑之重者柯琴曰更煩是既煩而復煩也要知陽明虛煩對胃家實熱而言是空虛之虛不是虛弱之虛二條是寒結胸中之脈症心下者胃口也滿者胃氣逆煩者胃氣盛也綱仲景曰傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之傷寒下後心煩腹滿起臥不安者梔子厚朴湯主之目成無己曰此二條與前發汗吐下後一條皆是因吐下發汗而煩者皆為內陷之煩故俱用取吐法以湧去其熱其有不經吐下發汗而煩者則又是傳經之熱不作膈實者也如少陽症心煩喜嘔或胸中煩而不嘔小柴胡湯少陰病二三日心中煩不得臥者黃連阿膠湯少陰病胸滿心煩者豬膚湯是皆用和解法而徹去其熱者也綱仲景曰傷寒二三日心中悸而煩者宜小建中湯目成無己曰陽明病不吐不下心煩者煩之熱者也此心中悸而煩煩之虛者也以悸為虛悸甚而煩故亦為虛也若少陽之邪入腑者煩而悸則又為熱大抵先煩而悸者是為熱先悸而煩者是為虛也短氣綱仲景曰趺陽脈微而緊緊則為寒微則為虛微緊相摶則為短氣目張元素曰此為短氣之虛者也成無己曰短氣者氣短而不能相續似喘非喘有氣上衝而實非氣上衝也喘則張口抬肩搖身滾肚氣上衝則腹裡氣時時上逆所謂短氣者呼吸雖數而不能相續似喘而不搖肩似呻吟而無痛也要識其短氣之真者氣急而短促俗謂之氣短者是也綱仲景曰陽明病脈遲微汗出不惡寒者其身不重短氣腹滿而喘有潮熱者此外欲解可攻裡也目張元素曰此為短氣之實者也綱仲景曰風濕相搏汗出短氣小便不利惡風不欲去衣甘草附子湯主之短氣但坐以汗出不徹故也目張元素曰此邪在表而短氣者也陶華曰短氣者呼吸短促不能相續也千金方謂少氣不足以息也大抵心腹脹滿而短氣者邪在裡而為實承氣湯下之心腹濡滿而短氣者邪在表而為虛桂枝湯解之食少飲多水停心下而短氣者小半夏湯主之李中梓曰若汗出不徹以致短氣葛根加人參湯水停心下短氣五苓散綱仲景曰乾嘔短氣汗出不惡寒者此表解里故未和也十棗湯主之太陽病醫反下之短氣煩躁心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之目張元素曰此邪在裡而短氣者也成無己曰虛也實也在表也在裡也皆作短氣又何以辨虛實也大凡心腹脹滿而短氣者邪在裡而為實也胸腹濡滿而短氣者邪在表而為虛也王肯堂曰短氣骨節痛不得屈伸汗出小便不利惡風身腫者由於風濕宜甘草附子湯短氣腹滿脅痛若脈浮弦大外不解無汗嗜臥身黃小便難有潮熱者小柴胡湯此皆為表症若表未解手足濈然汗出或有潮熱者宜大承氣湯若表解心下痞硬乾嘔短氣者宜十棗湯此皆為里症短氣煩躁若發汗不徹續微汗出不惡寒表症不罷面赤者為並病更發汗則愈此為汗不徹之症若下後心中懊憹心下硬痛者大陷胸湯此為下後之症吳綬曰因汗吐下後元氣虛弱脈來微虛氣不能相接而短少者人參益氣湯凡陰症脈弱沉細而遲手足逆冷面上惡寒如刀刮口鼻之氣難以布息而短者四逆湯加人參又食少飲多水停心下令人短氣煩悶茯苓甘草湯不得臥綱仲景曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若加燒針心怵惕煩躁不得眠梔子豉湯主之發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之傷寒下後心煩腹滿起臥不安者梔子厚朴湯主之目朱肱曰汗為火之液汗多則神昏故不眠大熱則神不清故不眠大下則動血心主血故不眠瘥後熱氣未散陰氣未復故不眠吳綬曰陽明標病頭額痛目疼身熱鼻乾不得臥脈長者葛根解肌湯若自汗脈洪數表裡俱熱煩渴舌燥飲水者白虎加人參湯蒸蒸發熱大便秘硬者調胃承氣湯外有傷寒已解或因食復煩劇乾嘔口燥呻吟錯語不得眠黃連解毒湯表裡大熱舌燥飲水人參白虎湯合解毒湯若太陽脈浮數身疼無汗煩躁不得眠者汗之則愈凡少陽發熱口苦心煩不得眠脈弦數者小柴胡加山梔黃連若虛弱人津液不足者加麥冬棗仁凡汗下後虛煩不得眠者加味溫膽湯酸棗仁湯梔子烏梅湯硃砂安神丸選而用之柯琴曰三條心煩則難臥腹滿則難起起臥不安是心移熱於胃與反覆顛倒之虛煩不同梔子以治煩枳樸以泄滿此兩解心腹之妙劑也熱已入胃則不當吐便未燥硬則不可下此為小承氣之先著綱仲景曰病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯目王肯堂曰不得眠陰陽皆有之正病有因汗下而然者有不因汗下而然者有因火逆而然者但不得眠皆為熱症其有太陽汗下之後晝日煩躁不得眠一症雖用乾薑附子湯蓋復其汗下所亡之陽非治其所感寒也魏荔彤曰小便不利大便忽難忽易胃固未成實不應下而燥屎為病滋甚容漠視乎加以時有微熱即煩躁發作有時之兆也乃更下不通而上逆作喘陰不降而陽升為冒臥則不寧坐則少息其腸胃有燥屎曉然矣此亦毋論胃腑積熱實與不實但從燥屎起見無不可攻用大承氣亦盪滌濁汙使清氣流行也身癢綱仲景曰陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也目趙嗣真曰蟲行皮中狀者即太陽症言身癢是也久虛者以表氣不足津液不充於皮膚使腠理枯澀汗難出也若謂虛則當補畢究陽明受邪為病邪可補乎如活人用朮附湯黃耆建中湯輩皆收汗藥則榮衛鬱閉邪無從出內熱發矣何況又無吐利胃虛等症病不在裡但皮膚中表氣虛乏理宜和解可也莫若借用合半湯或有熱者柴胡桂枝湯庶幾甘辛之劑可以和其榮衛通行津液而解也程郊倩曰此胃熱協寒邪而鬱於肌膚之症也言久虛者明所以不能透出肌表之故也方中行曰陽明主肌肉腠理開宜多汗故以無汗為反也無汗則寒勝而腠理秘所以身如蟲行狀也魏荔彤曰如蟲行皮中狀者此邪熱欲出表作熱作汗而正氣衰弱不能達之也所以胃亦不能成實也明以久虛治者欲其熱透表必令其汗透表然陽明已成里症且中氣虛又無發汗法惟有清其熱補其虛而已但此汗非發汗也亦非解肌也乃補虛清熱兩解表裡喻氏謂如人參白虎湯是也此症言胃虛熱則可言胃寒則無據太陽篇病將入里成胃實多言胃未成實不可遽下合此可知病初傳入陽明亦多在經而不歸腑不可遽謂除下法無他治也身重綱仲景曰陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之目成無己曰身重之由有風濕有風寒有風寒濕俱見有火逆有易病有三陽合病雖所得不一然悉屬三陽非但若身疼兼有裡寒也壞病有矣寒則無之識者鑑之魏荔彤曰潮熱二字原兼汗出而言太陽發熱汗出自是汗陽明大熱汗出自是潮潮者潮潤汗者汗漫各有意象諺謂潮濕即此乃由熱氣薰蒸鬱悶而作潮濕者熱也濕既潮矣無不兼熱不兼熱則寒濕矣方喻謂潮熱在申酉戌三時燥氣盛行而作誤也潮熱若必於此三時至不又為少陽之病乎不幾為太陽如瘧狀乎何取於陽明也他條曰太陽病三日發汗不解蒸蒸發熱者屬胃也詳蒸蒸之意潮熱之義可見蓋三日發汗不解必發汗不如法乃表症轉屬於里而蒸蒸發熱也太陽發熱自表而入里之熱陽明發熱自里而出表之熱太陽汗出而熱汗自汗熱自熱陽明汗出而熱熱揣之有似汗汗揣之有似熱大約其熱經胃腑鬱悶而出與在表衛疏自出之汗形狀迥異黏滯濕膩著於衣被必黏按之手足如蒸此乃汗熱二症各為一症以此驗胃熱洵要訣也觀此而三時作熱之非明矣脈經云沾汗者即潮熱也綱仲景曰三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯目成無己曰腹滿身重難轉側口不仁譫語者陽明也針經曰少陽病甚則面微塵此面垢者少陽也遺尿者太陽也以陽明症多故出陽明篇中三陽合病為表裡有邪若發汗攻表則燥熱益甚必愈譫語若下之表熱乘虛內陷必額汗肢冷自汗出者三陽經熱甚也張元素曰身重難轉側者下後血虛津液不榮於身也身疼不能轉側者風濕搏於經而里無邪也故二湯各有所主鰲按太陽少陽少陰皆有身重然非三經主病故專列款於陽明其餘諸款有特見於一經者亦從此例有二經並舉三經並舉者則以其款在三經二經中俱為主病之故閱者以意會之可也如身重難轉側為陽明主病因列陽明經其太陽少陽少陰雖亦有身重難轉側症而不但不於三經中各舉此款並不煩贅於陽明經者以所主為重也其他各經各款皆然可以類推
