front:
  text: 自序內經揭傷寒之症未詳傷寒之變自仲景創論分陰陽析六經立方治人始知傷寒之病之大與傷寒之病之治矣而實未知其所以大所以治也傷寒之病有傳經有直中有始終不傳有風寒交中千態萬狀棼如亂絲稍涉疑似汗吐下誤施致生他變又復誤治至再至三其焉有不斃者乎乃猶語於人曰吾固用仲景法其如病之不治何夫不知病之所犯於臟腑經絡輕重虛實之何若而但云用仲景法其曷有濟乃又詭言仲景但知治外感不知治內傷又詭言但取仲景法不取仲景方夫方因法立法就方施仲景方果不足取仲景之法亦非法矣不知一百一十三方方方皆活三百九十七法法法皆通即其法與方融會貫通之誠有取之無盡用之不竭者人顧不此之思欲妄言以文其謬可慨已廿年來余專讀傷寒書至百餘家人各一說不勝繁冗駁雜之慮倘欲學者如是以為業恐白首不獲所據不如是以為業又空空罔所識知乃不揣著為綱目一書循六經之次析各款之繁以仲景論為綱歷代諸家之語足以闡明仲景者為目庶覽是書者可尋流溯源而曉然於仲景之旨矣時乾隆三十九年甲午十一月中浣沈金鰲芊錄氏書
  hash: sha256:945e3fc6c224a8fc28ecf9c9a1e1587f11ddd155c2412c1dde21dc8a703b2fde
