body:
  text: 凡例一是書各循三陽三陰之六經而又析六經所發之款症不循經但據款析言之則如各經皆有頭痛之類難於識別不析款但循經挨言之則又依文順義不能令讀者一覽易曉故循經析款是書所由以成一仲景傷寒書自叔和竄亂後其六經條款凡註釋家各以意為前後訖無一定獨柯氏論注其分隸六經者頗有理據今綱目所定皆依柯本一論者即仲景之傷寒論仲景有論繼仲景而言者亦為傷寒論也一綱也者以為主也傷寒之論創自仲景故獨主仲景而取其論以為綱目也者以為發明也仲景論後說者無慮千百家然或偏或駁或淺或庸無足取者甚多故獨採叔和以下若干家各摘其語之尤精且當者以為目一各經各款引仲景之論為綱固已或有遺而未備者必其與逐款無關不便夾入或語意與所已錄者大同小異故亦置之亦有條款太繁不必備錄者閱者當為意會毋以掛漏為咎一各經條款彼此相同如各經俱備載毋論已其有詳於此經不復贅於他經者或因候治相同或因所列之款相互須彼此連及故他經不必再詳閱者當以意會前後參看毋得拘泥一採輯前人諸說或由理勢所及或因仲景論之前後相附不以世代之遠近為拘一諸家方論俱系專集擇其至精至當者錄之固已駢珠刻玉各咀其英各擷其髓矣癸巳春從邑中嵇氏假得欽定古今圖書集成中藝術部按次而詳讀之不啻深入龍宮海藏遍賞奇寶非復人間耳目近玩矣私心竊喜故特表而志之
