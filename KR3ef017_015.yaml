body:
  text: 卷十三太陰經症太陰經脈綱仲景曰傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至六七日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也目朱肱曰足太陰脾之經為三陰之首其脈布於脾胃絡於嗌喉故病人腹滿而嗌乾尺寸俱沉細者知太陰經受病也傷寒四五日腹滿咽乾手足自溫或下利不渴或腹滿時痛尺寸脈俱沉細此足太陰脾經受病也傷寒手足必微冷若手足自溫者系太陰也自利不止屬太陰也腹滿時痛屬太陰也自利不渴者臟寒也當溫之宜四逆湯理中湯也腹滿脈浮者可桂枝微發汗腹痛者桂枝加芍藥湯甚者桂枝加大黃湯魏荔彤曰脈浮緩手足溫此近太陽中風而手足不能發熱則脾臟素有濕邪與風寒變熱之邪相溷所以不能作大熱於外而實蓄深熱於內明其系在太陰身當發黃同於太陽發黃等症蓄熱於裡之義也若小便利濕泄而熱去故不能發黃在陽明篇已言之重見於此者彼以太陽初入陽明者言其脾素有濕則不能成胃實表邪熱入止為發黃症蓋胃實本津液內竭盛熱成實之症既有濕邪亦津液也故不成胃實而成發黃逮七八日熱邪久已耗液故覆成胃實以大便硬為驗仲師於彼指之為陽明病起見與太陰病迥不同也此條亦由太陽初入然病終不歸陽明故仲師指出太陰脾家實當風寒變熱傳入特以脾素濕則邪熱之投濕如煙投水俱趨於脾而為患也故不能發黃以上均於陽明所言同但此至七八日不惟大便不硬卻暴煩下利日十餘行者病之初入同病之去向分也熱勝濕遂成胃實便硬濕勝熱濕留而熱欲去遂成脾實下利此胃實脾實之分關不出濕熱二字也濕陰邪凝滯可以留熱陽邪迅捷必欲出小便既泄不盡又不發黃熱從何出必隨濕下流歸於大便平日為泄為熱所停蓄腐穢之物無不隨之而去有不容自已之勢也此脾實系太陰胃實屬陽明止在濕熱分關遂為兩經判然之症也至二條俱未出方蓋陽明則胃實宜四承氣隨人調劑太陰則脾實下利未利前如何除濕燥土既利後如何補中益脾或兼除濕清熱又在人審量焉且使腐穢一瀉得愈亦可不必方治矣喻昌曰太陰脈本緩故浮緩雖類太陽中風然手足自溫則不似太陽之發熱更不似少陰厥陰之四逆與厥所以系在太陰不能發黃以上與陽明篇中語句皆同但彼以胃實而便硬其症復轉陽明此以脾實而下穢腐其症止屬太陰耳至七八日暴煩下利日十餘行其症又與少陰無別而腐穢盡利當自止則不似少陰之煩躁有加下利漫無止期也況少陰之煩而下利手足反溫脈緊反去者仍為欲愈之候若不辨析誤以四逆法治之反增危矣綱仲景曰傷寒下利日十餘行脈反實者死目虞摶曰脾氣虛而邪氣盛故脈反實也綱仲景曰太陰病脈弱其人續自便利設當行大黃芍藥宜減之以其胃氣弱易動故也目喻昌曰此段叮嚀與陽明篇中互發陽明曰不轉失氣曰先硬後溏曰未定成硬皆是恐傷太陰脾氣此曰脈弱便利減用大黃芍藥又恐傷陽明胃氣也綱仲景曰惡寒脈微而復利亡血也四逆加人參湯主之目朱肱曰病有無熱惡寒者發於陰也發於陰者宜溫里脈必微或沉細屬四逆加人參湯四逆湯理中湯也若發熱微惡寒者屬柴胡桂枝湯也鰲按以其惡寒未罷故宜四逆以其脈微為無血故宜加人參綱仲景曰太陰病脈浮者可發汗宜桂枝湯目朱肱曰問古人以四日太陰症發病在胸膈可吐而愈何也答曰不然有太陰症脈大胸滿多痰者可吐之脈大而無痰症者可汗而已大抵在表者汗之在裡者下之在上者湧之在下者泄之瓜蒂梔豉隨症施用不可以日數拘也魏荔彤曰邪自太陽而陽明而少陽遞及太陰法當還升之少陽使由少陽之半表透太陽之表亦兼在陽經之治也太陰病而脈不沉緩卻見浮則傳入陰經之邪復思遠陽而去也可急發汗俾得外越而病可已矣在太陽麻黃為發汗桂枝為解肌此言桂枝發汗非發汗即解肌也蓋用桂枝湯中芍藥引桂薑之辛溫入陰分而驅傳入之邪所謂陽因陰用也且桂芍俱能走肝更可引太陰之邪由少陽傳入者還回少陽而出此桂枝湯但見太陰脈浮即可汗未可拘風因用桂枝寒因用麻黃之説也邪在太陽陽明尚分風寒兩因之來路及由陽明而少陽已不可復分更傳太陰豈能分風因寒因哉再者麻黃湯一概辛熱不能入陰分即寒因可辨亦不宜用兼之無隔少陽而驅入太陽之理麻黃湯之力但輕清上升達於太陽亦不能假少陽之道也故不言麻黃湯非漏也亦非舉桂枝以概之也知此則太陰邪之出路必由少陽以返太陽而他説俱不足以惑之矣麻黃湯之走陰分在營血則能入以在太陽之表入三陰之陰分則不能入以其升而不降也此亦宜知綱仲景曰太陰中風四肢煩疼陽微陰澀而長者為欲愈目方中行曰四肢煩疼者脾主四肢亦風淫末疾之明驗也魏荔彤曰脈見長則邪自太陰欲還復少陽必矣脾為臟里經邪內陷則症見腹滿痛吐不能食等症若經邪欲外出則症見於四末而不久於內陷可知矣於是陽微陰澀邪已有浸浸透至營衛之勢兼以弦長見少陽之門戶闢而生髮之氣已動矣更得四末之間蠢然煩疼汗出發熱其邪純回太陽矣邪不由太陽而去烏能自止乎寒實結胸綱仲景曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬目張元素曰太陰本症惟腹滿自利而已若邪迫於上則吐而食不下也邪迫於下則利甚而腹滿也上下相迫必上下交亂胃中空虛法只可行溫散之劑其病自痊若誤下之必在下之邪去而在上之邪陷有不至於胸下結硬者哉魏荔彤曰邪自外感太陽先中之邪自內傳太陰先受之少陽之邪既不能由半表而達表必由半里而入里而里三陰之太陰又為三陰之表內經云太陰主開是也所以少陽之邪傳經必先及太陰亦不離內外表里之義而已矣腹滿而吐食不下自利腹痛純為太陰濕土失鎮奠之令故症全見於腸胃肚腹之間本為三陽之邪陷入陰經為患法當升散其邪復還陽分若以滿痛為實邪而下之則陽愈陷而下沉陰愈凝而不散胸下結硬有似太陽之結胸而在下有似太陽之心下痞而又在上胸下結硬所以為太陰誤下獨見之症者如此傷寒傳經之邪無論在太陽為風因寒因及遍歷三陽皆成熱邪復由陽而入陰或誤下誤汗又能變虛生寒此病之變易莫測也惟其為熱邪所以作滿而能吐若寒邪但脹滿不食必不能上逆為嘔吐矣自利而時腹痛利為挾熱時痛亦熱邪若寒邪則痛隱隱無已時矣所以知其確為熱邪也況凡病初得為寒久痛多熱亦理之常太陽風寒之邪傳陽明時已變熱矣未有無所因而忽又變寒入三陰者如謂入三陰即為寒何以有系在太陰之發黃也發黃亦為寒邪耶又何以三陰篇中用苦寒之劑仲師立法不一而足豈智不足耶總由傳經與直中之邪分路不明故見仲師立一溫散之法便謂傳經為寒邪及見一恣用苦寒之法便自己亦説不周全遂含糊了事便罷余不得不於三陰之首條力爭之曰直中有寒傳經悉熱八字鐵案此二語確乎不易再太陽結胸痞皆經誤下而成亦屬風寒在表之邪日久變熱遂成結聚特風邪陽聚於高分寒邪陰聚於低分然風因寒因俱為已變熱之邪無異也所以陷胸瀉心內俱有苦寒之味今此胸下結硬又豈能外陷胸瀉心別求門路乎或問仲師意在溫散子言陷胸瀉心何也曰仲師溫散為太陰未誤下言非為已下成胸下結硬者言也亦如太陽未誤下用辛溫已誤下用苦寒也三陽為表三陰為里固矣三陽有三陽之表裡三陰有三陰之表裡豈可一陽而盡表之理一陰而盡陰之道乎此乃傷寒中之大關鍵也綱仲景曰寒實結胸無熱症者與三白小陷胸湯為散亦可服目柯琴曰太陽表熱未除而反下之熱邪與寒水相結成熱實結胸太陰腹滿時痛而反下之寒邪與寒藥相結成寒實結胸也無熱症者不四肢煩疼也腹滿腹痛綱仲景曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬目朱肱曰本太陽病醫反下之因爾腹滿時痛是有表復有里仲景所以用桂枝加芍藥湯甚者加大黃桂枝加芍藥即是小建中也仲景云太陰脈弱自利設當行大黃芍藥者宜減之其人胃虛陽氣易動之故下利者先煎芍藥十餘沸腹痛有二症有熱痛有冷痛尺脈弦腸鳴泄利而痛者冷痛也小建中湯不瘥者小柴胡湯陰症腹痛即四逆散四逆加芍藥湯腹痛小便不利者真武湯關脈實腹滿大便祕按之而痛者熱痛也桂枝加大黃黃連湯大承氣湯太陰大約可溫然須有積方可下也何謂積症太陰腹滿時痛胸膈不快䐜滿閉塞唇青手足冷脈沉細少情緒或腹痛此名太陰也近人都不識陰症才見胸膈不快便投熱藥非其治也大抵陰症者由冷物傷脾胃陰經受之也主胸膈脹䐜面色及唇皆無色澤手足冷脈沉細少情緒亦不因嗜欲但內傷冷物或損動胃氣遂成陰症復投巴豆之類胸膈愈不快或吐而利經一二日遂致不救蓋不知寒中太陰也問萬一飲食不節寒中陰經何法以治曰理中加青皮陳皮一二劑胸膈即快枳實理中丸五積散太陰脾經主胸膈滿甲乙經曰賊風虛邪者陽受之飲食不節起居不時者陰受之陽受則入腑陰受則入臟入腑則身熱不時上為喘呼入臟則䐜滿閉塞下為飧泄久為腸澼腹脹滿者陰陽不和也桔梗半夏湯最良仲景論太陽病發汗後腹脹滿者厚朴生薑半夏甘草人參湯下後心煩腹滿臥起不安者梔子厚朴湯吐後腹脹滿者調胃承氣湯成無己曰腹滿者俗謂之肚脹也華他曰傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃入胃謂入腑也是在腹猶未全入里也雖腹滿為里症亦有淺深之別經曰表已解而內不消非大滿猶生寒熱則病不除是其未全入腑若大滿大實堅有燥屎自可下之雖四五日不害謂之邪氣已入腑也傷寒邪入腹是里症已深故腹滿乃可下如經曰其熱不潮未可與承氣若腹大滿不通者可與小承氣本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯大實痛者桂枝加大黃湯少陰症腹脹不大便者急下之諸如此者皆為里症是也雖曰腹滿痛為實然腹滿不減則為實可下腹滿時減則為虛不可下以溫藥和之蓋虛氣留脹亦為之脹但比之實者不至堅痛也王肯堂曰結胸從心下起至少腹硬滿而痛與腹滿類也然結胸按之痛手不可近腹滿痛舉按常痛手近不甚也痞亦從心下起至少腹亦與腹滿類也然痞或止留心下腹滿但在腹之中也邪入里與正搏則為腹痛所以痛有異腹痛屬裡正太陽腹不痛少陽亦胸脅痛而無腹痛若陽明腹滿急而痛此為裡實宜下大柴胡小承氣三陰下利清穀而又腹痛裡寒故也此總論太陽經陽中之陰四逆湯附子理中湯陽氣傳太陰經腹滿而痛其症有二有實痛有虛痛腸鳴泄利而痛者虛痛也此獨論太陰經陰中之陽小建中湯即桂枝加芍藥湯但桂有厚薄爾不瘥小柴胡去芩加芍如數腹滿便祕按之痛者實痛也桂枝湯加大黃一錢此虛痛實痛乃是以陽邪漸消為虛陽氣盛大為實吳綬曰凡腹痛可按可揉者內虛也不可按不可揉者內實也海藏言中脘痛者屬脾土脈沉遲內寒者理中湯附子理中丸陽脈澀陰脈弦小建中若小腹痛屬厥陰經分當歸四逆湯加吳萸厥逆者同如大實腹滿痛繞臍刺痛不大便脈實大承氣凡潮熱不大便從心下至少腹硬滿而痛手不可近大陷胸若脈弦腹痛無熱無寒芍藥甘草湯脈弦口苦發熱腹痛小柴胡去人參加炒白芍若寒熱交作腹痛加肉桂白芍若寒多而痛去黃芩加肉桂白芍凡少陰發熱手足冷腹痛四逆散加附桂萸芍凡發熱脈洪弦腹痛芍藥黃芩湯凡蓄血亦令人腹痛手不可近腹痛欲吐利而煩躁者多有痧毒世俗刮刺委中穴柯琴曰太陰之上濕氣主之腹痛吐利從濕化也故人傷於濕脾先受之然寒濕入於陰經不能動臟則還入於胃腑太陰經布胃中又發於胃胃中寒濕故食不納而吐利也太陰脈從足入腹寒氣時上故腹時自痛法當溫中散寒若誤下胃口受寒故胸下結硬綱仲景曰傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也目許叔微曰難經曰痛為實脾家實者知其實必痛也大抵痛宜下成無己曰腹滿太陰症也陽熱為邪者則腹滿而咽乾陰寒為邪者則腹滿而吐食不下自利益甚時腹自痛太陰者脾土也治中央故專主腹滿之候又發汗吐下後成腹滿者皆邪氣乘虛內客為之而所主又各不同經曰發汗後腹脹滿者厚朴生薑甘草半夏人參湯傷寒吐後腹脹滿者調胃承氣湯傷寒下後心煩腹脹滿臥起不安者梔子厚朴湯三者有當溫有當下有當吐何也邪氣不一也且發汗則邪之在表者雖去而汗多亡陽致胃氣虛不能敷布諸氣壅滯而為脹滿者是當溫散吐後邪之在胸中者能去則安若不能去致胸中之邪下傳入胃而為實遂生脹滿者是又當下妄下後邪氣在表未經入腑者遂自表乘虛而入鬱於胸中致為虛煩氣上下不得通腹為之脹者是又當吐醫者要識邪氣所自知其由來觀邪氣所在知其虛實汗吐下之不瘥則可矣鰲按脾家實即腐穢也綱仲景曰傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也目柯琴曰此自利之兆也四五日是太陰發病之期吐利綱仲景曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬目柯琴曰腹痛吐利從濕化也太陰脈布胃中又發於胃胃中寒濕故食不內而吐利交作也綱仲景曰自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也目劉完素曰仲景大意以自利不渴屬太陰之為病蓋太陰脾屬濕土若熱邪入脾必蒸動其濕濕動則不渴而身黃又以自利而渴屬少陰之為病蓋少陰腎屬寒水若熱邪入腎必消鑠其水水消則口渴而煩躁分經辨症其所關不甚大哉魏荔彤曰此言太陰病之有寒症以見異於傳經而入之熱邪另立法以別之也太陰為臟屬陰而太陰為經自是陰中之表傳經之邪本風寒而變熱遞傳自是熱邪固已然有太陰臟中本寒而得病者又當另為諦審其症而治之不容混言熱邪以貽誤蓋自利未有不渴者自利而不渴則非太陰之經病而太陰之臟病也經為里之表臟為里之裡其人脾臟之陽素虧寒濕凝滯則斡運不行所以腸胃水穀不分下泄益甚此欲執升散經邪之法必不對矣故當溫之溫之者溫其臟也服四逆輩不專主一方不出溫之之義耳凡傷寒六經之邪皆當論其標本以分經病臟腑病不然本經即混矣況合病並病及遞傳之間或盡傳不盡傳之辨愈渺然矣再此自利乃未誤汗吐下者故知其臟本寒非藥所致也既云自利又云臟寒非誤治亦非傳經可謂寒邪直中太陰矣少陰厥陰俱有直中少陰直中寒也厥陰直中風也太陰直中其此症乎蓋太陰直中中濕也風寒濕雖分三邪俱以寒邪為宗主也綱仲景曰傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行以脾家實腐穢當去故也目鰲按前半身當發黃是太陰寒濕傷於表後半暴煩下利是太陰濕熱蓄於內然寒濕之傷於表者因小便而出故小便自利則身不發黃濕熱之傷於內者必從大便而出故下利日十餘行而自止蓋發於陰者六日愈七八日則陽氣復因而暴煩下利夫利至日十餘行其腐穢當盡去故必自止也惟表陽仍在故手足溫惟里陽陡發故暴煩此陰中有陽與前臟寒症純陰無陽者迥別綱仲景曰太陰病脈弱其人續自便利設當行大黃芍藥者宜減之以其胃氣弱易動故也目柯琴曰下利為太陰本症自利因脾實者腐穢盡則愈自利因臟寒者四逆輩溫之則愈若自利因太陽誤下者則腹滿時痛當加芍藥大實痛者當加大黃此下後脈弱胃氣亦弱故減其制而與之也大黃瀉胃是陽明血分下藥芍藥瀉脾是太陰氣分下藥下利腹痛熱邪為患宜芍藥下之下利腹痛為陰寒者非芍藥所宜矣仲景於此並提勿草草看過綱仲景曰惡寒脈微而復利亡血也四逆加人參湯主之目張兼善曰利則止矣以猶惡寒仍宜四逆以脈微無血故加人參綱仲景曰病在膈上必吐在膈下者必利目柯琴曰本症原是吐利因胸下結硬故不能通因勢而利導之結硬自除矣綱仲景曰傷寒下利日十餘行脈反實者死目柯琴曰脾氣虛而邪氣盛故脈反實也汗後寒熱不解綱仲景曰太陰病脈浮者可發汗宜桂枝湯目朱肱曰太陰症發汗後依前寒熱者須看脈如何若浮數或洪大則表症猶在再表可也如桂枝湯桂枝二麻黃一湯之類醫人為見已汗或已下而發寒熱不敢再表誤矣蓋脈浮為在表表之必愈也李中梓曰或表邪未盡或邪傳裡或邪氣乘虛內客故雖汗而病仍在也張從正曰脈浮病在表也即已經發汗或自汗而脈仍浮表猶有風熱未盡可再汗之附録三陰病或熱或寒辨王履曰嘗讀仲景傷寒論於太陰有曰自利不渴者屬太陰以其臟有寒故也當溫之宜四逆輩於少陰有曰少陰病得之一二日口中和其背惡寒者當灸之少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰病下利白通湯少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯少陰病脈沉者急溫之四逆湯於厥陰有曰手足厥寒脈細欲絶者當歸四逆湯大汗若大下利而厥冷者四逆湯觀仲景此論則傷寒三陰必有寒症而宜用溫熱之劑也及讀劉守真之書有曰傷寒邪熱在表腑病為陽邪熱在裡臟病為陰俗妄謂有寒熱陰陽異症誤人久矣寒病有矣非汗病之謂也寒病止為雜病終莫能為汗病且汗液之氣乃陽熱之氣非陰寒所能也雖仲景有四逆湯症是治表熱里和誤以寒藥下之太早表熱入里下利不止及或表熱裡寒自利急以四逆溫藥利止里和急解其表也故仲景四逆湯症復有承氣下之者由是傷寒汗病經直言熱病而不言寒也經言三陰症者邪熱在臟在裡以臟與里為陰當下熱者也素問論傷寒熱病有二篇名曰熱竟無寒理兼素問靈樞諸篇運氣造化之理推之則為熱病誠非寒也觀守真此論則傷寒無問在表在裡與夫三陽三陰皆一於為熱而決無或寒者矣成注亦只隨文略釋並不明言何由為熱何由為寒之故彼蓋止知傷寒皆是傳經故疑於六經所傳俱為熱症而熱無變寒之理遂不敢別白耳以寒為本臟之寒歟安得當熱邪傳裡入深之時反獨見寒而不見熱且所用溫熱藥能不助傳經之熱邪乎以寒為外邪之寒歟則在三陽已成熱矣豈有傳至三陰而反為寒哉成氏能潛心於此則必語其所以然矣自仲景作傷寒論靡不宗之後人不能決於似是而非之際故或謂今世無真傷寒或謂今人皆病內傷或謂論中諸溫藥悉為傳經熱邪用者以三陰經屬陰故也又或謂論中凡有寒字皆當作熱字其謬一至於此殊不知三陽之病其寒邪之在太陽也寒鬱其陽陽不暢而成熱陽雖人身之正氣既郁為邪用麻黃髮表以逐其寒則腠理通而鬱熱泄故汗而愈苟或不汗不解其熱不得外泄則必里入故傳陽明傳少陽而或入腑也若夫三陰之病則或寒或熱者何哉蓋寒邪之傷人也或有在太陽經鬱熱然後以次而傳至陰經者或有太陽不傳陽明少陽便傳三陰經者或有寒邪不從三陽始直傷陰經者或有雖從太陽始不及鬱熱即入少陰而獨見少陰症者或有太陽始即入少陰而太陽不能無傷者或有直傷即入而寒便變熱及始寒而終熱者其鬱熱傳經與變熱則為熱症其直傷陰經及從太陽即入少陰則為寒症其太陽不能無傷則少陰脈症而兼見太陽標病其始為寒而終變熱則先見寒症而後見熱症此三陰之病所以或寒或熱也苟即三陰經諸篇細繹之理斯出矣夫其或傳經或直傷或即入或先寒後熱者何也邪氣暴卒本無定情而傳變不常故耳故經曰邪之中人也無有常或中於陽或中於陰彼守真非好為説以駭人由其以溫暑為傷寒而仲景之方每不與溫暑對故略乎溫熱之劑而例用寒涼由其以傷寒一斷為熱而無寒故謂四逆為寒藥誤下表熱里和之症及為表熱裡寒自利之症而立又謂溫里止利急解其表又謂寒病止為雜病嗟乎仲景傷寒論專為中而即病之傷寒作不兼為不即病之溫暑作故每有三陰之寒症而溫熱之劑之所以用也且如寒藥誤下而成裡寒者固不為無矣不因寒藥誤下而自為裡寒者其可謂之必無乎殊不知陰經之每見寒症本由寒邪不由陽經直傷於此與夫雖由陽經始不及鬱熱即入於此而致也雖或有因寒藥誤下而致者蓋亦甚少仲景所以用諸溫熱之劑何嘗單為寒藥誤下而立況表裡俱寒之症何嘗每有急解其表之文乎夫裡寒外熱之症乃是寒邪入客於內迫陽於外或是虛陽之氣自作外熱之狀耳非真熱邪所為也況仲景於裡寒外熱之症但以溫藥治里而不治外熱則知其所以為治之意矣茲果當急解其表豈不於裡和之後明言之乎夫內經所敘三陰病一於為熱者言其常也仲景所敘三陰病兼乎寒熱言其變也重行而不悖耳學者能知三陰固有寒邪所為之症則仲景創法之本意可以瞭然矣且仲景曰病發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈夫謂之無熱惡寒則知非陽經之鬱熱矣謂之發於陰則知不從陽經傳至此矣謂之六日愈則知其不始太陽而止自陰經發病之日而始數之矣仲景又曰傷寒一二日至四五日而厥者必發熱傷寒病厥五日熱亦五日設六日當復厥不厥者自愈傷寒厥四日熱反三日復厥五日其病為進夫得傷寒未為熱即為厥者豈亦由傳經入深之熱邪而致此乎今人多有始得病時便見諸寒症而並無或熱者此則直傷陰經即入陰經者也苟不能究仲景之心但執凡傷於寒即為病熱之語以為治其不夭人天年者幾希矣發黃綱仲景曰傷寒脈浮而緩手足自溫系在太陰太陰當發身黃若小便自利者不能發黃以脾家實腐穢當去故也目樓英曰凡身黃小便自利小腹硬而狂大便黑者為蓄血宜抵當湯若小便不硬其人不狂大便不黑者雖小便利非蓄血也其為症有三一者梔子柏皮湯二者麻黃連翹赤小豆湯皆治身黃小便利而身不疼者海藏所云干黃是也三者桂枝附子去桂加白朮湯皆治身黃小便利而一身盡痛者活人所謂中濕也張云岐曰或謂傷寒發黃惟陽明太陰兩經有之俱言小便利者不能發黃何也蓋黃者土之正色以陽明太陰俱屬土故發黃也其黃之裡外不能汗里不得小便脾胃之土為熱所蒸故色見於外為黃也若小便利者熱不內蓄故不能變黃也其有別經發黃者亦由脾胃之土兼受邪故也王好古曰身如煙燻黃一身盡痛乃濕病也身如橘子黃一身不痛乃黃病也傷寒病遇太陽太陰司天若下之太過往往變成陰黃一則寒水太過水來犯土一則土氣不及水反侵之多變此疾一則發黃小便不利煩躁而渴用茵陳湯加二苓滑石當歸官桂此韓氏名茵陳茯苓湯二則發黃煩躁喘嘔不渴茵陳湯加陳皮白朮生薑半夏茯苓此韓氏名茵陳橘皮湯三則發黃四肢遍身冷者茵陳湯加附子甘草此韓氏名茵陳附子湯四則發黃肢體逆冷腰上自汗茵陳湯加乾薑附子甘草此韓氏名茵陳薑附湯五則發黃冷汗不止者茵陳湯加乾薑附子此韓氏名茵陳乾薑湯六則發黃前服薑附諸藥未已脈尚遲者茵陳湯加吳萸附子木通乾薑當歸此韓氏名茵陳吳萸湯往來寒熱一身盡黃者小柴胡加梔子湯戴原禮曰濕熱俱甚則發身黃傷寒至於發黃為病亦已甚矣邪風被火兩陽相熏其身必黃陽明病被火額上汗出小便不利必發身黃此皆由內有熱而又被火攻以致發黃者也陽明病無汗小便不利心中懊憹必發黃者由陽明熱甚也傷寒汗已身目為黃以寒濕在裡不解故也此不可下宜於寒濕中求之是知非特濕熱發黃而寒濕亦發黃也但寒濕之黃身如熏黃色暗而不明熱甚之黃黃如橘子色染著衣正黃如柏大抵黃家屬太陰太陰為濕熱蒸之所致經曰太陰當身發黃是也又或脈沉結少腹硬小便自利其人如狂者又為蓄血在下焦而黃也發黃非止寸口近掌無脈鼻氣出冷為不治之症又若形體如煙燻為心絶柔汗發黃為脾絶皆不治也趙嗣真曰瘀熱發黃與瘀血發黃外症及脈未嘗相似且如頭汗出齊頸而還腹微滿小便不利渴飲水漿為瘀熱症小腹急結其人如狂小腹硬滿小便自利大便黑為瘀血症此外症之不相似也瘀血脈微而沉或沉結瘀熱脈則浮滑緊數此脈狀又不相似也然則相似者但色黃耳若論黃色相似不特瘀血瘀熱又如風溫被火微發黃色太陽火劫發汗兩陽相熏灼其身發黃陽明被火額上微汗必發黃者是又挾火邪所致者外此亦有黃色之不相似者乎曰濕家之熏黃則異矣可不各以其似不似而明辨歟王肯堂曰海藏次第用藥法謂先投韓氏茵陳茯苓湯次茵陳橘皮湯又次茵陳附子湯依次漸投至效即止身冷汗出脈沉而黃為陰黃乃太陽經中濕亦有體痛發熱者身如熏黃終不如陽黃之明如橘子色也當叩其小便之利不利小便自利朮附湯小便不利大便反快五苓散
