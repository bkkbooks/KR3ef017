body:
  text: 卷十六傷寒後症陰陽易綱仲景曰傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之目王好古曰陰陽易病當診脈隨症治之若脈在厥陰當歸四逆送下本散脈在少陰通脈四逆湯送下本散脈在太陰四順理中丸煎湯送下本散所用之藥各隨其經而效自速也張元素曰假如婦人病新瘥未平復男子與交因感外邪卒病實非餘邪相染醫見病速謂之陰易於法何以別乎夫易症者有本條所見之症存焉其與外所感豈相侔哉設若風寒外傷當有表症安有少腹裡急引陰中拘攣者乎或又云假如男子病新瘥強合陰陽而自病仍小腹裡急引陰中拘攣症同易病求其理何故不染易他人而自復未審其症治可同何法也曰病雖有復理與易同亦用燒裩散以安其氣夫易病之為易陰陽感動餘邪而其人正氣本虛故能染著不然安得受其邪哉今病自復緣正氣尚虛而餘邪因動悉非外感故與易同亦與燒裩散以安正氣正氣安餘邪自退矣趙嗣真曰病傷寒人熱毒藏氣血中者漸從表裡解散惟熱毒藏於精髓中者無由發泄故瘥後與不病之體交男女相傳故名陰陽易即交易之義也服此散後小便得利陰頭微腫陰毒仍從陰竅出耳王肯堂曰男病而女與交接相染名陽易女病而男與交接相染名陰易男相染則陰腫入腹絞痛女相染則裡急腰胯連腹內痛柯琴曰此症無內外因本非傷寒而冠以傷寒者原其因也無惡寒發熱之表症無胃實自利之裡症因淫情不禁陰邪得以投其隙移禍於不病之人頓令一身之精氣形神皆受欲火之為害是不病於傷寒而病於陰陽之易也瘥後勞復食復綱仲景曰大病瘥後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子五六枚目成無己曰勞為勞動之勞復為再發也是傷寒瘥後因勞動再發者也傷寒新瘥後血氣未平餘熱未盡勞動其熱熱還經絡遂復發也此有二種一因勞動外傷一因飲食內傷其勞動外傷者非止強力搖體持重遠行即如梳洗則動氣憂思悲慮則勞神皆令復也況其過用者乎其飲食內傷者為多食則遺食肉則復也內經曰熱病已愈而時有遺者何也以熱盛而強食病已衰而熱有所藏因其穀氣留薄兩陽相合故有所遺經曰病已瘥尚微煩損谷則愈夫傷寒邪氣之傳自表至里有次第焉發汗吐下自輕至重有等差焉又其勞復則不然見其邪氣之復來也必迎奪之不待其傳也枳實梔豉則吐之豈必虛煩懊憹之症加大黃則下之豈必譫語腹滿之候經曰傷寒瘥後更發熱小柴胡湯浮脈以汗解之脈沉實以下解之亦是便要折其邪也蓋傷寒之邪自外入勞復之邪自內出發汗吐下隨宜施用勞復食復諸勞皆可治及御內則死矣若男女相易為陰陽易其不易而自病者為女勞復以其內損真氣外動熱邪正虛邪盛故不可治也魏荔彤曰此下申解傷寒病愈後血氣虛羸餘熱未盡飲食起居俱宜節慎也至房勞一事更關性命故不必列於此其示禁更切矣言大病瘥後者凡病皆然不但傷寒也瘥後血氣必虛凡費心費力過喜過怒多言多動皆可因勞而復病也因勞而動其既虛之血氣虛勞而生其未盡之餘熱熱邪退而病瘥熱邪生而病復可見傷寒傳經之邪連綿難盡如此傷寒後血氣之虧因循難復如此推之自凡病後皆然綱仲景曰傷寒瘥已後更發熱者小柴胡湯主之脈浮者以汗解脈沉者以下解之目許叔微曰有人患傷寒得汗數日身熱自汗脈弦數心不得寧真勞復也豫診之曰勞心之所致神之所舍未復其初而又勞傷其神榮衛失度當補其子益其脾解其勞庶幾得愈授以補脾湯佐以柴胡湯解之或曰虛則補其母今補其子何也豫曰子不知虛勞之異乎難經曰虛則補其母實則瀉其子此虛當補母人所共知也千金曰心勞甚者補脾氣脾旺則感之於心矣方治其虛則補其生我者與錦囊所謂本骸得氣遺體受蔭同義方治其勞則補其助我者與荀子言未有子富而父貧同義此治虛與勞所以異也王好古曰大抵勞者動也動非一種有氣血內外之異焉若勞乎氣而無力與精神者法宜微舉之若勞乎血與筋骨者以四物之類補之若在脾內為中州調中可已此為有形病也但見外症則謂之復非為勞也如再感風寒是已吳綬曰勞復病古人所謂如大水浸牆水退則牆蘇不可犯之但可安臥守靜以養氣設或早起勞動則血氣沸騰而發熱也喻昌曰瘥已後更發熱乃餘熱在內以熱召熱也但熱當辨其何在不可泛為施治以虛其虛如在半表半裡仍用小柴胡和解在表仍用汗法在裡仍用下法然汗下之法即上條用枳實梔豉微汗下用枳實梔豉加大黃微下也綱仲景曰大病瘥後從腰以下有水氣者牡蠣澤瀉散主之目喻昌曰腰下有水氣者水漬為腫也金匱曰腰以下腫當利小便此定法矣乃大病後脾土告困不能攝水以致水氣泛溢用本湯峻攻何反不顧其虛耶正因水勢未犯身半以上急逐其水所全甚大設用輕劑則陰水必襲入陽界驅之無及矣庸工遇大病後悉用溫補自以為善孰知其大謬哉綱仲景曰大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸目喻昌曰身中津液因胃寒凝結而成濁唾久而不清其人必瘦削索澤故不用湯藥蕩滌而用丸藥緩圖理中丸乃區分陰陽溫補脾胃之善藥綱仲景曰傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之目喻昌曰身中津液為熱邪所耗餘熱不清必致虛羸少氣難於康復若更氣逆欲吐是餘邪復挾津液滋擾故用本湯以益虛清熱散逆也綱仲景曰病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈目朱肱曰大抵新病瘥多因傷食便作痞乾噫食臭腹中雷鳴下利等症可與生薑瀉心湯陳士鐸曰傷寒火退邪散胃氣初轉是忌急與之食一得食而胃氣轉閉不可復開此時即以藥下之則胃氣大傷而火邪復聚反成不可解之症不若禁不與食則中州之地自然轉輸漸漸關開搬運不至阻隔方用茯苓陳皮山梔各一錢白芍三錢陳曲枳殼厚朴甘草各五分麥芽二錢此方似平平無奇卻調理自然無事然必待其飢餓之時方可與服飽時服之徒滋滿悶傷寒愈後邪已退正自虛理宜補正但脾胃弱多食補劑恐不能受法當用補胃藥少補脾藥多尤不宜補脾藥多而補腎藥少蓋腎能生土土自能生金金旺則木有所畏不至來克脾土然則補腎正所以補脾也方用熟地一兩麥冬白芍白朮苡仁各三錢五味子五分肉桂三分白芥子一錢此方專補脾腎二經不必通補各臟而各臟無不補也龐安常曰凡新瘥只宜先進白稀粥次進濃者又次進糜粥亦須少少與之不得過吃肉食凡男子大病後早犯女色而為病者名女勞復其候頭重不舉目中生花腰背疼痛或小腹裡急絞痛或憎寒發熱或時陰火上衝頭面烘熱心胸煩悶活人以豭鼠屎湯主之有熱者竹皮湯千金以赤農散主之虛弱者人參三白湯調下赤衣散若少腹急痛脈沉逆冷者當歸四逆湯加附子吳萸送下赤衣散仍以吳萸一升酒拌炒尉少腹凡卵縮入腹離經脈見死不可救李梴曰復者其病如初也新瘥津液未復血氣尚虛或梳洗言動太早或思維太過則成勞復蓋勞則生熱熱氣乘虛還入經絡未免再復宜小柴胡湯麥門冬湯和之食復者新瘥後胃氣尚弱若恣食欲不能克化依前發熱若用補藥則胃熱益增治須清熱消食輕者腹中微滿損谷自愈重者必須吐下宜梔豉枳大黃湯胸痞者生薑瀉心湯飲酒復病者黃連解毒湯凡復症先病七日出汗而解今復舉亦必七日而解先病十四日出汗而解今復舉亦必十四日而解雖三四次復舉亦必三四次發汗而解但勞復經久不愈恐成癆瘵諸寒熱症綱仲景曰病人身大熱反欲近衣者熱在皮膚寒在骨髓也病人身大寒反不欲近衣者寒在皮膚熱在骨髓也目朱肱曰身大熱反欲近衣此名表熱裡寒身大寒反不欲近衣此名表寒裡熱仲景皆無治法其熱在皮膚寒在骨髓者先與陽旦湯寒已次以小柴胡加桂以和其表其寒在皮膚熱在骨髓者宜先與人參白虎湯熱除次以桂枝麻黃合半湯以解其外大抵病有標本治有先後表熱裡寒者脈須沉而遲手或微厥下利清穀所以陰症亦有發熱者四逆湯通脈四逆湯主之表寒裡熱者脈必滑而數口燥舌乾所以少陰惡寒而蜷時時自煩不欲厚衣大柴胡下之而愈此皆仲景之餘議柯琴曰此屬內因不是外感亦不關七情病在形軀不涉臟腑亦不犯經絡故無六經脈症可憑非天時寒熱所可拘也是病只在骨髓不在皮膚皮膚之寒熱指天時不指病骨髓之寒熱是漸積之伏邪故雖逢天令大寒大熱之正氣亦不能除時大熱而反欲復衣時大寒而反欲裸身病在骨髓與病在營衛者不同法當以六味八味二丸補腎中之真陰真陽而骨髓之蓄熱痼寒自愈綱仲景曰問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰尺脈弱名曰陰不足陽氣下陷入陰中則發熱也目柯琴曰前條病在骨髓故著而不移此病在經絡故寒熱反復卻與外感之往來寒熱瘧疾之鼓寒戰栗又不同寸者陽所治寸微為無陽是陽脈不足故陰寒得上乘陽位而灑淅惡寒也尺者陰所治尺弱而血虛是陰脈不足故上焦虛陽得以下陷陰部而發熱也夫陰陽互根又以陽為主治之者當以扶陽為急此補中益氣之方為功最巨也綱仲景曰病人脈微而澀者此為醫所病也夫發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗使陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知亡血也目柯琴曰先寒後熱陽微陰弱具症與上文同前條病因在血脈虛此條病因在妄汗下以致亡血而脈微澀也瘥後諸病綱仲景曰大病瘥後從腰以下有水氣者牡蠣澤瀉湯主之大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣弱不能消穀故令微煩損谷則愈目成無己曰瘥後脾胃虛不能制約腎水歸於隧道故水溢下焦腰以下為腫也王肯堂曰千金方瘥後口乾喜唾或咽痛用大棗十枚烏梅三個共搗蜜丸棗核大含口中徐徐咽下或咽痛不愈者以山豆根涼水浸含龐安常曰解後津液不足而虛羸餘熱未盡熱則傷氣故少氣而氣逆與竹葉石膏所以散熱調胃也陽明旺於申酉戌宿食在胃故日暮微煩當小下之以消宿谷只用梔豉湯痞硬加枳實鰲按以上水氣喜唾欲吐微煩四症皆仲景書所載但瘥後病正多如王氏肯堂補遺十四症皆瘥後所常患者今特採之條附於後並録陶節庵瘥後症二條附王肯堂補遺瘥後十四症一驚悸傷寒後虛羸心氣乏力弱驚悸多忘茯神散傷寒後伏熱在心心虛驚悸龍齒丸瘥後心膽虛怯觸事易驚夢寐不安氣鬱生涎涎與氣搏變生諸症或短氣困乏或自汗盜汗四肢浮腫飲食無味心虛煩悶坐臥不安加味溫膽湯一煩熱瘥後夾勞者心煩熱背膊疼痛手足無力不能飲食柴胡湯一虛汗瘥後虛羸盜汗不止四肢無力向晚憎寒鱉甲散瘥後虛羸日夜汗出不止心躁口乾咽喉不利者黃雄雞湯一喘嗽瘥後肺痿勞嗽唾膿血腥臭連連不止漸將羸瘦紫菀散一夢泄瘥後虛損心多怔悸夜夢泄精牡蠣散傷寒夜夢精泄不禁身體枯燥瘦瘠骨立者羚羊角散一失音傷寒失音不語二瀝湯一嘔噦瘥後虛羸少力嘔噦氣逆人參湯一下利瘥後膿血痢下部疼痛訶黎勒飲傷寒熱病熱毒下利膿血黃連丸大小便自利腹中痛者燥腸丸一腰痛傷寒汗吐下後體虛元臟積冷氣刺腰痛難於轉動杜仲酒外貼蠶蛾膏一不眠瘥後虛煩不眠梔子烏梅湯一遺毒瘥後汗出不徹邪熱結耳後一寸二三分或耳下俱腫硬者名曰發頤此為遺熱成毒之所致也宜速消散之若緩則成膿為害初起宜連翹敗毒散外敷消毒救苦散已破內托消毒散未破亦可服一昏冒傷寒汗出愈後漸覺昏昏不省如鬼祟之狀或錯語呻吟者此因汗出未盡邪熱伏於心包所致活人用知母麻黃湯以汗之但慮病後血氣空虛豈可發汗若脈弱人宜十味溫膽湯加黃連主之若有寒熱潮熱日晡發熱者小柴胡湯隨症增損治之一發豌豆瘡千金方治豌豆瘡只以酒炒黃連一味水煎服外以赤小豆末加青黛用雞子清和塗神效一瘥後虛弱治例傷寒新瘥後虛弱盜汗不止當歸六黃湯陽虛無熱惡寒盜汗無力下虛者加味黃耆建中湯瘥後陰虛精血不足四肢少力心神不寧夜夢遺泄或虛熱盜汗飲食少進不為肌肉身體羸弱面色青黃無血色滋陰補腎丸或加味補陰丸亦可瘥後心神不安夜臥不寧或多夢不眠硃砂安神丸瘥後胃弱食少加味枳朮丸瘥後脾胃虛弱不思飲食養脾湯縱食不能消化者健脾散或六君子湯亦可又附陶節庵書所載瘥後症二條一瘥後昏沉傷寒後無寒熱雜症但漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水將稀粥與之則咽不與則不思心下無痞心中不滿大小便如常形貌如醉人此熱傳手少陰心經也心火熏肺所以神昏名曰越經症宜陶氏導赤各半湯胃口有熱虛煩有熱者竹葉石膏湯加生薑一餘熱不退傷寒餘熱不退通用小柴胡調之尿赤澀者柴芩湯劉河間云傷寒後虛熱不已白虎加蒼朮人參一服如神汗止身涼此通神之法也如此則汗下後熱不退不問有汗無汗俱宜白虎加蒼朮人參解之最妙傷寒後六經餘熱不退宜加減涼膈散餘熱盛或發狂言辰砂益元散發熱後熱不解脈尚浮者蒼朮白虎湯婦人傷寒綱仲景曰婦人中風發熱惡寒經水適來得之七八日熱深而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之目許叔微曰一婦人患熱入血室醫者不識用補血調氣藥延養數日遂成血結胸或勸用前藥豫曰小柴胡已遲不可行也無已則有一焉剌期門穴果愈或問熱入血室何為而成血結胸也曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷邪氣乘虛而入血室血為邪逼上入肝經肝受邪則譫語而見鬼復入膻中則血結於胸也何則婦人平居水當養木血當養肝方未受孕則下行以為經水既妊則中蓄以養胎既産上壅以為乳皆此血也今肝氣蓄血並歸肝經聚於膻中結於乳下故手觸之則痛非湯劑可及故當刺期門也綱仲景曰婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上中二焦必自愈目成無己曰此則不須治而自愈者也蓋經水適來以里無留邪但不妄犯熱隨血散故自愈經曰血自下下者愈故只須無犯胃氣及上中焦也所謂妄犯者蓋恐以譫語為陽明內實攻之犯其胃氣也此無胸脅之邪刺期門恐犯其中焦也此無血結與小柴胡恐犯其上焦也小柴胡解散則動衛氣衛出上焦動衛氣是犯上焦也刺期門則動榮氣榮出中焦動榮氣是犯中焦也樓英曰一婦人溫病已十二日診其脈六七至而澀寸稍大尺稍小發寒熱頰赤口乾不了了耳聾病數日經水乃行此屬少陽熱入血室也若治不對病則必死用按其症與小柴胡服之二日又與此湯加桂乾薑寒熱遂止又云我臍下急痛又與抵當丸微利臍下痛痊身漸涼脈漸勻尚不了了仍與小柴胡次日又云我但胸中熱燥口鼻乾又少與調胃承氣湯不得利次日又與大陷胸丸半服利三行次日虛煩不樂亦有所見時復狂言雖知其尚有燥屎以極虛不敢攻遂與竹葉湯去其煩熱其夜大便通下燥屎數枚而狂言虛煩盡解但咳唾此肺虛也恐乘虛而成肺痿遂與小柴胡去人參薑棗加乾薑五味而愈以上皆用仲景方柯琴曰前言中風此言傷寒見婦人傷寒中風皆有熱入血室症也綱仲景曰婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之目成無己曰此須治而愈者也夫譫語為病邪之甚者何不類治而愈耶且胸脅滿如結胸狀譫語是邪氣留結於胸脅而不去者故必刺期門隨其實而瀉也寒熱如瘧是邪留於內故血結不行故須散之也張云岐曰婦人傷寒中風自汗頭痛項背強發熱惡寒脈浮而緩恐熱入血室故倍加芍藥宜桂枝加芍藥湯婦人傷寒脈浮而緊頭痛身熱惡寒無汗發汗恐熱入血室宜麻黃加生地黃湯婦人傷寒身熱脈長而弦屬陽明少陽往來寒熱夜躁晝寧如見鬼狀經水適斷熱入血室不實滿者小柴胡加牡丹皮湯大實滿者桃仁承氣湯婦人傷寒頭痛脈浮醫反下之邪氣乘虛而傳於裡經水閉不行心下結硬口燥舌乾寒熱往來狂言如見鬼狀脈沉而數者當下之宜小柴胡加芒硝大黃湯樓英曰婦人傷寒經水適來初斷寒熱如瘧狂言見鬼乾薑柴胡湯龐安常曰婦人室女傷寒發熱經水適來適斷晝日明瞭夜則譫語如見鬼狀宜小柴胡加生地黃湯亦治産後惡露方來忽間斷欲死婦人傷寒表虛自汗身涼四肢拘急脈沉而遲太陽標病少陽本病經水適斷宜桂枝加附子紅花湯附録妊娠傷寒治法朱肱曰妊娠傷寒安胎宜阿膠散白朮散妊娠傷寒憎寒發熱當發其汗宜蔥白湯妊娠傷寒頭痛憎寒壯熱身痛項強宜芎蘇散妊娠傷寒頭疼發熱遍身疼痛宜紫蘇散亦治胎氣不和湊上心腹脹滿疼痛謂之子懸能安活胎亦下損胎王好古曰若妊娠傷寒中風表虛自汗頭疼項強身熱惡寒脈浮而弱太陽經病宜表虛六合湯若妊娠傷寒頭痛身熱無汗脈緊太陽經病宜表實六合湯若妊娠傷寒中風溫之氣肢節煩疼脈浮而熱頭痛者太陽標病也宜風溫六合湯若妊娠傷寒下後過經不愈濕毒發斑如錦紋宜升麻六合湯若妊娠傷寒胸脅滿痛而脈弦少陽症宜柴胡六合湯若妊娠傷寒大便硬小便赤氣滿而脈沉數太陽陽明本病也急下之宜大黃六合湯若妊娠傷寒汗下後咳嗽不止宜人參六合湯若妊娠傷寒後虛痞脹滿者陽明本虛也宜厚朴六合湯若妊娠傷寒汗下後不得眠宜梔子六合湯若妊娠傷寒蒸蒸而煩脈長而大宜石膏六合湯若妊娠傷寒小便不利太陽本病也宜茯苓六合湯若妊娠傷寒太陽本病小便赤如血者宜琥珀六合湯若妊娠傷寒汗下後血漏不止胎氣損動者宜膠艾六合湯若妊娠傷寒四肢拘急身涼微汗腹中痛脈沉而遲少陰病也宜附子六合湯若妊娠傷寒蓄血症不宜用墜胎藥下之宜四物大黃湯下之若婦人妊娠或蓄血抵當桃仁勿妄施要教子母俱無損大黃四物對分之此乃歌訣也樓英曰婦人有孕傷寒脈浮頭重腹中切痛宜桂枝芍藥當歸湯妊娠傷寒自利腹中痛飲食不下脈沉者太陰經病也宜芍藥湯婦人有孕發斑變黑色宜梔子大青湯吳綬曰孕婦傷寒六經治例皆同但要安胎為主凡藥中有犯胎者切不可用如藿香正氣散十味芎蘇散小柴胡湯之類有半夏能犯胎如用須去之若痰多嘔逆必欲用之半夏麴則可凡川烏附子天雄肉桂乾薑大黃芒硝芫花甘遂大戟蜀漆虻蟲水蛭桃仁丹皮乾漆赭石瞿麥牛膝等類皆動胎藥必不可犯大抵妊娠傷寒合用湯劑必加黃芩白朮二味能安胎也或以二味為末白湯調下二三錢亦可如孕婦素弱加四物湯佐之且如用小柴胡去半夏加白朮合四物湯可以保胎除熱其效如神余皆仿此附録婦人傷寒妊娠服藥例王好古曰發熱惡寒不離桂枝芍藥往來寒熱不離柴胡前胡大渴引飲不離知母石膏麥冬五味大便泄利不離乾薑白朮大便燥結不離大黃黃芩月經適來適斷不離小柴胡胎動不安不離人參阿膠黃芩白朮要汗不離薑豉旋覆頭痛不離山梔石膏前胡傷暑頭痛不離柴胡甘草石膏滿悶不離枳實陳皮胎氣不安不離黃芩麥冬人參斑色發黑不離黃芩山梔升麻附録産後傷寒治法朱震亨曰産後發熱惡寒皆屬血氣虛左手脈不足補血右手脈不足補氣凡惡寒發熱又腹痛當去惡血惡寒發熱乳汁不通及膨者無子當消用麥芽二兩炒研作四服白湯下有子當下用木通通草豬蹄汁煎服産後才身熱不可發表並一切苦寒藥大凡産後頭痛身疼不可便作感冒治之此等多是血虛或敗血作梗宜以平和之劑與服必效如玉露散或四物湯加北柴胡等分若便以小柴胡及竹葉石膏湯之類竟不救者多矣吳綬曰新産後患傷寒不可輕易發汗蓋有産時傷力發熱去血過多發熱惡露不去發熱三日蒸乳發熱或有早起勞動飲食停滯一皆發熱狀似傷寒要在仔細詳辨不可便發汗大抵産後大血空虛若汗之則變筋惕肉瞤或冒郁昏迷而不省或風搐搦而不定或大便祕澀而難去其害非輕切宜精審凡有發熱且與四物湯以芎歸為君炒白芍熟地佐之如發熱加軟苗柴胡人參乾薑最效蓋乾薑能引血藥入血分氣藥入氣分且能去惡養新有陽生陰長之道豫嘗用之取效如有惡露未盡者益母丸黑神散必兼用之若胃虛食少必加白朮茯苓有痰嘔逆必加半夏陳皮其餘六經各條治例皆同但藥中必加四物湯為主乃養血務本之要産後中風數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖多陽旦症或可治與陽旦湯産後中風發熱面赤喘而頭痛竹葉湯鰲按産後氣血大虧若惡寒發熱固當以四物湯為主即用表藥只可荊芥蘇葉桔梗甘菊輕清之品然猶當少用即用涼藥亦不過丹皮石斛之類亦須少用余以此意治産婦無一失者嘗見俗工用大散大涼之劑往往幾日即斃反此便大熱大補加參桂薑附亦多致死嗚呼可謂不知高下者矣傷寒所屬諸病百合病鰲按傷寒雜病論十六卷仲景原書六經傷寒為傷寒論雜病為金匱要略乃王叔和編次之書非仲景書也傷寒症中有百合病狐惑病陽毒陰毒二病皆傷寒之屬患之者正多六經傷寒論中俱未之及若以叔和編次之書為仲景原本豈有傷寒所屬之病而傷寒論中竟不之及反詳其症治於金匱者乎雖然百合狐惑陰毒陽毒既為傷寒症中之病則傷寒論中斷不可缺欲補其缺則惟仍採金匱篇中之論而已何也金匱等篇本即仲景傷寒雜病十六卷中之語非別論也以仲景書補仲景論中之缺今雖有假借在當日實非假借也故此四症即録金匱中語以為綱云綱仲景金匱曰論曰百合病者百脈一宗悉致其病也意欲食復不能食嘗默默欲臥不能臥欲行不能行飲食或有美時或有不欲聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若病時頭不痛淅淅然者四十日愈若溺時快然但頭眩者二十日愈其症或未病而預見或病四五日而出或病二十日或一月後見者各隨症治之目徐彬曰此言傷寒之人都有正氣不能御邪致浸淫經脈現症雜亂不能復分經絡曰百合病謂周身百脈皆病然皆有所宗而主之以致各病而名不能專持其病者但覺行住坐臥飲食皆妨而寒熱口苦便赤吐利且得藥則劇身形反如和亳無可捉摸而寒熱口苦似屬少陽小便赤似屬太陽吐利似屬三焦腑病未深入臟故恐邪久留連陽經搏結於腦則猝難脫身而非不治之病但於溺時而頭痛者知其病深頭不痛而淅淅然則病稍淺快然而頭眩則邪更淺故愈日以漸而速乃千金曰其狀惡寒而嘔者病在上焦二十三日當愈其狀腹滿微喘大便堅三四日一大便時復小溏者病在中焦六十三日當愈其狀小便淋瀝而難者病在下焦三十三日當愈則知此病有搏邪在內而微有三焦之分者其治法又當分三焦而和之綱仲景金匱曰百合病發汗後者百合知母湯主之百合病下之後者滑石代赭湯主之百合病吐之後者百合雞子湯主之百合病不經吐下發汗病形如初者百合地黃湯主之目徐彬曰十二經絡皆朝宗於肺而氣口成寸乃仲景注百合病云百脈一宗悉致其病豈不謂百脈之病無可名狀一宗於肺而為病乎百合者補肺藥也用以主治百合病則仲景因肺為治之意曉然然不明言肺何也蓋百合病乃傷寒餘邪留連陽經而浸淫於各腑之陰無正氣以統之各自為病互相牽引若出一宗而現症無一是肺則知病雖不在肺而肺之治節實不行矣故以百合輔肺之正氣以合於他臟而理其滯者為主其在汗後者汗過傷陽陽虛熱鬱不可攻補故用百合同知母以養陰泉水以清熱而陽邪自化其在下後者下多傷陰虛邪在陰陰虛火逆攻補無益故以百合同滑石代赭以通陽氣而陰氣自調其在吐後者吐傷元氣而陰精不上奉故用百合同雞子以滋元陰以行肺氣則氣血調而陰陽自平若不經吐下發汗則無傷陰傷陽之可慮但病形如初者即傷寒論所謂太陽病是也如初不解是陽經之困極而陰氣亦耗竭矣心為五臟主故以生地之涼血補心者同百合泉水養陰以化其陽經之久邪綱仲景金匱曰百合病一月不愈變成渴者百合洗方主之百合病渴不瘥者栝蔞牡蠣散主之目徐彬曰有陽渴有陰渴百合病所變其為陰虛火熾無疑矣至渴不瘥雖以百合湯洗無益矣明乎陽亢而陰氣未復也故用本湯從其內治綱仲景金匱曰百合病變發熱者百合滑石散主之目李梴曰百合病者百脈合病也治以百合為主者以其能合百脈也樓英曰大病後未平復失於調理餘症在陽醫反下之餘症在陰醫反汗之以此百脈一空舉皆受病所謂無復經絡傳次也鰲按仲景謂發於陽者其人振寒發熱則百合病而變發熱由內熱太甚淫於肌膚而陽分亦熱也綱仲景金匱曰百合病見於陰者以陽法治之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆目徐彬曰陽法陰法即和陰和陽之法也以此相救即和其未病意內經所謂用陽和陰用陰和陽也故諸治法皆以百合補肺而使流氣於腑所謂氣得於權衡權衡以平也皆以泉水清邪熱而使受成於肺金所謂炎蒸得清肅而萬物鹹平也但病見陽加一二味以和陰病見陰加一二味以和陽耳鰲按陽法救者使陽得其平陰邪欲傳之而不受即陰邪亦漸消也陰法救者使陰得其平陽邪欲傳之而不受即陽邪亦漸消也救與攻相反汗下即所謂攻故曰逆狐惑病綱仲景金匱曰狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍白乍黑蝕於上部則聲啞甘草瀉心湯主之蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃熏之目朱肱曰狐惑與濕䘌皆蟲症初得狀如傷寒或因傷寒變成大抵傷寒病腹內食入少腸胃空虛三蟲行作求食蝕人五臟及下部為䘌病其候齒無色舌上白甚者唇黑有瘡四肢沉重忽忽喜眠蟲蝕其肛爛見五臟則死當數看其上下唇上唇有瘡蟲蝕其臟下唇有瘡蟲蝕其肛殺人甚急多因下利而得治䘌桃仁湯黃連犀角湯雄黃鋭散少陰症口燥咽乾者急下之病人默默欲眠目不能閉起居不安其聲啞或咽乾者即當作狐惑治之徐彬曰狐惑蟲也蟲非狐惑因病以名之大抵皆濕熱毒所為之病故狀如傷寒蝕者若有食之而不見其形如日月之蝕也面者陽明之標目者厥陰之標內有毒氣乘之故乍赤白黑變現不一也上部毒盛則所傷在氣而聲啞下部毒盛故所傷在血而咽乾也鰲按狐惑病有專由濕熱而生者有由傷寒後濕熱未清而成者狀如傷寒句須看得活綱仲景金匱曰病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤豆當歸散主之目李中梓曰狐惑症失汗所致也以清熱為主鰲按此條非言狐惑病乃濕熱侵陰有似狐惑而更甚者首曰病者乃概言之辭非專指病狐惑者故用赤豆當歸與治狐惑之藥異其病總由陰分熱極故現症如是也陰毒綱仲景金匱曰陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之目許叔微曰積陰感於下則衛陽消於上故其候四肢沉重逆冷腹痛咽喉不利或心下脹滿結硬燥渴虛汗不止或時狂言爪甲面舌青黑六脈沉細而一息七至服還陽湯退陰散陰毒沉困之候六脈取之附骨方有按之即無一息七八至以上甚至不可數至此則難治矣宜灸臍下二三百壯更以熱藥助之手足不和緩亦不治朱肱曰手足逆泠臍腹築痛咽疼嘔吐下利身如被杖或冷汗煩渴脈細欲絶此名陰毒也陰毒之為病初得病手足冷背強咽痛糜粥不下毒氣攻心心腹痛短氣四肢厥逆嘔吐下利宜服陰毒甘草湯白朮散附子散正陽散肉桂散回陽丹返陰丹天雄散正元散退陰散選用大抵陰毒本因腎氣虛寒或因冷物傷脾外傷風寒內既伏陰外又感寒或先感外寒而內伏陰內外皆陰則陽氣不守遂發頭疼腰重眼睛疼身體倦怠四肢逆冷額上手背冷汗不止或多煩渴精神恍惚如有所失三二日間或可起行不甚覺重脈俱沉細而疾尺部短小寸口脈或大六脈俱浮大或沉取之而不甚疾者非陰症也大抵陽毒傷寒其脈多弦而洪數陰毒傷寒其脈沉細而弦疾不可不知也若誤服涼藥則渴轉甚躁轉急有此病者便須急服辛熱藥一二日便安若陰毒漸深其候沉重四肢逆冷腹痛轉甚或咽喉不利心下脹滿結硬躁渴虛汗不止陽盛則身熱而無汗陰盛則身冷而有汗岐伯云陽盛則身熱腠理閉喘粗為之俯仰汗不出而熱陰勝則身寒汗出身常清數栗而寒寒則厥或時鄭聲指甲面色青黑六脈沉細而疾一息七至以來有此症者速於氣海及關元二穴灸二三百壯以手足和緩為效仍於前諸方選而服之內外得通遂令陽氣復而大汗解矣陰獨盛而陽氣暴絶則為陰毒陽獨盛而陰氣暴絶則為陽毒大凡陰陽離絶非大汗不能復其正氣也若陰毒已深病勢困重六脈附骨取之方有按之即無即難治但於臍中用蔥尉法或灼艾三五百壯手足不溫真不可治如得手足溫更服前熱藥助之若陰氣散陽氣來即減熱藥而調治之陽氣乍復往往煩躁慎不可投涼藥煩躁甚者再與返陰丹即定當識此勿誤也王好古曰考仲景書雖有陰毒之名然其所敘之症不過面目青身痛如被杖咽喉痛而已並不言陰寒極甚之症況其所治之方亦不過升麻甘草鱉甲當歸而已並不用大溫大熱之藥是知仲景所謂陰毒者非陰寒之病乃感天地惡毒異氣入於陰經故曰陰毒耳後之論者遂以為陰寒極盛之症稱為陰毒乃引仲景所敘面目青數語並而言之卻用附子散正陽散等藥以治竊謂陰寒極甚之症固亦可名為陰毒然非仲景所以立名之本意觀後人所敘陰毒與仲景所敘陰毒自是兩般豈可混論後人所敘陰毒亦不過內傷冷物或不正暴寒所中或過服寒涼藥所變或內外俱傷於寒而成耳非中天地之惡毒異氣也樓英曰陰毒本因腎氣虛或因欲事或食冷物後傷風內既伏陰外又感寒或先感外寒而後伏陰內外皆陰則陽氣不守遂發頭痛腰重腹痛眼睛痛身體倦怠而不甚熱四肢逆冷額上及手背冷汗不止或多煩渴精神恍惚如有所失或可起行不甚覺重六脈俱沉細而疾尺部短小寸口或無或六脈俱浮大或沉取之大而不甚疾者非陰症也若服涼藥過多則渴轉甚躁轉急有此症者急服還陽退陰之劑即安惟補虛和氣而已宜正元散退陰散五勝散陰症不宜發汗如氣盛脈大身熱未瘥用藥發汗無妨李梴曰傷寒三陰經病深必變為陰毒其症四肢厥冷吐利不渴靜倦不臥甚則目痛鄭聲加以頭痛頭汗睛痛不欲見亮面唇指甲青黑手背冷汗心下結硬臍腹築痛身如被杖外腎冰冷宜甘草湯正陽散陽氣乍復或生煩躁者破陰丹復陽丹不可用涼藥吳綬曰或問陰毒傷寒用附子湯冷服何也此蓋陰極於下陽浮於上之治法也豫曾治一人傷寒十餘日脈沉細手溫而足冷大便不通面赤嘔吐煩渴萬不能下惟喜涼水一二口或西瓜一二塊食下良久復吐出此陰寒於內逼其浮陽失守之火聚於胸中上衝咽嗌故為面赤嘔煩也遂用大附子一枚以薑汁和麵包煨熟取附子去皮尖切八片又以人參炮姜各三錢煎浸冷水中待冷服之即愈內經曰若調寒熱之逆冷熱必行則熱藥冷服下嗌之後冷體既消熱性即發由是病愈近世患陰症傷寒往往疑似參差初便不敢用附子直待陰極陽竭而用之遲矣且夫陰症傷寒先因欲事伏陰於內卻又著寒內外皆陰陰氣獨盛則陽氣以衰故脈沉而足冷也必須急用人參附子以益元氣溫腎散寒若舍此二味將何以救之許學士論必以真氣為主蓋真氣乃人之根蒂也若不察真氣虛實而欲攻其實或施汗下或用寒涼藥攻熱未愈陰寒又生病至危已又方用雄雞血滴入無灰酒中儘量飲之以衣被溫覆取汗王肯堂曰有陰毒漸深爪青面黑脈七至沉細者積陰感於下則微陽消於上故其候四肢逆冷腹痛轉甚或咽喉不利或心下脹滿結硬躁渴虛汗不止或時狂言爪甲面色青黑六脈沉細一切七至速宜灸氣海關元二穴二三百壯以手足溫暖為效仍服五勝散還陽散退陰散有陰毒沉困之候與前後漸染之候皆同而更加沉重難治有陰中伏陽者初病四逆臍築痛身疼如被杖蓋陰症也病雖陰症而見陽脈有可生之理仍灸氣海丹田百壯手足溫溫陽回得汗而解或問滑沉之狀如何便有生理豫曰仲景云翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故名曰滑古人謂脈滑雖曰往來前後流利旋轉替替然與數相似仲景三語而足也此三字極難曉翕合也言張而復合也故曰翕為正陽沉言忽降而下也故曰沉為正陰方翕而合俄降而沉奄為忽忽間仲景論滑脈為諦當矣其言皆有法讀者難曉宜細思之徐彬曰寒邪直中陰經久而不解則為毒矣故有陰毒之病其病乃直中於腎浸淫肝脾寒氣凜冽所至疼痛面目者肝脾之精所及也土受寒侵木乃乘之故色青寒侵肌肉與衛氣相爭故痛如被杖咽喉亦痛者少陰脈上至咽故有伏寒者咽必痛喉雖屬陽痛甚則氣相應也然邪總以相傳而深深則難治故曰五日可治七日不可治藥用升麻龜甲獨去蜀椒雄黃蓋陰邪為毒雖陰亦有陰躁之氣則溫之無益即攻之亦偏而鮮濟故去蜀椒之溫雄黃之猛而但以龜甲當歸走肝和陰以止痛升麻甘草從脾升散以化其寒謂直折而有剛燥之患不若辛平而得散解之力也陽毒綱仲景金匱曰陽毒之為病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治升麻鱉甲湯主之目朱肱曰傷寒病若陽氣獨盛陰氣暴絶必發躁狂走妄言面赤咽痛身斑斑若錦紋或下利赤黃脈洪數或滑促者此名陽毒也宜用酸苦之藥令陰氣復而大汗解矣葶藶苦酒湯陽毒升麻湯大黃散梔子仁湯黑奴丸可選用之若陽毒倍常躁盛大渴者黑奴丸主之李梴曰傷寒三陽病深必變為陽毒或有失於汗下或本陽症誤用熱藥使熱毒陷深發為狂亂面赤眼紅身發斑黃或下利黃赤六脈洪大名曰陽毒發斑宜黑奴丸三黃石膏湯消斑青黛飲樓英曰傷寒先觀兩目或赤或黃赤為陽毒脈洪大有力燥渴者輕則三黃石膏湯三黃巨勝湯重則用大承氣湯下之外用水漬法吳綬曰凡咽痛有陰陽二毒陽毒咽喉腫痛乃熱極也陰毒咽喉不利乃冷極也陽毒脈浮數而大咽痛吐膿血活人用黑奴丸又陽氣獨勝狂躁咽痛脈洪實滑活人用葶藶苦酒湯徐彬曰內經云人傷於寒皆為熱病然邪在陽經久而熾盛則為毒矣故有陽毒之病其病乃熱淫營衛摶結於衛上乾咽喉總是陽熱故熾於上焦而肝脾之陰不交面者陽明之氣所注故火熱盛而面赤斑斑如錦紋也咽喉雖有陰陽之分大火所沖玉石無分故咽喉俱痛也陽經熱盛心火併之心主血則化而為膿病在上焦故唾也陽毒病甚雖非傷寒傳經之比非人身經脈遞運五日經氣未遍故可治七日則陰陽經氣已周而再行故不可治藥用升麻鱉甲湯此熱摶氣血不可直折故以升麻合生甘草升散熱毒為主而以雄黃解毒為臣鱉甲當歸以理其肝陰為佐以蜀椒導其熱氣為使非陽毒反起於陰經而用鱉甲也蓋治病之法病在陽必兼和其陰亦即所謂病現於陽以陰法救之也然非補也仲景辨脈平脈辨脈篇鰲按辨脈平脈二篇理精詞簡義達神清與傷寒及金匱要略同一筆墨的是仲景所撰舊本有韻語一段庸淺膚鄙乃叔和僞作與仲景筆墨不類前人或置之辨脈下平脈前或將平脈倒置辨脈前而以韻語冠於首或將辨脈平脈合為一篇而以韻語終至柏鄉既知辨平二篇不可不分又知先辨後平之次何得仍將韻語冠於首不知韻語誠屬叔和僞作當直削之毋俾滋混而此二篇乃益見純粹也二篇注釋皆竄摘柏鄉語而以己見正之問曰脈有陰陽者何謂也答曰凡脈大浮動數滑此名陽也脈沉澀弱弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死此段首揭脈有陰陽當辨於過不及之間元陽為氣元陰為精脈者不離乎氣血亦不雜乎氣血統乎精氣而得神之名也氣血有盛衰精氣隨有盈虧於是神亦因之各異矣故未辨病先辨脈脈雖合陽氣陰血而成既成又必分為二不分則不見其合也於是脈有陰陽所必辨也盛而盈者陽脈也氣血之有餘也衰而虧者陰脈也氣血之不足也病氣之陰陽既成脈之陰陽必應陰病在臟在裡得陽脈則正氣有餘陽病在腑在表得陰脈則正氣不足問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇此段就陰陽之脈辨出陰陽之症陽實而結陽非有餘而陰正不足故津液耗而陰亡陰亡而陽何所依乎陰虛亦結陽正不足而陰邪有餘故陰寒凝滯而亡陽陽亡而陰何所主乎此段論結俱驗大便似乎專論陽明但不必專論傷寒病之陽明凡結症皆可以陰陽辨之於脈症之間問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰假令尺脈弱名曰陰不足陽氣下陷入陰中則發熱也此段言人身陰陽之氣稍有過不及即互相交爭而為病不必定出於天地之陰陽邪氣傷人身之正氣也人身之中有部位有界限此不足則虛彼有餘則實實不就虛則虛處無氣天地內人身中凡有空處無非氣塞無無氣之空處此部位界限內既不足而虛則彼部位界限內有餘者必來湊實一定之理也本條問答未可專言一病凡寒熱皆本於陰陽從乘也陽脈浮則陰來乘斯惡寒矣陰脈數則陽往從斯發熱矣無寒熱不是此義陽脈浮陰脈弱者則血虛血虛則筋急也其脈沉者榮氣微也其脈浮而汗出如流珠者衛氣衰也榮氣微者加燒針則血流不行更發熱而煩躁也此段就脈之陰陽以辨氣血之或過或不及其脈沉浮接陽脈浮來陽浮則陰自沉榮氣微者榮血也沖氣也血亦氣之化也衛氣衰宜補氣以壯陽榮氣微宜生血以滋陰然榮氣亦氣補氣壯陽未嘗非滋陰也因筋急而加燒針致有火邪入榮之患脈靄靄如車蓋者名曰陽結也脈纍纍如循長竿者名曰陰結也脈瞥瞥如羹上肥者陽氣肥也脈縈縈如蜘蛛絲者陽氣衰也脈綿綿如瀉漆之絶者亡其血也此段根上陽結陰結申言之以辨陽統乎陰陽微固不足行其氣陽衰更不能化血也二脈雖病脈而浮中沉皆有力結雖病邪必有氣聚之處故邪反助脈而見力如車蓋如循竿也瞥瞥頂汗出如珠之浮脈脈雖浮至瞥瞥之狀是陽脈中見弱也縈縈頂榮氣微之沉脈沉雖同至縈縈之狀是陰脈中兼見微弦細也綿綿承上陽從陰見綿綿之象必平日亡血血虛故陽來湊榮陰之虛處而實其隧道也縈縈者無將斷不斷之勢其細尚均勻也綿綿者忽細忽微細兼緊尚有力細不緊而微則更無力矣此所以細同而細之中又不同也綿綿之象從沉取而得脈來緩時一止復來名曰結脈來數時一止名曰促陽盛則促陰盛則結此皆病脈此段辨脈有結促皆病脈不治將至代結也陰盛故緩太緩無力而結將為結代之結矣陽盛故數太數無力而促將至代矣見諸於診人雖未病脈已病矣脈病人未有不病者較結代雖尚可治然退則吉進則凶辨脈者當預圖陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者三焦傷也若數脈見於關上動脈之象上下無頭尾厥厥動搖者名曰動也此段辨明五陽脈中之動脈及動脈主症因摹動脈之形狀關上專主關脈言厥厥動搖且兼滑矣陽動則汗出者陽不足陰乘而搏陽沉取之脈必動陰脈動則陰強而陽弱不固故汗出陰動則發熱者陰不足陽從而搏陰浮取之脈必動陽脈動則陽強陰弱而榮不斂故發熱此陰陽有太過不及不能均平之故也然又有不汗不熱但形冷惡寒者此三焦之裡氣損傷也蓋三焦根於少陰之少火損傷則少火不能生氣以充三焦而火亦衰故形冷惡寒然此非就動脈言症乃就陰陽相搏之至極者充類至義之盡也反此大發熱汗出煩躁不寧可卜矣陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者名曰緩也此段言平人之脈陰陽中和故緩脈應然緩又論無力有力又論兼浮兼沉如陰脈陽脈左右診之俱浮而大則有力兼見濡則有力而和柔故為緩浮診大而浮恐其直硬弦緊見於沉取則浮大乃亢而非和必兼沉取之濡則浮取不陷中取不弱沉取有根斯可謂無病之平脈也陰陽五脈中無緩與遲與濡蓋緩者中和也胃脈也不同於陰陽偏勝之脈遲者三息一至太遲帶止則病脈近緩之微遲尚未可名為病脈也濡者柔軟也今人得之為有濕邪然濕邪之濡寒濕水飲俱兼緊細濕熱則兼數此之濡乃單見和柔之象非濕邪之濡也大率辨脈者在神氣執一字以論專兼如二十四脈之說則後世之論非仲景本意也脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半産漏下男子則亡血失精此段辨明五陰脈中之弦脈因論弦脈主症弦脈按之直徑不動緊脈按之移動如轉索是弦乃緊之有力而硬直者緊乃弦之無力而細直者弦雖兼浮緊而弦自弦緊自緊明矣弦減芤三脈是遞說又從三脈合看出革脈若弦脈似有力而大卻非硬直亦非單絃蓋單絃則浮而見緊兼大則中取不緊有漸微之象是減也如十分之物減損一二分也然見於浮其損輕見於沉弦且大是形大力薄則不止於減損其中且必虧傷而呈中空外實芤之形象見減知寒以弦緊皆陰脈陰乘陽而寒盛也見芤知虛以浮大之弦漸成形大力薄則陽不足而氣中虛也弦為減減陽氣則不能和柔大為芤虛中氣則脈不能充實虛寒相搏者中陽既虛必聚陰寒故名革也革如鼓革外硬中空是為病脈不必說為改革生命之革也觀下半産漏下亡血失精皆革脈之見症不外於中空外實之義也中空固正氣空外實者陰氣也陽之根空於中則外陽盡掣不能包陰而陰散於外而實是陰陽俱失其位而血竭精枯所必至也失此不治而鼓革之革亦且為改革之革矣脈弦而芤未嘗言浮沉二取也後條乃言脈弦而緊按之反芤可知浮與沉兩取之矣所謂按之大大而空故謂之芤言極簡而意極該正難一見了然耳問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗而解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也問曰病有不戰不汗而反解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也此段因辨脈而知其症故是辨脈非辨症也浮取弦也按之芤則弦而大也本虛者中氣不足不能使邪透表邪又欲透表之甚中氣方振汗作隨之故必身戰而後汗出也若脈浮而數即從上轉下言若汗出不戰者則氣未虛診之而非緊必數也邪已將透表也按之不芤是中取而得實象知正氣足以逐邪汗出而不致身戰也再問不戰而汗出乃於浮數之中見一大字不惟無弦緊且浮數者亦有力於此言大知異乎沉取之弦而大也彼弦緊之弦陰脈陽盛此浮數之數陽脈陽盛也彼浮緊之弦得於沉取沉取則弦者大大而空也此浮數之數不待沉取即見大大而實也彼此浮沉為緊為弦為數為大俱辨脈之必精者也其脈自微者非正氣微乃邪氣退而脈得寧靜不弦緊亦不浮數虛之大實之大俱平也故曰微脈雖弱而非病脈不過因曾經發汗吐下亡血正氣弱津液亡故脈見微也然無他病致脈偏勝左右浮沉一例則陰陽之氣雖微而自和合也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也此段辨脈而知解之時解之狀傷寒見病在表亦可類推脈浮已有邪欲透表之勢不必兼數兼微也然兼見單見皆各有義故猶必驗諸症如脈浮數而微病人身涼意和可知其夜半病解蓋浮數恐身熱浮數而微恐正虛而煩今身涼意和不熱不寒知此浮數乃邪急向外病後正虛之微俟夜半陽生陽不微則驅邪有力邪必透表而浮數自罷矣此浮兼微之診也或但浮不數則邪不盛不微則正不虛故不大汗而解若但數並不浮是邪尚不能自然透表然不微則中氣足必能食食能助氣氣能驅邪故邪自解若但微似乎難解然此微非病脈即前其脈自微之微但既微則正氣虛而衛稍虛故必大汗出而表症以解此三者皆於辨脈而得其症之本原自能預知其解之時解之狀也問曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈此段就脈辨之而知陰陽自和必自愈也此又辨脈察症進退之機也曰脈病以病時脈為問也今見此三處同等之脈雖病寒熱亦可以和脈答之三處各有三診脈皆同等所謂和也蓋大小浮沉遲數皆可名病脈至於三處同等則俱為和脈也前段言不戰不汗而解明其為陰陽自和於何知之於診三處同等脈而知之也立夏得洪大脈是其本位其人身體苦疼重者鬚髮其汗若明日身不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時仿此此段辨脈得時旺則邪不勝正可以察病之進退也舉夏以該三時俟人推暨其餘鬚髮其汗句是曲筆猶云身體疼重為陰寒邪氣所傷本鬚髮汗但見時脈則邪不勝正明日即不疼重故汗自出又不大出明日便解也此得時脈洪大之吉徵也病人得時脈為最難非平日持身謹慎不能得此時旺之脈也問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也此段因時脈而辨及於每日之陰陽衰旺則不盡求之脈矣前條四時旺脈即六經各有旺時之義此又就陰陽出入推明病機寸口脈浮為在表沉為在裡數為在腑遲為在臟假令脈遲此為在臟也此段就浮沉遲數因人內外淺深而辨別之合兩手之寸口言寸關尺三部雖三候而寸口又為氣之所聚易得察識也於此得浮沉遲數之脈而辨之則症自可明而所祛之邪亦自得當矣浮沉就經脈分表裡遲數就臟腑分表裡脈浮在表沉似在臟腑矣然寸口之沉非關尺之沉故云里亦表之裡而非里之裡也表裡義無盡未可就經絡臟腑之一大表里而不研究其極也寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛病骨節煩疼當發其汗此段承上寸口脈浮一語申明之示人推暨其餘榮衛俱病則經脈俱急故骨節覺其煩疼也此症言治邪在表宜驅之於外故當發汗也亦不過籠統言之示人知辨脈為要與前段一勢敘下故下段稍易前後焉趺陽脈浮而澀少陰脈如經也其病在脾法當下利何以知之若脈浮大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃虛也以少陰脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也此段言辨脈之法不但辨手三部並當辨足骨付骨上之趺陽脈也此辨脈於精微多方求其至不惟表裡臟腑大勢可明即細微曲折無不可明矣趺陽胃脈也又以候少陰腎胃者就經以候腑腎者就下以候下也夫在經為胃脈而四肢則屬脾胃又與脾為表裡故脈之行實脾胃之氣互相為用也今趺陽脈浮而澀其浮不同於手脈之浮也寸口浮在經絡之表趺陽浮則在腑之裡然在腑雖為里就脾臟言則仍表也然浮皆作表論在趺陽亦然也若浮而大則為氣實血虛是何病乎亡血也則大脈乃是外實中虛浮按而得空之芤脈故但為亡血以是知浮大之症不同於脈浮而澀之症也蓋浮而又澀似腎病但診腎脈之在手者則弦而浮弦雖似寒而按之不緊且浮則非寒而弦也乃少陰之氣通於少陽寒水上溉風木水木相生非為病脈故脈浮而澀專為脾家病也蓋趺陽浮為胃氣兼澀則脾病以澀為血不足血不足仍是氣不足脾之陽氣不足則脈澀實由胃之陽氣虛而不能溫脾表裡俱虛土不能障水故下利也因趺陽屬胃又屬腎求之少陰脈調如經更求之胃陽浮即得脾之陰澀設下利之久浮而澀忽反滑而數知向脈之浮陽虛外散者因下利而隨陰下趨盡斂而陷入陰分為挾熱之利且當便膿血矣是趺陽脈雖兼腎而候胃但候腎亦必少陰常負趺陽方為調脈如經故求之腎不得病脈而見調脈即求之胃亦先浮而澀繼滑而數知病在脾並不在胃特以脾不離胃應於趺陽故辨胃而知其病在脾耳舊說將滑而數謂少陰病不知少陰已脈調如經何得滑數且少陰之數必兼沉細或下利未有不澀者今云滑數豈少陰病乎況少陰雖開竅於二陰卻不司屎之軟硬膿血之有無明系自上文浮澀來故加反字也如此看本段文義方一線本段筆法回互錯綜極變化之妙庸醫不能驟解真仲師之文也即此已可知非後人僞作趺陽脈遲而緩者胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫下之所為也榮衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數浮動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈跌陽脈當遲緩脈此是手脈因前後度數如法病者則飢數脈不時則生惡瘡也此段再就趺陽明其為胃脈以胃與脾表裡病必連及故又當於脈辨之遲而緩遲字只貼緩作虛字看非三至之遲故為如經之調脈浮而數則不如經矣蓋浮則正陽外散而中氣虛故曰胃傷數則邪熱入里而中陰耗故曰脾動夫脾本動今非本經之動乃病邪觸之使動也醫所以下者必以數為內熱故下之不知浮為在表雖兼數無下理數為在腑必兼滑大方為實熱可下數而微小則為虛熱亦無下理也今誤下之榮衛所受之表邪悉內陷臟腑虛熱浮游不能持久故脈之數者先罷而微但見虛浮之象則內陷之邪變熱必逼胃陽外出胃中液耗而便硬且脈浮少氣浮而上逆噫除更噫皆由妄下傷陰以致陽擾也何以言之先言數則動脾後因妄下而數脈先微一切便硬氣噫皆脾氣之不治也夫前條因脾不足而知胃弱此條因脾不治而亂胃氣其表裡相關如此所以浮數改為但浮而數已漸微先罷數去浮存必表邪獨留於內遂致心中則飢口不能食食亦不消且邪熱耗液液耗則陰虛而熱必潮渴必發於是汗大泄邪遂以散邪散正復是以趺陽脈復當遲緩也且不獨趺陽即諸脈之在手者亦必六診同等而如法病人自飢而能食也或有平日熱邪內勝誤下後雖數暫改微而病愈然恐不時又起變生惡瘡故亦不可因病愈而忽之也此段亦筆法回互文義婉曲一時不易猝解師曰病人脈微而澀者為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛暑欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰微則惡熱此醫發其汗陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣冬十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀所以血亡也此段就脈之微澀知為醫所病而致氣血多虛之症也其人亡血句宜著眼包陰陽兩虛在內陽微陰微不過示人知誤汗誤下之禁其實汗即血也誤汗多出何嘗不病陰津液氣之化也誤下何嘗不病陽此又可推廣誤汗下陰陽交病之理也兼以天時言之亦俱推廣陰陽來復而知病之加損也於是可以再申言之脈之微者寸日浮取之也脈之澀者尺部沉取之也微澀皆陰脈而候之於尺寸浮沉則分陰陽矣故浮而澀陰陽俱病也言亡血者其陰脈澀之中又兼遲也遲而澀沉取於尺部而得之可以專言血分但既兼遲氣不足運脈不如經過於緩而得遲血亡由於氣衰誤為汗下可以一症而兼得之也安可不辨脈哉獨言亡血者血有形氣無形血之亡可見氣之亡不可見故言亡血下即言當惡寒後發熱若但亡血不過陰虛生內熱發熱而已何以復陽虛生外寒而先惡寒後發熱耶但外感之邪亦有先寒後熱何以知其陰陽兩虛此又就症之寒熱無休止時而可知矣脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻此段就脈辨病屬臟屬腑分在裡之表裡以求病邪病邪得尤必辨脈以施治也不令溲數數語一貫說下俱貼屬腑一邊脈浮而大寸口得之知病在表然心下硬邪已入里且內有熱必煩必渴此屬心臟也肺臟也此在胸則結胸雖不入肺而礙於肺在心則痞雖不入心而迫於心故曰屬臟審於脈浮大在表原應令汗出以解病至於變熱內結則必攻之攻法不必盡言盡言則非辨脈是辨症辨治矣此因浮大既悉又審於症卻無非辨脈耳屬腑一段亦根浮大脈來脈大本宜汗邪既變熱入里幸不成結胸痞諸近臟之症惟轉入陽明之腑則不可因內熱而利小便蓋小便利則津液從清道泄無以潤大腸故便硬是仍宜發汗使邪從陽明轉太陽而出蓋熱雖入胃腑而胃尚未實切宜禁下況脈見浮大故仍從表治必令汗出徹而後邪熱入里者還從表解也如汗出不徹邪不透表日久在胃消耗正津大便硬者且漸難必至成實有無所復傳之危症夫至便難似宜下矣然猶必辨脈若帶遲胃虛冷亦未可下也總之當初入胃腑邪猶在表一汗而熱愈為不易之良法也此亦就辨脈而申論之症示人當知辨脈為先務也脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也又未知何臟先受其災若汗出發潤喘不休者此為肺絶也陽反獨留形體如煙燻直視搖頭者此心絶也唇吻反青四肢漐習者此為肝絶也環口黧黑柔汗發黃者此為脾絶也溲便遺失狂言目反直視者此為腎絶也又未知何臟陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也此段因辨三部皆浮而無根及洪大而散之脈而知其大命之將絶又就症辨何臟先絶又辨陰陽盡竭之前後辨脈至此精矣至矣故非辨症也所以命絶者以脈三部皆浮而無根洪大而散是陽將外脫上越陰不能維持於中以致離卸其交鈕再或陰寒內盛自下逼上孤陽外亡獨陰無陽亦成離判也此皆辨脈而知其命將絶也漐習謂振動搐搦手足時引縮也寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫反不知而反飲冷水令大汗出水得寒氣冷必相搏也其人即䭇此段只就寸口浮大一脈推究之以見左右三部九候應辨者無窮也寸口脈浮是邪在表不治表而下之自犯大逆也且凡言浮則必過於浮凡脈皆當如此看凡言大則必過於大故寸見浮可知氣勝而亡血陰不能維陽使靜故只見浮而且大可知所謂氣勝者亦非正氣乃挾外感風寒之邪參雜而成大脈是外感邪寒與正氣相搏而成病者也夫中表固為寒與正搏即直中里因腸胃素有虛風風亦氣也亦與時感之寒相搏遂成腸鳴之症即不下之且將自利可下之乎然不可下俗醫必為可汗但因浮大謂為實熱在內飲以冷水令大汗出不知冷水只可消實熱焉可治寒氣今所飲冷水得寒氣又必相搏搏於胸胃陽滯陰凝飲食入而必䭇矣䭇即噎也所以䭇者以寒邪格於陽部拒而不入也飲冷水以發汗諸家概置勿論魏氏比義於白虎湯而云未能自信然此無難知者如今人患熱病食西瓜則汗出而解亦此意也䭇病有成於飲冷者有成於飲熱酒者無非寒熱與虛氣相搏而成也趺陽脈浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也此段承上申言氣逆之䭇再審於專主胃之趺陽脈也下體之診浮即為虛不同於寸口之必兼大也浮虛相搏之虛乃胃虛也虛必有寒虛寒之胃氣相搏是以氣必上逆而為䭇不必定成噎症凡胃虛寒胸膈必反有浮游之熱逆而上衝重可噎飲食輕亦可逆膈氣是胃已虛不治則將竭也如浮帶滑滑近數邪熱上衝必為空噦是胃虛氣逆更甚於嘔矣此由醫誤汗下或誤飲冷水也夫胃本虛而以為實反責虛以取實其為大逆如前段所云也於是胃氣內空則陽不足而越於外陰之內守者亦不能自固於中且陰既虛又生邪熱熱入陰中迫血妄行於是血隨邪熱而上行必從鼻而出故趺陽脈浮而覺鼻中燥者必衄也然則趺陽得一浮脈即知胃氣之虛竭兼一滑脈即知邪熱之妄行其可不辨之而誤有所治哉此段言胃虛大約虛寒則䭇食虛熱則吐血於浮脈兼滑兼大而辨之大即芤滑即數也可體原文上段言芤言革言數而明之諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也脈浮而遲面赤而戰惕者六七日當汗出而解反發熱者瘥遲遲則無陽不能作汗其身必癢也此段就脈之浮數辨論曰諸脈則左右三部九候皆該不獨兩寸也然必以兩寸為氣之聚脈之歸焉寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔濁邪中下名曰渾也陰中於邪必內栗也表氣虛微裡氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出表氣虛微裡氣微急三焦相混內外不通上焦怫鬱臟氣相熏口爛食斷也中焦不治胃氣上衝脾氣不轉胃氣為濁榮衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣內入嚏而出之聲嗢咽塞寒厥相逐為熱所壅血凝自下狀如豬肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全此段似乎辨症但起手重提寸口脈陰陽俱緊一語則浮中沉取之俱緊乃三焦陰寒涸沍之象故必詳究表裡上下之症以為陰陽俱緊之脈證驗則辨症正以辨脈也脈陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也到七日以來其人微發熱手足溫者欲解到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也此段承上脈陰陽俱緊申言寒濕中人上下成病其症候次序病情轉變大命生死一切情狀也此段單就初病言下段又就變遷言脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解此段又就脈陰陽俱緊申言之以見脈之宜辨症正所以證脈也病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也若脈和其人大煩目重瞼內際黃者此為欲解此段總承上陰陽俱緊三段而申言之點出手足三部脈以見不獨寸口也脈浮而數浮為風數為虛風為熱數為寒風寒相搏則灑淅惡寒也脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾即發熱汗出者此為不治此段辨脈之浮數以明症之輕重不同也傷寒咳逆上氣其脈散者死其形損故也此段結言辨脈之終故就傷寒推究其所以死也平脈篇師曰呼吸者脈之頭也初持脈來疾去遲此出疾入遲名曰內虛外實也初持脈來遲去疾此出遲入疾名曰內實外虛也此段先明呼吸為脈所自始問曰上工望而知之中工問而知之下工脈而知之顧聞其說師曰病家人請云病人苦發熱身體疼病人自臥師到診其脈沉而遲者知其瘥也何以知之表有病者脈當浮大今脈反沉遲故知愈也此段因脈辨症此所謂沉遲是就初持脈寸口浮取而言非持之而得沉遲故為病愈此等大有關係故申明之假令病人云腹內卒痛病人自坐師到脈之浮而大者知其瘥也何以知之若更有病者脈當浮而細今脈浮大故知愈也此段亦是因脈知症更有病更即仍字義非別病也師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令脈不和處言已愈設令向壁臥聞師到不驚起而盼視若三言三止脈之咽唾者此詐病也設令脈自和言此病太重當須服吐下藥針灸數十百處乃愈此段就病人情僞察識其病之真假而必以脈為定也言須服吐下藥針灸數十百處以受盡痛苦嚇之彼詐病者驚聞必不敢見欺而自吐實情矣師持脈病人缺者無病也脈之呻者病也言遲者風也搖頭言者里病也行遲者表強也坐而伏者氣短也坐而下腳者腰痛也裡實護腹如懷卵物者心痛也此段就持脈時病人之聲音狀貌情態以辨明何病亦以佐辨脈察病之法也師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須伏之若脈微弱者當喉中痛似傷非喉痹也病人云實喉中病雖爾今復欲下利此段辨明伏氣之脈故雖及症而不言治法冬時感寒伏藏經中者為伏氣今月春分伏寒欲發時也欲有伏氣為時令言假令舊有伏氣診於人而得之脈微弱指少陰也喉痛如物傷之而非火邪壅腫之喉痹此正伏氣久已變熱也病人果雲實喉中痛辨脈驗症伏氣已真矣雖爾喉痛為伏氣上衝且必下決作利也問曰人病恐怖者其脈何狀師曰脈行如循絲纍纍然其面白脫色問曰人不飲其脈何類師曰脈自澀唇口乾燥也問曰人愧者其脈何類師曰脈浮面色乍白乍赤此段並言三症皆辨脈而兼望色以知病之情狀也問曰脈有三菽六菽重者何謂也師曰脈者人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也此段明診法輕重以求脈於淺深而知所屬何臟也假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治此段補敘少陰伏氣由元陽素虛寒邪久蓄變成熱邪上衝不透下趨必利為危候也問曰脈有相乘有縱有橫有順有逆何也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘之名曰順此段就五行生剋之理辨脈之衰旺乘者為病邪所乘者為正氣也問曰脈有殘賊何謂也師曰脈弦緊浮滑沉澀此六者名為殘賊能為諸脈作病也此段申明病脈有害於如經之脈又以些六脈為關要故舉以示人弦緊者陰病脈殘賊陽正脈之柔緩也浮滑者陽病脈殘賊陰正脈之和緩也浮而兼滑大而芤也沉澀者亦陰病脈殘賊陽正脈之流行充暢也舉此六者以概之然凡病脈皆能殘賊正脈使之變動而不安其常問曰脈有災怪何謂也師曰假令人病脈得太陽與形症相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此症今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪也此段辨脈審症推究以至於極也脈得太陽必用散邪升陽湯劑舊服藥今發作必是寒涼之藥舊存於里今得治表之湯寒邪在表未及驅逐而寒藥在裡先發作而吐瀉矣故曰災怪然寒藥中存者得吐瀉可除即今表邪亦不治而自散矣何也吐上越必有汗可解也問曰東方肝脈其形何似師曰肝者木也名厥陰其脈微弦濡弱而長是肝脈肝病自得濡弱者愈也假令得純弦者死何以知之以其脈如弦直是肝臟傷故知死也南方心脈其形何似師曰心者火也名少陰其脈洪大而長是心脈心病自得洪大者愈假令脈來微去大故名反病在裡也脈來頭大本小者故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死西方肺脈其形何似師曰肺者金也名太陰其脈毛浮也肺病自得此脈若得緩遲者皆愈若得數者則劇何以知之數者南方火火克西方金法當癰腫為難治也此三段因五行生剋之理已於前縱橫順逆詳言之今復就辨脈而知臟病欲人審察之也但言三臟者亦如辨脈篇但言夏令人當自推及也問曰二月得毛脈何以遽言至秋當死師曰二月之時脈當濡弱反得浮者故知至秋死二月肝用事脈應濡反得毛浮是肺脈也肺屬金金來剋木故知秋死也他皆仿此此段因五臟辨脈而推及於四時亦舉一以例其餘也師曰脈肥人責浮脈瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之此段就人形體辨診脈之輕重以定責治之法也師曰寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計其餘有生死之期期以月節克之也此段承上關格推言陰陽不順接上下不交通凡病皆可決之於脈也師曰脈病人不病名曰行尸以無王氣卒眩僕不識人者短命則死人病脈不病名曰內虛以無穀神雖因無苦此段因前文辨脈審症而知所重惟在乎脈而症不過證其脈也問曰翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽相合故令脈滑關尺自平陽明脈微沉食飲自可少陰脈微滑滑者緊之浮名也此為陰實其人必股內汗出陰下濕也此段專辨脈之沉而兼及滑浮緊正申言脈有殘賊一節也翕與闢對奄與發對掩同脈屬氣屬陽陽為陰所翕合而奄掩之則脈沉也再重按形圓頂指此沉乃流動有力而滑也問曰曾為人所難緊脈從何而來師曰假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下利以胃中虛冷故脈緊也此段亦申言殘賊脈也前段論關尺二部之沉滑於尺中辨陽虛陰實之緊脈此言寸脈之緊及胃中虛冷之緊皆明三部之陽虛陰實也寸口衛氣盛名曰高榮氣盛名曰章高章相搏名曰綱衛氣弱名曰惵榮氣弱名曰卑惵卑相搏名曰損衛氣和名曰緩榮氣和名曰遲遲緩相搏名曰沉此段分三節辨脈之過不及與中和之象而審病機也曰寸口者以諸脈總會之首實該三部九候而辨之也寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長遲則陰氣盛骨髓生血滿肌肉緊薄鮮硬陰陽相抱榮衛俱行剛柔相搏名曰強此段緊接上遲緩為沉來分別出遲緩又可名強也亦曰寸口者分以兩寸統各三部其左右六部悉同等也趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也此段承上強脈並前段言陰實專就脾胃表裡以明脈見強為平脈亦有時為病脈也脈貴和平胃實脾強皆為病脈如持陽實以擊陰強則水火相搏不相逮者真相搏矣然非外敵乃自相殘傷如以手把刃坐而自戕其軀體以成瘡瘍也但言持實擊強不言持強擊實可推其義寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格此段就脈辨出關格之病卻有兩種然皆由陰陽為病無錯雜之邪阻礙故尚輕於無尿但頭汗出之關格脈浮而大浮為風虛大為氣強風氣相搏必成癮疹身體為癢癢者名泄風久久為痂癩此段又就浮大脈辨癮疹痂癩之症亦於寸口候表也寸口脈弱而遲弱者衛氣微遲者榮氣寒榮為血血寒則發熱衛為氣氣微則心內飢飢而虛滿不能食也此段亦辨脈論症總不外陽虛陰實之義趺陽脈大而緊者當即下利為難治寸口脈緩而弱弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於胸上也此段亦辨脈論症專以胃之虛實驗病之輕重而實為陽虛陰實之見端也趺陽脈緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉即氣動膈氣乃下少陰脈不出其陰腫大而虛也此段就趺陽脈辨少陰之症而胃脈亦兼統焉以趺陽主胃腎二經之脈也程氏謂腎腫兼有水蓄亦是腎陽已衰無濕不作虛腫也然此水蓄必在膀胱氣盛陽足則自宣泄不可作濕熱治也寸口脈微而澀微者衛氣不行澀者榮氣不足榮衛不能相將三焦無所仰身體痹不仁榮氣不足則煩疼口難言衛氣虛則惡寒數缺三焦不歸其部上焦不歸者噫而吞酢中焦不歸者不能消穀引食下焦不歸者則遺溲沉而數沉為實數消穀緊者病難治此段辨脈乃就表之榮衛里之三焦而得陰陽兩虧之脈雖言寸口實兼關尺二部輕重取之而得也緊者病難治以中氣空虛之極所致較浮而澀者更加等也然皆不為預圖之故不重可悔恨哉寸口脈微而澀微者衛氣衰澀者榮氣不足衛氣衰面色黃榮氣不足面色青榮為根衛為葉榮衛俱微則根葉枯槁而寒栗咳逆唾腥吐涎沫也此段又就寸口脈分辨病情面色而知陽虛陰實更兼痰之候趺陽脈浮而芤浮者衛氣衰芤者榮氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絶此段又就辨脈明榮衛之表氣而趺陽為胃脈中焦之氣出於胃因可識宗氣也四屬四肢也斷絶則榮衛不行不止不足將為半身不遂等症矣寸口脈微而緩微者衛氣疏疏則其膚空緩者胃氣實實則谷消而水化也谷入於胃脈道乃行水入於經其血乃成榮盛則其膚必疏三焦絶經名曰血崩此段因前二段寸口趺陽候得榮衛俱微遂專論衛微榮盛之症亦於脈辨之也里榮無所統攝多入於經者亦易亂出於經何也氣有行於榮中者榮氣也氣有護於榮外者衛氣也衛氣既疏則里血無力血易泛濫不由經道而下崩此乃三焦經絶也趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣少陰脈弱而澀弱者微煩澀者厥逆趺陽脈不出脾不上下身冷膚硬此段又就脈辨得陽虛陰實之一症余可類推少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕此段就上趺陽脈不出推出少陰脈以趺陽主腎故可明腎虛主症也寸口脈微遲尺脈緊其人虛損多汗知陰常在絶不見陽也寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口緊不能言戰而栗也此段又就脈申言陽虛陰實之病更推類以結之也問曰濡弱何以反適十一頭師曰五臟六腑相乘故十一問曰何以知乘腑何以知乘臟師曰諸陽浮數為乘腑諸陰遲澀為乘臟也此段言脈之通於臟腑凡邪之乘因乎脈之虛所以通結辨脈平脈二篇之義也濡弱言氣血氣無形血如水皆軟細之物非指病脈為濡弱凡人脈皆如此也適往也反來也反適即往來義頭即處字之意十一頭原文自明之言相乘表裡之謂也五臟六腑皆陰陽相配為表裡而以三焦統之成十二經又分上中下為三上焦心肺二臟配以心包絡一腑即身里上段之大膜而就其包裹心者主之包心絡者不止包心通於全里遂更通於表矣中焦肝脾二臟配以胃膽二腑兩脅之間胃腸之際又有脂膜以連之胃之下口通於中焦之小腸大腸下焦膀胱二腑獨腎一臟此十一頭之部位也上焦肺稍後心稍前而肺下心上是為胸膈其中為膻中宗氣居焉中焦肝膽在左脾在右胃居中胃之下小腸之後大腸之上是為人之中臍上三寸三分是其處居於身左右前後之中乃受天地父母之元氣而生身者故與臍對有竅而不開雖其氣無不通而無可通之竅所以深藏永固之也下焦則腎居後膀胱居前腎臟兩丸附於脊骨而中虛者為命門膀胱之上臍之下亦有空處是為關元命門水中存火以溫三焦三焦無形以軀殼為形以脂膜為界其實一物故亦附名為腑經為手少陽正配腎足少陰以命門之火同為相火共奉心之君火也關元之中有氣專司分清濁二路故曰關而名其氣為胞中此十一頭相乘而得十二經之義也其中為膻中為胃中為身中之中為胞中之中為命門之中皆形虛而有氣以實之惟虛故能實萬化起於中靜者動之本也至鼻下口上亦名人中則以人之開竅上下者分中人中之上耳目鼻皆兩竅陰耦數三耦合乎坤也人中以下口與前後陰皆一竅陽奇數三奇合乎乾也坤上乾下乃成泰象故陰陽上下左右皆以交而生以不交而死也此十一頭三焦五中皆氣之充塞則皆脈之流通故脈之濡弱而實氣之所藉流行也此段系魏氏全文按平脈篇起手曰脈之頭結處曰十一頭兩頭字首尾照應成篇法按魏氏釋辨脈平脈之義以為辨者分別之平者較量之平如平章之平非平人之脈然則辨者始條理也分為二推至於無窮也平者終條理也衡如一究歸於不二也夫氣有陰陽邪亦有陰陽病必分陰陽脈必辨陰陽必分為二以辨之氣之陰陽有有餘不足邪之陰陽亦有盛衰病因而有輕重脈必平陰陽故權衡如一以平之如此釋辨平二字之義致有精鑿
