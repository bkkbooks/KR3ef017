body:
  text: 卷三身搖綱仲景曰傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之目喻昌曰心下逆滿氣上衝胸塞湧於膈所以起則頭眩脈見沉緊明系飲中留結外邪若但發汗以強解其外外雖解而津液盡竭反足傷動經脈有身為振搖之患蓋人身經脈賴津液以滋養吐下而津液一傷發汗而津液再傷令經脈失養而身搖故遇此等症不得不重在表此症外邪已散止存飲中之邪故以桂枝加入制飲藥內俾之邪盡散津液得以四布而滋養其經脈千百年來孰窺其批卻導窾之妙乎魏荔彤曰沉則為里緊則為寒是裡虛陽微而陰邪為患也原在經絡之症誤吐誤下乃為在臟腑之症矣復不從里治而又發汗以傷動其經絡之表衛外之陽亦自汗出而虛身為振搖亡陽之兆也仲師以苓桂術甘內治其沉緊陰寒上逆之邪可除外治其振搖表虛惡寒之象可止四物俱投陽分治表裡陰邪至當之劑也方喻皆謂挾飲為患不知陰邪內盛有飲固然無飲亦然飲或因陰盛而起非飲獨為病陰消而飲亦安非飲自為安也則亦不必論列於飲矣鰲按喻氏留飲之論未嘗不是本條病因而魏氏專主陰邪內盛包括留飲見理自更圓通夫世固有飲家而患本條之症者則知喻氏非盡謬理也亦有非飲家而犯本條之症者則知魏氏為尤當也故並存之身癢綱仲景曰太陽病八九日脈微而惡寒者此陰陽俱虛不可更發汗更吐更下也面色反有熱色者未欲解也以其不得小汗出身必癢宜桂枝麻黃合半湯目朱肱曰不可更汗吐下小柴胡湯主之若反重發汗則氣虛必兩耳聾無聞素無熱人可芍藥甘草附子湯有熱人可黃耆建中湯柯琴曰八九日是當解未解之時陰陽俱虛當調其陰陽若其人熱多寒少面色正赤者是陽氣怫鬱在表不得越出當汗不汗其身必癢八九日來正已虛邪未解不可汗又不可不汗故立此法身疼綱仲景曰太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗麻黃湯主之脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗以營氣不足血少故也目朱肱曰尺脈遲者先以小建中湯以養之王肯堂曰體痛乃六經俱有之症有表有里有寒有熱有風有濕如太陽傷寒榮血不利身疼者宜發汗若汗後脈沉遲體痛者又宜溫之中暍身疼者白虎湯解之裡寒外熱身疼者先與救里而後攻表寒在三陰則脈沉身疼寒在三陽則一身支節煩疼四逆柴胡可不辨歟太陽身痛但拘急耳中濕身痛不可轉側陰毒身痛體勢沉重宛如被杖以此別之發熱惡寒身體痛者屬太陽麻黃湯大青龍湯是也若兼心下支結柴胡加桂枝湯若兼下利清穀腹脹先以四逆溫里後以桂枝發表若尺遲血少營氣不足也活人先以小建中湯養血俟尺脈回卻用柴胡等湯劑解之按熱多寒少尺脈沉遲者榮血不足黃耆建中湯夫血不足而用黃耆者黃耆味甘加以甘草大能生血此仲景妙法蓋稼穡作甘甘能補胃胃為氣血之海血所從以生又經云無陽則陰無以生以甘益胃而生血旨哉今人但知參耆為氣藥故表而出之柯琴曰太陽受病當一二日發蓋寒邪凝不遽發非若風邪易於發熱也然不論已未發熱而惡寒體痛嘔逆之症陰陽俱緊之脈先見即可斷為太陽之傷寒而非中風矣寒邪外束故體痛寒邪內侵故嘔逆太陽主一身之表風寒外束陽氣不伸故一身盡疼此麻黃八症頭痛發熱惡風同桂枝症無汗身疼同大青龍症本症重在發熱身疼無汗而喘鰲按法者脈法也以浮緊之脈法言當身痛宜發汗然必三部浮緊乃可發汗今浮緊之脈雖見寸口而尺中遲則不得主發汗之法矣且尺主血血少而尺遲雖發汗亦不能作汗不但身疼不除必至有亡血亡津之變綱仲景曰發汗後身疼痛脈沉遲者桂枝加芍藥生薑人參新加湯主之目成無己曰汗後身痛邪氣未盡也脈沉遲營血不足也經云其脈沉者營血微也又云遲者營氣不足血少故也與桂枝以解未盡之邪加參芍姜以益不足之血朱肱曰小建中湯兼治汗後身疼脈沉而遲者若霍亂吐瀉止而身疼痛不休者少與桂枝湯即愈金匱要略云瘡家雖身體痛不可發汗汗出則痙張元素曰經言表邪盛脈浮而緊法當身疼痛宜以汗解之況身疼皆系表邪未盡此又加人參芍藥生薑以益血何也予曰表邪盛則身疼血虛則身亦疼其脈浮緊者邪盛也其脈沉遲者血虛也盛者損之則安虛者益之則愈仲景凡言發汗後以外無表症里無熱症止余身疼一事而已若脈稍浮盛則為表邪未盡解今言脈沉遲此血虛致然也故加三味以益血綱仲景曰傷寒醫下之續得下利清穀不止身疼痛者急當救里後清便自調身體痛者急當救表救里宜四逆湯救表宜桂枝湯下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯吐利止而身痛不休者當消息和解其外宜桂枝湯小和之目柯琴曰寒邪在表而妄下之移寒於脾下利完穀胃陽已亡身疼未除是表裡皆困身疼猶有表邪也然當舍表而救里里症既瘥表症仍在救表亦不容緩身疼本麻黃症而下利清穀腠理之疏可知必桂枝湯和營衛而痛自解故不曰攻而仍曰救救表仍合和中也溫中之後仍可用桂枝湯其神乎下利而腹尚脹滿即伏清穀之機先溫其里不待其急而始救也里和而表不解可專治其表故不曰救而曰攻吐利是臟腑不和非桂枝湯所治止後而身痛不休是營衛不和非麻黃湯所宜和解其外惟有桂枝之法消息其宜更有小與之法也綱仲景曰病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷寒冷所致也問曰值天陰雨不止風濕相搏一身盡疼法當汗出而解醫云此可發汗汗之病不解者何也答曰發其汗汗大出者風濕俱去也濕家之為病一身盡疼發熱面色如熏黃傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈虛浮而澀者桂枝附子湯主之若其人大便硬小便自利者去桂加白朮湯主之目成無己曰傷寒與中風家至七八日再經之時則邪氣都在裡身必不苦疼痛今日數多復身體痛煩不能自轉側者風濕相搏也煩者風也疼者濕也經曰風則浮虛脈經曰脈來澀者為病寒濕也不嘔渴里無邪也脈得浮虛而澀身疼煩知風濕俱在經也與桂枝附子湯以散表中風濕李杲曰風濕相搏一身盡疼者補中益氣湯加羌活防風升麻藁本蒼朮治之如病去勿再服以諸風藥損人元氣而益其病也麻黃復煎湯治陰室中汗出懶語四肢困倦乏力走注疼痛乃下焦伏火不得升浮而躁熱汗出一身疼痛蓋風濕相搏也以麻黃髮汗漸漸發之在經者亦宜發汗況值季春之月脈緩而遲尤宜發之令風濕去而陽氣升困倦乃退血氣俱得生旺也王好古曰神術湯治風濕惡寒脈緊無汗白朮湯治風濕惡寒脈緩有汗上二術湯治風濕又當隨症加減其法詳在二湯之後閔芝慶曰汗出當風寒則汗不得越久留骨節故一身盡痛元府反閉故發熱日晡為陽明之時太陰濕土鬱而不伸故劇此雖傷於濕而實因於風寒也金匱用麻黃杏仁薏苡甘草湯凡濕不得泄熱不得越則身黃若傷寒發黃時身疼已解此濕流關節故不解也須用五苓散以除其濕鰲按風濕身疼與傷寒身疼各不同蓋傷寒身疼無止時風濕身疼多在日晡時發若更遇陰雨與天氣相合則疼更甚亦不必拘於日晡時矣綱仲景曰太陽中暑者身熱疼重而惡寒脈微弱此以夏月傷冷水水行皮中所致也太陽中暑者發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚下之則淋目柯琴曰中暑者與傷寒迥別而亦有因於傷寒者太陽之氣在天為寒在地為水冬之傷寒傷於天之寒風夏之傷寒傷於地之寒水脈微亡陽脈弱發熱此身熱脈微本是暑傷於氣而疼重惡寒實由於寒水沐浴留在皮膚而然亦是傷寒所致耳宜五苓散藿香飲之類弦細芤遲不得連讀言中暑夾寒之脈或微弱或弦細或芤遲皆是虛脈以此等而見發熱惡寒身重疼痛等症雖當炎夏而虛寒可知東垣用補中益氣湯深合仲景心也綱仲景曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也以真武湯救之目方中行曰末以真武湯救之六字黃氏正之以原文為傳寫之誤甚是當從之蓋既曰不可服服之為逆則安得又復有大青湯主之之文故黃氏正以真武湯是也魏荔彤曰既曰中風又曰脈浮緊浮為在表緊為寒邪則是閤中風與寒邪在表為一症也更見發熱惡寒身疼不汗出煩躁諸症大率傷寒之症多然言太陽中風而中風諸症亦在矣主以大青龍仍傷寒麻黃髮汗之義也綱仲景曰太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之目魏荔彤曰他條脈浮緊發熱無汗而自衄愈純是寒邪傷營猶輕微也此竟身疼痛則寒傷者重矣八九日不解表症仍在因以麻黃湯發汗微除而不全除其人發煩目瞑者非麻黃治寒邪不效必少帶中風之陽邪故用麻黃辛熱至於發煩目瞑劇者更必衄血也設預審之知其寒重風輕斟酌青龍用之不至是矣然寒雖發汗未盡除風因衄已悉去乃解者風邪解也百節疼痛綱仲景曰太陽病關節疼痛而煩脈沉而細者此名濕痹傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外症未去者柴胡加桂枝湯主之太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之目張兼善曰脈沉而細本少陰脈今太陽病而見此脈太陽與少陰為表裡故相似乃太陽之變脈也濕流關節故疼痛太陽氣不宣故煩濕氣痹閉而不行故脈應其象而沉細太陽之脈從風則緩從寒則緊從濕則細傷上則浮傷下則沉當因症而合脈魏荔彤曰傷寒六七日宜傳裡矣乃有半未離太陽之表而半已微入少陽之裡者惟不離太陽故結胸之結變而結於心下復不正結而偏出微入少陽兩側之界因謂之支結雖云帶少陽實皆太陽表裡之症也故用少陽柴胡之治仍加太陽之桂枝本條何以見太陽多少陽少也如正文發熱微惡寒支節煩疼微嘔太陽之症有四獨心下支結一症侵入少陽其實又系大小結胸之流派惟以部位在少陽故治少陽正所以治太陽也用柴胡加入桂枝者猶如太陽之賊侵少陽之界用太陽之兵捕協同少陽之兵捕方可治太陽少陽兩界之賊寇也綱仲景曰寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨肉煩疼當發其汗也目柯琴曰風寒本相因必風先開腠理寒得入經絡緊者急也即數也緊以形象言數以至數言緊則為寒指傷寒也數則為熱指發熱也辭異而義同故脈浮數浮緊者皆是麻黃症骨肉煩疼即是風寒兩傷營衛俱病要之冬月風寒本同一體故中風傷寒皆惡風惡寒營病衛必病中風之重者便是傷寒傷寒之淺者便是中風不必在風寒上細分須當在有汗無汗上著眼耳筋惕肉瞤綱仲景曰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也太陽病醫發汗仍發熱惡寒復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈目朱肱曰大凡發汗過多即身瞤動振搖虛羸之人微發汗便有此症宜服真武湯羸甚者去芍藥或少用之有熱症惡熱藥者去附子楊士瀛曰傷寒筋惕身瞤發汗太過所致也古人以真武湯主之然真武湯能止其汗而不能定其瞤瞤者動也蓋汗多則傷血血虛無以榮筋筋愈急而四體百骸俱為之瞤宜以四物去地黃加人參半夏茯苓甘草作劑以五靈脂為佐入生薑烏梅煎服自有神效此專主生血生血乃以收汗也陶華曰筋惕肉瞤者非常常有之內經曰陽氣者精則養神柔則養筋發汗過多津液枯少陽氣偏虛筋肉失所養故惕惕然跳瞤瞤然動非溫經助陽不能愈仲景特設真武湯救之或因發汗吐下後表裡俱虛而有此狀者此又逆之甚矣柯琴曰此條用真武湯全在降火利水重在發熱心下悸頭眩身瞤因心下悸所致脈微弱而自汗出是無陽也是桂枝症不可與大青龍以中有麻黃石膏也服之則血氣不周於身必筋惕肉瞤因汗下後加燒針以致虛煩多汗傷血故經脈動惕燒針傷肉故面青膚瞤此亦半夏瀉心湯症也綱仲景曰動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤目魏荔彤曰臍左屬肝故肝虛風動為頭眩肝藏血之臟風動擾陰故汗出不止也筋惕肉瞤者肝主筋血主肉俱因氣虛而振振惕瞤也陶華曰此候最逆先宜防風白朮牡蠣湯次服小建中湯十救一二附錄筋骨四肢辨李杲曰內傷等病是心肺之氣已絕於外必怠惰嗜臥四肢沉困不收此乃熱傷元氣脾主四肢既為熱所乘無氣以動經云熱傷氣又云熱則骨消筋緩此之謂也若外傷風寒是腎肝之氣已絕於內腎主骨為寒肝主筋為風自古腎肝之病同一治以其遞相維持也故經言膽主筋膀胱主骨是也或中風或傷寒得病之日便著床枕非扶不起筋骨為之疼痛不能動搖乃形質之傷經云寒傷形又云寒則筋攣骨痛此之謂也脅痛綱仲景曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之目朱肱曰身涼汗出兩脅疼痛或乾嘔此十棗湯症也大抵脅下痛者此為有飲須分表裡乾嘔微利發熱而渴為表有水小青龍加芫花主之身體涼表症罷乾嘔而脅下痛為里有水十棗湯主之十棗非小青龍之比須量人虛實不可妄投柯琴曰水氣為患此則外走皮毛而汗出上走咽喉而嘔逆中走脅肋而牽痛下走腸胃而下利浩浩莫御非得利水之峻劑以直折之中氣不支矣此十棗與五苓青龍瀉心等法懸殊也綱仲景曰太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯目樓全善曰脈微細欲寐少陰症也浮細嗜臥無少陰症雖十日後尚屬太陽此表解而不了了之謂設見胸滿嗜臥亦太陽之餘邪未散兼脅痛是太陽少陽合病矣以少陽脈弦細也少陽為樞樞機不利一陽之氣不升故胸滿脅痛而嗜臥與小柴胡和之若脈浮而不細是浮而有力也無胸脅痛則不屬少陽也但浮而不大則不涉陽明仍在太陽也太陽為開用麻黃湯以開之然與太陽初病用以發汗不同當小其制而少與之也鰲按此言太陽少陽脈症相關處也脅痛本少陽症綱仲景曰傷寒吐下後復發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿目鰲按此條脅下痛兼見經脈動惕屬於虛氣也沖咽喉眩冒即虛煩之處結胸綱仲景曰病發於陽而反下之熱入因作結胸若不結胸但頭汗出余無汗至頸而還小便不利身必發黃也目陳士鐸曰傷寒變為結胸者以傷寒火邪正熾急與飲食胃中得食茹而不出他臟因胃中有食群起而爭其勢猖狂必當以變法治之急用栝蔞一枚槌碎入甘草一錢同煎服夫栝萎乃陷胸之勝物平人服之必至心如遺落然惟食結在胸非硝黃枳樸檳榔等可祛必得栝蔞始能陷之尤恐其過於下也可加甘草留之使不至十分推蕩此變症而用變法真勝於用正也張云岐曰不發汗而反下之熱反內陷寒氣隨熱而入入於胸必結瘀熱在裡故也綱仲景曰結胸無大熱但頭微汗出者此為水結在胸脅也大陷胸湯主之傷寒六七日結胸熱實脈沉緊心下痛按之石硬者大陷胸湯主之結胸者項亦強如柔痙狀下之則和宜大陷胸丸目成無己曰結胸雖為實邪人皆知用陷胸湯丸下之或脈浮大者不可下下則死是猶帶表邪未全結實下之重虛其里邪深結則死設或結胸形症悉具而加煩躁者尤為不治之疾綱仲景曰病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也目趙嗣真曰不經下後而心下滿者則有吐下之殊如病人手足厥冷脈乍緊邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之又脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數此二條是也或吐或攻要在泄其邪氣若下後心下滿者又有結胸痞之別如陽明病雖心下硬又未可攻經曰陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈是邪氣自表傳裡至於心下留結為實者不可下乃吐之可也若未全為實者則不可下故有此戒又邪氣在表未應下而強下之邪氣乘虛結於心下實者硬滿而痛為結胸虛者滿而不痛為痞蓋實邪留結則為硬為痛虛邪留滯則但滿而不硬痛也柯琴曰陽指形軀陰指胸中心下非指陰經陰症發陽發陰俱指發熱結胸與痞俱是熱症作痞不言熱入熱原發於裡也誤下熱不散因而痞硬不可以發陰作無熱解也若謂非熱症瀉心湯不得用黃芩大黃矣綱仲景曰小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之目張兼善曰從心下至少腹石硬而痛不可近者大結胸也正在心下未及腹脅按之痛未至石硬小結胸也形症之分如此蓋大結胸者是水結在胸腹故其脈沉緊小結胸者是痰結於心下故其脈浮滑水結宜下故用甘遂葶杏硝黃等痰結宜消故用栝蔞半夏等綱仲景曰結胸症其脈浮大者不可下下之則死結胸症具煩躁者亦死目陳士鐸曰言不可下見下之必死也夫結胸而加煩躁此胃氣將絕也胃氣欲絕即不能生津液而養心故為死症雖然津液之竭非五臟自絕亦因結胸之故耳是必攻其中堅使結胸症愈而津液自生死症可望更蘇也藥用化結湯柯琴曰陽明脈浮大心下反硬有熱屬臟者可攻之太陽結胸熱實脈浮大者不可下蓋太陽浮大仍為表脈恐熱未實則水未結故不可下也結胸是實邪煩躁是正氣虛故亦死綱仲景曰傷寒五六日嘔而發熱者柴胡湯症具而以他藥下之若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞也柴胡不中與之宜半夏瀉心湯目程郊倩曰誤下後有二症者少陽為半表半裡之經不全發陽不全發陰故誤下之變亦因偏於半表者成結胸偏於半里者心下痞耳此條本為半夏瀉心湯而發故只以痛不痛分結胸痞不及他症陶華曰結胸乃下早而成未曾下者非結胸也乃表邪傳至於胸中未入於腑症雖滿悶尚為在表正屬少陽部分為半表半裡之間只消小柴胡加枳殼以治不效則以本方對小陷胸湯一服如神若因下早而成者方用陷胸湯丸分淺深從縱治之不宜太峻上焦乃清道至高之分過下則傷元氣慎之熱實結胸懊憹煩渴心下痛少與大陷胸湯寒實結胸無熱症三物白散枳實理中丸臟結綱仲景曰病有結胸有臟結其狀若何答曰按之痛寸脈浮關脈沉者名曰結胸也如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治病人胸中素有痞連在臍旁引入小腹入陰筋者此名臟結死目蘇頌曰病人素有痞氣再加傷寒與宿積相合使真臟之氣閉塞不通亦名臟結切不可下止宜小柴胡加生薑以和表灸關元以回陽解陰結危哉黃仲理曰臟結者臟氣閉結而不流布也一息不運機緘窮一毫不續穹壤判臟其可結乎急刺關元灸之李梴曰臟結與結胸相似皆下後邪氣入里與陽相結結在胸者為結胸與陰相結結在臟者為臟結惟其陰結故臟結無陽症不往來寒熱或但寒不熱其人反靜飲食如常時時下利舌上白苔脅肋臍腹引入陰經俱痛者丹田有熱胸中有寒所以難治喻昌曰胸位高臟位卑其脈之寸浮關沉兩俱無異乃臟結之關脈更加小細緊者以關脈居上下二焦之界外邪由此下結積氣由此上干實往來之要衝所以病在下而脈反困於中也此症全以外受之邪定輕重若舌上有白滑苔則所感深重其互結之勢方熾單表單里及兩解表裡之法俱不可用所以難治然溫中散邪俾陰氣漸下而內消客邪漸上而外散兩相開解則良工之為其所難也乎方中行曰此設問答以明結胸臟結之同異時時下利者陰邪結於陰臟而寒甚也以寒甚故脈多細小與緊此其所以不同蓋結胸以陽邪結於陽臟結以陰邪結於陰故也程郊倩曰凡人衛氣出於下焦升陽而行其濁陰者中焦也宗氣出於上焦降陰而行其清陽者中焦也今關脈小細沉緊則沉寒內格有陰無陽陽不下入則濁陰結而不化是為死陰臟結所由名舌上白苔滑者寒水之氣浸浸乎透入心陽矣故為難治溫中散邪圖其急益火之原治其緩或亦良工之所為也其所難乎魏荔彤曰方喻程三家之注甚明無庸再贅獨是舌上白滑之苔斷非丹田有熱即方喻二注於此亦不敢明言有熱矣溫中散邪喻唱之而程和之豈有熱之治乎瀉心諸方有陰在下而陽在上者為治痞言也人知仲師辨結胸非臟結為論不知仲師正謂臟結與痞有相類而與結胸實不同耳蓋結胸者陽邪也痞與臟結陰邪也痞則尚有陽浮於上臟結則上下俱無陽獨陰矣豈無陽哉一線之陽無如何也是皆誤吐下汗之流毒也可不慎歟陰氣內滿四逆湯症之對也客邪反散或仍桂枝歟然客邪豈能自散則亦內陽生而逐邪使散矣痞綱仲景曰傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯目張介賓曰按結胸一症觀傷寒論所載凡太陽表邪未解而誤下者成結胸少陽亦然太陽少陽並病者亦然此不當下而誤下之以致臟氣空虛外邪乘虛內陷結於胸膈之間是皆因下而結者也其曰傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者此不因下而邪實漸深結聚於胸者也然則結胸一症有因誤下者有不因下而由於本病者近世傷寒書云未經下者非結胸夫豈不謬哉又結胸症觀仲景所言惟太陽少陽誤下者有之而陽明一經獨無言及者何也蓋凡病入陽明胃腑已實故可下之而無害也然又曰陽明病心下硬滿者不可攻之攻之利不止者死此豈非陽明在經表症邪未入腑者亦為不可下乎不惟三陽為然三陰之症其有發熱惡寒表邪未解者切不可下也又心下痞是誤下后里症內外俱病由汗下倒施仍當用先表后里先汗後下之法鰲按心下之痞比清穀猶輕綱仲景曰太陽病外症未除而數下者遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之目魏荔彤曰風邪初感在表不治鬱而為熱故傳經之熱為熱邪今云數下之其日久可知此因透表之風邪變而為陷入之熱邪又屢為苦寒之劑所鎮墜由是病之熱邪下於下焦而藥之寒邪又留於心下熱入下焦斯為協熱之利不止寒留心下斯為協寒之痞硬非用理中則協熱之陽不能升協寒之陰不能散也鰲按桂枝人參湯即理中湯加桂枝故魏氏有非用理中雲云也綱仲景曰本以下之故心下痞與瀉心湯病不解其人渴而口燥煩小便不利者五苓散主之太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒此表解里未和也十棗湯主之目龔信曰痞氣通用桔梗枳殼湯陶華曰痞者因太陽症當服麻黃湯而誤用承氣下之而成痞滿此因虛邪留滯若欲下之必待表症罷而後可宜小柴胡加枳桔湯鰲按此二條之痞皆由心下水氣泛溢綱仲景曰病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也目成無己曰結胸與痞俱是熱症作痞不言熱入者熱原發於裡也柯琴曰熱入是結胸之因痞不言熱入見痞與結胸所以異也綱仲景曰傷寒汗出解之後胃中不和心下痞硬乾嘔食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中空虛客氣上逆故使硬也甘草瀉心湯主之目蘇頌曰胃寒先宜理中丸後用旋覆代赭湯咳逆氣虛四逆湯汗吐下後噎氣痞硬旋覆代赭湯發熱不解嘔吐不利心下痞硬大柴胡湯下利不止則治下焦赤石脂禹餘糧湯又不止只利小便五苓散柯琴曰陽邪居胃之上口故痞硬幹嘔食臭水邪居胃之下口故腹鳴下利故病雖在胃而不屬陽明仍屬太陽寒水之變上條是汗解後水氣下攻症下條是誤下後客氣上逆症總是胃虛而稍有分別上條腹鳴下利胃中猶寒熱相半故云不和下條腹鳴而完穀不化利日數十行則痞為虛痞硬為虛硬滿為虛滿明矣上條因水氣下趨故不煩不滿下條是虛邪上逆故心煩而滿綱仲景曰傷寒五六日嘔而發熱者柴胡湯症具而以他藥下之若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞也柴胡不中與之宜半夏瀉心湯目許叔微曰誤下之變結胸則其偏於半表者也心下痞則其偏於半里者也綱仲景曰傷寒吐下後復發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿太陽病醫發汗仍發熱惡寒復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨留加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈目柯琴曰上條因吐下後復汗以致虛煩而痞下條因汗下後加燒針以致虛煩而痞綱仲景曰傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之複利不止者當利其小便目柯琴曰服湯藥而利不止是病在胃復以他藥下而利不止是病在大腸矣故用石脂餘糧胸脅腹脹滿痛綱仲景曰太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯目黃仲理曰本節乃太少二陽合病耳故胸滿脅痛嗜臥非少陽之氣不得上升乎故和以柴胡湯脈但浮則仍屬太陽之脈故與麻黃以發之也韓祗和曰胸滿者胸膈間氣滿悶也非心下滿脅滿者脅肋下氣填脹滿也非腹中滿蓋邪自表傳裡必先胸脅以至心腹入胃是以胸滿多帶表症宜發汗惟脅滿或痛多帶半表半裡小柴胡加枳實和之至於胸中痰實者湧之如胸中邪結而為實燥渴大便閉者大陷胸湯主之綱仲景曰下後脈促胸滿者桂枝去芍藥湯主之太陽與陽明合病喘而胸滿者不可下宜麻黃湯目成無己曰此二條是胸滿屬表而鬚髮汗者也蓋胸中至表猶近及脅則不言發汗但和解而已大抵胸脅滿以邪氣初入里未停留而濕氣鬱積而不行致生滿也和解可矣若邪氣留胸中聚而為實者非湧吐不可已故華佗曰四日在胸吐之則愈是邪氣已收斂而不散漫者則可吐之也韓祗和曰喘而胸痛猶帶表症不可下與麻黃湯或麻黃杏子甘草石膏湯脈促胸滿而與桂枝去芍藥湯者病在於胃芍藥入營故去之也鰲按胸滿本陽症但下後滿而不喘則是寒邪內結將作結胸矣故知胸滿不但陽盛即陽虛者亦然也綱仲景曰傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之目柯琴曰傷寒初起正宜發表吐下非法也然吐下後不轉屬太陰而心下逆滿氣上衝胸陽氣內擾也綱仲景曰發汗若下之而發煩熱胸中窒者梔子豉湯主之病如桂枝症頭不疼項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散目成無己曰二者均是吐利梔子豉湯吐胸中虛煩客熱瓜蒂散吐胸中痰實宿寒鰲按此二條本陽明症以欲明胸滿之當吐故附此綱仲景曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒此表解里未和也十棗湯主之目鰲按此條心下硬滿牽引脅滿是由心下水氣泛溢不和也綱仲景曰服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之小便利則愈目鰲按此水結中焦只可利而不可散也因汗不徹而遽下之致水氣結於心下然病根雖在心下而病機仍在膀胱今小便不利則是太陽本病實非桂枝症未罷也故用本方以散邪行水綱仲景曰發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之目韓祗和曰腹滿者邪入太陰脾土也常痛為裡實須下之承氣湯時減者為裡虛當溫之理中湯若表解內不消非大滿猶生寒熱是邪未全入里亦未可下若大滿大實兼有燥屎是邪已入腑雖得之四五日亦可下大抵陽邪為熱則腹滿而咽乾陰邪為寒則腹滿而吐利食不下若已經吐下後而腹滿者治法又各不同是又不可不知也柯琴曰此條不是妄汗人本虛也汗後反見有餘症邪氣盛則實故用薑樸夏散邪以除腹滿正氣虛故用參甘補中而益氣綱仲景曰本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之目陶華曰陽明發熱腹滿微喘口苦咽乾或不大便譫語並小柴胡湯噦而小便難加茯苓三陽合病腹滿身重難以轉側譫語口中不仁小柴胡湯有汗白虎湯太陰腹滿吐食不下枳桔理中丸少陰病六七日腹脹滿不大便急下之大承氣湯腹滿痛者脾不勝水水與氣搏皮肉之間腹中漉漉有聲小半夏茯苓湯加桂枝下利腹滿身疼痛先溫其里四逆湯後攻其表桂枝湯發汗後腹滿當溫厚朴半夏生薑人參湯吐後腹滿當下少與調胃承氣湯下後腹滿宜梔子厚朴湯腹脹滿者陰陽不和也桔梗半夏湯柯琴曰腹滿時痛因於下後是陽邪轉屬非太陰本病表症未罷故仍用桂枝解外腹痛既見故倍加芍藥以和里此病本於陽故用陰以和陽若因下而腹大實痛是太陽轉屬陽明而胃實尚未離乎太陽此之謂有表裡症仍用桂枝加大黃以除實痛此雙解表裡法也凡妄下必傷胃氣胃氣虛則陽邪襲陰故轉屬太陰胃氣實則兩陽相摶故轉屬陽明太陰則滿痛不實陰道虛也陽明則大實而痛陽道實也滿而時痛下利之兆大實而痛燥屎之徵桂枝加芍藥即建中之方桂枝加大黃即調胃之劑腹中雷鳴綱仲景曰傷寒中風醫反下之其人下利日十數行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之目黃仲理曰下利完穀腹鳴嘔煩皆誤下而胃中空虛之互詞設不知此義以為結熱而復下之其痞必益甚故重以胃中虛客氣上逆昭揭病因樓英曰客氣者乍來之氣非本有之氣也傷寒傷風者原無此陰邪之氣格於心下乃庸醫不治表而誤下使然也痞硬而滿腹鳴下利者陰沉於下也乾嘔心煩不安者陽浮於上也仍用瀉心法而異其術綱仲景曰傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之目成無己曰腹中雷鳴有二症壞病也一主甘草瀉心者以誤下損陰氣也一主生薑瀉心者以誤汗損陽氣也用此二湯以復陰陽之氣耳魏荔彤曰本條諸症皆凝聚停蓄之象即雷鳴下利亦是中氣運行不健之故鳴則為虛利則為熱痞硬少氣而虛乾噫食臭為熱虛熱二字合成此症此生薑瀉心以苦治熱以甘補虛以辛散痞為對症之劑也動氣綱仲景曰發汗後其人臍下悸欲作奔豚茯苓桂枝甘草大棗湯主之燒針令其汗針處被寒核起而赤者必發奔豚氣從小腹上衝心者灸其核上各一壯與桂枝加桂湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之目徐彬曰首條言君火虛極腎邪微動亦將凌心而發奔豚也謂汗乃心液發汗後則虛可知使非因汗時餘邪侵腎何至臍下悸至於悸而腎邪動矣故知欲作奔豚乃以茯苓合桂甘專伐腎邪單加大棗以安胃似不復大顧表邪謂發汗後表邪已少且但欲作則其力尚微故滲其濕培其土而陰氣自衰用甘瀾水助其急下之勢也次條乃言太陽餘邪未盡而加奔豚兼又起核者宜內外兩治之法也謂太陽病發汗矣又復燒針令汗以太陽之邪未盡故也奈燒針則驚發其奔豚之氣所以氣從少腹上至心於是治其餘邪攻其沖氣治之甚易乃又針處被寒核起而赤則兼治為難故以桂枝湯主太陽之邪加桂以伐奔豚之氣而赤核則另灸以從外治之法庶為兩得耳所以然者以無腹痛及往來寒熱則病專在太陽故也鰲按此三條亦動氣之屬也首條臍下悸乃腎水乘火而上克曰欲作者言猶未發也當預治之二條乃陽氣不舒陰氣反勝寒邪凝聚發為赤核是奔豚之兆從小腹衝心是奔豚之象總之臍下悸是水邪欲乘虛而犯心故君伏苓以正之奔豚自不發小腹氣衝是木邪挾客氣以凌心故湯中加桂以平木而奔豚自除一在裡而未發一在表而已發所以治各不同也三條胃中以下而空虛邪之客上焦者必不因下而除故客氣動於膈也綱仲景曰動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗發汗則氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食則反吐谷不得前目許叔微曰動氣築築然跳動於腹者是也病人先有五積在腹中或腹上下左右復因傷寒新邪與舊邪相搏而痛築築然跳動名曰動氣大概虛者理中湯去朮加桂熱者柴胡桂枝湯李梴曰五積中惟臍下奔豚衝心最急桂枝湯加桂一倍自效成無己曰傷寒動氣何以明之動氣者為築然動於腹中者是矣臟氣不治隨臟所主發泄於臍之四旁動跳築築然也難經曰肝內症臍左有動氣按之牢若痛心內症臍上有動氣按之牢若痛肺內症臍右有動氣按之牢若痛腎內症臍下有動氣按之牢若痛是臟氣不治腹中氣候發動也動氣應臟是皆真氣虛雖有表裡攻發之症即不可攻下且脾內症當臍有動氣經特曰臍之四旁動氣不可汗下獨不言脾候當臍有動氣者以脾者中州為胃以行津液發汗吐下猶先動脾況脾家發動氣者詎可動之也所以特不言之也傷寒所以看外症為當者不在脈之可見必待問之而得者發汗吐下務要審諦舉此動氣類可知矣綱仲景曰動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也目李梴曰動氣在右不可發汗先宜五苓散後與竹葉石膏湯不可不宜竹葉石膏湯動氣在左不可汗先宜防風白朮牡蠣湯汗必與建中湯不可下先宜甘草乾薑湯後與小建中湯動氣在上不可汗宜甘李根湯不可下宜竹葉石膏湯加減動氣在下不可汗先宜大橘皮湯後與小建中湯不可下宜甘草瀉心湯治之也魏荔彤曰成氏注右肺左肝上心下腎四臟分屬動氣引難經皆歸之氣虛固然然氣虛曷有動氣又必在臍之左右上下何也臍者先天之氣所存也氣實則充而固氣虛則搖而動如水在瓶中滿則搖之亦不動虛則可以搖動而有聲推之腸鳴亦可知其象義矣氣本一又何屬四臟乎可見臍之氣通乎臟腑為先天之元此氣有不足則按其部位知所通之臟氣必不治也不治即不至不至即不足無非氣不能及之義成注引難經云按之牢此非正氣虛也有邪居之也何邪乎寒邪也氣不足而陽虛陰邪入而參之參雜於其中也愈見四臟氣不至而不能開散即知本部寇盜不靖知其官吏之治無術也虛而發汗概在所禁況有積耶發汗則正氣益虛陰邪伏者必起矣居臍之左右上下者皆各有變症就動氣之可按可驗者可以明其禁也此皆由元氣虛而臟氣弱所以臍之四方有動氣已示端倪不審明而誤下其變症與誤汗大同而小異
