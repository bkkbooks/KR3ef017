body:
  text: 卷十四少陰經症少陰經脈綱仲景曰少陰之為病脈微細但欲寐也目朱肱曰足少陰腎之經其脈起於小指之下斜趨足心別行者入足跟中上至股內後廉貫腎絡膀胱直行者從腎上貫肝膈入肺中絡舌本傷寒熱氣入臟流於少陰之經少陰主腎腎惡燥故渴而引飲入經發汗吐下後臟腑空虛津液枯竭腎有餘熱亦渴故病人口燥舌乾而渴其脈尺寸俱沉者知少陰經受病也問傷寒何以須診太溪脈耶答曰太溪穴是足少陰腎之經男子以右腎為命門女子以左腎為命門主生死之要病人有命門脈者活無者死仲景云少陰手足逆冷發熱者不死脈不至者灸太溪七壯故傷寒必診太溪以察其腎之盛衰也太溪二穴在足內踝後跟骨上動脈陷中問脈微細欲吐不吐心煩但欲寐五六日自利而渴答曰此名少陰也少陰為病欲吐不吐心煩但欲寐五六日自利而渴者虛故引水自救若小便色白者以下焦虛有寒不能制水故令色白也四逆湯少陰腎之經主脈微細心煩但欲寐或自利而渴問經云一二日少陰病者何也謂初中病時腠理寒便入陰經不經三陽也傷寒雖是三陰三陽大抵發於陽則太陽也發於陰則少陰也此二經為表裡其受病最多陽明太陰受病頗稀至於少陽厥陰肝膽之經又加少焉凡病一日至十二三日太陽症不罷者但治太陽有初得病便見少陰症者直攻少陰亦必先自太陽次傳而至蓋寒氣入太陽即發熱而惡寒入少陰但惡寒而不發熱也三陰中寒微則理中湯稍厥或中寒下利即乾薑甘草湯手足指微寒冷謂之清此未須服四逆蓋疾輕故也只可服理中乾薑之類大段重者用四逆湯無脈者用通脈四逆湯綱仲景曰少陰病脈沉細數病為在裡不可發汗少陰病脈微不可發汗亡陽故也陽已虛尺中弱澀者復不可下之目危亦林曰發汗則動其經氣便有奪血亡陽之災故所戒也韓祗和曰亡陽無陽亡與無同無陽則其邪為陰邪陰邪本宜下然陽已虛尺脈弱澀者復不可下宜用溫矣魏荔彤曰此乃申明少陰病應審之於脈而知其經病臟病為直中寒邪為傳經熱邪而分應汗不應汗應下不應下也蓋少陰為病直感乎外邪者有經受臟受之不同其連及乎太陰者又有傳經為熱直感為寒之不同皆不容不辨如脈不緊而微此經邪欲愈乎再手足溫必自愈而無俟發汗也不然是臟邪初感即見陽微之象更無事於發汗傷正也此無論其邪在經在臟發汗陽必隨汗而亡少陰陽亡必難治矣此應審其經邪臟邪而禁誤汗者也再或陽本虛尺脈弱澀或為傳經熱邪乎是少陰大承氣症也然見此脈不可下也況為直感腎臟之寒邪耶方用附子四逆等湯溫之不暇顧可下乎此又就傳經熱邪直感寒邪諦審之而不可誤下也吾曾言六經皆發汗今仲師言不可汗何也蓋少陰病陰陽俱緊審其為在經之寒邪則附子麻黃甘草湯原為發少陰之汗而設如不緊而微在經邪欲愈尚不可汗況臟邪乎至於別條陰陽俱緊而反汗出者則是陰邪逼出之汗與發汗無與是又為少陰臟病故愈不可發汗也六經原俱可汗五臟原俱不可汗何疑焉然六經見陽微之脈俱不可發汗不止少陰見微脈方不可發法也又何疑焉綱仲景曰病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利脈陰陽俱緊者口中氣出唇口燥干鼻中涕出蜷臥足冷舌上苔滑者勿妄治也到七八日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈目朱肱曰問陰症有發熱者乎答曰太陰厥陰皆不發熱只少陰發熱有二症仲景謂之反發熱也少陰病初得之發熱脈沉者麻黃附子細辛湯少陰病脈沉發汗則動經此大略之言耳脈應里而發熱在表亦當以小辛之藥泄汗而溫散也仲景云傷寒之病從風寒得之表中風寒入里則不消須用溫藥少汗而解楊士瀛曰有咽痛復吐利見症方是少陰病不然是風寒兩傷之脈緊汗出矣咽痛者少陰之脈循喉嚨也其臟屬水所以不惟咽痛而復吐利水無制也龐安常曰陰陽俱緊傷寒脈也傷寒本無汗反汗出者無陽以衛其外所以邪不出而汗反出也少陰之邪不出所以咽痛吐利皆少陰本症也於此而可不用少陰溫經散邪之法乎脈緊寒邪也自下利脈暴微陰寒內泄也手足反溫陽回也陽回則陰退故緊反去為欲解也夫寒邪在陰而脈緊得自利脈暴微手足溫緊去欲解者猶之邪在陽脈數而熱得汗出脈和身涼數去為欲愈也柯琴曰少陰脈絡肺肺主鼻故涕出少陰脈絡舌本故舌苔滑少陰大絡注諸絡以溫足脛故足冷諸症全似亡陽口氣出唇口燥干涕出此為內熱脈緊蜷臥舌苔足冷又是內寒此少陰為樞故見寒熱相持病雖發於陰而口舌唇鼻之半表裡恰與少陽口咽目之半表裡相應也治之卻與少陽不同緊去則吐利止其人可安此據脈辨症之法三條亡陽脈症四條陽回脈症玩反溫前此已冷可知微為少陰本脈煩利為少陰本症至七八日陽盡陰復之時緊去微見所謂穀氣之來也徐而和矣綱仲景曰少陰中風脈陽微陰浮者為欲愈目魏荔彤曰少陰病不外直中傳經寒熱二邪然於其入也分寒熱必清於其出則不必分寒熱竟言出而得愈而已然症脈必明辨之而後臨事不惑如本少陰病何忽類太陽之中風少陰有直中之寒必無直中之風如有直中之風則為風中腎臟之症與傷寒中傳經熱邪固不相涉即與傷寒中直中寒邪亦不相涉也蓋少陰症忽變為似乎太陽之中風也何以見之以其熱自發汗自出定之也少陰之反熱反汗出乃內真寒外假熱直中寒邪內所有之症也本文未嘗發熱汗出吾以為本文所有也何言之以脈見陽微陰浮而知其人必發熱汗出也在少陰直中寒邪之脈見沉緊是陽緊而陰沉也在少陰傳經熱邪之脈見沉數是陽沉而陰數也今陽見微是不緊也原為直中之寒邪將散故變緊為微且不沉也原為傳經之熱邪將散故變沉為微也再陰脈見浮是不沉也原為直中之寒邪將散故變沉為浮且不數也原為傳經之熱邪將散故變數為浮也此足見少陰病不論寒邪熱邪見此陽微陰浮之脈俱為欲愈之幾矣又何以知其發熱汗出也於太陽原文知之太陽中風原文云陽浮者熱自發陰弱者汗自出少陰見陽微即太陽之浮脈也再陰脈浮而不沉非弱之義乎於此知其陰病轉陽里邪透表必發熱汗出見欲愈之神理也發熱則陰寒已微況脈不見沉緊則非內陰逼陽於外之反發熱也汗出則里病已除脈又不見沉細則非陰盛逼陽出亡之汗自出也此皆辨析於毫釐而虛實寒熱進退真假之理躍如也綱仲景曰少陰病四逆惡寒而身蜷脈不至不煩而躁者死目方中行曰不伸曰蜷陰主屈故也症俱見而脈不至陽已絶矣不煩而躁孤陰亦欲自盡也綱仲景曰少陰病吐利手足不逆冷者不死脈不至者灸少陰七壯目朱震亨曰手足不逆冷陽足拒陰也陽雖微尚能內拒正陽猶存於中而陽氣猶充於四肢陰病中得此豈有死理哉設或脈有不至不過陽氣衰微不能快行於經隧間耳非脈絶也灸少陰本穴者就其經行之道路扶其陽氣使得宣通則脈必自至而吐利亦自止矣曰七壯者不必定在一處凡少陰之經起止循行處皆可灸也綱仲景曰少陰病下利脈微澀嘔而汗出大便數而少者宜溫其上灸之少陰病脈微沉細但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死目朱肱曰少陰不得有汗而少陰亦有反自汗出之症蓋陰症四肢逆冷額上及手背冷汗濈濈者亡陽也綱仲景曰病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也若脈和其人大煩目重瞼內際黃者此欲解也目柯琴曰脈者資始於腎朝會於肺腎氣絶則脈不至三部手足皆至是脈道大通根本俱足非暴出可知故所致之脈和調雖大煩不解亦不足慮也綱仲景曰少陰病始得之無汗惡寒反發熱脈沉者麻黃附子細辛湯主之目朱肱曰少陰病始得發熱脈沉者固用本湯矣若二三日常見少陰無陽症者亦須微發汗麻黃附子甘草湯此不可不知也若少陰病惡寒而蜷時時自煩不欲厚衣者大柴胡去大黃張介賓曰太陽症似少陰者以其發熱惡寒而脈反沉也少陰症似太陽者以其惡寒脈沉而反發熱也如仲景曰太陽病發熱頭痛脈反沉身體疼痛若不瘥者當救其里宜四逆湯以及本條此二症謂在太陽其脈當浮而反沉者因正氣衰弱裡虛而然故當用四逆以裡虛不得不救也病在少陰當無熱而反熱者因寒邪在表猶未傳裡故用本湯以表邪不得不散也此二症者均屬脈沉發熱但其有頭痛故為太陽病無頭痛故為少陰病但在少陰而反發熱者以表邪浮淺可以汗解其反猶輕在太陽而反脈沉以正氣衰微雖施汗下其反為重由此觀之可見陽經有當溫里者故以生附配乾薑補中自有散意陰經有當發表者故以熟附配麻黃發中亦有補焉此仲景求本之治其他從可知矣綱仲景曰少陰病身體痛手足寒骨節痛脈沉者附子湯主之目黃仲理曰此乃少陰腎臟病也骨屬腎腎寒故骨俱痛也即此一端便當急救其臟中之陽宜用本湯也綱仲景曰脈浮而遲表熱裡寒下利清穀者四逆湯主之病發熱頭疼脈反沉若不瘥身體疼痛當救其里宜四逆湯嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之少陰病脈沉者急溫之宜四逆湯目龐安常曰五條不言症非無症也少陰之症自具不必言也獨云脈沉則寒邪堅實凝固臟中將有滅陽之勢可知是即脈一端便當急溫以救陽也柯琴曰首條浮為在表遲為在臟浮中見遲是浮為表虛遲為臟寒未經妄下而利清穀是表為虛熱里有真寒矣仲景凡治虛症以里為主此是傷寒症然脈浮表熱亦是病發於陽世所云漏底傷寒也二條諸症皆麻黃是病為在表矣其脈當浮今反沉此為逆也當憑脈之沉而為在裡陽症見陰脈是陽消陰長之兆也熱雖發於表而為陽虛寒反據於裡是真陰也三條脈弱而微熱非相火也膈上有寒飲故嘔也四條脈微欲絶而見吐利交作下利清穀之症是氣血喪亡矣綱仲景曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之目朱肱曰大抵陰症發熱終是不同脈須沉或下利手足厥也病人尺寸脈俱沉細欲寐者少陰症也急作四逆湯復其陽不可緩也少陰病口燥舌乾而渴急下之不可緩大承氣湯若脈沉而遲四逆湯溫之蓋以口燥而渴者知其熱脈沉而遲者別其寒也少陰屬腎古人謂之腎傷寒其口燥舌乾而渴固當急下大抵腎傷寒亦多表里無熱但苦煩憒默默而極不欲見光明有時腹痛其脈沉細舊用四順湯古人恨其熱不堪用云腎病而體猶有熱可服仲景四逆散若已十餘日下利不止手足厥冷乃無熱候可增損四順湯少陰症口燥咽乾即云急下之蓋少陰主腎系舌本傷寒熱氣入於藏流於少陰之經腎汁干咽絡焦故口燥咽乾而渴即宜急下非若陽明宜下而可緩也雖然陽明亦有一症發熱汗出多急下之陽明屬胃汗多則胃汁干故亦須急急下之也綱仲景曰下利清穀裡寒外熱汗出而厥者通脈四逆湯主之脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也目柯琴曰此比上條脈症皆輕熱微厥亦微此陰陽相等寒熱自和故易愈綱仲景曰吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之目楊士瀛曰加豬膽汁於通脈湯中者反佐之法也必有陰盛格陽之症故用之觀白通湯可知綱仲景曰傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至咽喉不利吐膿血泄利不止者為難治傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死下利手足逆冷無脈者灸之不溫若脈不還微喘者死下利後脈絶手足厥逆晬時脈還手足溫者生脈不還者死目柯琴曰寸脈沉遲氣口脈平矣下部脈不至根本已絶矣諸症皆內外水穀之道俱絶故此為下厥上竭陰陽離決之候生氣將絶於內也厥陰肝脈也應春生之氣故灸其五俞而陽可回也三條四條兩症不嘔不煩反佐而服白通外灸丹田氣海或可救於萬一鰲按三四條之生死總以脈為憑綱仲景曰手足厥冷脈細欲絶者當歸四逆湯主之下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表症脈沉微身無大熱者乾薑附子湯主之下之後復發汗必振寒脈微細所以然者內外俱虛故也目柯琴曰首條雖無外衛之微陽亦未見內寒諸險症二條當汗而反下下後又發汗以至純陰無陽而脈沉微此四逆之變劑也三條內陽虛故脈微細外陽虛故振栗惡寒亦即乾薑附子症綱仲景曰傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死傷寒脈促手足厥者可灸之目鰲按脈象空虛故為亡血促為陽脈陽虛而促理固然矣然陰氣太盛亦往往見促脈者總之促結代皆是虛脈非灸不可綱仲景曰少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生目喻昌曰與白通反至厥無脈乾嘔而煩此非藥之不勝病也以無嚮導之力宜其不入耳故復加人尿豬膽汁之陰以引陽藥深入然脈暴出死微續生亦危矣哉表熱裡寒表寒裡熱綱仲景曰脈浮而遲表熱裡寒下利清穀者四逆湯主之目柯琴曰浮中見遲是浮為表虛遲為臟寒未經妄下而利清穀是表為虛熱里有真寒矣綱仲景曰既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之目成無己曰吐利亡津液則小便宜少小便復利而大汗出津液不禁陽氣大虛也脈微為亡陽若無外熱但內寒下利清穀為純陰此以外熱為陽未絶猶可與通脈四逆湯救之綱仲景曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之目喻昌曰下利裡寒種種危殆其表反熱其面反赤其身反不惡寒而手足厥脈欲絶明系群陰格陽於外不能內返也故仿白通之法加入四逆中以入陰迎陽也魏荔彤曰脈者本陰陽相合而無間之神也今陰獨陽無脈故微絶必復回其陽俾與陰兩相調勻而後脈可得通酌用四逆為主更增減之使陽回脈通此於脈出不出見愈不愈之機從至險處立救法也綱仲景曰下利清穀裡寒外熱汗出而厥者通脈四逆湯主之目許叔微曰此條比之上條其症較輕也綱仲景曰少陰病惡寒而蜷時自煩欲去衣被者可治目王肯堂曰表熱裡寒者脈雖沉而遲手足厥逆下利清穀此裡寒也所以陰症亦有發熱者此表解也表寒裡熱者脈必滑身厥舌乾也所以少陰惡寒而蜷此表寒也時時自煩不欲近衣此裡熱也魏荔彤曰此不言下利則陽旺於中焦較他條下利而利自止者又勝雖惡寒足蜷亦見少陰症象然陽時煩而陰不躁且欲去衣被內有陽存不須言矣不但當辨其經邪臟邪為溫為汗本易為力且當識其煩而欲去衣被之故為陽存之有餘而扶陽抑陰亦不可過為猛烈矣此又陰病見陽症易治之一也面色綱仲景曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也目王肯堂曰此陰寒內竭逼其浮火上行於面故發赤色非熱也若誤投寒涼之劑即死又夾陰傷寒虛陽泛上者亦面赤也但足冷脈沉者是又煩躁面赤足冷脈沉不能飲水者此陰極也宜溫柯琴曰上條是寒熱相半症下利清穀陰盛於裡也手足厥冷寒盛於外也身不惡寒面赤陽鬱於表也咽痛利止陽回於內也腹痛乾嘔寒熱交爭也溫里通脈乃扶陽之法脈出則從陽而生厥逆則從陰而死下條脈症較輕熱微厥亦微故面亦少赤此陰陽相等寒熱自和故易愈鰲按諸家面色之説詳在少陽經症互參之可也頭痛眩冒綱仲景曰少陰病下利止而頭眩時時自冒者死目李杲曰內症頭痛有時而作有時而止外症頭痛常常有之直須傳入里方罷此又內外症之不同者也王肯堂曰下利則水穀竭眩冒則陽氣脫故死陳士鐸曰少陰症下利雖止而頭眩暈亦是死症蓋陽雖回而陰已絶下多亡陰竟致陰絶而諸陽之上聚於頭者紛然亂動所以眩冒此陽欲脫而未脫補其陽而陽氣生陽生則陰之絶者可以重續陰生於陽也方用參桂湯人參二兩肉桂二錢參能返陽氣桂能走肝腎兼補陰也綱仲景曰病發熱頭疼脈反沉若不瘥身體疼痛當救其里宜四逆湯目鰲按發熱頭痛病在表本太陽麻黃症也脈當浮而反沉故為逆綱仲景曰乾嘔吐涎沫頭痛者吳茱萸湯主之目柯琴曰嘔而無物胃虛可知吐惟涎沫胃寒可知頭痛者陽氣不足陰寒得以乘之也綱仲景曰下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也目寇宗奭曰此條脈症皆輕故能自作鬱冒汗出而自解也鼻衄綱仲景曰少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從耳目是名下厥上竭為難治目朱肱曰間陰症有衄血者乎答曰陰症自無熱何緣有衄若少陰病無汗強發而動血則有之耳劉完素曰衄為熱無寒是以三陰無衄如本條是名下厥上竭非衄也戴原禮曰少陰初得病醫誤以發汗法迫血動經妄行而衄其血水獨出於鼻或口耳目又有陽陷入陰四肢厥逆醫見其厥謂寒邪在表從而汗之當下反汗以致動血故謂下厥上逆為難治先哲云桂枝下咽陽盛則斃正以此也要知汗出不徹為陽之衄發汗動血為陰之衄二者大不同也又云陽盛陰虛汗之則死魏荔彤曰少陰病而厥近於腎臟直中寒邪矣然腎臟直中寒邪則陰寒之氣有厥必逆厥者風也逆者寒也少陰之邪必輸厥陰風水相連陰寒下凝之象也今但厥不逆是謂之熱厥厥仍風也不逆者熱也亦風水相連熱邪上衝之象也但厥二字既知為傳經熱邪矣而又有無汗似寒以混之不知無汗者陰血素虧也熱邪雖在少陰由厥陰上衝而陽盛陰虧則無能化液而出此少陰熱邪所以愈熾了設誤為直中之厥逆而溫之謬矣或強發汗汗不出而動血血即不能作汗上分陰分素虧之血也為溫經散寒猛烈之劑所鼓蕩而走陰分血熱妄行邪害空竅不擇何道從耳目口鼻而出此誤為直中之寒邪妄發其汗所致也於是在下腎經愈熱而厥愈甚在上之血分愈竭而陰愈亡名曰下厥上竭上下陰亡則孤陽無附必有脫離之勢矣故難治妄發少陰陰分之汗其害之大如此厥而不逆者手足溫也然就無汗言之亦準厥而有汗乃真寒逼陰外亡之象故為直中之少陰無汗而厥則熱邪伏於裡而不外越故厥者少陰有邪而無汗者邪熱內耗也斯可定為傳經之熱邪無疑矣咳悸綱仲景曰少陰病咳而下利譫語者被火劫故也小便必難以強發少陰汗也目鰲按上咳下利津液喪亡之故綱仲景曰少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利嘔者真武湯主之目朱肱曰有少陰症咳嗽真武湯四逆散豬苓湯也大抵熱在上焦其人必飲水水停心下則肺為之浮肺主於咳水氣乘之故咳而微喘真武加五味子乾薑大抵傷寒水氣皆因飲水過多古人治水氣而咳者病在陽小青龍湯病在陰真武湯古今録驗橘皮湯治咳佳綱仲景曰少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之目寇宗奭曰又咳嘔又煩渴非腎水不升之故而何綱仲景曰少陰病四逆泄利下重其人或咳或悸或小便不利或腹中痛者四逆散主之目朱肱曰四逆散加五味子乾薑綱仲景曰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之目鰲按仍發熱而心下悸坎陽外亡而腎水凌心也以其為腎水凌心之故故亦列少陰款中渴綱仲景曰少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之目魏荔彤曰此乃申解少陰傳經熱邪有挾水飲為患者不得誤為寒邪也蓋少陰之熱邪充周於上下流布於四肢固已然水飲一症亦有入熱邪而俱混者不止他條直中之寒邪兼水飲為患也今下利六七日咳而嘔此純類於少陰直中寒邪之症也然口渴心煩不眠則非直中之寒邪而為傳經之熱邪矣蓋陽煩而陰躁至不得眠煩而不躁則為陽邪甚的矣知此則口渴下利固熱邪為之而水飲挾阻其氣化陰陽不分上下不通下利口渴所以滋甚也本湯五物無一非走陰經以之淡滲陰經水飲推之三陰水飲皆可用但加減引經之味可耳問原文並無水飲症何以知水飲兼混曰觀其咳而不咽痛口不燥即知雖為傳經熱邪惟有水飲相混故熱勢不能甚烈雖上衝為咳嘔而不致咽痛隔阻正津為口渴而不致乾燥兼以心煩不寐於少陰但欲寐陰症中見陽症非傳經之熱兼水飲之濕何物乎綱仲景曰少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也目魏荔彤曰不吐心煩但寐則陰寒凝聚於下而孤陽浮遊於上可驗五六日久脾陽亦失令而自利胃津以利耗而作渴且陰盛於下陽必逼處於上曰虛知下虛而上實實邪實也引水自救以理論之雖渴未必能多飲水或多飲多尿尿色淡白則少陰腎臟為真寒而非假熱足以相惑也明矣以此知少陰病形悉具全在小便色白蓋赤白分寒熱也白為下焦虛寒寒水不能收制將為飲一溺二傾泄不禁矣法容不灸與溫兼行耶仲師為少陰腎臟里症言之如此再者少陰腎臟為病內素虛寒者十之六七外寒乘入者十之三四無內寒則不能召外寒君子平日寧可不以命門之火為實而用嗇道乎漱水不咽綱仲景曰少陰脈沉細手足冷或時煩躁作渴欲漱水不欲咽者宜四逆湯目吳綬曰本條之外又有下利厥逆無脈乾嘔煩渴欲漱水不欲咽者白通加豬膽汁人尿主之又有厥陰蛔厥體寒煩躁吐蛔口燥舌乾但欲涼水浸舌及唇時不可離者理中湯加烏梅大抵陰症發躁煩渴不能飲水或有勉強飲下良久復吐或飲水而嘔或噦逆者皆內寒也蓋無根失守之火遊於咽嗌之間假作燥渴則不能飲或有能飲不吐復欲飲者熱也咽痛咽乾口燥附不能言綱仲景曰病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利目朱肱曰脈沉遲手足厥冷或吐利而咽中痛此少陰症也病源云此為下部脈都不至陰陽隔絶邪客於足少陰之絡毒氣上衝故咽喉不利或痛而生瘡也傷寒脈陰陽俱緊如本條云云此候汗下熏尉俱不可汗出者藁本粉傳之咽喉痛者甘草湯桔梗湯豬膚湯通脈四逆去芍加桔梗湯麻黃升麻湯選用又有伏氣之病謂非時暴寒中人伏氣於少陰經始不覺病旬月乃發脈微弱法先咽痛似傷寒非喉痹之病次必利始用半夏桂枝湯次四逆散此病只一二日便瘥古方謂之腎傷寒也戴原禮曰亦有初得病頭痛發熱無陽毒少陰諸症而咽自痛者此因感冒後頓用厚衣被堆壅或用蠻法服薑湯熱酒即臥遂成上壅或先有壅熱欲取涼快致為外邪所襲既有風寒又有熱壅宜參蘇飲倍桔梗加木香五分或消風百解散或五積散敗毒散各半帖名交加散閔芝慶曰此寒邪在少陰本臟而非經病也當咽痛而又吐利利為少陰本症吐而咽痛則孤陽欲飛脫於上矣急救欲亡之陽真武四逆附子等湯可選用也綱仲景曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之目王肯堂曰太陽陽明咽痛各一症悉屬熱也太陽治以半夏散陽明治以四逆散加桔梗少陰咽痛有六症熱症四寒症二熱者治以豬膚湯甘草湯桔梗湯苦酒湯半夏散寒者治以桂枝幹薑湯真武湯四逆湯厥陰咽痛一症亦熱也治以桔梗湯咽痛皆屬熱何獨少陰二症寒耶其一以汗多亡陽故用乾薑附子以復陽溫經其一以陰盛格陽故用通脈四逆以散陰通陽綱仲景曰傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至咽喉不利吐膿血泄利不止者為難治目王肯堂曰此宜麻黃升麻湯柯琴曰此為下厥上絶陰陽離決之候故咽痛不利為水穀之道絶也綱仲景曰少陰病下利咽痛胸滿心煩者豬膚湯主之目張元素曰或云六經皆不言咽痛惟少陰有咽痛咽傷何也夫少陰咽痛乃經絡所繫蓋少陰脈循喉嚨系舌本故有咽傷痛之患內經曰少陰所生病者咽腫上氣干嗌及痛此經脈所繫邪氣循行而致然也方中行曰豬膚本草不載但豬屬亥宜入少陰膚乃外皮宜能解外其性則涼固能退熱邪散而熱退煩滿可除也白蜜潤燥以利咽痛可愈也白粉益土以勝水利可止也意者義取於此乎魏荔彤曰此申解少陰傳經熱耶上下充滿之症立法以滋陰散熱為義蓋少陰之邪上衝為咽痛為心煩熱之性升也為便血為便膿陰之性降也又有上下充周熱邪瀰漫者如下利猶之陰之降也咽痛胸滿心煩猶之熱之升也無非邪在少陰既內耗其真復交亂三焦使之然也法用豬膚豬亥水腎蓄也其膚主太陽能入腎滋陰兼透表散邪之用佐蜜甘寒上炎之焰熄白粉淡滲下利之路分一劑而三善備焉蓋腎臟原無散法散藥又必用辛溫今熱邪在內非散不可辛溫又不可因另出此法以甘寒之味佐原屬腎經之物帶太陽表性者入其中以導之出膚乃肉外皮中之薄脂浮而外發之性也亦如石膏以辛涼為發散之義也綱仲景曰少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯少陰病咽中痛半夏散及湯主之目蘇頌曰咽痛而無下利心煩胸滿等症但甘以緩之足矣不瘥者配以桔梗辛以散之也其熱微故用輕劑魏荔彤曰少陰之邪惟其緣木而升所以於其傳也必傳厥陰亦升降之理也太陰降而少陰少陰升而厥陰三陰中之升降也比之三陽之表裡亦然蓋氣之行也無論病氣與正氣皆以往復屈伸為義也鰲按下條之症比上條較重故非甘草桔梗甘緩辛開輕清之物可治必用半夏之苦開而兼泄桂枝之辛升散其熱甘草之緩緩其炎焰其義如此喻氏謂半夏滌飲桂枝散邪猶非的義蓋本方用桂枝半夏並非發汗解肌之謂也綱仲景曰少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之目吳綬曰少陰脈疾可下脈沉附子湯加知柏五味子麥冬花粉若虛熱病後煩熱不解者竹葉石膏湯去半夏加花粉凡汗吐下後口燥咽乾此津液衰少腎水不升虛火上炎也生津益氣湯脈沉微足冷舌燥難治其少陰有急下以救腎水之例若虛人水竭火燥不可下者以補中益氣湯倍人參加麥冬五味花粉知柏以滋水也趙嗣真曰活人謂脾臟有熱則津液枯少故口燥咽乾然非獨脾臟有熱脾主太陰太陰腹滿而咽乾此可言脾熱特一症耳余皆非也如白虎加人參湯口舌乾燥者表裡俱熱也口苦咽乾者少陽經熱或陽明中風也口燥咽乾急下之自利清水色純青心下痛口乾燥者少陰經熱也咽乾煩躁吐逆者誤汗津液少而欲作陽明內熱者也如上數症豈亦脾臟有熱哉鰲按傷者痛久而傷也火灼則瘡生邪熱壅於胸膈之上故不能語言聲出於喉咽病則喉亦病肺金為邪火所制故聲不出其症較重於咽中痛皆治之遲誤也半夏開散雞子清涼潤故必治以本湯甘草湯桔梗湯半夏散及湯苦酒湯數方皆為少陰熱邪在經上衝為咽痛而立之法也綱仲景曰少陰病得之二三日口燥咽乾者急下之宜大承氣湯少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯目成無己曰傷寒傳經五六日邪傳少陰則口燥舌乾而渴為邪漸深也今少陰病得之二三日邪未深入之時便作口燥咽乾者是邪熱已甚腎水乾也急與大承氣以全腎也正經自病其邪深入宜急下之若燥則死腎水乾燥之故也張元素曰承氣湯陽明當下之症宜用少陰亦用何也蓋胃為水穀之海主養四旁四旁有病皆能傳入胃胃土燥則腎水乾以二三日則口燥咽乾是熱之深傳之遠也故曰急下之以全腎水夫土實則水清謂水穀不相混故自利清水而口乾燥此胃土實熱致然也下利色青青者肝也乃肝邪傳腎緣腎之經脈從肺出絡心注胸中由是而心下痛故急下以去實熱逐腎邪其六七日腹脹不大便以入腑之邪壅甚胃土勝則腎涸故急下以逐胃熱滋腎水蓋陽明與少陰皆有急下之條然而症雖不同其入腑之理則一是以皆用大承氣也王肯堂曰按舌乾輕咽乾重者蓋咽舌雖皆通於少陰之絡而舌又為心之苗也傷寒喜陽而惡陰故舌乾輕喻昌曰熱邪傳入少陰逼迫津水注為自利質清而無渣滓相雜色青而無黃赤相間可見陽邪暴虐之極反與陰邪無異但陽邪傳自上焦其人心下必痛口必乾燥設系陰邪必心下滿而不痛口中和而不燥必無此枯稿之象故宜急下以救其陰也煩躁綱仲景曰少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也目柯琴曰少陽脈下胸中故胸煩是病在表之裡也少陰經出絡心故心煩是病在裡之裡也綱仲景曰少陰病惡寒而蜷時自煩欲去衣被者可治少陰病四逆惡寒而身蜷脈不至不煩而躁者死少陰病吐利煩躁四逆者死少陰病脈沉微細但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死目喻昌曰自煩欲去衣被真陽擾亂不寧然尚未至於亡故用溫法可治也四逆惡寒身蜷脈不至陽已去矣陽去故不煩尚可施回陽之法若加躁擾則陽已離陰陰孤求侶不得所謂陰躁者也上吐下利因致煩躁則陰陽擾亂而竭絶可膚更加四逆是中州之土先敗上下交徵中氣立斷使早用溫中之法寧至此乎魏荔彤曰脈微沉細但欲臥此少陰本病然應無汗而汗出陽將亡於外矣雖未躁而煩陽已動而欲離其舍矣自欲吐而無可吐寒邪上逆陽脈而沖矣至六七日之久不為治加以自利則正陽益虛竭陰寒愈凝固逮至煩而且躁則下利煩躁之死症見但欲寐者反不得臥寐陰擾陽亂樞紐已脫亦必死之候也綱仲景曰傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死發汗若下之病仍不解煩躁者茯苓四逆湯主之目鰲按此二條皆回陽之法厥陰者肝脈灸灸其俞所以使陽回也未經汗下而煩躁為陽盛汗下後而煩躁為陽虛用薑附以回陽用參苓以滋陰則煩躁止而外熱除柯氏所謂陰陽雙補法也綱仲景曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之目劉完素曰少陰病下利固宜用白通湯升陽溫中之法矣若不早治至於既吐且利手足厥冷寒邪之侵凌微陽之擾亂已見端矣甚則陽為陰侮而煩生陰欲凌陽而躁作內實真寒外現假熱此陰躁之死症欲成矣非急急助火之源何以消嚴寒之勢乎四逆湯蘇脈之沉也附子湯用芍藥引陽入陰術苓兼治脾土以勝腎邪白通湯升陽止利吳茱萸湯兼溫厥陰各溫法之不同也綱仲景曰少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生目朱肱曰傷寒陰盛格陽者身涼脈沉細疾煩躁而不飲水者是也若欲引飲者非也不欲飲水者宜霹靂散須臾躁止得睡汗出即瘥此藥通散寒氣然後熱氣上行汗出乃愈火焰散丹砂丸並主之柯琴曰脈暴出者孤陽獨行也微續者少陽初生也綱仲景曰少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之目張兼善曰心煩不得臥而無躁症則與真陽發動迥別蓋真陽發動必先陰氣四布為嘔為利為四逆乃致煩而且躁魄汗不止耳今但心煩不臥而無嘔利四逆等症是其煩為陽煩乃真陰為熱邪煎熬也故必解熱生陰以為主治少緩則無及矣朱肱曰傷寒陰症似陽者陰發躁反厥物極則反也大率以脈為主諸數為熱諸遲為寒無如此最驗也假令身體微熱煩躁面赤其脈沉而微者皆陰症也身微熱者裡寒故也煩躁者陰盛故也面戴陽者下虛故也若不看脈以虛陽上格之燥誤為實熱反與涼藥則氣消成大病矣外臺祕要云陰躁欲坐井中宜以熱藥治之仲景少陰病面赤者四逆加蔥白主之也如本條裡熱甚而里不和則又以黃連阿膠湯主之也綱仲景曰少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之吐利止而脈平小煩者以新虛不勝穀氣故也目喻昌曰下利六七日本熱去寒起之時尚兼咳渴心煩不眠等症則是熱邪摶結水飲以故羈留不去用本湯以利水潤燥不治利而利自止也柯琴曰二三日心煩是實熱六七日心煩是虛煩蓋咳嘔煩渴者腎水不升下利不眠者心火不降耳腹痛綱仲景曰脈陰陽俱緊者口中氣出唇口燥干鼻中涕出蜷臥足冷舌上胎滑勿妄治也到六七日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也目柯琴曰設使到七日來以陰陽俱緊之脈不發熱反惡寒是寒甚於表上焦應之必欲嘔也反腹痛是寒甚於里中焦受之必欲利也綱仲景曰少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之目魏荔彤曰此申解少陰病有水氣為兼症當於溫里之中寓鎮奠之義蓋兼水氣則不特寒邪亦濕寓焉如二三日不已就臟邪言也至四五日腹痛必隱隱常痛乃寒濕凝滯之象非時痛時止之熱痛也且寒濕痛必兼滿按之少可而非熱痛不欲近人也且驗小便不利濕盛而氣壅也單為寒色白且利兼濕雖白不利此寒熱之可據者也且單寒則身體骨節痛而不沉重兼濕則沉重多而痛少故先言沉重後言疼痛就緩急言也或自下利亦濕邪下注惟小便不利則大便濕行種種審諦知其人有水氣兼寒邪得中少陰亦如太陽有水氣更感風寒以水氣為兼病而治法必當更為推求也咳嘔皆水氣上逆亦有小便自利者則寒濕又兼虛氣不能收攝之故膀胱與腎表裡水氣浸淫於腑陰寒固沍於臟法當溫臟回陽以治寒邪燥脾暖土以制水氣故主真武湯而以附子治寒邪其餘治水氣也綱仲景曰少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之目魏荔彤曰腹痛小便不利乃熱在下焦熏蒸中焦使氣化因熱鬱不行大便因熱盛而自利也利久不止腸胃間穢濁之物如膿帶血盡隨大便而下熱不消利不止危矣故用本湯以固澀之綱仲景曰下利腹脹滿身體疼痛先溫其里目龐安常曰下利裡寒也身疼表寒也先溫里從本治也綱仲景曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之目魏荔彤曰此申解少陰熱邪散見四末熱極似寒手足逆冷之症不可誤認為寒逆而妄治也少陰病熱邪能瀰漫於上下亦能流行於四肢可以為熱厥似寒厥以誤人此少陰病熱極似寒寒極似熱大有真假當詳為考辨不可就病言病失毫釐而謬千里也如四逆本寒邪也或咳或悸即熱邪上衝咽痛心煩之變出者也小便不利腹中痛泄利下重即熱邪下行熱在膀胱下血下膿之變出者也然則此逆非寒逆直可名之曰熱逆也夫熱但厥不逆茲何以曰熱逆不知寒固逆而厥熱逆亦厥有陰陽不順接之厥在內有真熱似寒之厥亦在內不容不嚴辨也於此等症必合脈與症以為辨他條沉數二字原足以定傳經之熱邪合觀諸條脈沉復微而緊細又足以定直中之寒邪再按他條之症口中和三字亦足以知內為真寒咽中痛三字亦足以知內為真熱明乎此則少陰前篇之大熱似寒少陰後篇之大寒似熱俱可洞如觀火矣此皆最要之處生死關頭溫涼失度頃刻人亡豈細故乎仲師於此用四逆散名亦四逆也而湯散之義不同也凡厥逆中自有寒濕雜合所謂陰陽不順接也至於諸痛亦必雜合交結方痛故藥亦雜合然後專寒專熱之品可開結止痛也泄利至於下重即滯下之意金匱要略主用小柴胡亦雜合寒熱之治故四逆散一方近小柴胡身痛綱仲景曰少陰病身體痛手足寒骨節痛脈沉者附子湯主之目鰲按本條純陰無陽陰寒切膚故身體痛四肢無陽故手足寒陰寒內注故骨節疼則此身疼骨痛雖與麻黃症相似而寒熱陰陽彼此判然此身體骨節疼痛固非太陽之症並非少陰之經直屬少陰之臟蓋腎主骨腎寒故骨疼即此一端便當急救其臟中之陽矣舍附子湯曷足以濟綱仲景曰傷寒下之後續得下利清穀不止身疼痛者急當救里宜四逆湯病發熱頭疼脈反沉汗之若不瘥身體疼痛者當救其里宜四逆湯目柯琴曰病為在表脈當浮今曰脈反沉此為逆汗之不瘥即身體疼痛不罷當憑其脈之沉而為在裡矣表宜溫散里宜溫補先救里治其本也蜷臥綱仲景曰少陰病下利若利自止惡寒而蜷臥手足溫者可治少陰病惡寒身蜷而利手足逆冷者不治目成無己曰蜷者屈縮不伸也皆陰寒之極雖在陽經見是症者即有表症亦宜用溫經之劑桂枝附子是也況在三陰裡寒下利厥逆者乎四逆之類其可缺諸若有陰無陽者為不治綱仲景曰少陰病惡寒而蜷時自煩欲去衣被者可治少陰病四逆惡寒而身蜷脈不至不煩而躁者死目魏荔彤曰少陰寒邪固有在經在臟之不同而治之之法必以存陽為第一義臟邪溫之固存陽也即經邪汗之亦存陽也舍此無他計也如前條利忽自止則陽盛於中焦不致隨陰沉陷惡寒蜷臥雖純為陰寒之象而手足能溫則真陽自在於此審其為臟邪溫之固易即審其為經邪汗之亦易故曰可治又如本條並不下利則陽更旺於中焦雖惡寒足蜷亦見少陰症象然陽時煩而欲去衣被內有陽存而扶陽抑陰亦不可過為猛烈也其經邪臟邪之當審而溫之汗之又不待言矣至次條不煩而躁則陽已離陰陰孤求侶不得擾亂不寧所謂陰躁者也宜其死矣但欲寐綱仲景曰少陰之為病脈微細但欲寐也目方中行曰脈沉細者少陰居於極下起於小指之下也針經曰是主腎所生病者嗜寐蓋人肖天地天地之氣行於陽則闢而曉行於陰則闔而晦故人之氣行於陽則動而寤行於陰則靜而寐然則但欲寐者邪客於陰也魏荔彤曰傷寒三陽遞傳三陰復自太陰傳少陰此傳經之邪乃外感風寒歷久變熱之熱邪也亦有直中少陰經臟者又非傳經熱邪可比乃陰寒之寒邪也故三陽分經與腑三陰分經與臟如少陰病其為傳經熱邪直中寒邪當辨也若此條則合傳經直中二邪而總標其脈症也少陰為病脈必沉三陰皆然又兼微細異乎三陽之浮大弦也沉對浮微對大細對弦此少陰脈也見此則三陰俱可識其端倪至少陰為症有寒熱二邪本不盡同姑取兩邪入而見症大同者則但欲寐也腎司智巧熱邪入而擾其陰寒邪入而溷其陽因致惛懞欲寐仲師示人未辨寒熱之邪先辨少陰之症此至訣也脈之沉微細三陰俱有兼以但欲寐則少陰病也但沉微細雖三陰皆有而太陰必多微少陰必多沉厥陰必多細太陰在中故微多少陰在下故沉多厥陰近膽故弦可變細而細多蓋細即弦之微者此仲師於少陰不言沉反言微細者沉少陰本脈不須言且沉亦非少陰獨有之脈必兼太陰之微厥陰之細而少陰之脈始確也再者少陰處三陰之中亦如陽明處三陽之中陽明之脈本大然兼太陽之浮多則太陽陽明也兼少陽之弦多則少陽陽明也推之三陰少陰之為脈何獨不然乎然則少陰之沉兼微多非太陰之少陰乎少陰之沉兼細多非厥陰之少陰乎三陽之陽明由遞傳而言之有相通之義仲師故分而為三三陰之少陰亦就遞傳而言之有相通之義何不可引而伸之哉綱仲景曰少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也目王肯堂曰少陰病如本條諸症理中四逆輩陰症雖云不用麻黃如少陰始得病反發熱脈沉者麻黃附子細辛湯於六經但少陰症難辨本經但云脈微細欲寐小便數而白背惡寒四肢厥者可不審而知之或雖有惡寒甚者不覺寒但喜厚衣近火也其脈微細或沉澀雖有陰陽俱緊者蓋其人素有熱為表寒外襲故如此但當察其外症為主必以溫藥逐之其陽邪傳入與少陰自受熱症宜下宜吐宜和者多矣仲景雖不言滑實沉數諸可下之脈然與症則可知矣脈必相符也雖或有反沉微細遲脈不應症者為不可下亦宜涼劑滋陰退陽而愈不愈必待脈有力而後下之可也其有症惡寒急下之者倘反有脈不應病亦宜微下之雖不敢大下亦不可緩也六經惟少陰傳變與太陽相同如真武湯四逆湯通脈四逆湯症俱有加減法謂有或為之症亦猶小青龍小柴胡是也綱仲景曰脈陰陽俱緊者口中氣出唇口燥干鼻中涕出蜷臥足冷舌上胎滑勿妄治也少陰病下利若利自止惡寒而蜷臥手足溫者可治少陰病惡寒身蜷而利手足逆冷者不治目鰲按首條蜷臥由於內寒二三條亦同一蜷臥卻以手足溫手足逆冷為憑見可治不可治之故蓋溫者陽回也逆冷者純陰無陽也綱仲景曰少陰病脈沉微細但欲寐汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死目陶華曰陽氣虛陰氣盛則目瞑故多寐乃邪氣傳於陰而不在陽也昏昏閉目者陰自闔也默默不言者陰主靜也陽氣盛陰氣虛則晝夜不得眠蓋夜以陰為主陰氣盛則目閉不安臥若陰為陽所勝故終夜煩擾而不得眠所謂陰虛則夜爭者是也鰲按始而欲寐是少陰本症五六日後不得臥寐是微陽欲絶也其何能生不得臥綱仲景曰少陰病得之二三日心煩不得臥黃連阿膠湯主之少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之目柯琴曰少陰受病當五六日發然發於二三日居多二三日背惡寒者腎火衰敗也必溫補以益陽反發熱者腎水不藏也宜微汗以固陽口燥咽乾者腎火上走空竅急下之以存津液此心中煩不得臥者腎火上攻於心也當滋陰以涼心血二三日心煩是實熱六七日心煩是虛煩且下利而熱渴是下焦虛不能制水非芩蓮芍藥所宜咳嘔煩渴者腎水不升下利不眠者心火不降耳凡利水之劑必先上升而後下降故主以豬苓湯以瀉陰利水而升津液斯上焦如霧而咳渴除中焦如漚而煩嘔靜下焦如瀆而利自止矣鰲按腎火上攻於心故心中煩而不得臥綱仲景曰下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表症脈沉微身無大熱者乾薑附子湯主之目王肯堂曰少陰當病於欲寐今乃不得眠緣陽氣入少陰經非少陰正病也綱仲景曰少陰病脈沉細自利煩躁不得眠者死目王肯堂曰不得眠為常症然由於脈沉細自利煩躁遂致不眠以及傷寒發熱下利厥逆煩躁不得臥者俱為死症皆由正氣弱陽不能復故也手足厥逆綱仲景曰凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也諸四逆厥者不可下之虛家亦然目朱震亨曰凡手足六經之脈皆自陰傳陽自陽傳陰陰氣勝則陽不達於四肢故為寒厥熱厥可下寒厥惟有溫補綱仲景曰少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從耳目是名下厥上竭為難治目成無己曰厥者冷也甚於四逆也陰陽氣不相接謂陽氣內陷熱氣逆伏故手足冷也夫厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微是知內陷者手足為厥矣強發汗而動血亦是發動其熱先熱而後厥者熱伏於內也先厥而後熱者陰退而陽氣得復也若始得之便厥則是陽氣不足而陰氣勝矣大抵厥逆為陰所主寒者多矣綱仲景曰大汗若大下利而厥冷者四逆湯主之大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之目危亦林曰陰陽二厥脈皆沉所以使人疑之然陰厥脈沉遲而弱陽厥脈沉伏而滑陽厥指甲時一溫陰厥指甲常冷足蜷不渴清便如常外症則自惺惺也若未辨陰陽宜用理中湯試之陽厥則便熱陰厥則不熱柯琴曰大汗亡陽大下亡陰陰陽俱虛故厥冷但利非清穀急溫之陽回而生可望也二條治之失宜雖大汗出而熱不去惡寒不止表未除也內拘急而下利裡寒已發四肢疼而厥冷表寒又見矣可知表熱裡寒者即表寒亡陽者矣綱仲景曰嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之目張云岐曰里無熱故小便利表虛寒故見厥傷寒以陽為主今則陽消陰長故難治綱仲景曰吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之目成無己曰大抵下利之人見厥復利厥者復為熱為陽氣得復而利必自止熱者便為厥是陰氣遠勝也故復下利龔信曰此條吐利不言清穀汗出不言大脈不言微弱幸有此表陽再以四逆溫其里可望其生也綱仲景曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之下利清穀裡寒外熱汗出而厥者通脈四逆湯主之吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至咽喉不利吐膿血泄利不止者為難治傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也目鰲按首條厥逆因寒盛於外也二條厥逆因下虛也然比首條脈症皆輕三條厥逆因陰盛格陽也故加豬膽汁為反佐四條厥逆因六腑氣絶於外也五條厥逆因於亡血也何以知之其脈空虛也六條厥逆因結胸也與五條合看當知結胸症有熱厥者也綱仲景曰傷寒脈促手足厥者可灸之傷寒六七日脈微手足厥冷煩躁灸厥陰脈不還者死目陳士鐸曰傷寒陰症發厥灸其厥陰之經亦不得已之法原不及湯藥之神也然苟以參藥救之未有不生者方名還厥湯白朮四兩附子乾薑各三錢水煎一帖而蘇凡具有厥逆等症即以此方投之神效如響蓋白朮最利腰臍陰寒初入原從臍始利其腰臍則腎宮有生氣佐以薑附則無微不達而邪又安留乎鰲按此二條皆屬陰虛故皆用灸法蓋脈之促者雖為陽脈亦有陽虛而促者亦有陰盛而促者此則陰盛而促者也綱仲景曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之目柯琴曰四逆者四肢厥冷兼臂脛而言此手足是言指掌也四肢之陽猶在綱仲景曰少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯後脈暴出者死微續者生下利手足逆冷無脈者灸之不溫若脈不還反微喘者死下利後脈絶手足厥逆晬時脈還手足溫者生脈不還者死目陳士鐸曰二條脈症當急灸關元之脈以寒極而脈伏非灸則脈不能出也今灸之而脈仍不還反為微喘此氣逆而不下乃奔於上而欲絶也本是死症而吾以為可生者正以其無脈也夫人死而後無脈今未死而無脈非無也乃伏也灸之不還豈真無脈可還乎無脈應死矣而仍未死止作微喘是脈欲還而不能遽還也方用人參一兩熟地五錢牛膝三錢甘草附子各一錢名還脈湯一帖而脈驟出者死苟得漸出可望生矣三條晬時脈還亦用灸法而還者也然亦必手足溫者可生正見陽氣之尚留耳倘脈不還則手足終無溫熱之時是陽不可返而死不可生矣不知脈之不返因灸法而不能返也灸之力微終不及藥之力厚吾以人參三兩灌之則脈自欲生矣鰲按首條下利厥逆服白通湯惡脈之驟出二三條下利厥逆無脈用灸法欲脈之猝還一死一生者何也一用灸而一用藥也可見用藥之能速出脈也綱仲景曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之目柯琴曰四肢為諸陽之本陽氣不達於四肢因而厥逆故四肢多屬於陰此則泄利下重陽邪下陷入陰中陽內而陰反外以致陰陽脈氣不相順接也可知以手足厥冷為熱厥手足厥逆為寒厥者亦鑿矣條中無主症而皆是或然症故小便不利同小青龍症厥悸同茯苓甘草症咳利腹痛小便不利同真武症種種是水氣為患不用利水者泄利下重故也泄利下重又不用白頭翁湯者四逆故也此少陰之樞無主故多或然症因取四物以散四逆之熱邪隨症加減以治或然症此少陰氣分之下劑也所謂厥因下之者此方矣綱仲景曰手足厥冷脈乍緊邪結在胸中心中滿而煩飢不能食病在胸中當吐之目成無己曰諸陽受氣於胸中邪氣客胸鬱郁留結則陽氣不得敷布而手足為之厥也綱仲景曰少陰病惡寒身蜷而利手足逆冷者不治目柯琴曰利而手足溫是陽回故可治利不止而手足逆冷是純陰無陽所謂六腑氣絶於外者手足寒五臟氣絶於內者下利不禁矣綱仲景曰少陰病四逆惡寒而蜷脈不至不煩而躁者死少陰病吐利煩躁四逆者死目成無己曰四逆者四肢逆而不溫也傷寒之始邪在皮膚當太陽陽明受邪則一身盡熱太陰少陰受邪則手足自溫是表邪漸緩而欲傳裡也傷寒四五日手足溫而渴者小柴胡湯是太陽邪傳少陽也脈浮手足溫為系在太陰是少陽邪傳太陰也是知邪在半表裡則手足不熱而自溫至邪傳少陰為里症已深雖未至厥而手足已不溫是四逆也若至厥陰則厥冷矣四逆散枳實柴胡白芍甘草皆寒涼而專主四逆之疾是知四逆非盡虛寒症也四逆湯乾薑附子皆熱藥亦治四逆手足寒旨哉若手足自熱而至溫從四逆而至厥者傳經之邪也用四逆散若始得手足厥而不溫者是陰經受邪陽氣不足用四逆湯溫之毋令誤也陳士鐸曰少陰症上吐下利且兼煩躁則陰陽擾亂拂抑而無生氣可知況手足逆冷是脾胃之氣又將絶也自是死症然而治之於早未嘗不可救急以人參白朮各二兩肉桂丁香各二錢灌之尚可救耳方名止逆奠安湯人參救元陽之絶白朮救脾胃之崩丁香止嘔肉桂溫中又能止瀉救中土之危亡奠上下之變亂轉生機於頃刻豈能捨此方哉少陰症四逆惡寒身蜷脈不至不煩而躁亦是死症而吾以為可救者全在脈不至不煩而躁夫病至四肢之逆陰陽之將絶可知脈之不至未必非寒極而伏也不然陽絶則心宜煩乃不煩但嫌其煩而不躁則陽未絶而將絶為可畏耳陽既欲絶則陰亦隨絶故一補陽陽回而陰亦回也急用生生湯可活人參三兩棗仁炒五錢附子三錢水煎人參以回陰陽附子祛寒棗仁安心則心定而躁可去脈可出矣死中求活其在此方乎附録厥與四逆不同論李杲曰四逆者四肢不溫也厥者手足逆冷也傷寒邪在三陽則手足必熱傳到太陰則手足不熱而溫至少陰則邪熱之入里漸深故四肢逆而不溫及至厥陰則又手足厥冷更甚於逆矣其四逆散以涼藥而治四肢不溫其四逆湯以熱藥而治寒極而成逆厥者也四肢通冷比之手足獨冷則有間夫死者以四逆言之可治者以厥冷言之則亦可見四逆與手足厥冷之有輕重矣蓋四肢通冷其病為重手足獨冷其病為輕也四肢與手足卻有所分以四字加於逆字之上是通指手足臂脛以上言也以手足二字加於厥逆厥冷之上是獨指手足言也蓋以四逆為四肢通冷而厥為手足獨冷也附録傷寒陰陽寒熱二厥辨陶華曰陰陽二厥治之一瘥生死立判夫陽厥者先自三陽經氣分因感寒邪於頭疼發熱惡寒以後傳進三陰血分變出四肢厥冷乍溫大便燥實譫語發渴揚手擲足不惡寒反怕熱脈沉有力此見傳經熱症謂之陽厥陽極發厥者即陽症似陰外雖有厥冷內有熱邪耳蓋因大便結實失下使血氣不通故手足乍冷乍溫也如火鍊金熱極金反化水水寒極而成冰反能載物厥微熱亦微四逆散厥深熱亦深大承氣湯正謂亢則害其物承乃制其極也若誤為陰症便進熱藥如抱薪救火矣夫陰厥者因三陰經血分自受寒邪初病無身熱無頭疼就使惡寒四肢厥冷直至臂脛以上過乎肘膝不溫引衣蜷臥不渴兼或腹滿吐瀉或戰栗面如刀刮口吐涎沫脈沉遲無力此為陰經直中真陰寒症不從陽經傳入謂之陰厥也輕則理中湯重則四逆湯溫之勿令誤也又曰人之手足乃胃土之末凡脾胃有熱手足必熱脾胃有寒手足必冷理之常也惟傷寒乃有厥深熱亦深厥微熱亦微之論何耶曰此為極則變火氣亢極反兼水化故有此象耳陰陽反復病之逆從未可以常理論也凡言厥逆厥寒厥冷手足寒冷皆變文耳不必分輕重若言四肢則有異也亦未可純為寒症若厥冷直至臂脛以上則為真寒無疑急用薑附等溫之少緩便難治謂其冷上過乎肘下過乎膝非內有真寒達於四肢而何然更當以脈與症參之庶乎無誤凡看傷寒不可以厥逆便斷為寒必參脈與兼症方知端的如手足厥冷兼之腹痛腹滿泄利清白小便亦清口不渴惡寒戰栗面如刀刮皆寒症也若腹痛後重泄利稠黏小便赤澀渴而好飲皆熱症也宜詳審之手足溫綱仲景曰少陰病下利若利自止惡寒而蜷臥手見溫者可治目柯琴曰傷寒以陽為主不特陰症見陽脈者生即陰病見陽症者亦可治背為陽腹為陰陽盛則作痙陰盛則蜷臥若利而手足仍溫是陽回故可治綱仲景曰脈陰陽俱緊者口中氣出唇口燥干鼻中涕出蜷臥足冷舌上胎渴勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也目許叔微曰發熱雖微而手足自溫乃陰得陽而欲解也綱仲景曰少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解雖煩下利必自愈目魏荔彤曰此申解少陰經邪有自解之故蓋臟邪為里症宜溫經邪為表症宜散固已然經邪之感也有淺深而人之氣稟有強弱若其人正弱而邪盛則非醫藥不為功若正旺而邪淺則經儘可以自解六經皆然耳如本條脈症並非少陰臟病虛寒下利也乃在經寒邪欲散也所以緊者失其緊忽變而為微微者緩也平也正緊字之對非虛微之微也且臟病下利必手足冷若利止方手足溫今下利而溫其邪不在臟而在經矣明為欲解雖煩而不躁則非陰盛而見陽回之象矣即利未自止經邪漸可消矣經邪有過經自解之理故緊去而微綱仲景曰少陰病八九日一身手足盡熱者以熱在膀胱必便血也目魏荔彤曰八九日而一身手足盡熱似為太陽陽明之熱矣不知少陰症既具而如此之熱非陽經為病仍陰經為病也腎與膀胱表裡腎熱必旁注於膀胱自然之理膀胱為太陽腑遂因腑熱而散於太陽經之周身以此而知病不在陽經而在陰經消耗陰津最迫不可謂陰病得陽為易愈也明其必便血在太陽膀胱本經之熱症言必便血今在少陰腎經移注於膀胱經之熱症亦言必便血膀胱一腑與腎表裡下焦血海皆相聯屬與太陽同有便血之機就其切近者必之也此非急泄下焦之熱不足以存少陰之陰也未成血則豬苓既成血則抵當非此無以為救同於太陽犯水之義也如已下血熱泄又須斟酌綱仲景曰下利後脈絶手足厥逆晬時脈還手足溫者生脈不還者死目鰲按脈還手足溫由醫藥之力也急溫症綱仲景曰少陰病脈沉者急溫之宜四逆湯自利不渴者屬太陰以其臟有寒故也急溫之宜四逆輩若膈上有寒飲者急溫之宜四逆湯目李梴曰脈沉厥冷膈上寒飲乾嘔或時頭痛皆寒氣上攻也急溫之三味參萸湯內寒已極厥逆吐利不渴靜蜷陽和之氣欲絶六脈若有若無急溫之四逆湯凡言急者病勢已篤將有變革非若他病可以緩也他如太陽汗出不止汗後惡風汗後煩躁心悸身痛皆急用附子加肉桂白芍之類三陽脈遲腹痛建中湯當先施也但一服中病即止傷寒之藥皆然鰲按臟有寒則寒之蓄於內者甚深脈沉為在裡亦知其內寒已甚陽和之氣欲絶膈上寒飲則陰寒之氣固結不散皆用溫法所謂救急之方也嘔吐下利綱仲景曰病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解少陰病脈解至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈目朱肱曰傷寒下利多種須辨陰陽勿令差誤三陽下利則身熱太陰下利則手足溫少陰厥陰下利則身不熱以此別之大抵下利挾太陽脈症便不得用溫藥俗醫但見下利便作陰症用溫熱藥鮮不發黃生斑而死大抵傷寒下利須識脈與外症不同下利而脈大者虛也脈微弱者為自止下利日十餘行脈反實者逆下利脈數而滑有宿食也下之愈脈遲而滑者實也其利未得便止宜更下之下利三部脈皆平按其心下硬者急下之協熱利者臍下必實大便赤黃色及腸間津液垢膩寒毒入胃則臍下必寒腹脹滿大便或黃白青黑或下利清穀溫毒氣盛則下利腹痛大便如膿血如爛肉汁更下利欲飲水者有熱也下利譫語有燥屎也寒毒入胃者四逆湯理中湯白通湯附子四逆散加薤白主之協熱利者黃芩湯白頭翁湯三黃熟艾湯赤石脂丸溫毒下膿血者桃花湯地榆散黃連阿膠湯雖然自利而渴屬少陰然三陽下利亦有飲水者乃有熱也三陰下利宜溫之然少陰自利清水心下痛口乾燥者卻宜下之此又不可不知也少陰泄利下重不可投熱藥先濃煎薤白湯內四逆散緣此散用枳實芍藥輩也又尋常胃中不和腹痛腸鳴下利者生薑瀉心湯最妙此二法不特傷寒症也若脈沉自利而身體痛者陰症也急當救里宜四逆湯附子湯真武湯大抵大便利而身體疼者當救里大便如常而身體痛者當救表不可不知成無己曰自利者不因攻下而自泄瀉也有表邪傳裡裡虛協熱而利者有不因攻下而遂利者皆協熱也又三陽合病皆作自利有攻表攻裡和解之不同何則太陽陽明合病為在表故與葛根湯汗之太陽少陽合病為半表裡故與黃芩湯和之陽明少陽合病為少陽邪氣入里故與承氣下之下利雖有表症不可發汗以下利為邪氣內攻走津液而胃虛也經曰下利不可攻表汗出必脹滿是也蓋三陰自利居多然自利家身涼脈靜為順身熱脈大為逆大抵下利脫氣又為難治蓋邪盛正虛邪壅正氣下脫多下利而死也綱仲景曰脈陰陽俱緊者口中氣出唇口燥干鼻中涕出蜷臥足冷舌上胎滑勿妄治也到六七日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也目柯琴曰使七八日來不能發熱以陰陽俱緊之脈反加惡寒是寒甚於表上焦應之必嘔反加腹痛是寒甚於里中焦受之必利綱仲景曰少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯少陰病吐利煩躁四逆者死目龐安常曰此由胃脘之陽將絶故上吐而下利也綱仲景曰少陰病脈微澀嘔而汗出大便數而少者宜溫其上灸之少陰病脈沉微細但欲臥汗出不煩自欲吐至六日自利復煩躁不得臥寐者死目陳士鐸曰傷寒而脈沉微細明是陰症況欲臥而欲動乎汗已出矣內無陽症可知心中不煩時欲嘔吐此陽邪已散陰邪作祟急宜祛寒為是乃失此不溫至五六日而下利是上下俱亂也此時尚不煩躁則腎中之真陽未散今又加煩躁不得臥寐明是奔越而不可回之兆矣非死症而何然其先原因失治而不可救非本不可救而成此擾亂之症也有一奇方名轉陽援絶湯人參白朮棗仁各一兩茯神五錢肉桂二錢水煎一帖即安人參救絶白朮茯神分消水濕而止利桂以溫中去寒棗仁安心解躁綱仲景曰少陰病二三日不止至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利嘔者真武湯主之目吳綬曰凡自利者不因攻下而自瀉利俗言漏底傷寒是也有協熱有協寒俱宜詳辨原病式曰瀉白為寒瀉青黃赤黑皆為熱也大抵完穀不化色不寒有如鶩溏或瀉利腥臭小便澄徹清冷口無燥渴其脈沉細或遲微無力或身雖熱手足逆冷惡寒蜷臥此皆寒也凡熱症口中燥渴小便黃赤或澀或所下如垢膩其脈多數或浮或滑或弦或大或洪或邪熱不殺穀其物不消化者當以脈症別之凡胃虛內熱煩渴瀉利脈弱者七味人參白朮散若發熱者參胡三白湯去黃芩加炒黃連若腹滿小便不利者五苓散合理中湯若嘔者加藿香半夏生薑陳皮如濕多而瀉不止者加二術腹脹加厚朴腹疼加白芍肉桂木香凡傷寒作利脈浮表未解仲景以小青龍去麻黃加炒芫花二錢蓋散表即治水也若小便澀大便水瀉不止五苓散水甚不解亦加芫花二錢以行水或車前子湯利自止也凡下利不可發汗當先治利利止內實正氣得復邪氣得解則汗出而愈也蓋利下由內虛若加發汗則內外皆虛變症為難治也蘇頌曰為有水氣是真武湯本旨下利亦水氣為患也後三項乃真武湯加減法綱仲景曰少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之目龐安常曰此由寒毒入胃故腹痛而下利也綱仲景曰大汗若大下利而厥冷者四逆湯主之大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之自利不渴者屬太陰以其臟有寒故也當溫之宜四逆輩目柯琴曰大汗則亡陽大下則亡陰陰陽俱虛故厥冷但利非清穀急溫之陽回而生可望也二條是治之失宜者雖大汗出而熱不去惡寒表未除也拘急下利裡寒已發肢疼厥冷表寒又見可知表熱裡寒者即表寒亡陽也綱仲景曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之目柯琴曰咽痛利止陽回於內也腹痛乾嘔寒熱交爭也綱仲景曰少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也目喻昌曰少陰之脈從足入腹上循喉嚨縈繞舌根故多咽痛之症其支別出肺故間有咳症今以火氣強劫其汗則熱邪挾火力上攻必為咳以肺金惡火故也下攻必為利以火勢逼迫而走空竅故也內攻必譫語以火勢燔灼而亂神明故也小便必難者見三症皆妨小便若肺為火氣所傷則膀胱氣化不行大腸奔迫無度則水穀並趨一路心胞燔灼不已則小腸枯涸不至耳少陰可強責其汗乎腎有熱邪其表腑之膀胱必應小便所以不利也咳而下利肺大腸表裡之義乎魏荔彤曰此申解少陰傳經熱邪入里為患不可認為直中之寒邪誤治反強責其汗以致難治也少陰病有傳經熱邪有直中寒邪固已然熱邪之傳原在經也而腎臟可以並見病若直中之邪則必分為經為臟矣為臟者尚單用溫而不用散為經者方既用溫而復用散是臟病原無散法也況為傳經入里之熱邪乎又豈可以溫散之法治之乎故熱邪久而方熾必不可用溫又傳入里而愈深更不可用散此在太陽入陽明之裡已忌發汗矣再遞傳三陰至少陰下之極深之盡為里中之裡矣其忌妄發強責其汗也何待言乎惟是少陰一經兼直中之寒邪在內法有溫經散寒近於取汗之義仲師恐人誤認以之治傳經之少陰故特標出示之正見附子麻黃細辛甘草純為寒邪直中少陰經而設也寒邪直中少陰臟且言溫而不言散也並非為少陰傳經之熱邪病及於少陰腎臟者言也此乃大關鍵處歷來無明白剖析者不可不詳辨也如本條之上曰少陰病脈細沉數病為在裡不可發汗而繼之以本條云云夫少陰脈本微細今細如故而見沉見數蓋細乃厥陰之少陰也而沉為少陰正脈也今不見太陰之微而反見陽脈之數數者遲之對見為微為數皆於沉中重取辨之也推此則為細為弦亦於沉之輕取辨之也所以沉為少陰本脈也診其人輕取之沉上見細重取之沉下見微此少陰直中之寒邪也或宜溫中或宜散寒再徐察之而直中少陰之臟病經病鹹得矣若診其人輕取沉上仍見細重取之沉中不見微而見數矣此乃少陰傳經之熱邪也就沉中重取一診而分少陰寒熱之二邪此定訣也審乎此則知非直中之表病而為傳經之裡病也蓋在風寒初感不論何經總為表症當發汗故三陰即少陰亦可發汗如麻黃附子細辛甘草湯症是也在傳經愈深不論何經總為里症皆不當發汗故三陽即太陽亦不可發汗如抵當湯五苓散等症是也知乎此方可言表裡不致以三陽定為表三陰定為里固執不通之論所惑也且明乎發汗之義則治傳裡之熱邪方有隨機應變之法而亦不可執一故仲師但言不可發汗並不出方不出方者方出之於後也但言不可發汗者妄發強責則為禍不旋踵也請試申之如咳而下利譫語者此傳經之熱邪遞及少陰也設以火劫汗少陰一經氣血本少熱邪又入耗損又火劫強責其汗則陰愈虧短津液內亡小便必難也胃亡津而小便利者津亡於上而氣化尚行於下此則腎陰有傷津亡於下而氣化不行矣強責少陰之汗用火劫似邪止傷其陽分表分而津亡氣耗為害已如是可不慎乎綱仲景曰傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至者咽喉不利吐膿血泄利不止者此為難治目陶華曰六腑氣絶於外者手足寒五臟氣絶於內者下利不禁此之謂也綱仲景曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之乾嘔吐涎沫頭痛者吳茱萸湯主之食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上虛也目鰲按吐利煩躁是陰邪入於合而不得從陽以出乎外也乾嘔者嘔而無物胃虛也吐涎沫胃寒也食谷欲嘔穀氣入於胃即拒之而出亦胃寒也得湯者即吳茱萸湯也服之反劇以上焦有痰飲俟嘔儘自愈也綱仲景曰少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯後脈暴出者死微續者生目張元素曰或謂白通湯白通加豬膽汁湯真武湯通脈四逆湯皆為少陰下利而設除用薑附相同其餘之藥俱各殊異何也蓋病殊則藥殊夫少陰下利寒氣已甚非薑附不治然下利之理無殊而兼有之症不一用藥故不同耳如白通用薑附以散寒止利加蔥白以通調陽氣若利而乾嘔煩者寒太甚內為格拒薑附非煩者之所宜必嘔而不納加人尿豬膽汁於白通湯中候溫冷服之二味皆鹹苦性寒是以納而不阻至其所則冷體既消熱性便發真武治少陰二三日至四五日腹痛小便不利四肢沉重疼痛自下利者為有水氣故多或為之症夫水氣者寒濕也腎主之腎病不能制水水飲停蓄為腹痛寒濕內甚也肢重疼痛寒濕外甚也小便不利自下利者濕甚而水穀不能別也經曰脾惡濕甘先入脾苓術之甘以益脾逐水濕所勝平以辛熱濕淫所勝佐以酸辛附子芍藥生薑之酸辛以溫經散濕小青龍症亦為有水氣故多或為之症如真武也通脈四逆治少陰下利清穀裡寒外熱手足厥逆脈微欲絶者為裡寒身熱惡寒而面色赤為外熱此陰甚於內格陽於外不能相通與通脈四逆以散陰通陽或為症依法加減以上四症俱云下利而兼有或為症是以用藥大同小異也或謂白通用附子凡四症惟真武一症熟用余皆生用何也附子生用則溫經散寒非乾薑佐之不可熟用則益陽除濕惟生薑相輔為宜乾薑辛熱故佐生附生薑辛溫少資熟附之功佐使之妙無出此理然白通等湯以下利為重其真武症以寒濕為先故用藥有輕重之殊耳蓋風濕寒濕大概頗同如太陽桂枝附子湯治寒濕相搏附亦用熟仍用生薑佐之其生熟之用輕重之分無過此理也綱仲景曰下利手足逆冷無脈者灸之不溫若脈不還反微喘者死下利後脈絶手足厥逆晬時脈還手足溫者生脈不還者死少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之目柯琴曰下利而熱渴下焦虛不能制水也咳嘔煩渴腎水不升也下利不眠心火不降也凡利水之劑必先上升而後下降故主此湯綱仲景曰少陰病下利咽痛胸滿心煩者豬膚湯主之少陰病嘔而咽中痛生瘡不能語言聲不出者苦酒湯主之目鰲按首條下利腎元虛也次條嘔逆腎火沖也綱仲景曰少陰病四逆泄利下重其人或咳或悸或小便不利或腹中痛者四逆散主之目朱肱曰問仲景少陰四逆湯又有散何也答曰大抵少陰病不可便用熱藥且亦有表熱者名晚發熱用麻黃細辛輩發汗終不成少陰症便不得發汗耶今少陰病四肢冷亦有內熱者故用四逆散也湯用乾薑附子而散則主熱症也綱仲景曰少陰病下利止而頭眩時時自冒者死目柯琴曰此症陽回利止是水穀已竭無物更行頭眩而時時自冒清陽之氣已脫也便膿血綱仲景曰少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之目朱肱曰寒毒入胃者臍下必寒腹脹滿大便黃白或青黑或下利清穀宜四逆湯理中湯白通加附子湯四逆加薤白散挾熱利者臍下必熱大便赤黃色及腸間津液垢膩宜黃芩湯白頭翁湯三黃熟艾湯薤白湯赤石脂丸三黃熟艾湯治傷寒四日而大下熱利時作白通諸藥多不得止宜服此除熱止利薤白湯治傷寒下利如爛肉汁赤帶下伏氣腹痛諸熱症悉皆主之濕毒氣甚者下利腹痛大便如膿血或如爛肉汁宜桃花湯地榆散黃連阿膠湯柯琴曰本症與真武大同彼以四肢沉重疼痛為有水氣此便膿血是為有火氣矣此方不清火不利水一惟培土蓋土得其養則火退位也水歸其職則腹痛自除膿血自清小便自利綱仲景曰少陰病下利便膿血者桃花湯主之少陰病便膿血者可刺目程郊倩曰此言少陰傳經熱邪移入下焦近後而致便膿血又熱挾中焦穢濁之物下行也方中行曰便膿血者當亦熱入血室之病故可刺刺者刺期門也期門為厥陰穴病在少陰而刺厥陰之穴以瀉之所謂實則瀉其子也下利清穀綱仲景曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或利止脈不出者通脈四逆湯主之下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也脈浮而遲表熱裡寒下利清穀者四逆湯主之目朱肱曰大抵陰症發熱終是不同脈須沉或下利手足厥也病人尺寸脈俱沉細但欲寐者少陰症也急作四逆湯復其陽柯琴曰首條寒熱相半症下利清穀陰盛於裡也二條比首條脈症皆輕因其下虛故下利清穀而厥逆此陰陽相等寒熱自和故易愈三條之脈浮中見遲未經妄下而利清穀是表為虛熱里有真寒也仲景凡治虛症以里為主綱仲景曰下利清穀不可攻表汗出必脹滿目張兼善曰裡氣其既虛矣其何能藏精而為陽之守乎幸得表陽尚存可以衛外而猶不致於壞也若又攻之則表亦必虛表虛則汗泄汗出亡陽其臟必寒而生脹滿矣可不戒哉綱仲景曰傷寒下之後續得下利清穀不止身疼痛者急當救里宜四逆湯目徐彬曰病醫下之續得下利清穀不止身體疼痛者急當救里後身體疼痛清便自調者急當救表按此言醫宜知緩急先後之序也謂表裡分治常理也乃有表而復有里倘因誤下而來不得如餘邪未清雙解表裡雖身疼痛不可治表謂稍緩而表邪將盡入內故曰急當救里逮清便調而身仍痛又不得以餘邪而忽之謂內既曾利稍緩而里將復受表邪下利不止也故又曰急當救表綱仲景曰既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之目黃仲理曰此乃氣血喪亡故完穀不化脈微欲絶也小便利綱仲景曰嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之目張從正曰既嘔而又發熱似乎小柴胡症也卻又脈弱熱又微內無大熱也所以小便利見厥者表寒也嘔者膈上有寒飲也則諸症皆見陽消陰長之兆何可治乎綱仲景曰既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之目鰲按三陰皆有小便自利症不特少陰也如太陰傷寒脈浮而緩手足自溫當發黃小便自利不發黃至七八日雖暴煩下利日十餘行必自止厥陰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食為病愈是也太陰厥陰不另立款故附於此此條小便利是門戶不約也小便不利附小便難綱仲景曰少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗故也目柯琴曰少陰受邪復受火侮樞機無主大腸清濁不分膀胱水道不利故下利而小便難也小便利者可治此陰虛故小便難也綱仲景曰少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利嘔者真武湯主之目柯琴曰小便不利是病根諸症皆因此而致然小便不利實由坎中無陽坎中火用不宣故腎家水體失職是下焦虛寒不能制水故也法當壯元陽以消陰翳三或字是加減症不是主症綱仲景曰二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之目柯琴曰少陰病腹痛下利是坎中陽虛故真武有附子桃花用乾薑不可以小便不利作熱治真武是引火歸原法桃花是升陽散火法綱仲景曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之目朱肱曰陰症小便不利手足厥冷脈微細者不宜服利小便冷滑藥但服返陰丹並取臍下石門穴灸之吳綬曰太陰腹滿自利小便不利無熱脈沉者理中湯合五苓散更加厚朴木香分利其小便而大便自止厥陰便閉厥冷脈伏囊縮入腹小便不利宜四逆湯加通草茯苓或灸氣海石門穴或以蔥尉法治之鰲按朱吳二説一於少陰病灸石門穴一於厥陰病灸石門穴其皆灸石門者所謂肝腎同一治也
