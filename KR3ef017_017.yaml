body:
  text: 卷十五厥陰經症厥陰經脈綱仲景曰傷寒脈滑而厥者里有熱也白虎湯主之目喻昌曰滑為陽脈其裡熱熾盛可知故宜行白虎湯以解其熱與三陽之治不殊也魏荔彤曰此言厥陰傳經熱邪盛於裡勿誤認為寒邪也傷寒厥陰病必有厥厥之為寒為熱迥別如厥陰病而症俱厥似寒邪矣然脈見滑滑者大而數也與沉細遲微相反矣是熱邪在裡也此內為真熱外厥以現假寒乎非也其厥者即他條所云凡厥者陰陽氣不相順接之凡厥也乃陰陽氣不順接所致也不必陰盛陽衰氣不順接可以成厥即陽盛陰衰氣不順接亦可成厥也故必診脈之滑而知熱在裡當急救其絶陰以制亢陽不當目為孤陽上浮之假熱明矣主以白虎湯寒涼以治熱兼辛散以發升俾熱隨肝木發達於表亦出邪之道路乘勢宜然也綱仲景曰傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門目朱肱曰足厥陰肝之經厥者盡也靈樞曰亥為左足之厥陰戊為右足之厥陰兩陰俱虛故曰厥陰夫陰盡為晦陰出為朔厥陰者以陰盡為義也其脈循陰器而絡於舌本也脈弗營則筋急筋急則引舌與卵故唇青舌卷而卵縮其尺寸俱微緩者知厥陰經受病也大抵傷寒病臟腑傳變陽經先受病故次第傳入陰經以陽主生故太陽水傳陽明土土傳少陽木為微邪陰主殺故木傳太陰土土傳少陰水水傳厥陰木至六七日當傳厥陰肝木必移氣克脾土脾再受邪則五臟六腑皆困而危殆榮衛不通耳聾囊縮不知人而死矣速用承氣下之可保五死一生古人云脾熱病則五臟危又云土敗木賊則死若第六七日傳厥陰脈得微緩微浮為脾胃脈也故知脾氣全不再受克邪無所容榮衛將復水升火降則寒熱作而大汗解矣厥陰肝之經主消渴氣上撞心心中疼熱飢不欲食食則吐蛔下之利不止也若陰氣獨盛陽氣暴絶則為陰毒其症四肢逆冷臍腹築痛身如被杖脈沉疾或吐或利當急灸之服以辛熱之藥令陽復而大汗解古云辛甘發散為陽謂桂枝甘草乾薑附子之類能復其陽氣也微用辛甘甚則用辛苦陰極發躁陰盛似陽以脈別之楊士瀛曰脈法曰脈浮而緊者名曰弦也弦為肝脈綱仲景曰厥陰中風脈微浮為欲愈不浮為未愈目朱肱曰傷寒六七日煩滿囊縮其脈尺寸俱微緩此足厥陰經受病也厥陰病其脈微浮而欲愈不浮為未愈宜小建中湯脈微緩者必囊不縮外症必發熱惡寒似瘧為欲愈宜桂枝麻黃合半湯若尺寸脈俱沉短者必是囊縮毒氣入臟宜承氣湯下之蘇頌曰厥陰之脈微緩不浮中風病傳厥陰脈轉微浮則邪還於表而為欲愈魏荔彤曰此言厥陰病得愈之脈以明厥陰病邪之去路標六經盡處以立治即傷寒六經之大法也凡以邪之盛者久必衰邪之入者久必出亦由其人陽氣原旺病邪不能久處於中則必行其經盡而自愈但厥陰為三陰之盡其邪行經盡而欲出舍少陽無路也又舍太陽無門也故厥陰一經為寒邪得自直中者由少陰而起溫之散之亦由少陽之半表而透太陽之表為熱邪得自傳經者亦由少陽而傳升之舉之亦必由少陽之半表而透太陽之表故在厥陰言邪之去路則不論為寒為熱舉由此也試驗於脈本厥陰病脈應沉中或見緊或見數俱非微脈也亦有陽脈而脈微者則浮沉取之俱微也今沉取不緊不數如平人知陰分之邪已離矣浮取見微知陽分之邪欲透矣此微即太陽中風之陽浮而陰弱也夫厥陰病何以言中風以脈見微而於浮取得之既非無根之陽外脫亦非厥陰之陽內陷是厥陰之邪隨陽氣由少陽達太陽欲愈之機也故可以厥陰中風名其病見厥陰而病具太陽中風之脈則陽升邪脫可識經盡得解之候也是全於浮之一診決之浮則愈不浮則未愈可知邪透表則病已未全透表則病未已主治者桂枝湯升陽驅邪之用仲師他條所言攻表宜桂枝湯者正此處吃緊也蓋邪已由陽有達太陽透表之勢故不用復從少陽為治而用柴胡但治太陽即以治少陽且正所以治厥陰也綱仲景曰傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此非臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人故吐蛔吐蛔者烏梅丸主之又主久利目喻昌曰此條微旨千百年來無識之者昌於篇首總括大意挈出腎陽胃陽竊原有所自臟厥者正指腎而言之蛔厥者正指胃而言之曰脈微而厥則陽氣衰微可知然未定其為臟厥蛔厥也惟膚冷而躁無暫安乃為臟厥宜用四逆及灸法其厥不回者主死蛔厥則時煩時止未為死候但因此而馴至胃中無陽則死也烏梅丸中酸苦辛溫互用以安蛔溫胃益虛久利而便膿血亦主此者能解陰陽錯雜之邪故也綱仲景曰下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死目寇宗奭曰下利而下重即痢症也無論病在傷寒中不在傷寒中其症皆為厥陰肝經所主若惟用寒涼有傷肝木暢達之性將日益陷下便難救療惟辨陽氣之升降使陽升則愈陽陷則危也喻昌曰下利而脈沉弦主裡急後重成滯下之症大者即沉弦中之大微弱數者即沉弦中之微弱數也脈微弱數雖發熱不死則脈大身熱者其死可知矣綱仲景曰下利有微熱而陽脈弱者令自愈下利脈數而渴者令自愈設不瘥必圊膿血以有熱故也下利脈數有微熱汗出令自愈設復緊為未解下利寸脈反浮數尺中自澀者必圊膿血目魏荔彤曰此二條申解厥陰下利診脈以為審辨定邪之升降為愈否也厥陰病陽升為吉陽降為凶要在下利一症固已然下利中亦有正陽升降之機不可不詳辨之以定其愈不愈未可因一下利而即謂厥陰病中之不可救藥者也如下利微熱而渴為陽症而利為因熱也診之脈弱陽氣上升脈必浮自無沉緊是陽升本脈非陽虛病脈也且渴亦陽盛熱越上焦之理合觀脈症可勿治而令自愈蓋下利脈應沉緊陰盛則脈必沉遲今雖厥陰下利脈自弱中帶數是陽原易升表原易透病原欲罷故令自愈而勿妄治也設不愈其人必圊膿血豈脈不應症乎非也熱邪入陰分已深因陰分有熱遽不能已故不愈倘下利脈數熱微則陽必上升透表邪隨汗出由厥陰竟達少陽而邪出矣又入陰分深留滯於中不能得脫則熱久內蓄必致便膿血亦猶少陰之便血為熏灼腸胃汙穢隨下均一義也設不弱而緊非寒邪復中表里則為陽已深陷豈能遽解此診脈必審陽氣升降之故以明厥陰病之愈否此要訣也再就膿血症言之亦於診脈識之寸反浮數陽升汗出病愈無疑而尺中自澀則陽雖上浮而陰中有熱以溷之是熱入之深壅閉陰分故必圊膿血將陽隨利下陷失其浮而復為緊致不可解也此二條皆就熱邪傳入厥陰致成下利而辨其正陽之升降以定病機進退也學者勿混正陽為熱邪又不可謂正陽升外別有熱邪應除斯可與言治厥陰熱邪矣又二條正是首條中段不愈之注示人診得寸脈浮數應愈因尺澀故便膿血不愈也原文不出方知急辨症也症明而用方在乎其人矣綱仲景曰傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也目喻昌曰少陰經中內藏真陽最患四逆故云吐利手足不逆冷反發熱者不厥厥陰經中內無真陽不患其厥但患不能發熱與夫熱少厥多耳論中恐暴熱來出而不去後三日脈之其熱尚在形容厥症重熱之意讀者不可草草然得熱與厥相應尤無後患若熱氣有餘病勢雖退必發癰膿以厥陰主血熱與血久持不散必致壅敗也魏荔彤曰厥陰病以厥為重而厥與發熱二者又必詳辨其時之久暫與氣之盈絀此乃病之進退大關不容不明者發熱六日反厥九日再熱三日陰陽之數各均矣夫陽入陰九日陽出陰又九日一出一入即一屈一伸一屈一伸即一曲一直木之本性也在三陽之少陽為往來寒熱屬腑故陽陷者淺而往來之時暫在三陰之厥陰為出入厥熱屬臟故陽陷者深而出入之時久旦日夜半愈者陰陽數九極數極必變夜半陽生故愈也肝為血臟熱溷其中而發癰膿此見厥陰以陽陷為病以陽升為愈而陽升必透表而散方為全愈若仍在厥陰灼炙為患也是升猶之乎未升也凡仲景言日皆約略之詞如此九日亦未可拘總以熱與厥較其均平耳如熱七八日厥七八日亦可即熱五六日厥五六日亦可不過較量其陰陽盛衰非定謂必熱九日厥九日方可驗准也原文言厥陰病始發熱六日即知其邪自少陰傳來為熱邪也何也少陰病無發熱發熱即為愈機至傳厥陰必反發熱以少陰在三陰為陰經之裡故熱不能發厥陰在三陰雖為陰盡處而與少陽相連表裡故熱可得發也綱仲景曰傷寒脈結代心動悸者炙甘草湯主之脈來緩時一止復來者名曰結脈來數時一止復來者名曰促陽盛則促陰盛則結此皆病脈又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止因而復動者名曰代陰也得此脈者難治脈瞥瞥如羹上肥者陽氣衰也脈縈縈如蛛絲者陰氣衰也浮而虛大者陽已無根沉而虛細者陰已無根其脈浮而汗出如流珠者衛氣衰也脈綿綿如瀉漆之絶者亡其血也傷寒咳逆上氣其脈散者死謂其形損故也脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也目柯琴曰首條寒傷心主心不主脈失其常度故結代也結代皆陰脈傷寒有此所謂陽症見陰脈者死矣二條脈以五至為平太過不及是陰陽偏勝失其常度也偏勝之脈更為邪阻陽邪盛而數中見止名曰促有急趨急蹶之象陰邪盛而緩中見止名曰結有綿綿瀉漆之狀陽盛可知為陰虛之病脈陰盛可知為陽虛之病狀矣三條陰陽相搏而脈動傷寒見此是形冷惡寒三焦皆傷矣況有動中見止更來小數中有還者反動宛如雀啄之狀不以名促反從結名者以其為心家真臟之陰脈也更有動而中止不能自還因而復動宛如蝦游之狀不可名結因得代名者以乍疏乍數為脾家將絶之陰脈也五條脈浮為陽盛法當無汗而反汗出如流珠是陽虛不能衛外而為固絶汗出矣陰虛不能藏精而主血綿綿其去如漆矣六條外寒傷形內寒傷氣咳不止氣上升脈散而不朝心肺之氣已絶矣七條脈浮而洪不是死脈而汗出如油是心液盡脫陽反獨留之脈也吐蛔綱仲景曰厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食即吐蛔下之利不止目朱肱曰此是厥陰症或病人有寒復發其汗胃中冷及因發汗後身熱重發其汗胃中虛冷故吐蛔先用理中丸次烏梅丸龔信曰傷寒有不必厥逆但吐蛔者雖有大熱忌下涼藥犯之必死蓋胃中有寒則蛔不安其所而上膈大凶之兆也急用理中湯加烏梅二個川椒十粒煎服待蛔定卻以小柴胡湯退熱李中梓曰吐蛔而渴理中湯加大黃入蜜利之陶華曰吐蛔若下之利不止用四逆湯張介賓曰凡治傷寒若見吐蛔者雖有大熱忌用寒涼蓋胃中有寒陽氣弱極則蛔逆而上此大凶之兆也急用炮姜理中湯加烏梅二個花椒一二十粒蓋蛔聞酸則靜見苦即安也柯琴曰太陰厥陰皆以里症為提綱太陰主寒厥陰主熱太陰為陰中至陰厥陰為陰中之陽也太陰腹滿而吐食不下厥陰飢不欲食食即吐蛔同是不能食而太陰則滿厥陰則飢同是一吐而太陰吐食厥陰吐蛔此又主脾主肝之別也綱仲景曰傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此非臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人故吐蛔吐蛔者烏梅丸主之又主久利目戴原禮曰胃中冷必吐蛔吐蛔人皆知為陰也然亦有陽症吐蛔者蓋胃中空虛既無穀氣故蛔上而求食至咽而吐又看別症如何不可專以胃冷為說曾醫一人陽黃吐蛔又大發斑陽毒症口瘡咽乾吐蛔皆以冷劑取效是亦有陽症矣王肯堂曰蛔厥者其人手足冷而吐蛔也臟厥者死陽氣絶也蛔厥雖厥而煩吐蛔已則靜不若臟厥之躁無暫安時病人臟寒胃虛蛔動上膈聞食臭則出因而吐蛔舌燥口乾常欲冷飲浸口不欲咽蛔上煩躁昏亂欲死兩手脈沉遲足冷至膝甚者連蛔並屎俱出大便祕而不行此症雖險都可救治也鰲按戴氏陽症吐蛔之說往往有之醫者不可不察而動以桂附乾薑等熱劑與之也除中綱仲景曰傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死目劉完素曰除者除去也與除夕之除同義夫脈遲為寒胃中真陽已薄不可更與涼藥蓋胃暖乃能納食今胃冷而反能食則是胃之真氣發露無餘而胃陽亦必漸去而不能久存故必死腹中即胃中也魏荔彤曰此為陽虛陰寒家立法見厥陰一症原寒熱雜合其盈虛消息之機全在臨時斟酌為陽氣盛熱有餘則越之散之甚且涼之下之為陰氣盛熱不足則升之舉之甚且溫之補之俱難一以為治也此固為厥陰傳經之邪言之而不止此也傷寒中何經不然雜病中何症不然故此條俱未嘗專指厥陰也學者可不察乎綱仲景曰眼睛不慧語言不出而設食反多者此為除中口雖欲言舌不能言傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈目楊士瀛曰除中者臟寒應不能食今反能食是也有三症悉屬厥陰其一由誤服黃芩湯而致期以必死其一則熱少厥多胃氣在者愈暴來出而復者死其熱續在者生此不因藥故也其一至眼不慧舌不能言則為壞症必死氣上撞心綱仲景曰厥陰之為病氣上撞心心中疼熱飢而不欲食食即吐蛔下之利不止目成無己曰氣上撞者腹中氣時時上撞也此汗吐下後之疾雖經下之邪猶在表故也痞病氣上撞咽候亦由誤汗吐下而生魏荔彤曰此言厥陰病傳經熱邪為患歷舉其症以驗之示誤下之禁也傷寒之邪傳入少陰為里中之裡及自少陰傳厥陰又為三陰之極盡處矣陰盡處受邪亦無所復傳卻由同表裡之少陽為升降之出路故在陽明有下法在少陰亦有下法今陰盡之極則少陽固無下法厥陰更無下法下之為誤可知矣然邪在少陰原分寒熱邪在厥陰亦必分寒熱邪由傳經入少陰者為熱及遞傳厥陰不問而知為熱矣惟是厥陰病中若直中寒邪亦自少陰起而入厥陰是寒熱皆由少陰而來大足相混也試先言傳經自太陰而來為熱邪者能辨乎此則由少陰直中而起之寒邪自可徐考而識之厥陰病得於傳經為熱邪者先驗其症首曰消渴凡熱必渴然寒濕隔阻正氣亦有渴渴欲飲水必不能多未有渴而飲飲而仍渴隨飲隨消隨渴者故隨飲隨消隨渴則為傳經之熱邪傳入厥陰無疑也少陰居下厥陰居中熱漸傳上則上焦必受熏灼之害為消渴為氣上撞心為心中疼熱皆少陰之邪熱緣木而升者竟入肝為病木火交熾而諸症見矣然又有飢不欲食食則吐蛔之症者何也蓋邪從少陰傳來本自三陽傳入病久胃虛邪熱乘之蛔因胃氣虛則不能安伏於胃底之下又熱乘之反浮游於胃口之上於是胃虛而熱則多飢蛔在胃口故不欲食食入而食在蛔上則相安食入而蛔反在食上則必吐蛔此又厥陰病中旁及之胃病也醫家或見熱症謂宜下再見胃病又謂宜下漫為下之大誤矣少陰之傳厥陰其勢駸駸日上矣治之如法則邪可從少陽而散亦如陽明傳少陽為邪出之門戶也反逆其勢而下之陰性本降再經誤下利何能止乎仲師於厥陰中首揭不可下之禁見厥陰病無論為寒為熱俱不可下也綱仲景曰病如桂枝症頭不痛項不強寸脈微浮胸中痞硬氣上撞咽喉不得息者此為胸有寒也當吐之宜瓜蒂散目寇宗奭曰此蓋未經汗吐下作膈實故宜吐也王肯堂曰氣撞心疼者厥陰本病也如氣上撞不吐蛔者為陽症若撞咽不得息者瓜蒂散吐之往來寒熱者奔豚陰拘攣者陰陽易卒口噤者剛痙與汗吐下之後各有症治方法學者詳之胸脅滿痛綱仲景曰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血目吳綬曰治脅下痛加枳殼青皮枯梗芍藥脅下硬加牡蠣粉若憎寒拘急往來寒熱而胸脅滿者加桂枝白芍俱小柴胡湯內加之李時珍曰此宜小柴胡湯抵當湯黃芩芍藥湯魏荔彤曰此就邪熱之微陽氣之出易於升舉而得愈者明之也若小便色不白即熱少厥微然有煩躁病在日久郁內無所宣泄遂致上衝下注且下肝臟之血示人不可輕忽其微熱也此條總是一串成文綱仲景曰婦人發熱惡寒經水適來熱除脈遲身涼胸滿如結胸狀譫語者刺期門吐下後脈微心下痞脅痛氣上衝咽眩冒脈動惕者必成痿下後脈弦者必兩脅拘急脅下素有痞連在臍旁痛引少腹入陰筋者名臟結死目王肯堂曰左右者陰陽之道路脅之部也宿痞在脅則陰陽之道路不通故邪不得傳經而直入於臟是以死綱仲景曰病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散目吳綬曰胸滿多用吐法實者瓜蒂散虛者人參蘆或以香蘇散送下以手探喉中吐之亦可傷寒三四日已傳少陽經脈弦口苦發熱而胸滿小柴胡湯胸中滿悶者加桔梗枳殼各二錢以利之胸脅滿而煩者加栝蔞實三錢黃連一錢半活人治胸滿氣痞不寬只用桔梗枳殼各二錢生薑五片名曰枳殼湯凡心之上胸之分宜枳殼心之下胃之分宜枳實蓋枳殼能泄至高之氣枳實泄至低之氣栝蔞仁能泄肺滌胸中痰垢之要藥也故胸滿而煩必加之一法治痞氣胸滿用小麥麩一二升以生枳殼切半同炒令熱去枳殼以帛包麩尉胸中冷則易則氣易散而愈腹滿痛綱仲景曰下利清穀不可發表汗出必腹滿下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯傷寒噦而腹滿視其前後何部不利利之則愈傷寒四五日腹中痛若轉氣下趣少腹者此欲下利也目成無己曰噦而腹滿氣上而不下也視其前後部有不利者則利之以降其氣前部小便也後部大便也或用五苓散或用小承氣湯張云岐曰傷寒邪在三陰內不得交通故為腹痛手足之經皆會於腹如脈弦而腹痛過在厥陰肝太陰肺刺太溪太淵太陵脈沉而腹痛過在太陰脾少陰腎手厥陰心包刺太溪太陵脈沉細而腹痛過在太陰脾少陰心刺大白神門三陰交此刺腹痛之法也魏荔彤曰二條乃言直中厥陰之寒邪有急行溫里之法徐可升舉其陽由厥陰而少陽以返於太陽之表也下利本症也腹滿痛陰寒內結也身體疼痛寒邪拘急也此必先使陽回於少陰而後厥陰之侵及者可徐圖之且寒邪本自少陰發源源頭之陽水既溫則灌溉於肝木者皆春泉矣是溫腎即以溫肝也然不攻其表則厥陰本經之陰寒留滯不散於是用桂枝攻表也首條下利清穀則裡寒陽微可審不先溫里回陽遽發其汗邪即散陽必亡陽愈衰陰愈盛腹滿猶小患也必至厥冷不還脈微至絶矣豈非失於溫里乎三條乃預防下利之因也轉氣下趣為寒為熱俱有此症凡傷寒症中見此則知其為欲自利然在陽明胃邪則為欲下行之機在厥陰肝邪則為欲下陷之候邪欲其去以下利而痊正欲上升以下利而危必然之理也少腹滿急綱仲景曰尺寸脈微緩者厥陰受病也當六七日發其症少腹煩滿而囊縮病者手足厥逆言我不結胸小腹滿按之痛者此冷結在膀胱關元也脅下素有痞連在臍旁痛引少腹入陰筋者名臟結死目王肯堂曰少腹下焦所治當膀胱上口主分別清濁冷結在膀胱或用真武湯夫胸中滿心下滿皆氣也腹滿者多有燥屎也少腹滿者有物聚也蓋身半以上同天之陽身半以下同地之陰清陽出上竅濁陰出下竅故在上滿者氣也在下滿者物也物者溺與血耳邪結下焦則津液不通血氣不行或溺或血留滯而腹脹也若小便利者蓄血之症小便不利者溺澀症也俱是熱病惟冷結膀胱少腹滿一症為寒病有手足厥冷可辨綱仲景曰太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃仁承氣湯目成無己曰如狂者熱在下焦必與血相搏若不蓄為熱迫之則血自下下則熱隨血出而自愈不下則血為熱搏蓄積於下而少腹急結乃可攻之以下熱散血內經曰從外之內而盛於內者先治其外後調其內此之謂也囊縮綱仲景曰尺寸脈微緩者厥陰受病也當六七日發其症少腹煩滿而囊縮目朱肱曰厥陰病其脈微浮為欲愈不浮為未愈宜小建中湯脈微緩者必囊不縮外症必發熱惡寒似瘧為欲愈宜桂枝麻黃合半湯尺寸俱沉短者必囊縮表氣入腹宜承氣湯下之大抵傷寒臟腑傳變陽經先受病次傳入陰經以陽主生陰主殺也若六七日傳厥陰脈得微緩微浮為脾胃脈也故知土氣不受克邪無所容榮衛將復水升火降則寒熱作而大汗出矣王好古曰厥陰病者煩滿囊縮大小便不通發熱引飲腹滿尺寸脈俱微緩煩者火也滿者木也雖不吐蛔囊縮但急者亦木也火木相合四肢厥逆而爪甲青大小便不通地道塞也發熱引飲邪氣在裡宜溫之下之有以上諸症大小便俱通地道不塞不發渴引飲邪不在裡則宜溫之灸之則裡外相接以復陽氣宜正陽散手足厥逆綱仲景曰傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤脈滑而厥者里有熱也白虎湯主之目朱肱曰手足逆冷此名厥也厥者逆也陰陽不相順接故手足逆冷也陽氣衰陰氣盛陰勝於陽故陽脈為之逆不通於手足所以逆冷也傷寒熱多厥少者其病當愈厥多熱少者其病為進然有冷厥有熱厥當仔細辨認冷厥者初得病日便四肢逆冷脈沉微而數足多蜷臥而惡寒或自引衣蓋覆不飲水或下利清穀或清便自調或小便數外症多惺惺而靜脈雖沉實按之遲而弱者知其冷厥也四逆湯理中湯通脈四逆湯當歸四逆湯當歸四逆加吳萸生薑湯白通加豬膽汁湯選用熱厥者初病必身熱頭痛別有陽症二三日至四五日乃發厥兼熱厥至半日卻身熱蓋熱氣深方發厥須在二三日後也若微厥即發熱者熱厥故也脈雖沉伏按之而滑為里有熱其人或畏熱或飲水或揚手擲足煩躁不得臥大便祕小便赤外症多昏憒者知其熱厥也白虎承氣隨症用之本條云厥應下之以熱厥當下若反發汗必口傷爛赤也又有下症悉具而見四逆者是失下後血氣不通四肢便厥醫人不識疑是陰厥反進熱藥禍如反掌大抵熱厥須脈沉伏而滑頭汗手雖冷爪甲時溫須承氣下之勿拘忌諸手足逆冷皆屬厥陰不可汗下然有須汗須下者謂雖逆冷時有溫時手足掌心暖非正厥逆也當消息之若寒熱而厥面色不澤冒昧兩手忽無脈或一手無脈者必是有正汗也多用綿衣包手足令暖急用五味子湯或兼與麻黃細辛甘草湯服之晬時必大汗解或厥逆怔忡者宜先治水茯苓甘草湯然後治厥不然水浸入胃必下利又有手足厥冷脈乍結者邪結在胸也心下滿而煩飢不能食者病在胸中吐之瓜蒂散蓋病在胸中亦令人手足厥但認脈乍結是也脈陰虛則結脈來緩時一止復來曰結主胸滿煩躁太陰少陰脈俱不至頭俱無頭疼症仲景只有厥陰一症吳茱萸湯治乾嘔吐涎沫頭疼而已大抵屬三陽者頭疼為多也若非次頭疼胸中滿及發寒熱脈緊而不大者即是膈上有痰瓜蒂末一錢水調下吐涎立愈重陽必陰重陰必陽寒暑之變也假令手足逆冷大便祕小便赤或大便黑脈沉而滑陽症似陰也輕則白虎重則承氣傷寒失下血氣不通令四肢逆冷此是伏熱深故厥亦深急用大承氣加分劑下之汗出立瘥仲景所謂厥宜下之者此也熱厥與陰厥自不同熱厥者微厥即發熱陰厥即不發熱四肢逆冷惡寒脈細大小便滑泄矣王好古曰仲景言四逆與厥者非一或曰四逆或曰厥逆厥冷厥寒或曰厥或曰手足逆冷手足厥逆手足厥冷手足厥逆冷俱是言寒冷耳故厥逆二字每每互言未嘗分逆為不溫厥為冷也既曰不溫則為冷矣何異乎然四肢與手足卻有分以四字加逆字上是通指手足臂脛以上言也以手足字加厥逆等字上及無手足字是獨指手足言也雖然厥冷俱為寒冷卻有陰陽之殊熱極而厥逆陽極似陰也以四逆散寒藥治之寒極而厥逆獨陰無陽也仲景雖無四逆湯熱藥治四逆之條但四逆湯之名由四肢之冷而立今以四逆湯治手足厥冷豈非逆厥之不異乎成氏既謂四逆為熱邪至少陰病四逆條下又謂四逆為寒甚不自悖乎是知四肢冷猶厥之有寒有熱但四肢通冷比之手足獨冷則異耳故仲景曰少陰病吐利煩躁四逆者死又曰少陰病四逆惡寒而蜷脈不至煩而躁者死又曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯此三條二為死一為可治雖通由諸症兼見而然然死者以逆言可治者以厥冷言可見四逆重於厥冷矣成氏謂厥甚於逆豈不謬耶王肯堂曰凡言四逆或言厥言逆者皆為重症皆言四肢耳言指頭寒言手足厥與逆與冷者皆為厥微蓋手之上為腕腕上為臂足之上為踝踝上為脛也其病之輕重淺深皆寓於書法中宜審自熱至溫自溫至厥乃傳經之邪四逆散主之厥逆大便祕小便赤或大便黑脈沉而滑此為陽症似陰白虎湯重者大承氣不可誤也張介賓曰厥有二症曰陽厥曰陰厥陽厥者熱厥也必其先自三陽傳入陰分故初起必頭疼發熱自淺入深然後及於三陰變為四肢逆冷或時乍溫其症必便結躁煩譫語發渴不惡寒反惡熱脈沉有力此以傳經熱邪所化外雖手足厥冷內則因於熱邪陽症發厥故為陽厥乃陽極似陰也其症由邪熱內結或伏陽失下之所致也凡厥微熱亦微宜四逆散之類厥甚熱亦甚宜大承氣之類陰厥者寒厥也初無三陽傳經實熱等症而真寒直入三陰則畏寒厥冷腹痛吐瀉戰栗不渴脈沉無力此陰寒厥逆獨陰無陽也故為陰厥輕則理中湯重則四逆湯回陽湯主之按陽厥陰厥其辨如此此先哲之大法也然愚則猶有辨如厥陰一症既無陽症陽脈而病寒若此明是陰症今人但曰中寒者即其病也然犯此者無幾知此者無難治宜溫中無待辨也惟是陽厥則有不得不辨者矣夫厥由三陽所傳為陽厥固矣即以傳經者言之又豈盡無陰症乎故凡病真陽不足者即陽中之陰厥也脈弱無神者即陽中之陰厥也攻伐清涼太過者即陽中之陰厥也四肢為諸陽之本使非有熱結煩渴脹實等症而見厥逆者皆由陽氣不足也成無己曰大抵厥逆為陰所主寒者多矣又曰厥為陰之盛也故凡屬挾虛傷寒則雖自陽經傳入者是亦陽中之陰厥也陰中之陰者宜溫陽中之陰者果宜涼乎勿謂其先有頭疼發熱但自三陽傳至者便為陽厥而寒因熱用之則為害不小矣柯琴曰首條明熱厥之理二條明熱厥之脈與方脈滑以弱是有胃氣緩而滑名熱中與寒厥之脈微欲絶不同綱仲景曰傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈目喻昌曰厥終不過五日即上句之注腳見熱與厥相應陰陽一勝一復恰恰相當故可勿藥自愈魏荔彤曰此與上一二日至四五日條乃申解厥陰病厥熱互見以明其陽陷入陰之深淺均應理其熱邪毋傷陰分不可誤見陽陷為厥即以為寒亦不可見陽升發熱即為可汗而妄治也上條言一二日至四五日夫久病非寒故知其為傳經之熱陽陷於陰而得厥也厥者必發熱是因後之必發熱知為熱厥而非寒厥也前熱者後必厥正見傳經熱邪入於厥陰升降不能故發為厥熱互見之症也厥深為日多也熱入陰分之深也故厥後必熱熱亦因深而久也厥微為日少也熱入陰分微也故厥後必熱熱亦因淺而暫也推之熱後必厥者亦如之總為陽陷之故也陽氣亦熱邪熱邪即陽氣也然熱微則陷者淺可以升舉熱深則陷者深不可升舉乘其陷入之勢與以蕩滌之施是厥陰無下法又未嘗無下法也喻氏用小承氣下熱邪而淨陰分也然大柴胡尤為對症不然熱入之深而反發汗並失其升舉之道矣若妄施之邪熱愈熾口傷爛赤必矣試就其厥與熱互見之日明之如本條厥五日陽入也熱亦五日陽出也設六日當復厥陽又入也不厥則陽不入而直出透表矣所以知其能自愈倘復厥其日亦不過五以前陽出之數計之知陽入又必五日而出也更推之凡陽入幾日厥幾日必陽出幾日熱幾日也均應理熱邪亦未能盡如漸厥多熱少則又當理其寒邪勿傷陽分矣然厥多熱少漸致有厥無熱自各有專條也綱仲景曰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血目張云岐曰熱少厥微即熱微厥亦微之症也但曰指頭寒不言手足逆冷其為熱亦有限矣綱仲景曰傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此為臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利目成無己曰臟厥者死陽氣絶也蛔厥雖厥而煩吐蛔已則靜不若臟厥而躁無暫時安也綱仲景曰傷寒發熱四日厥反五日復熱四日厥少熱多其病當愈四日至七日熱不除者必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也目喻昌曰以陰陽進退之義互舉其旨躍然綱仲景曰傷寒先厥後發熱而利者必自止見厥復利傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹目魏荔彤曰此與上發熱四日厥反三日條申明熱厥互見並詳其傳經之熱邪上衝下注不同即此可知陽氣升陷之幾而病勢之進退決焉蓋傳經之邪其有深淺升降固已然就深淺言此熱原為傳經之邪就升降言此熱又為正陽之氣非陽氣升透則熱入既深漫無出路其患非上衝即下注豈能遽言愈哉厥陰病總宜升陽於陰分散熱於表分也此與上條又在厥陰中辨病勢吉凶之大關鍵也乎綱仲景曰傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也目魏荔彤曰凡仲景言日如他條一二日四五日及五日六日四日三日與本條九日皆設以為驗之辭俱不可拘如算法設為問答以明其數使人得較量其虧盈也綱仲景曰傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利吐膿血泄利不止者為難治麻黃升麻湯主之目王好古曰厥陰症四肢厥冷爪甲青脈沉疾按之有力者為陽則當下宜大承氣湯如脈沉按之無力者為陰則當溫宜四逆湯喻昌曰寸脈沉而遲明是陽去入陰之故非陽氣衰微可擬故雖手足厥逆下部脈不至泄利不止其不得為純陰無陽可知況咽喉不利唾膿血又陽邪搏陰上逆之徵驗所以仲景特於陰中提出其陽得汗出而錯雜之邪盡解也魏荔彤曰寸上焦之部位陽分之脈也而見沉遲寒格於熱上熱伏於寒下可知手足厥冷陽陷入陰寒格熱伏又可知下部尺脈不至平日之寒下腎虛又可知是腎陽素弱陽陷於陰熱格於寒之故如繪目前何可任陽澌滅乎但陽畢竟在陰中雖弱未嘗無也熱畢竟伏寒下惟郁故反能為害也咽喉不利唾膿血者熱邪不肯屈伏而上衝於肺為患也泄利不止熱邪既不能上達不得不隨陰氣而為挾熱之利也即是熱邪伏郁陰中陽氣必勃動於陰分固極難為升舉不易致透表散邪治之得愈矣然非有陰無陽厥去不還之死症也仍當以破陰升陽為主治用麻黃升麻湯與烏梅丸同理而各有義烏梅丸意在緩以收功治胃厥以安蛔麻黃升麻湯意在急於奏捷理肺熱以發汗綱仲景曰手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之目魏荔彤曰厥寒脈細似四逆症然直中之厥陰宜四逆若傳經之邪先盛後衰漸至不振則此時之寒固宜急理而當日之熱尤宜回顧也病在陰厥一熱一厥互爭日久厥陰血臟血未有不虧者故厥陰病之末不惟陽氣衰而陰血亦亡法當於救陽之中顧陰也不然陰亡而陽亦終歸於亡何救之有所以主當歸四逆救陽兼補其血也設或陰盛於陽陽衰於陰內有久寒則加姜萸雖扶陽之力較多而養陰之意不失所以救肝血於熱邪既傷之後扶陽氣於厥多熱少之時此方內第一適用者也綱仲景曰下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死目鰲按晬時脈還非無因而自還也乃灸之而後還也若不還是無根之陽隨火勢上升而脫也亦有陰無陽之厥陰也安望其生綱仲景曰發熱而厥七日下利者為難治傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利至甚厥不止者死目戴原禮曰陰陽之病皆能發厥故有陰厥陽厥皆病之深者而陽厥尤易誤必初得病頭疼身熱外別有陽症五六日方發厥雖厥猶畏熱或飲水或揚手擲足煩躁不得臥大便祕小便赤乃為陽厥也近有陽病自腰以上極熱兩腳常冷蓋三陰脈不至頭故頭不疼三陽脈下不至足故足冷也吳綬曰有尸厥者經言少陰脈不至腎氣微奔氣促迫宗氣反聚血結心下陽氣退下熱歸陰股而為尸厥也急刺期門巨闕陳士鐸曰傷寒發熱而能發厥便有可生之機以厥則邪能外出也然厥可暫而不可久況身熱而下利至甚如何可久厥而不止乎宜為死症也蓋下寒上熱鬱結於中而陰陽之氣不能彼此相接也必須和陰陽而通達上下則死可變生方用人參三兩白朮五錢附子二錢甘草蘇子各一錢自然厥利俱止倘服後厥仍不止真不可救附録手心手背辨李杲曰內傷及勞役飲食不節病手心熱手背不熱外傷風寒則手背熱手心不熱以此辨之皎然熱利下重附下利綱仲景曰厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食即吐蛔下之利不止目柯琴曰太陰厥陰皆以里症為提綱太陰主開本自利而下之則開折胸下結硬者開折反闔也厥陰主闔氣上逆而下之則闔折利不止者闔折反開也按兩陰交盡名曰厥陰又名陰之絶陽則厥陰為病宜無病熱矣以厥陰脈絡於少陽厥陰熱症皆相火化令耳夫病發於陰而反下之則氣無止息而利不止矣綱仲景曰下利欲飲水者以有熱故也白頭翁湯主之熱利下重者白頭翁湯主之目戴原禮曰大抵陽熱之利與陰寒之利不同陽利糞色必焦黃熱臭出作聲臍下必熱得涼藥則止陰利必洞下清穀糞色或白或淡黃臍下多寒宜溫中止瀉之劑此陰利陽利指陰陽二氣而言非陰陽二經也緣陰中亦自有陽利不可因下利便以為陰也又有內不大滿猶生寒熱未可下而便下之內虛熱入挾熱自利臍下必熱大便赤黃及下腸間津液垢膩名曰利腸宜白頭翁湯黃芩湯綱仲景曰下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死下利有微熱而渴脈弱者令自愈下利脈數而渴者令自愈設不瘥必圊膿血以有熱故也下利脈數有微熱汗出令自愈設復緊為未解下利寸脈反浮數尺中自澀者必圊膿血目鰲按此三條詳言熱利之脈各有不同由所發之臟腑陰陽不一也首條脈沉弦沉為在裡弦屬少陽下重者膽氣不升火邪下陷也大脈屬陽明其未止者陽明之陽邪太盛故脈大而病進也又脈之微弱者為虛利後而數亦為虛其欲止者陰陽漸和也二條脈弱者外之發熱既微則內之熱勢當自解故現弱象也諸條令自愈言可不服白頭翁湯而令其自愈也脈數而渴由於虛熱若不瘥而圊膿血乃為真熱也汗出二字為本條關鍵蓋熱從汗解熱解則利因可愈也三條則陰出之陽為欲愈之兆故脈數而帶浮澀見尺中在便血之後亦順脈也綱仲景曰傷寒六七日不利復發熱而利其人汗出不止者死有陰無陽故也發熱而厥七日下利者為難治傷寒發熱下利至甚厥不止者死傷寒發熱下利厥逆躁不得臥者死目柯琴曰首條有陰無陽指內而言此為亡陽與熱利之發熱不死汗出自利者天淵矣二條發於陽者七日愈今厥不止而反下利恐為除中故難治若煩躁而能食尚為熱厥利耳三四條厥利不止臟腑氣絶矣躁不得臥精神不治矣微陽不久留故死也綱仲景曰傷寒先厥後發熱而利者必自止見厥復利傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹目魏荔彤曰厥陰傳來之熱邪一日不升陽透表必一日在內為患非上衝而汗出喉痹即下注而無汗便膿血在陽升熱出見病尚如此況熱後復厥厥後復熱熱勢愈深其厥愈深漸致陽微陰盛厥多熱少愈難治矣主治者安可坐視其困殆而不一升舉其陽宣導其熱乎傳經之熱邪如本條之為害如此而尚有言寒邪者豈非盲目乎便膿血綱仲景曰下利有微熱而渴脈弱者令自愈下利脈數而渴者令自愈設不瘥必圊膿血以有熱故也下利脈數有微熱汗出令自愈設復緊為未解下利寸脈反浮數尺中自澀者必圊膿血目張從正曰熱邪之陷於陰中已深因陰中有熱一時不能自止故至便膿血也脈反浮數宜其陽出於陰而愈矣止因尺中澀故又至便膿血也柯琴曰前條是未膿血因不瘥而預料之辭後條在膿血後因寸浮尺澀而揣摹之辭綱仲景曰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也傷寒先厥後發熱而利者必自止見厥復利傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹目吳綬曰凡下血便膿血有陰陽冷熱之不同古人云見血無寒又言血得熱而行此大概也大抵屬熱者常八九屬寒者才一二不可定為無寒也要略曰陽症內熱則下鮮血陰症內寒則下紫黑血如豬肝也且夫陽症脈數而有力者為實熱苦寒之藥可用數而無力者為虛熱當甘溫養血藥中少佐寒藥可也若陰症則脈遲而有力者為有神可治無力者難治也凡下利膿血身熱脈大者為難治身熱脈小者為易治也王肯堂曰便膿血熱病也其在太陽陽明者無論已若在少陰下利便膿血又有至四五日腹痛便膿血者治以桃花湯成氏釋謂裡寒非也桃花湯雖用乾薑然分兩最微赤石脂粳米居多蓋調正氣澀滑脫佐用辛以散之之義又八九日一身盡熱必便血又少陰下利便膿血者可刺與此三條厥陰之便膿血皆傳經之熱邪也各隨其輕重或用微涼或用疏導無不愈者誤用辛熱罔或得痊世因以為難療之疾殊不知仲景著便膿血別無死候學者宜究心焉
