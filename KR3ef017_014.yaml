body:
  text: 卷十二痞滿綱仲景曰傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之目朱肱曰大抵結胸與痞皆宜下然表未解者不可攻也仲景云當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯汗出表解而胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯利日數十行穀不化腹中雷鳴心下痞硬而滿此以醫下之也若復下之其痞益甚甘草瀉心湯蓋此非結熱以胃中虛客氣上逆故使硬也下利而心下痞服生薑瀉心湯甘草瀉心湯利不止者當治其下焦赤石脂禹餘糧湯蓋前二瀉心皆治中焦此利在下焦只治中焦則利益甚耳服石脂湯仍不止當利其小便五苓散若太陽症未除而數下之遂協熱而利利不止心下痞硬表裡不解者桂枝人參湯主之如十棗湯大柴胡湯皆治心下痞此方尤難用須是表症罷不惡寒身涼其人漐漐汗出發作有時頭疼心下痞硬滿引脅下疼乾嘔短氣者乃可行十棗表未解者慎不可用也大柴胡治傷寒發熱汗出不解心下痞硬嘔吐而下利者非大柴胡不可也若發汗吐下後心下痞硬噫氣不除者旋覆代赭湯此是主解後心下痞硬症綱仲景曰傷寒五六日嘔而不發熱者柴胡湯症具而以他藥下之若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者為痞柴胡不中與之宜半夏瀉心湯目柯琴曰此為柴胡壞症故用瀉心而不與柴胡綱仲景曰少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚目柯琴曰胸中為里之表滿者虛風所為也綱仲景曰太陽與少陽並病脈弦頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語若譫語不止當刺期門目朱肱曰心下滿而不痛此名痞也傷寒本無痞應身冷醫反下之遂成痞枳實理中丸最良仲景治痞氣諸湯中有生薑半夏二瀉心湯俱平和宜用之半夏瀉心治滿而不痛之痞此湯蓋本理中人參黃芩湯方也審知是痞先用桔梗枳殼湯尤妙緣桔枳行氣下膈先用之無不驗也結胸與痞關脈須皆沉若關脈浮者大黃黃連黃芩瀉心湯以關浮則結熱三黃能瀉肝也若復惡寒汗出者附子瀉心湯病人心下痞與瀉心湯不解發渴口燥小便不利者五苓散綱仲景曰太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩太陽少陽並病心下硬頸項強眩者當刺大椎肺俞肝俞慎勿下之目陶華曰痞者因太陽症當服麻黃湯而誤用承氣下之而成痞滿此因虛邪留滯若欲下之必待表症罷而後可宜小柴胡加枳桔湯綱仲景曰傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡龍骨牡蠣湯主之目鰲按此妄下熱邪內攻以致亡陰之變也綱仲景曰太陽病過經十餘日反二三下之後四五日柴胡症仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈目樓英曰此屢妄下兩候之久柴胡症仍在因其人不虛故樞機有主而不致成壞病與小柴胡湯和之表症雖或已罷而內尚不解以前此妄下之藥但去腸胃有形之物而不能泄胸中氣分之結熱也急者滿也但滿而不痛即是痞也脅滿腹痛綱仲景曰傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之目王肯堂曰邪氣傳裡必先自胸而脅以次經心腹而入胃也是以胸滿多帶表症脅滿多帶半表裡症如下後脈促胸滿者桂枝去芍藥湯又太陽與陽明合病喘而胸滿者不可下宜麻黃湯二者屬表須汗之蓋胸中至表尤近也及脅則更不言發汗但和解而已經曰設胸滿脅痛者及胸脅滿不去者與夫本太陽病不解傳入少陽脅下硬滿乾嘔往來寒熱脈沉緊者俱宜小柴胡和解之大抵邪初入里尚未停留為實但鬱積生滿者和解斯可矣若留於胸中聚而為實者又非吐下之不可已如發汗若下之煩熱胸中窒者梔子豉湯若胸中痞硬氣上衝咽喉不得息者此胸中有寒瓜蒂散二者均是吐劑又當知梔豉吐虛煩客熱瓜蒂吐痰實宿食也鰲按此言傷寒五六日中風者乃本傷寒病至五六日更中風也綱仲景曰傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之目陶華曰胸滿者胸膈間氣塞滿悶也非心下滿脅滿者脅肋下氣填脹滿也非腹中滿蓋凡邪自表傳裡必先胸至脅以至心腹入胃也柯琴曰身熱惡風頸項強桂枝症未罷脅下滿已見柴胡一症便當用小柴胡去參夏加桂枝栝蔞以兩解之不任桂枝而主柴胡者從樞故也綱仲景曰陽明病發潮熱大便溏小便自可胸脅滿者小柴胡湯主之目張云岐曰此是邪從少陽而入陽明者何以見之潮熱者陽明症也然陽明猶未實也又何以見之曰大便溏小便自可豈有胃已實而二便如此者乎胸脅苦滿而用小柴胡和之使熱邪仍自少陽而解可不復入陽明也鰲按前條四五日身熱惡風項強與脅滿齊見是太陽少陽並病也此條潮熱便溏小便自可與脅滿齊見是陽明少陽合病也若云傳入則必先有太陽陽明之症然後漸見少陽症矣此不可不察綱仲景曰陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也目王履曰不大便屬陽明然脅下硬滿而嘔也不猶在少陽部分乎至舌上起有白苔則全由痰飲溢於上焦也綱仲景曰傷寒陽脈澀陰脈弦法當腹中急痛先用小建中湯不瘥者小柴胡湯主之目成無己曰胸脅滿以邪氣初入里未停留為濕氣痰積而不行致生滿也和解可矣若腹中急痛邪漸入里矣急痛者即滿痛也鰲按此條已偏於半里矣綱仲景曰本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈弦細者與小柴胡湯若已吐下發汗溫針譫語柴胡症罷此為壞病知犯何逆以法治之目鰲按此條壞病尚由太陽病不解而來已有壞之之機故一入少陽即患脅滿乾嘔寒熱不食也更兼吐下汗針更不知變生何病矣故必審之知犯何逆然後可隨所犯而以法治非既入少陽再加吐下汗針之後而成壞病也綱仲景曰得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔食谷噦者柴胡不中與也目鰲按此太陽中風誤下之壞病非柴胡症也故與柴胡湯而必下重猶是誤與之也綱仲景曰傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之初服微煩復服汗出則愈目許叔微曰本條著眼微結二字微結者對大結胸而言是指心下痞其病留著胸脅間故胸脅滿微結五字當作一句看與心下痞硬心下支結同義也綱仲景曰傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之目陶華曰腹滿者邪入太陰脾土也常痛為裡實須下之承氣湯時減者為裡虛當溫之理中湯若表解內不消非大滿猶生寒熱是邪未全入里亦未可下若大滿大實兼有燥屎是邪已入腑雖得之四五日亦為可下大抵陽邪為實則腹滿而咽乾陰邪為寒則腹滿而吐利食不下若已經吐下後而腹滿者治法又各不同是又不可不知者也有腹滿痛由脾不勝水水與氣搏皮肉之間腹中漉漉有聲小半夏茯苓湯加桂枝下利腹滿身疼痛先溫其理四逆湯後攻其表桂枝湯發汗後腹滿當溫厚朴半夏生薑人參湯吐後腹滿當下少與調胃承氣湯下後腹滿宜梔子厚朴湯腹脹滿者陰陽不和也桔梗半夏湯張介賓曰若小腹硬痛小水自利大便黑身目黃者屬蓄血痛亦用寒劑加行血藥下盡黑物自愈凡傷寒腹中痛甚但將涼水一盞與飲之若痛稍可者屬熱痛當用涼藥清之以上皆實熱症也必脈來沉實有力方是此症若微弱者仍當審察從緩治之若飲水愈痛此為寒痛急用溫藥和之和之不已而或四肢厥冷嘔吐瀉利者急用熱藥救之但須詳脈之有力無力方為良法耳朱撝曰有胃脘之陽不散致腹中痛者須知之也嘔綱仲景曰陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也目柯琴曰傷寒則嘔逆中風則乾嘔凡傷寒中風無麻黃桂枝症但見喜嘔一症雖發熱者便可用柴胡湯不必寒熱往來而始用也發熱而嘔則人參當去即桂枝非所宜矣或目赤耳聾胸滿而煩者用柴胡去參夏加栝蔞之法脈弦細而頭痛發熱者從柴胡去參加桂之法鰲按邪正相爭故喜嘔然不曰嘔而曰喜嘔則非真嘔可知此與苦滿苦字不欲飲食不欲字皆病情之得於內者所貴在無形以揣之者也綱仲景曰傷寒嘔多雖有陽明症不可攻之目趙嗣真曰嘔者水氣在上焦也上焦得通津液得下胃氣因和矣胃氣和故不嘔矣綱仲景曰傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之目趙嗣真曰此症以內外俱虛故特用輕劑和解之不得以他藥與也綱仲景曰本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈弦細者與小柴胡湯若已吐下發汗溫針譫語柴胡症罷此為壞病知犯何逆以法治之太陽中風下利嘔逆表解者可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯目張元素曰或云乾嘔脅痛小柴胡十棗皆有之一和解一攻伐何也蓋小柴胡病在半表裡外有寒熱往來內有乾嘔諸症所以不可攻下宜和解以散表裡之邪十棗症外無寒熱人漐漐汗出此表已解也但頭痛心下痞硬滿引脅下痛乾嘔短氣者邪熱內蓄而有伏飲是里未和也故與十棗以下熱逐飲以上二症宜從表症以決之要法有表症而乾嘔脅痛者乃柴胡症也無表症而乾嘔脅痛者十棗症也綱仲景曰傷寒五六日嘔而發熱者柴胡症具而以他藥下之若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者為痞柴胡不中與之宜半夏瀉心湯目黃仲理曰此則柴胡湯之壞症也綱仲景曰傷寒十三日下之胸脅滿而嘔日晡所發潮熱已而微利此本柴胡症下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡以解外後以柴胡加芒硝湯主之目魏荔彤曰傷寒至十三日則過經不解明矣胸脅滿而嘔本為少陽症也但日晡所發潮熱已而微利則又類陽明矣何也邪在少陽無利法邪在陽明成胃實有下之而不得利者今反利是症雖在少陽而陽明有邪未盡此當以和解者治少陽以泄下者治陽明如前法矣醫者用非其法以丸藥下之故於潮熱已時微利利而潮熱仍不已也仲師恐人誤認為虛而無熱直指之曰潮熱者實也謂此熱為實邪在陽明不同於虛而不煩之治也此實指熱之虛實而言非言胃已成實之實所以仍主小柴胡湯正以胃不成實邪已半在少陽故仍從前法半治少陽半治陽明而少變之也先宜柴胡以解外使邪在少陽者從表外而上透也後加芒硝以滌內使邪在陽明者從里以下泄也此就少陽症中兼治陽明胃中餘熱為太陽病過經不解陽明有熱者言之也陽明有熱而不大下之乃於柴胡湯中用芒硝則非胃實大下之故也鰲按此應是少陽陽明並病胸脅滿而嘔邪在少陽表裡之間也發潮熱里可攻也微下利便未硬也此時若以大柴胡分解表邪蕩滌裡實則邪去而微利亦當自止奈醫不識病根誤以丸藥下之徒引熱邪內陷而下利表裡俱不得解此以知本條之誤並不在下而在於用丸藥以下也綱仲景曰太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先其時極吐下者調胃承氣湯若不爾者不可與但欲嘔胸中痛微滿者此非柴胡症以嘔故知極吐下也目韓祗和曰此條乃明先時極經吐下中虛而胃不成實之故以示虛虛之禁也蓋此又太陽傳入少陽不必治少陽亦不必治陽明但須扶正補虛為聽邪自止之法也凡太陽病過經不解者邪在少陽則用小柴胡邪在陽明少陽之間則用大柴胡邪在陽明虛而有熱作煩則用調胃承氣邪在陽明虛而無熱不作煩則大小柴胡俱不可用況於調胃承氣故凡太陽病後過經不解所當辨其邪在何經為虛為實以善其治者也柯琴曰太陽居三陽之表其病過經不解不轉屬陽明則轉屬少陽矣心煩喜嘔為柴胡症然胸中痛大便溏腹微滿皆非柴胡症但以欲嘔一症似柴胡當深究其欲嘔之義矣夫此病既不關少陽之半表見太陽過經而來一切皆屬裡症必十日前吐下而誤之壞病也極吐誤下是太陽轉屬陽明而不屬少陽矣故與調胃承氣也綱仲景曰太陽病過經十餘日反二三下之後四五日柴胡症仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈目成無己曰此是熱邪為嘔者也魏荔彤曰病由太陽必傳陽明方有柴胡相對之少陽症今不言陽明症而言柴胡症仍在者則十餘日內太陽罷後必已傳入陽明之經因胃氣旺而未歸陽明之腑遂更傳少陽之經矣所以此十餘日內曾見柴胡症至十餘日後又四五日柴胡症仍在耳先見柴胡症時曾與小柴胡湯乃嘔不止心下急鬱郁微煩者雖見柴胡其病未盡到少陽尚留陽明經故宜大柴胡於升舉少陽之中寓攻下陽明之法此斟酌於邪在兩經而兼治之者也綱仲景曰膈上有寒飲乾嘔者不可吐也乾嘔吐涎沫頭痛者吳茱萸湯主之目成無己曰此二條是皆寒邪為嘔者也綱仲景曰先嘔後渴者此為欲解先渴後嘔者為水停心下此屬飲家目成無己曰此條是停飲為嘔者也綱仲景曰嘔家有癰膿不須治膿儘自愈目成無己曰此是胃脘有膿而嘔者也大抵傷寒表邪欲傳裡裡氣上逆則為嘔是以半表半裡症多雲嘔也傷寒三日三陽為盡三陰不受邪是知邪氣傳裡必嘔也綱仲景曰傷寒發熱汗出不解心下痞硬嘔吐而下利者小柴胡湯主之目黃仲理曰未經下而嘔嘔而發熱故主以小柴胡也綱仲景曰嘔家不可用建中湯以甘故也目樓全善曰酒客不可與桂枝湯以甘故也嘔家不可與建中湯亦以甘故也二者之禁其義同耳心煩喜嘔嘔而發熱柴胡湯症胸中有熱腹痛欲嘔黃連湯症太少合病自利而嘔黃芩湯症嘔同而所由作嘔不同故方治亦異綱仲景曰傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之目柯琴曰熱不發於表而在胸中是未傷寒前所蓄之熱也邪氣即寒氣胃中寒邪阻膈胸中之熱不得降故上炎作嘔胃脘之陽不外散故腹中痛也此在臟腑之半表裡非形軀之半表裡也欲嘔而不得嘔腹痛而不下利似乎今人所謂乾霍亂絞腸痧等症綱仲景曰太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之目喻昌曰太陽陽明合病下利表症為多陽明少陽合病下利里症為多太陽少陽合病下利半表半裡症為多故用黃芩甘草芍藥大棗為和法也趙獻可曰太陽陽明合病邪初入陽明之裡也宜辛甘發散用葛根湯以從陽而為治也太陽少陽合病邪已入少陽之裡也宜酸苦湧泄用黃芩湯以從陰而為治也發斑綱仲景曰陽毒之為病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治鰲按仲景傷寒論無發斑明文而傷寒發斑症極多歷代名家言及斑症者皆據金匱陽毒面赤斑斑如錦紋陰毒面目青黑以為説但陰毒面目青黑雖亦斑紋之類畢竟傷寒發斑是陽盛之症當以赤色如錦紋者為主若趙氏以此症謂皆熱毒傷於陰陽頗有理其説詳載於後然只存參可也茲但録金匱陽毒條以為綱目李杲曰陽症發斑有因下之太早者有因失下者有因胃熱胃爛者得之雖殊大抵皆邪助手少陰心火入手太陰肺也故紅點如斑生於皮毛之間耳白虎湯承氣湯從所當而用之當以肺脈別也趙嗣真曰活人云發斑有兩症有溫毒有熱病又云表虛里實熱毒乘虛出於皮膚所以發斑瘡癮疹如錦紋素問謂之疹愚詳仲景論無此症治但華他云熱毒未入於胃而下之胃虛熱入爛胃又熱已入胃不以時下之熱不得泄亦爛胃其斑如雞頭大微隱起喜著兩脅王仲弓云下之太早熱氣乘虛入胃故也下之太遲熱留胃中亦發斑服熱藥不當或多亦發斑微者色赤五死一生劇者色黑十死一生皆用化斑湯及阿膠大青湯又索氏新書云陽毒病人出斑皆如炙迹指面大青黑並不免於死者古人云胃爛如此可信矣世之人或謂斑有生者非斑也皆疹耳其狀如蚊蟲咬小點而赤是也故其生多矣今此癮疹如錦紋者疹也非斑也以斑即是疹亦非也謂表虛里實者亦非也如上所言豈獨兩症而已乎吳綬曰凡發斑有六一曰傷寒二曰時氣三曰溫毒四曰陽毒五曰內傷寒六曰陰症一曰傷寒發斑者蓋因當汗不汗當下不下熱毒蘊於胃中乃發斑也千金方云紅赤者為胃熱紫赤者為熱甚紫黑者為胃爛也故赤斑五死一生黑斑十死一生大抵鮮紅起發者吉雖大亦不妨但忌稠密成片紫赤難治雜黑尤難也凡斑既出須得脈洪數有力身暖足溫易治脈沉小足冷元氣弱難治凡斑欲出未出之際且與四味升麻湯先透其毒若脈弱倍加人參食少大便不實倍用白朮若斑已出則不宜再申發也又不可發汗汗之更增斑爛又不宜早下下之則斑毒內陷也如脈紅數熱盛煩渴者人參化斑湯若欲消斑毒犀角元參湯大青四物湯如斑毒內甚心煩不得眠錯語呻吟者黃連解毒湯加元參升麻大青犀角之類熱甚煩渴喘咳者解毒合化斑湯若斑勢稍退內實不大便譫語有潮熱者大柴胡加芒硝或調胃承氣如未可下有潮熱煩渴者且與小柴胡去半夏加山梔黃連黃柏花粉或加大青如無代以青黛大抵解胃熱胃爛之毒必以黃連大青犀角元參升麻石膏知母黃芩山梔黃柏之類要在審察病情合宜而用之二曰時氣發斑者乃天行時疫之氣也感之則憎寒壯熱身體拘急或嘔逆或喘咳或胸中煩悶或躁熱起臥不安或頭痛鼻乾呻吟不得眠此皆斑候也先用紙燃燈照看病人面部胸膛四肢背心有紅點起者乃發斑也易老曰凡大紅點發於皮膚之上者謂之斑小紅靨行於皮中不出起者謂之疹疹輕而斑重也大抵一發鮮紅稀朗者吉若一發如針頭稠密紫黑者凶雜黑者不治有來勢急者發熱一二日便出斑來勢緩者發熱四五日方出凡治必察病人元氣虛實脈之有力無力為主若脈微弱元氣虛者必先以三白湯加人參以助真氣次察斑欲出未透者升麻葛根湯如胃弱人虛者升麻解毒湯四君子湯合用名曰升君湯也若斑不透者直指方加紫草茸若疹斑初出有表症憎寒壯熱頭痛骨疼四肢拘急胸中滿悶者用三因加味羌活散或加紫草若斑稠密咽喉不利犀角消毒飲元參升麻湯凡斑出脈數大煩渴者人參化斑湯發熱或潮熱不解者小柴胡隨症增損或人參敗毒散皆可出入用之斑出嘔逆者必用陳皮半夏生薑黃連之類喘咳不止者必用二母栝蔞黃芩石膏之類咽痛者必用連翹牛蒡元參升麻桔梗甘草之類斑出而毒盛者必用犀角大青元參山梔石膏黃連黃芩黃柏知母之類北方謂之紅眼兒瘡氣又避忌香臭恐觸之也凡斑已出未出切不可便投寒涼之劑以攻其熱並飲涼水等恐傷胃氣先作嘔吐也又不可發汗攻下虛其表裡之氣其害尤甚也若脈弱者必先有房事要在審問之如有夾陰者必先助真氣為要也三曰溫毒發斑者活人云初春病人肌肉發斑癮疹如錦紋而咳心悶但嘔者是也冬時觸冒寒毒至春始發初病在表或已汗吐下而表症未罷毒氣未散以此發斑宜用黑膏又有冬日溫暖人感乖戾之氣冬末即病或春被積寒所折毒不得泄至天暖溫毒始發斑疹如錦紋而咳心悶嘔清汁宜葛根橘皮湯大抵冬應大寒而反大暖人感此不正之氣而為病者名冬溫若發斑即名溫毒治例與時氣同但溫毒發斑尤甚耳黑膏元參升麻湯犀角大青湯人參化斑湯選用凡溫病發於春熱病發於夏若出斑者治與傷寒同也此由怫鬱之熱自內發外亦非輕也四曰陽毒發斑者其候狂言下利咽痛面赤斑如錦紋者陽毒升麻湯大青四物湯人參化斑湯梔子仁湯選用五曰內傷寒者因暑月得之先因傷暑次食冷物並臥冷處內外皆寒逼其暑火浮遊於表而發斑也海藏治完顏小將軍病寒熱間作有斑三五點鼻中微血出兩手脈沉澀皮膚按之無大熱此內傷寒也與調中湯數服而愈凡夾暑者加香薷扁豆六曰陰病發斑者略例曰陰症發斑亦出胸背手足但稀少而淡紅也此人元氣素虛或先因欲事內損腎氣或誤用涼藥太過遂成陰症伏寒於下逼其無根失守之火聚於胸中上獨熏肺傳於皮膚而發斑點但如蚊蝨咬傷非大紅點也與調中溫胃加白芍茴香寒甚脈微者大建中湯則真陽自回陰火自降而愈此治本不治標也大抵發斑身溫足暖脈數大者為順身涼足冷脈微弱者為逆也凡治斑不可專以斑治必察脈之浮沉病之虛實而治之則為善治斑也張介賓曰發斑之由雖分數種然總由寒毒不解而然如當汗不汗則表邪不解當下不下則里邪不解當清不清則火邪不解當補不補則無力不解或下之太早則邪陷不解或陽症誤用溫補則陽亢不解或陰症誤用寒涼則陰凝不解凡邪毒不解則直入陰分乃致液涸血枯斑見肌表此實毒邪固結營衛俱劇之症也但斑有微甚勢有重輕輕者只在四肢重者乃見胸腹輕者色淡而隱重者色赤而顯若見黑斑或大便自利或短氣或二便不通則十死九矣凡病傷寒而汗下溫清俱不能解及足冷耳聾煩悶咳嘔者便是發斑之候凡傷寒之邪本自外而入深入不解則又自內而出此其表裡相乘勢所必至原非表虛症也但使內外通達必由表而解矣即如犀角地黃湯乃治斑之要藥人知此湯但能涼血清毒而不知此湯善於解表散邪若用之得宜則必通身大汗熱邪頓解何為不可汗耶由此言之則凡脈數無汗表症俱在者必須仍從解散凡治發斑須察表裡如瘟疫不解熱入血室舌焦煩熱發斑者犀角地黃湯內外俱熱陽明狂躁大渴發斑者白虎湯陽毒赤斑狂言見鬼者陽毒升麻湯疫癘發斑大熱而躁者三黃石膏湯火鬱於經寒邪不解脈仍滑數而發斑者一柴胡飲陽明外邪陽毒不解者升麻湯脾腎本虛外邪不解而發斑者五柴胡飲陽明表邪不解溫熱發斑者柴胡白虎煎溫熱毒盛咽痛發斑者元參升麻湯陰虛水虧血熱發斑者玉女煎陰虛血燥大熱大渴發斑者歸芍飲內虛外熱陰盛格陽發斑者大溫中飲太陽陽明惡熱大便祕結邪毒在腑發斑者調胃承氣凡本非陽症妄用寒涼者每令人泄瀉邪陷不解余嘗用大溫中飲理陰煎之類解寒托邪始得大汗汗後邪解多有見赤斑風餅隨症而出隨出隨沒頃刻即愈活者多人凡寒毒為斑即此可見使內托無力則此毒終無出期日深日甚難乎免矣此理甚微不可不察陶華曰發斑者大熱則傷血血熱不散裡實表虛熱乘虛出於皮膚而為斑也輕則如疹子重則如錦紋或本屬陽誤投熱藥或當汗不汗當下不下或汗下未解皆致此陳士鐸曰傷寒發症死症也然而斑亦不同有遍身者有止心窩者遍身症似重而反輕心窩症似輕而實重蓋遍身內熱已盡發於外心窩熱存於心中而不得出必須用化斑藥以解其熱毒之在中一方最神名起斑湯元參三兩當歸一兩荊芥花粉各五錢升麻黃連茯神各三錢甘草一錢煎服火毒結於內必須盡情發出然內無血以養心則心中更熱火毒益熾而不能外越也故用元參當歸滋心中之血黃連涼心中之火花粉消心中之痰然不開關以散之則火內藏而不得泄故又用升麻荊芥以發之甘草茯神以和之自然引火外出而不內蓄火既外越斑亦漸消又何至於喪命哉鰲按發斑症或因溫毒或因熱病皆由陽邪內蘊熱毒之氣不得宣泄病至五六日或七八日必大發熱無汗面赤煩渴心悶心悶尤切要然後斑出大約頭面胸腹間先發肌膚內或細如蚊迹或大如米豆便隱隱於皮膚之間一半日便出皮膚之外甚者浮腫相連如雲片如錦紋其色以紅潤鮮明者為佳紫色者熱毒較重黑色邪毒內陷便為九死一生之症治法於初發皮膚之時急用化斑湯透發之以解毒清熱邪毒內陷者羚羊角散大青湯元參解毒湯犀角解毒湯選而用之如或天氣暄暖兼用防風解毒湯天氣酷熱兼用黃連解毒湯此其大法蘆根石膏亦可斟酌加用凡傷寒發斑雖大約從頭面胸前起但必手足背心一齊透露為妙凡有一處不透毒必內陷遂有棘手之膚故前提綱雖引仲景陽毒條論其實論中只言面赤斑斑如錦紋並未嘗及遍身上下然只引以為緣起而非傷寒發斑正文參看諸前賢議論自得精詳附録三陽治法總要繆希雍曰太陽病其症發熱惡寒惡風頭痛項強腰脊強遍身骨痛脈雖浮洪而不數多不傳經煩躁脈數急者是欲傳經宜先發汗以解表邪其藥以羌活湯為主羌活三錢前胡葛根各二錢甘草八分生薑三片棗一枚杏仁九粒秋深冬月應用此方亦可量加紫蘇蔥白如冬月嚴寒感邪即發服此藥不得汗本方加麻黃一錢生薑四片共前七片得汗勿再服如病人自覺煩躁喜就清涼不喜就熱兼口渴是即欲傳入陽明也若外症頭疼遍身骨疼不解或帶口渴鼻乾目疼不得臥即系太陽陽明症羌活湯中加石膏知母麥冬大劑與之得汗即解如自汗煩躁頭疼遍身骨疼不解者羌活一錢桂枝七分石膏一兩二錢麥冬六錢知母三錢竹葉一百二十片白芍二錢甘草八分如冬月即病太陽症惡寒畏風頭疼遍身骨疼自汗不渴宜用桂枝八分白芍二錢甘草一錢棗三枚薑一片太陽病不解熱結膀胱其人如狂血自下下之愈其外症不解者不可下當先解表表症罷少腹急結者乃可下之桃仁承氣湯無蓄血症大承氣湯正陽陽明病者胃家實熱是也其症不大便自汗潮熱口渴咽乾鼻乾而嘔或乾嘔目眴眴不得眠畏人聲木聲畏火不惡寒反惡熱或先惡寒不久旋發熱甚則譫語狂亂循衣摸床脈洪大而長宜急解其表用竹葉石膏湯大劑與之不嘔無汗與葛根湯亦須大劑若表症已罷脈緩小小便利是病解矣若表症解後邪結於裡大便祕小便短赤宜用調胃承氣湯或小承氣湯下之下後按其腹中不作痛而和病即已解如作痛是燥屎未盡也再用前藥下之以腹中和二便通利為度陽明病不能食若其人本虛勿輕議下陽明病頭眩咳而咽痛者用葛根甘草桔梗麥冬四味濃煎數數與之陽明病無汗小便不利心中懊憹者當發黃急用梔子麥冬淡豆豉大劑濃煎與之如已見身黃急加茵陳為君主之陽明病衄血此緣失於發汗宜用荊芥蒲黃側柏葉各二錢葛根生地各三錢麥冬五錢丹皮錢半茅根二兩濃煎與之兼飲童便陽明病心下硬滿者此邪未入於腹中慎勿下之用竹葉石膏湯加栝蔞一個搗碎桔梗二錢黃連一錢陽明病邪結於裡汗出身重短氣腹滿而喘潮熱手足濈然汗出者此大便已硬也六七日以來宜下之用小承氣不行換大承氣勿大其劑若大便不硬者慎勿輕下陽明病發汗不解腹急者亟下之傷寒六七日目中不了了睛不和無表症大便難承氣湯下之陽明病下之早外有熱手足溫不結胸心中懊憹不能食但頭汗出梔子豉湯陽明病但潮熱大便溏胸滿不去者小柴胡湯去人參加黃連栝蔞陽明病自汗出或發汗後小便利津液內渴大便難硬不可攻之須候其自欲便或用蜜導膽導通之大下後六七日不大便煩不解腹滿痛本有宿食宜再用承氣湯下之食谷欲嘔屬陽明非少陽也胸中煩熱者竹茹湯主之竹茹三錢麥冬五錢枇杷葉三大片蘆根三兩內無熱症者小便利口不渴此為陽明虛也吳茱萸湯主之吳萸二錢人參三錢生薑錢半棗三枚水煎日三服凡陽明病多汗津液外出胃中燥大便必硬硬則譫語小承氣湯若一服譫語止者勿再服陽明病譫語發潮熱脈滑而數者小承氣湯服藥後腹中轉氣者更一服若不轉氣勿更與若服後次日不大便脈反微澀者裡虛也為難治勿再下陽明病下血譫語者此為熱入血室汗止在頭用荊芥葛根各三錢黃芩丹皮各錢半麥冬五錢生蒲黃二錢濃煎童便對飲之陽明病脈浮緊咽燥口苦腹滿而喘發熱汗出惡熱身重若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯若渴欲飲水舌燥者白虎加人參湯若脈浮發熱口渴小便不利者豬苓湯陽明病協熱下利者六一散心下痞者以黃連栝蔞湯調服脈浮遲表熱裡寒下利清穀四逆湯趺陽脈浮而澀小便數大便硬其脾為約麻子仁丸每用十丸日三服陽明實則譫語虛則鄭聲鄭聲者重語也直視譫語喘滿者死下利者亦死發汗多若重發其汗譫語脈短者死脈和者不死若吐若下後不解不大便五六日或至十餘日日晡發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死澀者陽症見陰脈也微者但發熱譫語大承氣下之利勿再服陽明病發狂棄衣而走登高而歌此陽明實也以承氣亟下之如便不結大劑白虎湯灌之石膏四兩麥冬二兩知母兩半加大青一兩甘草七錢太陽陽明病協熱下利者六一散黃連湯調服太陽陽明並病六七日表症仍在其人發狂者以熱在下焦小腹當硬滿小便自利下其血乃愈桃仁承氣湯又二陽並病太陽症罷潮熱汗出大便難譫語者大承氣湯少陽病其症口苦咽乾目眩往來寒熱胸脅痛胸滿或痛耳聾脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語胃和者自愈不和則煩而悸傷寒三日少陽脈小者欲已也凡太陽病不解傳入少陽者脅下硬滿乾嘔不能食往來寒熱未經吐下脈沉緊者與小柴胡湯日三服柴胡二錢四分人參黃芩甘草生薑各九分半夏錢半大棗二枚加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚若心下痞滿去大棗加牡蠣二錢半若渴者去半夏加人參花粉若腹中痛者去黃芩加白芍三錢若心下悸小便不利去黃芩加茯苓二錢若不渴外有微熱者去人參加桂一錢夏勿用溫覆取微汗愈若咳者去參棗加五味一錢少佐乾薑陽明少陽並病必下利脈滑而數有宿食也承氣湯下之若吐下發汗溫針譫語柴胡湯症罷此為壞病知犯何逆以法治之三陽合病脈大上關上但欲睡眠目合則汗藥用百合一兩麥冬五錢炙草一錢知母白芍花粉各二錢制龜甲三錢竹葉五十片三陽合病腹滿身重譫語遺尿白虎湯加百合傷寒六七日無大熱其人煩躁者此為陽去入陰故也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪之故也附録理傷寒條論朱撝曰養生至寶書云近穢氣觸真氣近死氣亂生氣深有旨哉孫真人云乘馬遠行至暮當沐浴更衣方可近嬰見處所若感其氣則為急驚風搐又曰步踐糞穢之履勿使近嬰兒若感其氣則為天吊傷寒大汗將出當以艾灸席隅以避其氣不然感其汗氣則傳染矣所以多染侍奉勞役之人者由其神虛氣怯易為擾亂故也如剝死馬者感其毒氣而為馬氣之疾其理同焉以上汗氣傳染或曰傷寒只傳足經不傳手經何也曰傷寒之邪多於足經而其病甚少於手經而其病微故不特言手經但寄於足經而已手足經辨外有風寒暑濕內有飢飽勞逸或曰勞役非也勞倦也逸間逸也西山記曰久勞則安間以保極力之處久逸則導引以行積滯之氣內外傷辨夫寒者天地殺厲之氣也秋之霧露冬之霜雪皆寒邪也是以辛苦之徒起居不節飲食不時感霧露之氣則邪淺感霜雪之氣則邪深感而即病名曰傷寒不即病者寒邪藏於肌肉之間伏於榮衛之內至春因溫暖之氣而發名溫病至夏因暑熱之氣而作名熱病一理而已若疫癘稍有不同者蓋因春宜溫而反涼夏宜熱而反冷秋宜涼而反熱冬宜寒而反溫四時不正之氣也感春夏不正之氣為溫疫感秋冬不正之氣為寒疫其經絡傳受表裡受症與傷寒同俗云時氣病經總之曰傷寒所以謂大病者害人甚速也軒岐後得其治法之祕者仲景一人守真先生不遵桂枝發表之法自制雙解通聖辛涼之劑非不同也時有異也五運六氣有所更世態居民有所變天以常靜人以常動動屬陽靜屬陰清平之世同水化也雖有辛熱之藥不生他症擾攘之世同火化也若用辛熱則發黃出斑成壞病矣蓋人內火既動外火又侵所以辛熱發汗不如辛溫辛溫發汗不如辛涼以辛熱發汗輕者必危重者必死可不慎哉理傷寒總論
