body:
  text: 卷七過經不解綱仲景曰太陽病過經十餘日反二三下之後四五日柴胡症仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯則愈目李梴曰傷寒六日傳經已遍七日當解至十三日以上不愈謂之過經汗下失宜以致邪氣流連不已神昏譫語胸滿潮熱隨其表裡症見而調之或從輕再汗再下如脈亂髮躁尺寸陷者危如脈緩安睡邪未盡者正未復耳參胡芍藥湯調之有大便下利而脈和者諸醫以丸藥下之停留餘熱凡過經氣虛或加異氣宜與外症參看喻昌曰過經不解者由七八日已後至十三日已後過一候二候猶不痊解也然邪在身中日久勢必結聚於三陽太陽為多少陽次之陽明又次之及至三陰則生死反掌不若此之久持矣程郊倩曰過經十餘日而不知太陽症有未罷反二三下之因致變者多矣後四五日柴胡症仍在未有他變本當行大柴胡兩解表裡但其邪屢因誤下而深入即非大柴胡下法所能服故必先用小柴胡提其邪出半表然後乃用大柴胡始合法也綱仲景曰太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不極者不可與但欲嘔胸中痛微溏者此非柴胡症以嘔故知極吐下也目喻昌曰此條有二辨若曾經大吐下者邪從吐解直已入里可用調胃承氣之法若未經吐下但欲嘔胸中痛微溏者是痛非吐所傷溏非下所致調胃之法不可用矣豈但調胃不可用即柴胡亦不可用以邪尚在太陽高位徒治陽明少陽而邪不解耳解太陽之邪仲景言之已悉故此但示其意也若其人能嘔則是為吐下所傷而所主又不在太陽矣綱仲景曰傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡症下之而不得利今反利者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之目喻昌曰二條俱見微利之症難辨其內虛內實上條胸脅滿而嘔邪湊少陽之表故欲下之必用柴胡為合法若以他藥下之表邪內入即是內虛此條原無表症雖丸藥誤下其脈仍和即為內實也按仲景下法屢以丸藥為戒惟治太陽之脾約用麻仁丸因其人平日津枯腸結必俟邪入陽明下之恐無救於津液故雖邪在太陽即用丸藥之緩下潤其腸俾外邪不因峻攻而內陷也此等處亦須互參再按傷寒以七日為一候其有二三候不解者病邪多在三陽經留戀不但七日傳之不盡即十三日二十餘日尚有傳之不盡者若不辨症徒屈指數經數候汗下展轉差誤正虛邪湊愈久愈難為力所以過經不解當辨其邪在何經而取之仲景云太陽病頭痛至七日以上自愈者以行其經盡故也即內經七日太陽病衰頭痛少愈之旨可見太陽一經有行之七日以上者其欲再作經者針足陽明使經不傳則愈以太陽既羈留多日則陽明少陽亦可羈留過經漫無解期矣所以早從陽明中土而奪之俾其不傳此捷法也若謂六經傳盡復傳太陽必無是理後人墜落成無己阱中耳豈有厥陰兩陰交盡於裡復從皮毛外再入太陽之事耶請破此大惑合病綱仲景曰三陽合病腹滿身重難以輾側口不仁而面垢遺尿發汗則譫語下之則額上出汗手足冷若自汗出者白虎湯主之三陽合病脈浮大在關上但欲睡眠合目則汗太陽與陽明合病喘而胸滿者不可下麻黃湯主之太陽與陽明合病必自下利葛根湯主之太陽與陽明合病不下利但嘔者葛根加半夏湯主之太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之陽明少陽合病必自下利其脈不負者順也負者失也互相剋賊名為負少陽負趺陽者為順也目李梴曰或一陽先病一陽隨病或二陽同病或三陽同病不傳者謂之合病自利者下利溏泄三陽合病寒邪盛而裡氣不和也氣行下則利氣逆上則嘔太陽合陽明自利惡寒升麻葛根湯惡熱者白虎湯太陽合少陽自利者黃芩湯並加半夏生薑陽明少陽自利最重小柴胡合升麻葛根湯有宜下者本太陽病因汗下滲亡津液胃腑燥實轉屬陽明謂之太陽陽明脾約丸潤之本少陽病因汗滲熱入胃腑大便燥者大柴胡微下之本陽明經病熱盛傳入胃腑謂之正陽陽明乃本經自病也宜調胃承氣湯從中治之蓋太陽少氣少陽少血惟陽明居二陽之中氣血俱多所以從中治陽明而不敢犯太陽少陽也又三陽合病面垢等一條白虎加人參湯主之不可汗下亦從中治也有宜汗者表症頭疼惡寒未除為太陽尚未過經尤宜發汗如太陽陽明喘而胸滿者麻黃湯太陽少陽麻黃合小柴胡湯通用九味羌活湯加石膏知母枳殼蓋在經則汗過經則下也柯琴曰首條本陽明病而略兼太少也雖三陽合病而陽明症居多則當獨取陽明矣無表症則不宜汗胃不實則不宜下此陽明半表裡症首條論病狀及治方二條詳病脈探病情究病機必兩條合參而合病之大要始得三條三陽俱受氣於胸中而部位則屬陽明若喘屬太陽嘔屬少陽故胸滿而喘者尚未離乎太陽雖有陽明可下之症而不可下如嘔多雖有陽明可攻之症而不可攻亦以未離乎少陽也四條不言兩經相合何等症但舉下利而言是病偏於陽明矣五條太陽陽明合病太陽少陽合病陽明少陽合病必自下利則下利似乎合病當然之症今不下利而嘔又似乎與少陽合病矣於葛根湯加半夏兼解少陽半里之邪便不得為三陽合病六條兩陽合病陽盛陰虛陽氣下陷入陰中故自下利太陽與陽明合病是邪初入陽明之裡太陽與少陽合病是邪初入少陽之裡七條兩陽合病必見兩陽之脈陽明脈大少陽脈弦此為順脈若大而不弦負在少陽弦而不大負在陽明是互相剋賊皆不順之候鰲按合病並病本兼陽明少陽今但列太陽經者從其先也既列太陽自不必復入陽明少陽款中矣特志於此並病綱仲景曰本太陽病初得時發其汗汗先出不徹因轉屬陽明也傷寒轉屬陽明者其人濈然微汗出也太陽與少陽並病脈弦頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語若譫語不止者刺期門太陽少陽並病心下硬頭項強而痛者當刺大椎肺俞肝俞慎勿下之太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩目許叔微曰問三陽有合病並病何之答曰脈浮大而長頭疼腰痛肌熱目疼鼻乾者合病也太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒者並病也三陽皆有合病惟三陰無合病不可不知李梴曰並者催併逼迫之意始初二陽合病後一陽氣盛一陽氣衰並歸一經獨重初症亦不解罷陽明並太陽者太陽症未解陽明症又至麻黃湯合升麻如太陽症重加太陽經藥陽明症重加陽明經藥後仿此少陽並太陽者太陽症未解少陽症又至麻黃湯合小柴胡湯頭痛項強眩冒如結胸狀者亦宜通用九味羌活湯少陽並陽明者為木剋土難治小柴胡湯合升麻葛根湯或柴胡升麻湯救之是並病在表者皆可汗若太陽症罷乃入胃腑者謂之傳經症非並病也宜酌量攻下古云三陰無合病然三陰亦自有相合並者但非兩感必無陰經與陽經相合為病之理陶華曰太陽陽明並病者如本太陽病發汗則汗出不徹因轉屬陽明續自微汗出不惡寒是並歸陽明也太陽症尚在桂枝麻黃合半湯太陽症也大小承氣則是陽明症也柯琴曰並病與合病異合則一時並見並則以次相乘如太陽之頭項強痛未罷遞見脈強眩冒心下痞硬是與少陽並病更見譫語即三陽並病矣太陽陽明並病太陽症未罷者從太陽而小發汗太陽病已罷者從陽明而下之其機於惡寒發熱而分也然陽明之病在胃家實太陽陽明合病喘而胸滿者不可下恐胃家未實耳附錄今時皆合病並病論張介賓曰合病者乃二陽三陽同病病之相合者也並病者如太陽先病不解又併入陽明少陽之類也觀仲景曰二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明若太陽症不罷者不可下按此云轉屬陽明則自太陽而來可知也云太陽症不罷則二經皆病可知也凡並病者由淺而深由此而彼勢使之必然也此合病並病之義不知者因以為罕見之病又豈知今時之病皆合病並病哉余自臨症以來初未見有單經挨次相傳者亦未見有表症悉罷止存里症者若欲依經如式求症則未見有如式之病而方治可相符者是皆不知合病並病之義耳今列其大略如下合病者乃二經三經同病也如初起發熱惡寒頭痛此太陽之症而更兼不眠即太陽陽陰合病也若兼嘔惡即太陽少陽合病也若發熱不眠嘔惡即陽明少陽合病也若三者俱全便是三陽合病而其病必甚三陽與三陰本無合病蓋三陽為表三陰為里若表裡同病即兩感也故凡陰陽俱病者必以漸相併而至皆並病耳此亦勢所必至非合病兩感之謂合病與並病不同合病者彼此齊病也並病者一經先病然後傳及他經而皆病也如太陽先病發熱頭痛而後見目痛鼻乾不眠等症此太陽並於陽明也或後見耳聾脅痛嘔而口苦等症此太陽並於少陽也或後見腹滿嗌乾等症此太陽並於太陰也或後見舌乾口燥等症此太陽並於少陰也或後見煩滿囊縮等症此太陽並於厥陰也若陽明並於三陰者必鼻乾不眠而兼三陰之症少陽並於三陰者必耳聾嘔苦而兼三陰之症陰症雖見於里而陽症仍留於表故謂之並凡患傷寒而終始熱有不退者皆表邪之未解耳但得正汗一透則表裡皆愈豈非陰陽相併之病乎今之傷寒率多並病若明此理則自有頭緒矣治此之法凡並病在三陽者自當解三陽之表如邪在太陽者當知為陽中之表治宜輕清邪在陽明者當知為陽中之裡治宜厚重邪在少陽者當知為陽中之樞治宜和解此皆治表之法也至於病入三陰本為在裡如太陰為陰中之陽治宜微溫少陰為陰中之樞治宜半溫厥陰為陰中之陰治宜大溫此陰症之治略也然病雖在陰而有兼三陽之並病者或其熱邪已甚自宜清火或其表尚未解仍當散邪蓋邪自外入則外為病本拔去其本則里病自無不愈者此所以解表即能和中也若表邪不甚而里症為急又當先救其里以表裡之氣本自相關惟表不解所以里病日增惟里不和所以表病不散此所以治里亦能解表也但宜表宜里自有緩急先後一定不易之道而非可以疑似出入者要在乎知病之藪而獨見其必勝之機耳此又陰陽並病之治法也惟是病既在陰必關於臟臟氣為人之根本而死生系之故凡診陰症者必當細察其虛實而補瀉寒熱弗至倒施則今時之治要莫切於此矣兩感傷寒綱仲景曰兩感病俱作治有先後傷寒下之後復下利清穀不止身疼痛者急當救里宜四逆湯後身體疼痛清便自調者急當救表宜桂枝湯目王叔和傷寒論例曰若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰同病則腹滿身熱不飲食譫語三日少陽受之即與厥陰同病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五臟六腑皆受病則營衛不行臟腑不通而死矣朱肱曰龐安常云脈沉大者太陽少陰沉長者陽明太陰沉弦者少陽厥陰諸方書不載兩感脈安常特設以示後人素問熱病論云兩感於寒而病者必不免於死法不過六日黃帝曰有三日而死者何也岐伯曰陽明者十二經脈之長也若三日而氣絕則死矣仲景亦無治法楊士瀛曰活人書五卷序云傷寒惟兩感不治仲景但一說云兩感病俱作治有先後張翼說與仲景同謂如下利清穀身體疼痛急當救里四逆湯身體疼痛清便自調急當救表桂枝湯症治論並活人書解仲景治有先後之說皆云宜先救里內才溫則可醫矣然救表亦不可緩也以上所論並先救里然後救表愚意當消息之如下利不止身體疼痛則先救里如不下利身體疼痛則先救表此亦謂之治有先後也然則兩感亦有可治之理而不可必其成效耳趙嗣真曰仲景論兩感為必死之症而復以發表攻裡之說繼之者蓋不忍坐視而欲覬其萬一之可治也乃活人云救里以四逆救表以桂枝殊不知仲景云太陽與少陽俱病則頭痛為太陽邪盛於表口乾而渴為少陰邪盛於裡也陽明與太陰同病則身熱譫語為陽明邪盛於表不食腹滿為太陰邪盛於裡也少陽與厥陰同病則耳聾為少陽邪盛於表囊縮為厥陰邪盛於裡也三陽之頭痛身熱耳聾救表已自不可三陰之腹滿口乾囊縮而厥不可下乎活人引下利身疼虛寒救里之例而欲施於煩渴腹滿譫語囊縮熱實之症然乎否乎蓋仲景所謂發表者葛根麻黃是也仲景所謂攻裡者調胃承氣是也活人救里則四逆救表則桂枝若用四逆則以火濟火而腹滿譫語囊縮等症何由而除臟腑何由而通營衛何由而行而六日死者可立待也籲兩感雖為不治症然用藥之法助正除邪虛實實虛補不足損有餘之理學者不可不素有一定之理於胸中也李杲曰問兩感從何道而入答曰經云兩感者死不治一日太陽少陰俱病太陽者腑也自背俞而入人所共知之少陰者臟也自鼻息而入人所不知也鼻息通於天故寒邪無形之氣從鼻而入腎為水也水流濕故腎受之經曰傷於濕者下先受之同氣相求耳又云天之邪氣感則害人五臟以是知內外兩感臟腑俱病欲表之則有里欲下之則有表表裡既不能一治故云兩感者死不治然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者猶或可治治之而不救者有矣未有不治而獲生者也予嘗用此間有生者故立大羌活湯以待好生君子吳綬曰兩感必死者乃一日傳二經陰陽俱病也欲治陽而有陰欲治陰而有陽表裡不可並攻故不治也活人有先後之法救里四逆救表桂枝此表裡皆寒急救之法非日傳二經之法也清劃保命集曰內傷於寒外傷於風或內傷於食外傷於風或先傷於濕後傷於風或先傷於風後傷於濕或先傷於寒後傷於風之類此亦內外俱病表裡俱傷此非兩感乃為可治故宜大羌活湯間有生者易老丹溪豈真賢於仲景哉李梴曰兩感者半入於陽半入於陰陰陽兩感臟腑俱病故為必死之症但稟厚而感邪淺者或挾異氣風溫濕溫之類猶可救療所以仲景有治有先後發表攻裡之說法當審其表裡緩急虛實何如如表裡俱急者大羌活湯主之如陽症陽經先受病身體痛而不下利者為表急先以葛根麻黃髮表後以調胃承氣攻裡如陰症陰經先受病身體痛而下利不止者為裡急先用四逆救里後以桂枝救表如陰陽未分者陶氏沖和湯探之古法一日太陽少陰五苓散頭痛加羌防口渴加知柏二日陽明太陰大柴胡湯三日少陽厥陰危甚大承氣湯加芎柴救之活人書不分陰陽專用四逆桂枝先輩皆以為謬大抵兩感脈從陽可治從陰難治張介賓曰病兩感於寒者固為死症細察之亦有緩急可辨若三陽之頭痛身熱耳聾脅痛惡寒而嘔此在表者不得不解於外其三陰之腹滿口渴囊縮譫語此在裡者不得不和其中若其邪自外入而外甚於里者必當以外為主而兼調其內若其邪因虛襲而元氣不支者速宜單顧根本不可攻邪但使元陽不敗則強敵亦將自解其庶乎有望也錢禎曰兩感者本表裡之同病似若皆以外感為言而實有未盡然者正以外內俱傳便是兩感今見有少陰先潰於內而太陽斷之於外者即縱情肆欲之兩感也太陰受傷於裡而陽明重感於表者即勞倦竭力飲食不調之兩感也厥陰氣逆於臟少陽復病於腑者即七情不慎疲筋敗血之兩感也人知兩感為傷寒而不知傷寒之兩感內外俱困病斯劇矣但傷有重輕醫有知有不知則生死系之或謂兩感症不多見者蓋亦見之不廣而義有未達耳其於治法亦在乎知其由而救其本也此言最切此病誠發人之未發陳士鐸曰傷寒兩感隔經相傳每每殺人如一日宜在太陽二日陽明三日少陽四日太陰五日少陰六日厥陰此順傳經也今一日太陽即傳陽明二日陽明即傳少陽三日少陽即傳太陰四日太陰即傳少陰五日少陰即傳厥陰此過經傳也更有一日太陽即傳少陽二日陽明即傳太陰三日少陽即傳少陰四日太陰即傳厥陰此隔經傳也若一日太陽即傳少陰二日陽明即傳太陰三日少陽即傳厥陰此兩感傳也順傳者原有生機至七日自愈過傳者有生有死隔傳者死多於生兩感傳者三日水漿不入不知人即死今傳二方一救過經傳一救隔經傳過經傳方名救過起死湯柴胡麻黃厚朴知母半夏黃芩各一錢石膏青蒿茯苓各五錢山梔五分當歸三錢水煎服一劑即生蓋過經之傳必然變症紛紜斷非初起之一二日也所以方中不用桂枝散太陽之邪止用麻黃散表傷寒至三四日內熱必甚故以石膏知母為君以泄陽明邪火又用青蒿山梔柴胡以涼散肝火使木不自焚而各經之邪亦不攻自散況又重用茯苓以健脾行濕引火下行盡從膀胱而出之乎且黃芩清肺厚朴逐穢半夏清痰五臟無非生氣矣隔經傳方名救陰起死湯青蒿一兩人參石膏各五錢白芍山梔各三錢柴胡二錢知母半夏甘草各一錢水煎服隔經之傳必至三日而症乃明雖已過陽明而餘火未散故少陰之火助其焰少陽之火失其權若不仍用石膏知母則陽明之火勢不退而少陰之火勢不息也然太陰脾土不為急救則火氣凌亢何以能生故用人參以助生氣又恐厥陰太燥以克脾故用柴芍梔蒿以涼散木中之邪況半夏清痰甘草和中起死回生實非虛語故一見有隔經之傳即以此方救之必能轉敗為功也至青蒿不獨息肝火尤能瀉陽明之焰且性靜而不動更能補陰也三日少陽與厥陰兩感相傳方名救臟湯麥冬三兩元參白芍各二兩人參當歸各一兩花粉三錢荊芥二錢水煎服多用當歸者助肝膽以生血也多用麥冬者救肺氣之絕以制肝膽之木使火不旺而血易生斯胃氣有養臟腑可救其壞也傷寒壞病綱仲景曰太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈症知犯何逆隨症治之目李梴曰傷寒病未退重感寒變為溫瘧重感風變為風溫重感濕熱變為溫毒重感疫氣變為溫疫又太陽病經汗吐下溫針不解過經不解皆名壞病或醫人不辨陰陽差謬汗下使病不解壞症亂經久而不瘥視其犯何逆以治之表症多者知母麻黃湯半表者小柴胡湯餘熱不解者參胡芍藥湯危急者奪命散諸藥不效者則用鱉甲散救之柯琴曰三日非吐下溫針之時治之不當故病仍不解壞病者即變症也若誤汗則有遂漏不止心下悸臍下悸等症妄吐則有飢不能食朝食暮吐不欲近衣等症妄下則有結胸痞硬協熱下利脹滿清穀等症火逆則有發黃亡陽圊血奔豚等症是桂枝症已罷故不中與綱仲景曰本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈弦細者與小柴胡湯若已吐下發汗溫針譫語柴胡症罷此為壞病知犯何逆以法治之目趙嗣真曰仲景論中所言壞病者以太陽病誤汗吐下後虛煩結胸痞氣吐後內煩脹滿等症是也此正謂桂枝不中與小柴胡症罷者曷嘗指異氣之病如活人書所謂異氣為壞病之說乎仲景又云更感異氣變為他病者即索矩所謂二氣三氣雜合為病是也以其未可定名而非有名四種溫病之比故以變病名之且四種溫病仲景以為冬傷於寒至春變為溫病溫病未已重遇於邪變為溫瘧風溫溫毒溫疫病未嘗壞故以變名之一曰壞病一曰變症名目自是不同可見異氣非為壞病也審矣假如溫瘧果為壞病則仲景不言小柴胡症罷也請人思焉而自悟乎王履曰太陽外症不解風寒從樞而入少陽矣若見少陽諸症尚可用柴胡治之若誤治後不見半表半裡症而譫語是將轉入陽明而不屬少陽矣故柴胡不中與之然亦不得以譫語即為胃實也當察何逆溫病綱仲景曰太陽病發熱而渴不惡寒者為溫病目李杲曰冬傷於寒者冬行秋令也當寒而溫火勝而水虧矣水既已虧則所勝妄行土有餘也所生受病木不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病使民腠理開泄少陰不藏惟房室勞傷辛苦之人得之若此者皆為溫病所以不病於冬而病於春者以寒水居卯之分方得其權大寒之令復行於春腠理開泄少陰不藏房窒勞傷辛苦之人陽氣泄於外腎水虧於內當春之月時強木長無以滋生化之源故為溫病耳故君子周密於冬少陰得藏於內腠理以閉拒之雖有大風苛毒莫之能害何溫病之有人肖天地而生冬時陽氣俱伏於地之下人之陽氣俱藏於腎之中人能不擾乎腎則六陽安靜於內內既得安邪無自入矣此傷寒之源非天傷人乃人自傷也傷於寒者皆為病熱為傷寒乃熱病之總稱故曰傷寒為熱邪明矣六陰用事於冬陽氣在內周密閉藏可矣反勞動之而泄於外時熱已傷於水矣至春之時木當發生氣已外泄孰為鼓舞腎水內竭孰為滋養此兩者同為生化之源源既已絕水何賴以生乎身之所存者獨無熱也時強木長故為溫病矣王履曰有病因有病名有病形辨其因正其名察其形三者俱當庶可以言治吾試即傷寒溫病熱病而說之如傷寒以病因而為病名者也溫病熱病以天時與病形而為病名者也二者皆起於感寒或者通以傷寒稱之通以傷寒稱者原其因之同耳用藥則不可一例施也夫感寒於冬即發於寒冷之時而寒邪在表閉其腠理故非辛甘溫之劑不足以散之此仲景桂枝麻黃等湯所必用也溫病熱病後發於暄熱之時怫熱自內達外郁其腠理無寒在表故非辛涼或苦寒或酸苦之劑不足以解之此後人所制雙解散大黃湯千金湯防風通聖散之類兼治內外者之所可用也夫即病之傷寒有惡風惡寒之症者風寒在表而表氣受傷故也後發之溫病熱病有惡風惡寒之症者重有風寒新中而表氣亦受傷故也若無新中之風寒則無惡風惡寒之症故仲景曰太陽病發熱而渴不惡寒者為溫病溫病如此則知熱病亦如此是則不渴而惡寒者非溫熱病矣然或有不因新中風寒亦見惡風惡寒之症者蓋病人表氣本虛熱達於表又重傷表氣故不禁風寒非傷寒惡風惡寒也但衛虛則惡風營虛則惡寒耳且溫病熱病亦有先見表症而後傳裡者蓋怫熱自內達外熱鬱腠理不得外泄遂復還里而成可攻之症非如傷寒從表而始也或者不悟此理乃於春夏溫熱病而求浮緊之脈殊不知緊為寒脈有寒邪則見之無寒邪則不見也其溫熱病或見脈緊乃重感不正之暴寒與內傷過度之冷食也豈其本然哉又或不識脈形但見弦便呼為緊斷為寒而妄治蓋脈之盛而有力者每每兼弦豈可錯認為緊而斷為寒夫溫病熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者良由怫熱在內也或左手盛或浮者必有重感之風寒否則非溫病熱病是暴感風寒之病耳凡溫病熱病若無重感表症雖間見而里病為多故少有不渴者當治裡熱為主而兼解表亦有治里而表自解者每見醫治溫熱病雖誤攻其里亦無大害誤發其表變不可言此足明其熱之自內達外矣間有誤攻裡而致大害者乃春夏暴寒所中之疫症純在表未入於裡者不可與溫熱病同論夫惟世以溫熱二病混稱傷寒故每執寒字以求浮緊之脈用溫熱之藥若此者因名亂實戕人之生名其可不定乎又方書多言四時傷寒夫秋冬之傷寒真傷寒也春夏之傷寒寒疫也與溫病熱病自是兩塗豈可同治雖然傷寒與溫熱病其攻裡之法若果是以寒除熱固不必求異其發表之法斷不可不異也況傷寒之直傷陰經與太陽雖傷不及鬱熱即傷陰經與寒症而當溫者又與寒熱病大不同其可妄治乎乃知一不知二謂仲景發表藥今不可用攻裡藥乃可用嗚呼其可用不可用之理果何在哉若能辨其因正其名察其形治法有不當者乎彼時行不正之氣所作及重感異氣而變者則又當觀其何時何氣參酌傷寒溫熱病之法損益而治之尤不可例以仲景即病傷寒藥通治也張云岐曰傷寒汗下不愈而過經其症尚在而不除者亦溫病也經曰溫病之脈行在裡經不知何經之動隨其經之所在而取之如太陽病汗下後過經不愈診得尺寸俱浮者太陽溫病也如身熱目疼汗下後過經不愈診得尺寸俱大者陽明溫病也如胸脅痛汗下後過經不愈診得尺寸俱弦者少陽溫病也如腹滿嗌乾過經不愈診得尺寸俱沉細者太陰溫病也如口燥舌乾而渴過經不愈診得尺寸俱沉者少陰溫病也如煩滿囊縮過經不愈診得尺寸俱微緩者厥陰溫病也隨其經取之隨其症治之如發斑乃溫毒也龐安常曰溫與熱有輕重之分故仲景云若遇溫氣則為溫病更遇溫熱則為溫毒熱比溫為尤重也若但冬傷於寒至春而發不感異氣名曰溫病此病之稍輕者也溫病未已更遇溫氣變為溫病亦可名曰溫病此病之稍重者也傷寒例以再遇溫氣名曰溫疫又有不應冬月傷寒至春為溫病者此特感春溫之氣可名曰春溫如冬之傷寒秋之傷濕夏之傷暑相同也以此觀之是春之病溫有三種有冬傷於寒至春發為溫病者有溫病未已更遇溫氣而為溫病與重感溫氣相雜而為溫病者有不因冬傷於寒不因更遇溫氣只於春時感春溫之氣而病者若此三者皆可名為溫病不必各立名色只要知其病源之所以不同也李梴曰溫病者春分後有太陽病發熱咳嗽身痛口渴不惡寒其脈弦數不緊右手反盛於左手怫熱在內故也或散諸經各隨其經取之熱病即與溫病同但發在夏至後脈洪數熱渴更甚耳雖因冬時受寒伏於肌骨然人身隨天氣化春分則寒變為溫夏至則寒變為熱所以傷寒惡寒而不渴溫熱不惡寒而渴不惡寒則病非外來渴則自內達表熱鬱腠理不得外泄乃復還里終是里多表少間有惡寒者乃冒非時暴寒或溫熱將發又受暴寒非冬症之甚也當治熱為主而解肌次之亦有專治里而表自解者誤下猶可誤汗則變為嘔噦狂斑而死蓋溫熱在經而不在表安可例用汗法惟兼暴寒者乃可表裡雙解亦不可用冬時辛熱之藥春溫表症天溫升麻葛根湯天寒柴胡桂枝湯太陽合少陽升麻葛根湯合小柴胡湯半表裡小柴胡湯里症大柴胡湯重者一時表裡俱發防風通聖散表裡俱熱大便利者柴苓湯加山梔木通虛煩竹葉石膏湯變雜症者治同傷寒夏熱表症太陽九味羌活湯汗後煩渴脈洪大背惡寒者白虎加人參湯益元散里症大柴胡湯重者一時表裡盛發雙解散熱病脈細無力足冷已得汗而躁甚者此陰脈之極也必死又有冬溫者冬有非時之暖名曰冬溫與春秋暴寒暴溫總謂之時行氣與傷寒相似但脈不浮耳治法大同春溫表症葳蕤湯九味羌活湯入里加大黃重者雙解散輕者加減調中湯治之趙獻可曰夫傷寒二字蓋冬時嚴寒而成殺厲之氣觸冒之而即時病者名正傷寒不即發者寒毒藏於肌膚至春變為溫病至夏變為熱病熱病即暑病熱極似重於溫也然為溫即不得復言寒不惡寒而渴者是也此仲景之文也麻黃桂枝為即病之傷寒設無與溫熱受病之源雖同所發之時則異仲景必別有方治皆已遺失是以至今未明劉守真謂欲用麻黃桂枝必加涼藥於其中以免發黃張子和六神通解散以石膏寒藥中加麻黃蒼朮皆非也蓋麻桂辛熱冬月所宜不宜用於春夏陶氏欲以九味羌活湯謂一方可代三方亦非也羌活湯易老所制乃治感四時不正之氣如春宜溫而反寒夏宜熱而反溫秋宜涼而反熱冬宜寒而反溫又有春夏秋三時為暴寒所折雖有惡寒發熱之症不若冬時肅殺之氣為甚故不必麻黃散寒惟用辛涼通內外而解之況此方須按六經加減法不可全用也不若逍遙散為尤妙真可一方代三方也且余有一法請申之經曰不惡寒而渴者為溫病不惡寒則知表無寒邪曰渴則知腎水乾枯蓋其人素有火冬時冒寒雖傷而不甚惟有火在內寒亦不能深入所以不即發而寒氣藏伏於肌膚自冬至三四月之久火為寒鬱於中亦久將腎水熬煎枯竭至此時強木旺無以滋潤髮生故發熱而渴非有所感冒也海藏謂新邪換出舊邪非也若復有所感表又當惡寒矣余以六味料滋其水以柴胡辛涼舒其木治人皆隨手而應余又因此推廣之凡冬時傷寒者亦是鬱火症若其人無火則為直中矣惟其有火故由皮毛而肌肉而臟腑今人皆曰寒邪傳裡寒變為熱既曰寒邪何故入內而反為熱又何為而能熱耶不知即是本身中之火為寒所鬱而不得泄日久則純熱而無寒矣所以用三黃解毒解其火也升麻葛根即火鬱發之也三承氣即土鬱奪之也小柴胡則木鬱達之也此理甚簡而易只多了傳經六經諸語支離凡雜病有發熱者皆有頭疼項強目痛鼻乾脅痛口苦等症何必拘為傷寒局傷寒方以治之耶余於冬月正傷寒獨麻桂二方作寒鬱治其餘不惡寒者俱作鬱火治此不佞之創論也聞者皆駭然吐舌及閱虞天民正傳云有至人傳曰傳經傷寒是郁病余竊喜以為先得我心又考內經云人傷於寒而傳為熱何也寒氣外凝內郁之理腠理堅緻元府秘密則氣不宣通濕氣內結中外相薄寒盛熱生故人傷於寒轉而為熱汗之則愈則外凝內郁之理可知觀此而余以傷寒為鬱火者不為無據故特著此郁論一篇柯琴曰溫病內外皆熱所以別於中風傷寒之惡寒發熱也此條不是發明內經冬傷於寒春必病溫之義乃概言太陽溫病之症如此若以春溫釋之失仲景之旨矣夫太陽一經四時俱能受病不必於冬人人溫病不必因於傷寒且四時俱能溫病不必於春推而廣之則六經俱有溫病非獨太陽一經也鰲按諸家都以溫病為春溫獨柯氏謂概言太陽溫病之症夫以本條言之首冠太陽病三字其為太陽之症固無疑矣然春溫之病亦多有發於太陽者故俱存其說學者神而明之變而通之可也趙氏醫貫一書語多偏僻惟溫病論中火鬱一篇頗為有旨然其詆守真子和節庵三家仍不免偏執且其以六味加柴胡謂為治溫妙法尤屬大謬若以此治溫病恐十斃六七余取其火鬱之說又恐人誤認其語之皆是故特表之於此溫毒綱仲景曰陽脈洪數陰脈實大者更遇溫熱變為溫毒目成無己曰此前熱未已又感溫熱者也陽主表陰主裡洪數實大皆熱也兩熱相合變為溫毒朱肱曰初春發斑咳嗽為溫毒吳綬曰冬有非節之暖名曰冬溫此即時行之氣也若發斑者又曰溫毒而亦時氣發斑也又傷寒壞病陽脈洪數陰脈實大更遇溫熱變為溫毒其病最重此因前熱多日不解更感溫熱之氣而為病故曰重也若無汗者三黃石膏湯汗之自汗者人參白虎湯主之煩熱錯語不得眠表熱又盛更加柴胡內實大便秘三黃瀉心湯或大柴胡湯加芒硝若斑出如錦紋多難治也宜人參化斑湯元參升麻湯大青四物湯陶華曰溫毒者冬月感寒毒異氣至春始發也表症未罷毒氣未散故有發斑之候心下煩悶嘔吐咳嗽後必下利寸脈洪數尺脈實大為病則重以陽氣盛故耳通用元參升麻湯風溫綱仲景曰發汗已身灼熱者名曰風溫其症脈浮汗出身重多眠目許叔微曰脈尺寸俱浮頭疼身熱常自汗體重其息必喘其形不仁嘿嘿但欲眠者風溫症也復發其汗者死宜葳蕤湯李梴曰太陽病發汗則身涼如發汗身猶灼熱者乃風溫也當春溫氣大行又感風邪所致惟風傷衛四肢緩縱不收者癱瘓惟溫傷氣氣昏而鼻息不利語言蹇澀身熱自汗多眠治在心火肝木二經忌汗下針誤汗則身必灼熱甚則煩渴譫語若下則遺溺針則耳聾惟清肌解表為佳宜葳蕤湯敗毒散或小柴胡加桂枝微汗之渴甚者栝蔞根湯喘者金沸草湯加杏仁細辛五味子誤汗防己黃耆湯譫語獨語直視遺尿者不治樓全善曰其病不獨見於春間故另立風溫門柯琴曰此正與內經伏寒病溫不同處太陽中暑亦有因於傷寒者雖渴而仍惡寒太陽溫病反不惡寒而渴者是病根不因於寒而因於風發熱者病為在表法當汗解然不惡寒則非麻桂所宜矣風與溫相搏發汗不如法風去而熱反熾灼熱者兩陽相熏灼轉屬陽明之兆也溫瘧綱仲景曰脈陰陽俱盛重於陰者變為溫瘧目李梴曰傷寒汗吐下後餘熱未淨重感於寒而變瘧過經舊熱未解新感六淫之氣而變瘧皆曰溫瘧者俱先熱後寒故也寒多熱少或單寒者太陽邪變也柴胡桂枝湯熱多寒少或單熱骨節煩疼者陽明邪變也白虎湯加桂枝寒熱相等或先熱者少陽邪變也小柴胡湯渴者去半夏加花粉知母寒熱大作戰慄汗出不散太陽陽明合病也桂枝石膏湯服此後瘧愈甚者三陽合病也恐傳入陰經急用桂枝黃芩湯如傳入陰分從卯至午發而嘔吐大便閉者大柴胡湯下之從午至酉發而腹滿便閉者大承氣湯下之從酉至寅發而欲狂喜忘便黑者桃仁承氣湯微利之不敢下者梔子升麻湯傷寒雜病瘧不同在此間有挾痰食積嘔吐不食者二陳湯對金飲子尿澀煩渴或因瘴氣不伏水土者五苓散俱加柴芩此等瘧與雜病無大異日久勢發稍緩則截之痰飲在上膈欲吐不吐者瓜蒂赤小豆雄黃等分為末水調五分服之以吐為度或祛邪丸亦好久不愈者勝金丹老瘧丸以消之王肯堂曰凡傷寒壞病前熱未除其脈陰陽俱盛重感寒邪變為溫瘧也寒熱往來口苦胸脅滿者小柴胡湯加芍藥少加桂枝主之熱多者倍用柴胡寒多者倍用桂枝熱盛而煩渴人參白虎湯少加薄桂主之單熱無寒者不用桂枝也但有寒必少佐之如熱多者小柴胡合白虎湯痰多而熱者小柴胡合二陳湯若食少胃弱者加白朮心下痞加枳實黃連脈虛者倍人參口渴者去半夏加花粉邪熱蘊結於裡大便秘實脈滑大有力者大柴胡湯下之若變瘧已正宜與雜病中求之溫疫綱仲景曰陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫目蘇頌曰此前熱未已又感溫氣溫熱相合故變為溫疫也王肯堂曰按叔和傷寒例云傷寒熱病未已再遇風寒濕而各變為一病也何止於溫既曰再遇溫熱變為溫毒矣又曰再遇溫氣變為溫疫是何溫之再遇而有二病之異且疫者特感非時之氣眾人病一般也如冬應寒而反大溫人感冬溫而病則所謂溫疫如春夏應溫熱而反大寒人感暴寒而病則所謂寒疫也何待再遇於異氣耶若云再遇溫氣變為溫疫是傷寒再遇異氣而變病也再遇異氣而變病未必眾病相似安可以疫言傷寒例云陽脈濡弱陰脈弦緊此溫疫之脈也活人書注此脈於冬溫條下是以溫疫冬溫合為一病殊不知冬溫特感非時之氣耳溫疫是傷寒再遇於異氣也豈可合為一病此理未明故書此以俟明哲愚謂感溫熱而為溫毒感溫氣而為溫疫此乃有微甚之分但疫字疑誤恐當作疾字若作疫字則冬溫又何一家長幼病相似也一家病相似方可言疫況此傷寒熱病未已再遇溫氣而病何至一家相似哉附錄寒疫時疫論吳綬曰寒疫乃天之暴寒為病也凡四時之中天令或有暴風寒之作人感之而即病者名曰寒疫其症與正傷寒同但暴寒為輕耳治法若初作頭痛憎寒拘急或嘔逆噁心中脘痞悶或飲食停滯不化或腹中作痛未發熱者藿香正氣散加減一二味主之已發熱者十味芎蘇散汗之若身痛骨節疼而發熱者人參羌活散加蔥白葛根生薑汗之或神術湯亦汗若自汗者不宜再汗九味羌活湯若熱不解或變別症宜從正傷寒條內治之朱肱曰仲景云冬溫之毒與傷寒大異蓋傷寒者傷寒氣而作冬溫者感溫氣而作寒疫者暴寒折人非觸冒之遇其治法不同所施溫涼寒熱之劑亦異不可拘以日數發汗吐下隨症施治要之治熱以寒溫而行之治溫以清冷而行之治寒以熱涼而行之治清以溫熱而行之以平為期不可以過此為大法王肯堂曰時疫者乃天行暴厲之氣流行凡四時之令不正者乃有此氣行也若人感之則長幼相似而病又互相傳染其作與傷寒相似然傷寒因寒而得此乃疫氣不可與寒同論也法當闢散疫氣扶正氣為主若多日不解邪熱傳變何症宜從傷寒變症條內選用惟發散藥則不同凡發散湯劑藿香正氣散芎芷香蘇散人參敗毒散十味芎蘇散十神湯皆可用韓祗和曰春應溫而清氣折之責邪在肝或身熱頭疼目眩嘔吐長幼率相似升麻葛根湯解肌湯四時通用敗毒散夏應暑而寒氣折之責邪在心或身熱頭痛腹滿自利長幼率相似射干湯半夏甘桂湯秋應涼而大熱折之責邪在肺濕熱相搏民多病癉喘咳金沸草散白虎加蒼朮湯病癉發黃茵陳五苓散冬應寒而大溫折之責邪在腎宜葳蕤湯朱震亨曰冬溫為病非其時而有其氣者冬月嚴寒君子當閉藏而反發泄於外專用補中帶表藥陶華曰春分後夏至前不惡寒而渴者為溫病用辛涼之藥微解肌不可大發汗急症見者用寒涼之藥急攻下切不可誤汗誤下當須識此表症不與正傷寒同治里症同夏至後有頭疼發熱不惡寒而渴者為溫病愈加熱者為熱病止用辛涼之藥解肌不宜大汗里症見急攻下表症不與正傷寒同治里症同立秋後霜降前有頭疼發熱不惡寒身體痛小便短者為溫病亦用辛涼之藥加燥以解肌亦不宜汗里症見者宜攻下表症不與正傷寒同暑暍綱仲景曰太陽中熱者暍是也其人汗出惡寒身熱而渴也太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚太陽中暍者身熱疼重而脈微弱此亦夏月傷於水水行皮中所致也目張兼善曰中暍與傷寒相似而異清邪中上濁邪中下風寒濕者皆地之氣傷濁邪所以俱中足經惟暑乃天之氣所以中手少陰心經也其症多與傷寒相似但脈不同耳夫傷寒雖惡寒發熱初病未至煩渴惟暑初病即渴所以異也且傷寒之脈必浮盛中暑之脈必虛弱或弦細或芤遲經曰脈盛身寒得之傷寒脈虛身熱得之傷暑此之謂也至如太陽病項背強𠘧𠘧反汗出惡風若當炎暑豈不與中暍相似惟其不渴故與桂枝加葛根湯凡居夏秋之令炎暑之時必當依經詳審則無差失王好古曰夏月發熱惡寒頭疼身體肢節痛脈洪盛者熱病也冬傷於寒因暑氣而發也治與傷寒同然夏月藥須帶涼如用麻桂青龍三方須加減夏至前桂枝加黃芩夏至後三方俱加知母石膏熱病三日外與前湯不瘥脈仍數邪氣猶在經絡未入臟腑者桂枝石膏湯主之此方夏至後代桂枝症用若三月至夏為晚發傷寒梔子升麻湯可用鰲按夏月熱病而王氏主用麻桂三方殊非良法當斟酌之龐安常曰大抵熱病大熱須得脈洪大有力或滑數有力乃為脈病相應為可治若小弱無力難治若人虛脈弱宜以人參扶其元氣不可但攻其熱暑風者由大熱制金不能平木搐搦不省人事其脈虛浮浮者風也虛者暑也俗名暑風乃相火甚而行令也宜黃連香薷飲加羌活或雙解散加香薷暑脈必虛外症頭疼口乾面垢自汗倦怠或背惡熱甚者迷悶不省而為霍亂吐利痰滯嘔逆腹痛泄利下血斑黃皆是治以清心利小便為主汗多者不利宜白虎湯次分表裡如在表頭痛惡寒雙解散加香薷或十味香薷飲如在半表裡泄瀉煩渴飲水吐逆五苓散熱甚煩渴益元散若表解裡熱半夏解毒湯下神芎丸或老弱人冒暑脈微下利渴而喜溫或厥冷不省人事竹葉石膏湯加熟附冷飲次以來復丹五苓散治之凡夏月暑症不可服諸熱劑致斑毒發黃小便不利悶亂而死慎之戴原禮曰暑病有冒傷中三者輕重之分或腹痛水泄胃與大腸受之噁心者胃口有痰飲此二者冒暑也可與黃連香薷飲或身熱頭疼躁亂不寧或身如針刺此為熱傷肉分當解毒白虎湯加柴胡虛加人參或咳嗽發寒熱盜汗不止脈數熱傷肺經火乘金也此為中暑宜清肺湯柴胡天水散之類張從正曰暑傷五臟為症不同如暑入心則噎昏悶不知人入肝則眩暈頑痹入脾則昏睡不覺入肺則嚏喘痿躄入腎則消渴李杲曰脾胃虛弱遇六七月濕旺汗泄身重短氣四肢痿軟腳敧眼花此腎與膀胱俱竭之狀也況汗大泄則亡津液津者庚大腸所主三伏庚金受囚木無可制故風濕相搏骨節煩疼也夫壬膀胱已絕於巳癸腎水已絕於午今更逢濕旺助熱為邪西北方之寒清絕矣聖人立法夏宜補者為熱傷元氣以人參麥冬五味滋水之源瀉丙火補庚金益元氣也長夏暑熱蒸人損傷元氣四肢困倦精神短少兩腳痿軟早晚則發寒厥日高之後復熱如火乃陰陽氣血俱不足也或心胸痞滿肢節沉疼或氣高而喘身熱而煩小便黃少大便溏而頻或利或渴自汗身重此血先病而氣不病也若濕氣先搏脈必洪緩而遲病雖互換少瘥其天暑濕令則一宜治以清燥或遠行大熱而渴則熱舍於腎故水不勝火發為骨痿此濕熱成痿也或熱厥而陰虛或寒厥而氣虛四肢如火為熱厥四肢冰冷為寒厥寒厥腹中有寒熱厥腹中有熱脾主四肢也虞摶曰暑暍之症變異不等非止歸五臟蓋人之形氣有虛實感有輕重則後時而發至秋成瘧痢是也重則即時而發如張氏所言諸症至有輕變重重變輕亦自感有淺深傳有兼併況人之形志苦樂不一豈為無變異乎四時之症皆然楊士瀛曰東垣論暑熱症候則同冬月傷寒傳變為症之不一彼為寒傷形此為熱傷氣若元氣虛甚受病忽於一時不救者與傷寒陰毒頃刻害人實同故東垣啟是病例大開後人之盲瞶也宜與痿門參看陶華曰中暑脈虛而伏身熱面垢自汗煩燥大渴四肢微冷而不痛用白虎湯痰逆惡寒橘皮湯熱悶不惡寒竹葉石膏湯頭痛惡心煩躁五苓散凡中暑小柴胡加香薷最良脈遲灑然毛聳口齒燥人參白虎湯霍亂煩躁大渴腹痛厥冷轉筋黃連香薷湯治之為要也須冷服熱服反吐瀉也龔信曰傷寒與傷暑所以異者以傷寒傷暑俱有熱若傷暑而誤作傷寒治之則不可蓋暑傷形熱傷氣傷寒則外惡寒而脈浮緊傷暑則不惡寒而脈虛此為異耳治宜小柴胡加知母石膏或人參白虎湯天久淫雨濕令大行蒼朮白虎湯若元氣素弱而傷之重者清暑益氣湯濕痹綱仲景曰太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候其人小便不利則大便反快但當利其小便目李梴曰痹者痛也太陽病脈沉而細關節煩疼皮膚麻木自汗者防己黃耆湯無汗者五積交加散然濕氣四時有之兼風兼熱兼寒者隨症加減兼風者先傷濕而後傷風風在上受濕先下受風濕相搏風在外而濕在內大汗則其氣暴而內邪不能出故風去而濕存濕流入里則病重微汗則其氣緩而內外之邪俱去或濕症去而風症未去者不久自解寒熱身痛麻杏薏甘湯身痛發熱小便不利麻黃湯加蒼朮肩脊腰背強痛者羌活勝濕湯腫痛微喘杏仁湯汗多漢防己湯虛者身重難轉側桂枝湯加白朮身重昏迷自汗失音下利不禁者白通湯加朮草身痛小便不利者甘草附子湯身重走痛者小續命湯去麻黃附子熱而重痛煩渴者敗毒散去柴胡人參加栝蔞小便自利及下利不止者死兼寒者傷寒無汗寒濕相搏而有汗不能周身惟在頭耳身背強者表不利也症與風濕相似滲濕湯主之帶表五積交加散裡寒理中湯加附子寒多浮腫朮附湯妙徐彬曰此論濕之挾風而濕勝以致痹著者謂發熱惡寒太陽病也乃濕勝而疼痛太陽病來邪自表入濕挾風風走空竅故流關節關節者機關腠會之處也風氣滯於中故逼心而煩然風為濕所搏而失其風之體故脈沉而細則知濕勝即名中濕亦曰濕痹痹著不去也氣既為濕所痹則氣化不敏或小便不利大腸主津濕則反快而不艱澀也病風者多燥閉故以濕勝而快者為反耳但當利小便者便利而氣化氣化而濕行見不必狃於太陽而治風亦非痛在關節而當溫散之比矣鰲按仲景論濕病而濕痹其最重者故列首條其餘若風濕風濕相搏寒濕相搏頭中寒濕濕溫濕熱風寒濕雜為痹為痙此數種皆濕病也俱列於後風濕綱仲景曰病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷寒冷所致也目劉完素曰身盡疼者濕也發熱日晡所劇者風也若汗出當風而得之者則先有濕而後感風若久傷寒冷得之者則先傷風而後中濕可與麻杏薏甘湯陶華曰風濕必脈浮先傷濕而後傷風也其症肢體腫痛不能轉側額上微汗惡寒不欲去衣大便難小便利熱至日晡而劇治法但微解肌宜羌活沖和湯咽渴小便不利五苓散外不熱內不渴小便利朮附湯緩弱昏迷腹滿身重自汗失音大便不禁白通湯去甘草加白朮身腫痛微喘惡風杏仁湯熱而煩渴小柴胡加花粉中濕小便不利一身盡痛身黃大便快茵陳五苓散大小便俱利無黃者朮附湯身痛鼻塞小建中湯加黃芩綱仲景曰傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之目虞摶曰以散表中風濕若大便硬小便自利桂枝去桂加白朮湯此條妙在脈浮虛而澀脈若沉實滑大數者非也綱仲景曰風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也目張兼善曰風在外而濕在內風濕相搏也汗大出者其氣暴暴則外之風邪去而里之濕邪不出故風則去而濕則在也綱仲景曰濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也目張元素曰濕勝者則多汗傷寒者必無汗故寒濕相搏雖有汗而不能周於一身但頭汗出也頭中寒濕綱仲景曰濕家病身疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈目張云岐曰此濕氣之淺者何以言之不曰關節疼痛而曰身上疼是濕尚未至流於關節而猶外客於肌表也不曰發熱而身似熏黃但曰發熱面黃而喘是尚未至於脾而但薄於上焦也陰受濕氣則濕邪為深今頭痛鼻塞而煩是濕客於陽而不客於陰也濕氣內流脈當沉細矣今脈大者陽也則濕猶未內流而但在表也又自能飲食腹無痞滿而中和無病知其濕氣微淺故但納藥於鼻中以宣泄頭中寒濕也宜瓜蒂散濕熱綱仲景曰濕家之為病一身盡疼發熱身色如熏黃也目楊士瀛曰一身盡疼其非傷寒客熱可知矣是由濕邪在經也夫脾土惡濕者也濕傷於脾則脾病脾病則色外見是以身發黃者為其黃如煙燻非正黃色也如煙燻者黃中帶晦暗也濕溫綱仲景曰濕溫之脈陽濡而弱陰小而急目朱肱曰濕溫者兩脛逆冷胸腹滿多汗頭痛妄言其人常傷於濕因而中暑濕熱相搏則發濕溫其脈陽濡而弱陰小而急治在太陽不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重暍如此死者醫殺之耳白虎加蒼朮湯此症切勿發汗汗之必死趙嗣真曰活人云常傷於濕因而中暑許學士云先受暑後受濕雖兩人所言感受之先後各自不同而其症治則一至用白虎蒼朮湯誠為至當設若濕氣勝臟腑虛大便滑朮附其可廢乎故但用白虎不可也吳綬曰如活人所言濕溫脈症宜朮附湯加人參香薷扁豆若脈大有力自汗煩渴者人參白虎湯加白朮輕者十味香薷飲或酌用清暑益氣湯猶必增損用之為妙總在除濕清暑益元氣而已風寒濕雜合病綱仲景曰病人身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭搖卒口噤背反張者此太陽中風重感寒濕而為痙也濕家下之額上汗出微喘小便利者死若下利不止者亦死目朱肱曰風寒濕雜至合而為痹身重汗出惡風痛如歷節狀防己黃耆湯張兼善曰錯雜之邪合至當論其先後多少分治可也成無己曰額上汗出而喘陽氣上逆也小便自利或下利陰氣下流也陰陽相離故云死內經曰陰陽離缺精氣乃絕此之謂也鰲按下條乃言濕家死症也濕病本不至死今由誤下以至不救仍是醫殺之耳附錄霧露論李梴曰陰脈緊者霧露濁邪中於下焦少陰之分故曰渾因表虛里微遂使邪中於陰為慄令人足脛逆冷便溺妄出或腹痛下利宜理中湯四逆湯熱藥以散其邪陽脈緊或帶澀者霧露消邪中於上焦太陽之分故曰潔令人發熱頭疼項強筋攣腰痛脛酸宜九味羌活湯加藁本或惡寒欲吐者藿香正氣散五積散仍量加藁本陰陽脈俱緊者上下二焦俱中邪也必吐利後脈不緊手足溫則愈若吐利後脈遲不食者脾胃虛而內停水飲也若脈陰陽俱緊口中氣出唇口乾燥蜷臥足冷鼻涕出舌上苔滑勿妄治也又有陽病上行極而下陰病下行極而上上下必於中焦於是三焦溷亂內外氣塞以致口糜嗢嚏下為小便黃大便血凝如豬肝熱氣騰而脾胃不運營衛凝滯則生瘡癰虛寒甚者脾胃獨弱下焦不約清便下重臍築湫痛而死蓋臍為生氣之源築痛乃生氣已絕
