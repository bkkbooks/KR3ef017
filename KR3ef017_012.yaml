body:
  text: 卷十循衣摸床綱仲景曰太陽中風以火發汗邪風被火兩陽相熏其身發黃陽盛則欲衄陰虛則小便難但頭汗出口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者可治傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床怵惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服目許叔微曰有人病傷寒小便不利日晡潮熱手循衣縫兩手撮空直視喘息醫見之皆走此誠惡候得之者十中九死仲景雖有症而無法但云脈弦者生澀者死已經吐下難以下藥謾且救之若大便得通而脈弦者庶可治與小承氣一服而大便利諸疾漸退脈且微弦半月愈或曰下之而脈弦者生此何意也余曰金匱云循衣妄撮怵惕不安微喘直視脈弦者生澀者死承氣湯主之余嘗觀錢仲陽小兒直訣云尋衣領及捻物者肝熱也此症在金匱列於陽明部蓋陽明者胃也肝有熱淫於胃經故以承氣瀉之且得弦脈則肝平而胃不受克此所謂有生之理讀仲景論不能博通諸方書以發明隱奧不可也王好古曰許學士作循衣撮空是肝熱風淫末疾此論誠當然莫若以為肺熱之邪其人必妄言亂語難經云肺邪入心為譫語也趙嗣真曰此條分三截看自起句至如見鬼狀一截是將潮熱譫語不惡寒不大便列為現症下又分兩截以辨微劇之殊微者但發熱譫語但字為義以發熱譫語之外別無他症用承氣日一服利止後服見其熱輕猶恐過下也若劇者起至澀者死此熱極危症不可不決其生死此陽熱已極若脈弦為陰未絶猶可下之以復其陰脈澀為陰絶不必藥矣王肯堂曰循衣摸床危惡之候也有二症一由太陽中風以火劫汗因成壞病捻衣摸床此則小便利者生不利者死一由陽明裡熱之極循衣摸床此則脈弦者生脈澀者死也鰲按樓全善云嘗治循衣摸床數人皆用大補氣虛之劑惟一人兼瞤振脈代遂於補劑中略加桂二分亦振止脈和而愈此亦偏治之法耳由於偶中未可奉為科律也恐醫者見樓氏之語遽或效尤以致殺人故特識於此閲者不可忽也自汗綱仲景曰陽明病發熱汗出此為熱越不能發黃也目王肯堂曰衛氣者護衛皮膚肥實腠理禁固津液不得妄泄邪氣干之若不能衛固於外由是津液妄泄濈濈然潤漐漐然出不因發散而自汗出也傷風則發熱自汗中暍則汗出惡風而渴風濕甚則汗多而濡言風與暑濕為邪皆令自汗惟寒邪傷榮而不傷衛是以膚腠閉密汗不出也始雖無汗及傳入里而為熱則榮衛通腠理開亦令汗自出矣自汗又有表裡之別虛實之異若汗出惡風及微惡寒者皆表未解宜發散至於漏不止而惡風及發汗後而惡寒者表虛也宜溫之此皆邪氣在表若汗出惡風寒者此表解里病下之則愈如本條及陽明發熱汗出急下之條是也自汗雖常症或汗出發潤如油如珠著身不流皆不治必手足俱周遍身悉潤漐漐然一時汗出熱已身涼乃為佳兆魏荔彤曰陽明病本應發熱汗出則太陽傳入之邪發越於外故胃津內耗而邪熱在胃漸實雖能成胃實之正病卻無發黃之變病也綱仲景曰陽明病外症云何答曰身熱汗自出不惡寒反惡熱也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也問曰惡寒何故自罷答曰陽明居土中也萬物所歸無所復傳始雖惡寒一日自止此為陽明病傷寒轉屬陽明者其人濈然微汗出也汗出身熱不惡寒便硬譫語者宜承氣湯陽明病發熱汗多者急下之宜大承氣湯目王肯堂曰此身熱汗出不惡寒屬裡為陽明本症中風則有汗傷寒則無汗惟入陽明乃有汗故曰陽明病法多汗若兼便硬譫語者下之魏荔彤曰首條陽明病是由太陽中風而傳入者二條是由太陽傷寒而傳入者可知傷寒之惡寒為無汗而中風之惡寒為汗自出也可知陽明之由傷寒傳入初得尚惡寒陽明之由中風傳入初得尚惡風逮至汗自出而惡熱則無論風寒皆已傳入陽明無疑也太陽中風則發熱惡風汗自出為正症太陽傷寒則惡寒無汗為正症今傳入陽明則但以汗出惡熱為正症也太陽病有惡風惡寒傳陽明則變為惡熱此太陽陽明之大關鍵也故一日惡寒二日自止所謂萬物歸土者只因表邪變熱由太陽之經絡近陽明在表初變熱必已犯陽明之經矣及熱入里有不犯陽明之腑乎再胃主容納物入其中必稍停蓄方下大腸邪熱入亦如是無二理此所以曰萬物所歸又曰無所復傳也無所復傳正言胃成實結耳若邪入氣足升散自有少陽門戶何謂無傳惟其實結已成則非推蕩不行故無所復傳正欲言傳以求得傳示人而已太陽中風病具亦名傷寒其人原當自汗出而病亦未解忽自汗出者漸覺濈濈然汗出而微是太陽中風以汗出而微為轉屬陽明成胃實之候也陽明病胃熱已盛結而成實乃正陽陽明之正症急當攻下之蓋以陽明為病而發熱汗出者初病也胃成實否尚未可定逮發熱久而汗出多則津液內耗邪熱大熾必腸干屎硬而成實矣此不急攻真為無所復傳之症矣故必急用大承氣此為汗之自出津亡者言也綱仲景曰陽明脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之目成無己曰脈浮發熱口苦者邪在表脈緊自汗腹滿不惡寒者邪在裡此表裡俱有邪宜和解王肯堂曰自汗而兼脈浮緊口苦者忌汗下針宜和解魏荔彤曰梔豉湯是仍以太陽治表泄熱之法治陽明可見非拘拘專治陽明者可愈陽明病也白虎人參湯生津滌熱熱去津回而汗出治陽明即所以治太陽陽明也豬苓湯導水清熱滋干未嘗及太陽之表而太陽之腑邪去氣宣其表亦不待再治是又治太陽之腑即所以治太陽之表而治太陽之表正所以治太陽陽明又可見非拘拘專治陽明可愈陽明病也綱仲景曰陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解此水不勝穀氣與汗共並脈緊則愈陽明病若中寒不能食小便不利手足濈然汗出此欲作痼瘕必大便初硬後溏以胃中冷水穀不別故也目王肯堂曰此自汗而兼小便不利者當分欲食不欲食欲食者宜桂枝湯羌活湯不欲食者宜吳茱萸湯理中湯魏荔彤曰此原本中風而病兼水濕者陽明病欲食此由中風而成然陽明宜大便難今小便反不利大便反調又骨節疼如有熱狀而非大熱則皆風兼濕為患也夫欲食仍兼風象小便不利則濕盛大便自調則熱輕骨節疼為濕多熱狀為熱少此洵風濕與熱雜合而成之陽明俱不可作胃熱論治者也逮至風邪所變之熱入里而發透表而汗出陽明病亦遂解矣蓋胃家熱邪既為濕間不能成實欲食而得食則胃家之穀氣即能扶正不解而自解故水濕之邪因穀氣得養即為退舍且能併力於汗俾熱邪透表而愈水濕其罪之魁而功之首乎言脈緊者言不若病脈之緩而已非必如傷寒之緊也痼瘕者陰氣堅凝閉祕之症也胃冷而水穀不別則溫中補胃之不遑已敢云下哉綱仲景曰心下痞大便硬心煩不得眠而復惡寒汗出者附子瀉心湯主之太陽中風其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之目王好古曰太陽自汗桂枝湯陽明自汗白虎湯少陰自汗四逆湯陽明症身熱目痛鼻乾不得眠不惡寒而自汗或惡熱而尺寸俱浮者白虎湯王肯堂曰此自汗而兼心下痞者當分惡寒不惡寒綱仲景曰陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫後服陽明病發熱汗多者急下之宜大承氣湯目朱肱曰陽明病法多汗而陽明亦有反無汗之症不可不察也柯琴曰陽明主津液所生病故陽明病多汗多汗胃燥之因也綱仲景曰服桂枝湯大汗出大煩渴不解脈洪大者白虎加人參湯主之傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也目朱肱曰陽明症汗多而渴者不可與五苓散若汗多胃燥豬苓復利其小便也可與苡仁竹葉湯柯琴曰胃實之病病機在汗出多病情在不能食初因寒邪外束故無汗繼為胃陽遽反故反汗多盜汗綱仲景曰陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出目朱肱曰脈浮盜汗黃耆湯或柴胡薑桂湯桂枝茯苓白朮湯王履曰盜汗者睡而汗出也睡則胃氣行里表中陽氣不致故津液得泄覺則氣行於表而汗止矣樓英曰雜病盜汗責其陰虛傷寒盜汗由邪氣在半表裡使然也若邪氣在表則又謂之自汗矣經曰微盜汗出反惡寒者表未解也又陽明當作裡實而脈浮者云必盜汗是猶有表邪也非若自汗有表裡虛實之別綱仲景曰三陽合病脈浮大上關上但欲眠睡合目則汗目劉完素曰關脈以候少陽之氣太陽之脈浮陽明之脈大浮大之脈上關上故知三陽合病也膽熱則睡少陰病且欲眠睡目合則汗出以陰不得有汗但欲眠睡目合則汗出知三陽合病膽有熱也小柴胡湯瀉心湯張元素曰或謂此症俱屬少陽篇中亦可用小柴胡否答曰可用夫三陽合病其邪發見於脈也浮者太陽大者陽明關上者少陽也但欲眠睡目合則汗此膽有熱脈症相符故出於少陽篇下蓋脈浮無症不可汗脈大無症不可下浮大之脈俱上關知三陽合病而熱在膽也膽居在半表裡用小柴胡亦當頭汗綱仲景曰陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈目朱肱曰汗出譫語者有燥屎也過經乃可下也下之早語言必亂以表實裡虛故也病人表實裡虛元府不開則陽氣上出汗見於頭凡頭汗出者五內乾枯胞中空虛津液少也慎不可下下之者謂之重虛然頭汗出者有數症傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦有里也汗出為陽微假令純陰結不得復有外症悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也小柴胡湯主之傷寒五六日已汗下胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此表未解柴胡桂枝幹薑湯心下緊滿無大熱汗出者茯苓湯劉完素曰熱入血室或陽明被火及水結胸皆但頭汗出俱是熱鬱於內而不得越者也此數者或吐或下皆欲除其熱也朱震亨曰血室肝也肝之熱者必移其熱於心遂令心氣受傷既不能主血亦不能作汗故但頭有汗而不能遍及於身也綱仲景曰陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗者梔子豉湯主之目朱肱曰病人表實裡虛元府不開則陽上出而頭有汗也張介賓曰頭汗之症有二一為熱邪上壅一為陽氣內脫蓋頭乃諸陽之會凡傷寒遍身得汗謂之熱越若身無汗則熱不得越而上蒸陽分故但頭汗出也治熱蒸者可清可散甚者可下在去其熱而病自愈至氣脫一症則多以妄下傷陰或克伐太過或泄瀉不止以致陰竭於下則陽脫於上小水不通而止見頭汗則大危矣頭汗脈緊數有表邪當散者小柴胡湯或柴胡桂枝幹薑湯若有火邪脈洪滑內多煩熱頭汗當清者人參白虎湯益元散若水結胸心下滿頭汗出者大陷胸湯小半夏茯苓湯若便結腹脹疼痛頭汗者承氣湯若諸虛泄瀉陽脫頭汗者速用獨參湯大補元煎急救之庶可保全鰲按此是下後變症但頭汗出者心火上炎也綱仲景曰陽明病發熱汗出此為熱越不能發黃也但頭汗出者身無汗齊頸而還腹滿小便不利渴飲水漿此為瘀熱在裡身必發黃茵陳蒿湯主之目許叔微曰亦可用五苓散劉完素曰頭者諸陽之會邪搏諸陽津液上湊則汗見於頭邪熱內蓄蒸發腠理遍身汗者為熱越身無汗則熱不得越熱蒸於陽故但頭汗出也何者以三陰經皆上至胸頸而還不循於頭獨諸陽脈上循於頭耳故為熱不得越而上達者也王好古曰頭汗出齊頸而還血症也額上遍多者屬心部為血症也獨益中州脾土以血藥治之其法無以加矣王肯堂曰頭乃諸陽之會熱蒸於陽故但頭汗出也三陰無頭汗其經不上頭故也遍身有汗為熱越但頭汗出熱上達也如瘀熱在裡身必發黃及熱入血室與其虛煩或陽明被火及水結胸數者皆但頭汗出俱是熱不得越故或吐或下以除其熱也且邪但在表則無頭汗之症必也寒濕相搏與邪在半表裡乃有頭汗也如傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩及傷寒五六日頭汗微惡寒手足冷心下滿口不欲食大便硬脈細者此皆邪在表裡兩間令頭汗出也濕家但頭汗出欲得被覆向火者寒濕相搏故頭汗也此皆不得謂之逆然小便不利而成關格若頭汗者陽脫也經云關格不通不得尿頭無汗者生有汗者死又濕家下後頭額汗出而微喘者亦陽脫也經曰濕家下之額上汗出小便不利者死下利不止者亦死二者乃頭汗之逆陶華曰諸陽經絡循於頭頭汗者邪搏諸陽也裡虛則不可下內涸則不宜汗頭汗症不可再汗也譫語頭汗是為血熱屬陽明用承氣湯心中懊憹而頭汗梔豉湯額汗綱仲景曰陽明病被火額上微汗出而小便不利者為發黃三陽合病腹滿身重難以轉側口不仁而面垢遺尿發汗則譫語下之則額上出汗手足冷若自汗出者白虎湯主之目鰲按此條之上曰三陽合病脈浮大上關上但欲睡眠合目則汗乃詳病脈病情及病機也本條乃言病狀及治方也必兩條合參而三陽合病之大要始得合目則衛氣行陰更兼汗出熱淫於內也手足汗綱仲景曰陽明病若中寒不能食小便不利手足濈然汗出此欲作痼瘕必大便初硬後溏所以然者以胃中冷水穀不別故也三陽並病太陽症罷但發潮熱手足漐漐汗出大便難而譫語下之則愈大承氣湯目王肯堂曰胃主四肢為津液之主故病則手足汗出也手足汗出為熱聚於胃是津液之旁達也二者俱手足汗出一則大便初硬後溏胃中冷不別水穀故不可下一則大便難譫語陽明症具故宜下陶華曰四肢者諸陽之本熱聚於胃則津液旁達於手足也蘊熱則煩躁譫語挾寒則水穀不分此則承氣理中之不同處也柯琴曰但手足汗出則津液之泄於外者尚少小便不利則津液不泄於下陽明所慮者亡津液此更慮其不能化液也陽明以胃實為病根更當以胃寒為深慮蓄血綱仲景曰陽明病其人喜忘者必有蓄血所以然者其人本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之目王好古曰初便褐者重再便深褐色者愈重三便黑色者尤重色變者以其火燥也如羊血在日中須臾變褐色久則漸變黑色即此意也當詳察之鰲按此實陽明未病前症前此不知今因屎硬為陽明病硬則當難而反易病機之變其原尚由太陽病陽明未病時先有宿血血主濡故不硬而反易且火極反見水化故血久則黑也綱仲景曰病人無表裡症發熱七八日不大便雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯若脈數不解而下利不止必協熱而便膿血也目成無己曰蓄血者血在下焦蓄聚而不散也血菀於上而吐血者謂之薄厥血留於下而瘀積者謂之蓄血此由太陽隨經瘀熱在裡血為熱所搏結而不行蓄於下焦之故也大抵看傷寒必先觀兩目次看口舌然後自心下至少腹以手按之覺有滿硬者則當審而治之如少腹覺有滿硬便當問其小便若小便不利者則是津液留結可利小便若小便自利則是蓄血之症可下瘀血經曰傷寒有熱少腹滿應小便不利今反利者為有血也又曰太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也皆須抵當丸下之愈陽明症喜忘屎雖硬大便反易其色必黑亦是蓄血之症血蓄於下所以如狂者經所謂熱結膀胱其人如狂者是也血瘀於下所以喜忘者內經曰血並於下亂而喜忘者是也二者若有其一則為蓄血症明矣蓄血症又有輕重焉如狂也喜忘也皆蓄血之甚須抵當湯丸下之者也如外已解小腹急結則為蓄血之輕者桃仁承氣利之醫之妙者何也在乎識形症明脈息曉虛實知傳變其於形症之明者衆人所共識又何以見其妙必也形症之參差衆人所未識而獨識之且如病人無表裡症發熱七八日脈雖浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者此有瘀血抵當湯當不大便六七日之際又無如狂喜忘之症亦無少腹硬滿之候當是時與承氣者多矣獨能處以抵當湯是為醫之妙者也何以知其有蓄血也脈浮而數浮則傷氣數則傷血熱客於氣則脈浮熱客於血則脈數因下之後浮數俱去則已若下之後數去但浮者則榮血間熱去而衛氣間熱在為邪氣獨留心中則飢邪熱不殺穀潮熱發渴也及下之後浮脈去而數不解者則衛氣間熱去而榮血間熱在熱氣合併迫血下行胃虛協熱消穀善飢血至下焦若下不止則血得以去泄必便膿血也若不大便六七日則血不得出泄必蓄在下焦為瘀血是用抵當湯下之此實疾病之奇異醫法之元微能審此者真妙醫也張元素曰或問攻下之法須外無表症里有下症然後可攻上言無表裡症況脈更浮數何故可下曰此非風寒之病是內傷致然也若外不惡寒里無譫語但七八日發熱有爍津液乃陽盛陰虛之時苟不攻之其熱不已而變生焉故云雖脈浮數可下不待沉實而後攻也夫內傷者何經曰趺陽脈浮而數浮則傷胃數則傷脾此非本病醫特下之所為也仲景之意不外是理凡傷寒當下之症皆從太陽陽明在經之邪而入於腑故下之今不言陽明病但云病人無表裡症此非自表之裡而病也但為可下故編於陽明篇中鰲按前用抵當湯雖表症仍在而不顧者急於救里也用桃仁承氣雖外症已解而邪甚者仍當顧表也此表裡症俱無而仍用抵當者以表裡熱極也合熱是表熱極協熱是裡熱極無表症是不頭痛惡寒無里症是不煩燥口渴前條大便反易知血之瘀於中者已久是驗之於已形也此條仍不大便知血之在內者已結是料之於未形也六經惟太陽陽明二經多血故俱有蓄血症綱仲景曰病人胸滿痞痿舌青口燥但漱水不欲下咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血病者如熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之目王好古曰血症古人用藥雖有輕重之殊而無上下之別今分作上中下三等以衄嘔唾吐血為上部血結胸中為中部蓄血下焦為下部夫既有三部之分故藥亦當隨其輕重也汗多為衄血脈浮灸之咽燥為唾血當汗不汗熱入於裡者為嘔血吐血此在上也犀角地黃湯涼膈散加生地亦可然衄嘔唾吐俱在上亦當以輕重分之大凡血症皆不飲水惟氣症則飲之宜詳審此症乃足太陰所主脾所不裹越而上行所以有吐嘔之候實者犀角地黃湯虛者黃芩芍藥湯凡病嘔吐者以脾所主故俱用芍藥主之是知太陰藥也血結胸中頭痛身疼漱水不咽者衄也無熱胸滿漱水不咽喜忘昏迷其人如狂心下手不可近者血在中也桃仁承氣蓄血下焦其人發狂小腹滿硬小便自利大便反黑及臍下疼者抵當湯丸如狂者在中發狂者在下吳綬曰凡蓄血者瘀血留結於內蓋傷寒病在太陽當汗不汗則瘀熱在裡必血結也大抵看傷寒病人心下兩脅少腹但有硬滿處以手按則痛者便當問小便如何若小便不利乃水與氣也若小便自利為有血也王肯堂曰病人七八日後兩手脈沉細微膚冷臍下滿或狂或躁大便實而色黑小便自利者此蓄血症也若老幼氣虛弱者宜生地黃湯發狂綱仲景曰陽明病初欲食小便反不利大便自調其人骨節疼翕然如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈目張介賓曰傷寒發狂本陽明實熱之病然復有如狂症者雖似狂而實非狂此中虛實相反最宜詳辨不可忽也凡實熱之狂本屬陽明蓋陽明為多氣多血之經陽邪傳入胃腑熱結不解因而發狂內經脈解篇曰胃者土也故聞木音而驚者土惡木也其惡火者熱甚也惡人者以陽明厥則喘啘啘則惡人也其病甚則棄衣登高逾垣上屋或數日不食以四肢為諸陽之本陽盛則實實則能登高也棄衣而走熱甚於身也妄言詈罵不避親疏而歌者陽盛為邪也又曰陰不勝陽則脈流薄疾並乃狂又曰邪入於陽則狂是皆以陽明熱邪上乘心肺故令心志昏亂若此此陽狂也然傷寒病至發狂是為邪熱已極使非峻逐火邪則不能已故但察其大便硬結或腹滿而堅有可攻之症則宜以大小承氣或涼膈散六一順氣湯之類下之可也如無脹滿實堅等症而惟胃火致然者則但以白虎湯抽薪飲輩泄其火邪自愈鰲按此為水濕之病其人胃本不虛只因水氣怫鬱鬱極而發奄者忽也言忽然而狂也綱仲景曰太陽病六七日表症仍在而反下之脈微而沉反不結胸其人如狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之太陽病身黃脈沉結少腹硬小便不利者為無血也不便自利其人如狂者血結症也抵當湯主之太陽病不解熱結膀胱其人如狂忽自下下者愈其人不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃仁承氣湯陽明病其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之目朱肱曰發狂有二症陽毒發狂蓄血如狂其外症與脈皆不同病人煩躁狂走妄言面赤咽痛脈實潮熱獨語如見鬼狀此陽毒也病人無表症不發寒熱唇燥但欲漱水不欲入咽其脈微而沉小腹硬滿小便反利大便必黑身黃髮狂此血證諦也大抵傷寒當汗不汗熱蓄在裡熱化為血其人喜忘而如狂血上逆則喜忘血下蓄則內爭甚則抵當湯丸輕者桃仁承氣湯犀角地黃湯須取盡黑物為效血熱蓄在膀胱若用抵當湯更須仔細審其有無表症若有蓄血症而外不解亦未可便用抵當宜桂枝湯解外緣熱在膀胱太陽經也張兼善曰狂之所起皆由陽盛內經曰陰不勝其陽脈流薄疾並乃狂也又曰邪入於陽則狂邪入於陰則喑難經曰重陽者狂重陰者癲脈經曰陰附陽則狂陽附陰則癲病源曰陽邪並於陽則狂陰邪並於陰則癲即諸經之狂為陽盛也明矣傷寒熱毒在胃並於心臟使神不寧而志不定遂發狂也其或狂言目反直視又為腎絶汗出輒復熱狂言不能食又若失志死若此則非藥所及張介賓曰如狂症本非實熱發狂症亦有輕重如熱結膀胱其人如狂及脈微而沉反不結胸其人如狂二條以太陽熱邪不解隨經入腑但未至發狂故曰如狂此以熱搏血分蓄聚下焦故宜下也近見傷寒家則別有如狂之症古人未及言者蓋或由失志而病其病在心也或由悲憂而病其病在肺也或由失精而病其病在腎也或由勞倦思慮而病其病在肝脾也此其本病已傷於內而寒邪復感於外則病必隨邪而起矣其症如狂亦所謂虛狂也而虛狂症則外無黃赤之色剛暴之氣內無胸腹之結滑實之脈雖或不時躁煩而禁之則止口多妄誕而聲息不壯或眼見虛空或驚惶不定察其上則口無焦渴察其下則便無硬結是皆精氣受傷神魂失守之症此與陽極為狂如冰炭而時醫不察但見錯亂便謂陽狂妄行攻瀉必致殺人凡治此者須辨陰陽其有虛而挾邪者邪在陽分補中益氣湯等邪在陰分補陰益氣煎等虛而無邪者在陽分四君八珍十全大補等在陰分四物六味左歸飲一陰煎等陰虛挾火者加減一陰煎方治之宜大略如此而變症之異則有言不能傳者能知意在言表則知所未言矣凡身有微熱或面赤戴陽或煩躁不寧欲坐臥泥水中然脈則微弱無力此陰症似陽也名為陰躁蓋以陽虛於下則氣不歸原故浮散於上而發躁如狂速當溫補其下命門暖則火有所歸而病當自愈若誤用寒涼之藥則必死矣陳士鐸曰傷寒發狂至登高棄衣詈罵去生遠矣仲景以竹葉石膏湯救之妙矣蓋陽明之火最大非大劑白虎不救世人往往畏用特小其劑如何能救故用石膏必須三四兩或七八兩一劑火勢始能稍退狂亦可少止然石膏性猛恐損胃氣必兼人參為妙我更有一方用白虎湯之半而另加藥味方名祛熱生胃湯石膏元參麥冬各三兩茯苓一兩人參車前各五錢知母三錢水煎此方石膏知母瀉胃火人參生胃氣元參去浮遊之火麥冬生肺陰茯苓車前引火下行於膀胱從小便出且火盛必渴渴必多飲水用此二味以分濕則水流而火自隨水以散方中瀉火又不傷氣似勝於白虎一劑狂定二劑渴減半三劑渴止火亦息正不用四劑也凡有火熱發狂或汗如雨口渴舌燥或生芒剌者此方投之立效斷不至死也鰲按此四條皆本太陽經症但首條誤下熱入陽極擾陰血燥而蓄於中血病則知覺昏昧而發狂所謂表病傳裡者二條亦病在燥血內結皆屬下後熱入於裡者三條血氣皆重故用桃仁承氣以攻其里之結血此則由於未下者四條喜忘乃發狂之根也故雖未及發狂字而亦當次入款內四條雖皆太陽症然至熱結則駸駸傳入陽明矣即如喜忘一症當其喜忘時尚屬太陽逮陽明既病而究其根由因知前此太陽病時已有喜忘之病情也綱仲景曰傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之目黃仲理曰又有火邪發驚狂者醫以火於臥床下或周身用火逼劫汗出或尉而成火邪其人煩躁驚狂起臥不安仲景主方外桂枝甘草龍骨牡蠣湯亦可凡灸及燒針後症似火劫者兼用劫法治之金匱風引湯尤良柴胡加龍骨牡蠣湯更捷陶華曰傷寒熱毒由胃並心遂使神不寧志不定故發狂始則少臥不飢妄語妄笑甚則登高棄衣越垣上屋皆由獨陽亢極熱毒所致非大下不止亦有當汗不汗瘀熱在裡下焦蓄血如狂者未至竟狂耳難經重陽者狂即陽毒脈洪大或數實狂言錯語煩躁乾嘔面赤咽痛潮熱發斑或下利黃赤陽毒升麻湯黃芩湯時行熱病發狂黑奴丸經曰太陽病不解熱結膀胱如狂而血下者愈也血症如狂脈微身黃唇燥漱水無寒熱小腹滿小便不利大便黑犀角地黃湯甚者桃仁承氣湯抵當丸取下黑物為效發黃綱仲景曰傷寒脈浮緩手足自溫者系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也目李梴曰經曰濕熱相交民病疸疸即黃單陽而無陰也傷寒發黃雖不一而誤用溫藥或被火攻太甚或失汗下與滲以致陽明經中血熱而見真色於肌膚名之瘀熱發黃頭汗作渴小便不利色黃而明茵陳湯茵陳三物湯陶氏茵陳湯有濕熱鬱而發黃者身疼發熱色黃而晦茵陳五苓散有寒濕發黃者太陽病寒濕在裡發汗過多則寒去而濕在麻黃連翹赤小豆湯身痛鼻塞者急用栝蔞搐鼻法內服茵陳五苓散頭痛甚者神朮散加茵陳有中濕發黃者一身痛誤汗則眼目俱黃茵陳五苓散梔子柏皮湯防己黃耆湯身煩痛者麻黃湯加蒼朮傷風發黃者易飢鼻乾腹滿潮熱咳嗽小柴胡加茵陳如噦加茯苓甚者大柴胡兼往來寒熱小柴胡加茵陳山梔由內傷中寒脾胃素冷或傷冷物停滯或嘔逆腹滿大便自利理中湯加枳實青皮茵陳腹脹食不敢飽欲作谷疸五苓散陰症發黃四肢逆冷脈沉或陰盛發躁四逆湯結胸發黃心胸滿硬按之痛不可近大陷胸湯由痞氣心下滿硬按不痛半夏瀉心湯以上並加茵陳用痞結散而黃自愈大抵發黃與治濕相似輕則滲泄和解重則大下水利黃自退矣但寸口無脈鼻氣冷為不治形變煙煤黑色搖頭直視環口黧黑柔汗發黃脾臟氣絶也諸發黃小便不利惟瘀血發黃小便自利且瘀血與瘀熱外症俱頭汗作渴脈浮數但熱結下焦則熱耗津液而小便不利血結下焦則熱但耗血而不耗津液故小便自利綱仲景曰陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈弦浮者與小柴胡湯脈但浮無餘症者與麻黃湯若不尿腹滿加噦者不治目鰲按此條中風是由少陽轉屬者兩陽熏灼故一身及面目悉黃也綱仲景曰陽明病脈遲腹滿食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也目柯琴曰金匱云穀氣不消胃中苦濁谷疸根原濁氣下流小便不通身體盡黃名曰谷疸宜五苓散調胃利水治法亦當如之反用茵陳湯下之腹滿不減而除中發噦所由來矣除中者胃陽不支假穀氣以自救凡人將死而反強食者是也綱仲景曰傷寒身熱發黃者梔子柏皮湯主之目成無己曰此湯所以解散其熱也綱仲景曰陽明病無汗小便不利心中懊憹者身必發黃目成無己曰此由陽明熱盛致發黃者也韓祗和曰無汗熱不得越矣小便不利熱不得降矣故雖未經汗下而心中懊憹也無汗小便不利黃之原也懊憹黃之兆也然與梔子柏皮自解不可用茵陳也綱仲景曰陽明病被火額上微汗出而小便不利者必發黃陽明病面合赤色不可下之必發熱色黃小便不利也凡用梔子湯病人舊微溏者不可與服之目成無己曰此由內本有熱而被火致黃者也鰲按梔子苦寒下泄向來微溏者由胃氣不實即梔子且禁用況承氣乎綱仲景曰陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗齊頸而還腹滿小便不利渴飲水漿此為瘀熱在裡身必發黃茵陳蒿湯主之傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之傷寒發汗已身目為黃所以然者以寒濕在裡不解故也不可下於寒濕中求之目成無己曰寒濕在裡不解還於寒濕求之是由寒濕致發黃者夫濕亦令黃熱亦令黃二者非止由來有異而色澤亦自不同濕家黃而暗熱盛如橘色甚者染衣正黃如柏大抵黃屬脾脾為濕熱所蒸則發黃用茵陳湯泄滌其熱也綱仲景曰形體煙燻直視搖頭此為心絶環口黧黑柔汗發黃此為脾絶目成無己曰此皆不治之症便膿血綱仲景曰病人無表裡症發熱七八日不大便雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯若脈數不解而下利不止必協熱而便膿血也目鰲按熱利不止必大便膿血由於素有蓄血內外俱熱陽盛陰虛而陰絡受傷故也此因下後協熱便膿血熱氣下流故也綱仲景曰陽明病下血譫語此熱入血室但頭汗者當刺期門目王肯堂曰衝脈為血海即血室也男女均有之男子下血譫語女人寒熱似瘧皆為熱入血室迫血下行則為協熱而利挾血之脈乍澀乍數或沉或伏血熱交併則脈洪盛大抵男多在左手女多在右手見之也又有陰寒為病下利膿血者乃下焦虛寒腸胃不固清濁不分而便下膿血也二者一為血熱一為血寒臨病審之大便先硬後溏綱仲景曰陽明病潮熱大便硬者可與大承氣湯不硬者不可與之若不便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱必大便硬而少也以小承氣湯和之不轉失氣者慎不可攻也陽明病下之心中懊憹而煩胃中有燥屎者可攻之宜大承氣湯腹微滿初頭硬後必溏不可攻之陽明病若中寒不能食小便不利手足濈然汗出此欲作痼瘕必大便初硬後溏所以然者以胃中冷水穀不別故也得病二三日脈弱無太陽柴胡症煩燥心下硬至四五日雖能食以小承氣少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯目許叔微曰仲景論中言先硬後溏者四症前二症不言及小便第三症言小便不利第四症言小便少其不言小便二條首則因胃中邪熱未作熱實次則因虛煩熱在上胃中無燥屎其小便不利條則以胃中水穀不別之故其言小便少條則又以胃中未可定其硬不硬而必候小便之利是知仲景測大便法皆以小便覘之如小便清知不在裡利不止者利其小便小便數少津液當還入胃中必大便皆可驗者然小便利屎定硬固為可攻亦有小便自利大便硬不可攻者何哉陽明自汗或發汗小便自利此為津液內竭雖硬不可攻之當須自欲大便時用蜜煎導法蓋非裡實故不可攻也又太陽一症云若吐若發汗微煩小便數大便硬與小承氣湯和之此兩症汗後大便硬小便利皆同而治法不同者後症為有傳邪故微煩又因發汗吐下後小便數內亡津液大便硬是熱邪入里故以小承氣利之至若前症小便自利以無傳邪故無煩症大便雖硬不得為裡實但腸頭乾燥止可用蜜導也讀仲景書者宜詳究焉柯琴曰痼瘕即初硬後溏之謂肛門雖固結而腸中不全乾也溏即水穀不別之象以癥瘕作解者謬矣按大小腸俱屬於胃欲知胃之虛實必於二便驗之小便利屎定硬小便不利必大便初硬後溏今人但知不大便大便難大便硬者為陽明病亦知小便難小便不利小便數少或不尿者皆陽明病乎不大便綱仲景曰問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也陽明病若能食者名中風不能食者名中寒目喻昌曰設為問答以辨陽明中風之裡症此屬正陽陽明可下魏荔彤曰太陽病治之未善所以得陽明病也若發汗過多若下若利小便皆得致陽明病之因也汗出利小便皆能使其人津液亡耗也津液亦以胃為歸亡耗則胃中乾燥而裡熱生裡熱生則在表之風寒亦隨變熱裡熱外蒸故自汗出風寒變熱故表惡熱內外熱合為一此所以太陽之病轉屬陽明也然陽明病有淺深其症亦不一如不更衣乃胃亡津液而乾燥也內實乃胃中邪熱太盛而結祕成實也大便難乃胃燥熱半盛尚有大便而艱難也症不同治之之法亦不同承氣諸方仲師並未明言而斟酌之妙存乎人矣中風中寒能食不能食之説固由化穀不化谷然風邪之熱散而虛寒邪之熱聚而實風邪之熱行乎氣寒邪之熱著於血亦能食不能食之故也鰲按中風中寒一節本與不大便無涉姑以能食不能食成陽明病之故附於此綱仲景曰小便數者大便必硬不大便十日無所苦也渴欲飲水者少少與之但以法救之宜五苓散目魏荔彤曰此太陽病已去而轉屬陽明者陽明既病熱氣內盛小便必黃赤而數津液內傷大便必枯燥而硬雖不更衣十日無所苦者津液坐耗腸枯便祕故不覺其苦而受傷甚深也以法救者仍從太陽表裡之法救之五苓導水滋干且解太陽風邪洵陽明猶帶太陽必用之藥綱仲景曰其脈浮而數能食不大便此為實名曰陽結期十七日當劇目鰲按此條本論陰結陽結亦是陪客以陽結即是胃家實也陰結本少陰病無表症當用溫藥綱仲景曰傷寒不大便六七日不惡寒反惡熱頭痛身熱者與承氣湯目鰲按受病即不大便其為胃家實可知此所以為陽明病也綱仲景曰若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之明日不大便脈反微澀者脾虛也為難治不可更與承氣湯也目魏荔彤曰此本申解陽明病譫語一症也譫語之由他條已言之乃有陽明譫語已見而猶當斟酌調和得攻下之宜者不容苟且也蓋有明日並不見大便脈反變滑疾為微澀者胃裡虛寒可信也此固非一下可收功亦非一調可奏效當緩緩補胃徐徐生津曰難治言近功小效必不易治也六七日之久竟不大便此似胃已成實然胃究未實胃燥腸干中塞硬屎此胃終非實而燥屎為害滋大也故以小承氣試之綱仲景曰傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服目方中行曰病由太陽轉屬陽明不大便延至五六日以上十餘日之久日晡云云者陽明之症備具此胃中邪熱已盛病已成實急宜攻下以救胃津矣不然逡巡畏縮坐致發狂病劇亦難救也綱仲景曰病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故也大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯目魏荔彤曰此二條皆申解陽明病有燥屎應下之辨有病雖攻下不傷正氣者如病人不止於傷寒凡不大便五六日之久繞臍痛而煩躁發作有時不必論胃腑之熱成實與否而燥屎在腸為患至於濁氣中結繞臍痛邪上干煩躁作知燥屎阻塞故也除滌其燥屎可耳燥屎由於宿食者以大下後津液耗宿食遂干故結而阻滯腸間也亦宜下之綱仲景曰少陰病六七日腹脹不大便者急下之宜大承氣湯目柯琴曰六七日當解不解因轉屬陽明是臟氣實而不能還之於腑也急攻之所謂已入於腑者可下也三陽惟少陽無承氣症三陰惟少陰有承氣症喻昌曰六七日腹脹不大便則胃土過實腎水不足以上供有立盡之勢又非少陰負趺陽反為順候之比此時下之已遲安得不急魏荔彤曰六七日之久熱邪瀰漫熏灼中焦不惟少陰水枯且陽明津亡至腹脹而脾陰已散不大便而腸胃皆干危急甚矣急下其熱邪以救其腎陰救腎陰即所以救胃與脾陰也大凡大承氣之用非至堅用之以破即至深用之以陷而滌熱邪留真陰一也在陽明熱邪之耗胃津津胃之真陰也急為攻下救其津以救胃在少陰熱邪之耗腎水水腎之真陰也急為攻下救其水以救腎無二法也明乎此則喻氏嘗言傷寒當救陰正於此等處用之也綱仲景曰病人無表裡症發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯若脈數不解而下利不止必協熱而便膿血也目魏荔彤曰雖無太陽表症陽明裡症而發熱脈數以熱在裡則傷里恐至津竭而後下之無濟也故可下但熱入於裡胃既不實多入下焦之血室與血為溷至血瘀甚則雖下之而血必旋蓄血熱甚則方下之而挾利不止此惟隨症立法救之故仲師分立下後二法也綱仲景曰陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也目魏荔彤曰此條是陽明胃實已成而邪復轉傳少陽也諸症中惟不大便為正陽明病余皆少陽陽明應有之病但猶屬欲轉而未全成少陽耳可下綱仲景曰脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻目朱肱曰傷寒固有始得病便變陽盛之症須便下之又有腠理寒一二日便成少陰病者須急溫之陽明裡症者內熱是也宜下之傷寒始發熱惡寒今汗後不惡寒但倍發熱而躁始脈浮大今脈洪實或沉細數始惺靜今狂語此為胃實陽盛再汗即死須下即愈更有心胸連臍腹大段疰悶腹中疼坐臥不安冒悶喘急極者亦不候他症便下之但大便妨悶恐尚有表症者亦須少少與小承氣湯微解之不可過多令大泄也失下則氣血不通四肢便厥醫人不知反疑是陰厥進熱藥禍如反掌不可不察問三陰有可下者乎三陰大約可溫然須有積症方可也何謂積症太陰腹滿時痛桂枝加芍藥湯甚者桂枝加大黃湯少陰口燥咽乾或腹滿不大便或下利清穀心下痛皆積症也下症悉具服湯已更衣者止後服不爾盡劑與之王肯堂曰大法秋宜下凡可下者用湯勝丸散中病便止不必盡劑也綱仲景曰病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之與承氣湯目王好古曰大承氣治大實大滿滿則胸腹填脹狀若合瓦大實則不大便也痞滿燥實四症俱備則用之雜病則進退用之小承氣治痞實而微滿狀若飢人食飽飯腹中無轉失氣心下痞大便或通熱甚須可下宜此方調胃承氣治實而不滿者腹如仰瓦腹中有轉失氣有燥屎不大便而譫語堅實之症以上三法不可瘥假令調胃承氣症用大承氣下之則愈後元氣不復以其氣藥犯之也大承氣症用調胃承氣下之則愈後神癡不清以其無氣藥也小承氣症用芒硝下之則或利不止變而成虛矣又曰傷寒外症全是下症而脈反細不可下者瀉心湯主之脈有力者黃連瀉心湯無力者半夏瀉心湯鰲按承氣症甚多不全採録單有急下之急攻之字樣者録之蓋以著此字樣者皆有急當攻下之故其餘承氣症未盡若是也綱仲景曰得病二三日脈弱無太陽柴胡症煩躁心下硬至四五日雖能食以小承氣少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯目吳綬曰經言太陽病發熱汗出不解其人蒸蒸熱者屬胃也調胃承氣湯凡潮熱腹滿者大柴胡加厚朴凡陽明病汗多胃中必燥大便必硬硬則譫語小承氣湯若譫語脈滑而疾發潮熱者大柴胡湯凡譫語潮熱不食者胃中必有燥屎五六枚小承氣湯若能食大便硬者大承氣湯綱仲景曰汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂表虛里實故也下之則愈宜大承氣湯目成無己曰胃實不大便或難或硬燥屎悉屬裡症宜下者多矣然而有表未解風濕相搏尤宜先解表已而下之可也如經言不大便六七日頭痛有熱者小便清和不在表仍在裡是也其症多見於陽明蓋胃土萬物所歸無所復傳自太少陽傳入者衆所共知而於三陰傳入者鮮或能識若能熟視其微則三陰有急下之症多矣豈非仲景之微意歟陶華曰有宜急下者兩症少陰症口燥咽乾謂之腎汁干宜急下陽明症發熱汗多謂之胃汁干亦宜急下此所謂急下兩症也汪昂曰少陰病得之二三日口燥咽乾者急下之邪入未深便作口燥此腎水將干宜急下以救欲絶之本少陰病六七日腹脹不大便者急下之此少陰邪熱入胃腑也土勝則水乾宜急下以救腎水少陰病自利清水色純青心中必痛口中燥者急下青為肝色肝邪乘腎故下利陽邪上攻故口燥此亦少陰傳入陽明腑病也厥陰症舌卷囊縮宜急下之此症仲景無治法按舌卷囊縮有寒極者宜附子四逆加吳萸並灸關元氣海或蔥尉法又有陽明之熱陷入厥陰經陽明主潤宗筋宗筋為熱所攻弗榮而急引舌與睪丸故舌卷囊縮此為熱極當瀉陽以救陰以上皆大承氣症也張兼善曰胃為水穀之海四旁有病皆能傳入胃土燥則腎水乾故陽明與少陰皆有急下之症症雖不同其入腑之理則一故皆用大承氣有病循衣摸床撮空者此胃熱也錢仲陽小兒直訣云此肝熱也亦承氣湯主之王肯堂曰胃家實不大便雖三尺之童亦知可下也殊不知仲景之法雖有胃實症若表未解及有半表者亦先用桂枝柴胡以解外然後視虛實消息之可也凡胃家不大便等症其或胃實有表者必先解表其或口苦咽乾脈浮緊者宜和解其或便硬無所苦者且候之其或胃實表解有症者急隨症攻之其或胃實表解無症者忌攻大便硬者導之蓋以陽明病身汗出若發汗小便自利者此津液內竭雖硬不可攻之當須自欲大便時蜜導之鰲按王氏有症攻之無症忌攻云者症即陽明實症如潮熱譫語是也有此等症方可攻無此等症雖不大便皆由津液不足當須詳審勿妄攻也經言過經乃可下者言已過七日行經已盡此時陽邪入陰乃可下也綱仲景曰陽明病下之心中懊憹而煩胃中有燥屎者可攻之宜大承氣湯腹微滿初頭硬後必溏不可攻之目李梴曰里症具而脈沉實者宜下若下後熱不退脈未和者猶當量虛實再下若失下則邪無從出又或應下而反汗之則津液內竭變為動悸等症鰲按腹大滿不通是胃中燥屎上攻也故可攻綱仲景曰脈滑而數者有宿食也宜大承氣湯腹滿不減減不足言當下之宜大承氣湯發汗不解腹滿痛者急下之宜大承氣湯陽明病發熱汗多者急下之宜大承氣湯目鰲按數為在腑故滑而數為有食為當下之症二條腹滿如故乃下之雖當減而未盡故更當下也三條表雖未解而邪甚於里故當急攻四條汗多亡陽又當急下以存津液綱仲景曰傷寒六七日目中不了了睛不和無表裡症大便難身熱者此為熱也急下之宜大承氣湯目李梴曰傷寒熱氣入臟流於少陰之經咽焦口燥渴腎水乾也熱病熱不已目睛不和亦腎水乾也皆急下以救腎水陽明發熱汗多或已汗不解腹滿痛及譫狂不大便者皆急下以存胃液傷寒脈弦而遲弦為寒遲為臟脈大而緊大為陽緊為寒俱謂之陽中伏陰急下以分陰陽又下利旦部脈平心下硬者內實也下利脈遲而滑或浮大按之反澀惡食者皆胃有宿食也但宿食忌巴豆只宜用大黃蕩滌劉完素曰下後熱不退再下之熱愈盛脈微氣虛力弱不加以法則無可生之理若輟而不下則邪熱極盛陰氣極衰脈息斷絶必不可救如此之症下亦死不下亦死經云三下而熱不退者死後人有三四次至十數次而生者此乃偶中不可為法但用解毒湯合涼膈散調之庶不失人命汗下後熱不退不問有汗無汗宜白虎加人參蒼朮以解之陶華曰凡言急下者蓋病熱已迫將有變也非若他病尚可稍緩不可下綱仲景曰陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈傷寒嘔家雖有陽明症不可攻之陽明病自汗出若發汗小便自利此為津液內竭大便雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導目張云岐曰非陽明之本病不可下陽明本病胃家實也非痞滿燥實不可下非潮熱發渴不可下非詈罵親疏不可下非脈沉數不可下非棄衣登高目見鬼不可下李梴曰可下者脈症全在裡也若太早若過則水穀脫而變生焉不可下者諸虛咽腫嘔吐厥逆結胸不轉失氣臍中左右上下動氣脈浮細浮虛浮澀帶遲惡寒等症下之則危隨宜以溫熱藥救之綱仲景曰陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也目朱肱曰脈浮不可下脈虛不可下惡寒不可下嘔吐不可下小便清不可下不轉失氣不可下大便堅小便數不可用承氣湯乃脾約丸症也大便硬小便少者不可攻柯琴曰此中風傷寒胃實轉胃虛初能食而致反不能食之機也綱仲景曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之目朱肱曰大抵傷寒最慎於下若表未罷不可亂投湯劑虛其胃氣仲景云表解而內不消非大滿猶生寒熱則病不除也表已解而內不消大滿大實堅有燥屎乃可下之雖四五日不能為禍若不宜下而攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困重者死古人所以傷寒有承氣之戒脈浮不可下其病在表宜發汗下之則為懊憹為痞為結胸脈虛細不可下惡寒不可下以惡寒為表之虛雖是陽明症尚惡寒即與太陽合病屬表但可發汗少陰惡寒當溫之嘔吐者不可下宜與小柴胡和解不轉失氣不可下與小柴胡明日又不大便脈反微澀裡虛也為難治姑與黃耆建中湯程郊倩曰陽明中風病在氣分故不可妄下綱仲景曰發汗若下之而發煩熱胸中窒者梔子豉湯主之目吳綬曰凡有惡寒惡風者凡腹滿時減時滿者凡腹脹滿可揉可按虛軟者凡陰虛勞倦者凡手足逆冷尺脈弱者凡脈在表者俱不可下凡脈沉不實不疾按之無力者凡亡血虛家及婦人經水適來適斷熱入血室與夫胎前産後崩漏等症及小便頻數小便清而大便祕者俱不可下也鰲按此熱傷君主心氣不足而然也故不可下綱仲景曰少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之目魏荔彤曰胸中實見不惟少陰寒邪為病且兼痰飲積實於胸次為病也邪在上自當順其勢而治之不可下而可吐綱仲景曰三陽合病腹滿身重難以輾側口不仁而面垢遺尿發汗則譫語下之則額上汗出手足冷若自汗出者白虎湯主之目戴原禮曰陽明下症悉具其人喘嗽或微惡寒為太陽陽明或往來寒熱為少陽陽明於陽明症中而有太陽少陽症此非正陽明也不可遽下所以古注陽明有三常須識此綱仲景曰傷寒發汗已身目為黃所以然者寒濕在裡不解故也不可下於寒濕中求之目鰲按寒濕在裡與瘀熱在裡不同且既由寒濕則非屬陽明病矣故不可下綱仲景曰陽明病脈遲微汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗出微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣微和胃氣勿令大泄下目黃仲理曰陽明之為病胃家實是也謂之正陽陽明屬下症輕則大柴胡重則大小承氣此邪自陽明經傳入腑者故可下但亦有在經未入腑者縱大滿大實不通亦不過小承氣微下之以和胃氣入胃在經尤宜兩審也其陽明一症少有自病者多因太陽傳入兼與太陽陽明合病用葛根湯者是也少陽陽明合病用黃芩芍藥湯者是也自少陽傳入陽明及未合併病者亦然鰲按勿令大泄下者以脈遲也脈遲者為無陽為在臟也故不可下綱仲景曰脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻目柯琴曰脈遲便非熱實是浮大皆為虛脈矣仲景特出此句正發明心下硬一症有無熱屬臟者為妄攻其熱者戒也小便自利綱仲景曰陽明病自汗出若發汗小便自利此為津液內竭大便雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導目柯琴曰本自汗更發汗則上焦之液已外竭小便自利則下焦之液又內竭綱仲景曰傷寒脈浮緩手足自溫者系在太陰太陰者身自發黃若小便自利者不能發黃至七八日大便硬者為陽明病陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛目柯琴曰首條小便自利是津液越出故燥土受病病在胃也次條小便利則里無瘀熱可知矣小便數綱仲景曰太陽病若吐若下若發汗微煩小便數大便因硬者小承氣湯和之愈目王肯堂曰陽明皆以小便自利為病蓋以驗病之下與不當下也若小便不利而少腹硬者屎也當滲泄之若小便自利而少腹硬者非血則糞也當通利之且病之發黃與不發黃及病之死與不死皆可於此驗之吳綬曰小便數者頻欲去而不多也太陽陽明治各有條凡腎虛有熱小便頻數者清心蓮子飲或人參三白湯加知柏麥冬石蓮之類或滋補丸補中益氣湯加知柏麥冬生地柯琴曰此用小承氣以潤燥是亦和劑不專是下劑小便不利綱仲景曰陽明病面合赤色不可攻之必發熱色黃小便不利也病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯得病二三日脈弱無太陽柴胡症煩躁心下硬至四五日雖能食以小承氣湯少少與微和之若不大便六七日小便少者雖不能食但初頭硬後必溏須小便利屎定硬乃可用大承氣攻之陽明病小便不利若中寒不能食手足濈然汗出大便初硬後溏者此欲作痼瘕目成無己曰發黃與痞及熱病小便不利者熱鬱所致風濕相搏與陽明中風其小便不利寒邪所乘其小便難者亦多由汗下而然綱仲景曰若脈浮發熱渴欲飲水小便不利者豬苓湯主之目王肯堂曰此浮字誤也活人云脈浮者五苓散脈沉者豬苓湯則知此症若脈二字下脫一不字也按五苓散乃茯苓豬苓澤瀉加桂術也豬苓湯乃豬苓茯苓澤瀉加阿膠滑石也桂術味甘辛為陽主外膠滑味甘寒為陰主內南陽之言可為不失仲景之旨矣但南陽欲區別二藥分明以沉對浮遂使後人致疑三陽症中不當言脈沉更不復致疑經文之有缺也更詳太陽症固當脈浮而陽明為表之裡故其浮不曰浮而曰長蓋長者不浮不沉之中脈也成氏直以脈浮釋之而朱氏卻以脈沉言之皆失之矣若曰脈浮者五苓散脈沉者豬苓湯則得旨小便難綱仲景曰若陽明胃實發熱惡寒脈浮緊下之者則腹滿小便難也目王肯堂曰脅痛身黃小便難若陽明胃實未下者小柴胡湯若下後不食項強者忌柴胡鰲按三陽皆有小便不利症不獨太陽也如少陽傷寒五六日中風往來寒熱心煩脅痛或心下悸而小便不利者仲景則主小柴胡湯若五六日已汗復下脅滿微結渴而不嘔但頭汗出心煩往來寒熱為未解而小便不利者仲景又主柴胡桂薑湯若八九日下之煩驚譫語身重而小便不利者仲景又主柴胡加龍骨牡蠣湯也
