body:
  text: 卷一太陽經症太陽經脈綱仲景曰太陽之為病脈浮頭項強痛而惡寒目朱肱曰足太陽膀胱經從目內眥上額連於風府分為四道下項並正別脈上下六道以行於背與身太陽之經為諸陽主氣或中寒邪必發熱而惡寒緣頭項腰脊是太陽經所過處今頭項痛身體疼腰脊痛其脈尺寸俱浮者故知太陽經受病也柯琴曰太陽主表故表脈表症獨太陽得其全後凡言太陽病者必據此一條脈症如脈反沉頭不痛項不強不惡寒是太陽之變局矣綱仲景曰太陽病發熱汗出惡風脈緩者名為中風太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒目朱肱曰有發熱惡寒煩躁手足溫而脈反浮緊者有寒多熱少不煩躁手足微冷而脈反浮緩者此名傷風見寒脈傷寒見風脈也皆宜服大青龍湯蓋大青龍症脈似桂枝反無汗病似麻黃反煩躁是也脈弱有汗為桂枝症脈緊不煩躁為麻黃症大青龍治病與麻黃湯症相似但病尤重而又加煩躁者用大青龍以其有煩躁一症故可用也大抵感外風者為傷風感寒冷者為傷寒故風則傷衛寒則傷營鰲按脈陰陽俱緊者脈浮為陽沉為陰言不論浮沉俱帶緊象不專指尺寸也其所以緊者寒也綱仲景曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之傷寒脈浮緩發熱惡寒無汗煩躁身不疼但重乍有輕時無少陰症者大青龍湯發之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也目朱肱曰仲景言不可服青龍者凡發汗過多筋惕肉瞤振搖動人或虛羸之人微汗出便有此症俱宜服真武湯以救之羸甚者芍藥或量多少與之惡熱藥者去附子余依加減法仲景制真武湯乃為合用桂枝卻用麻黃之類發汗多亡陽有此症故用真武湯若調理順者無此症也柯琴曰風有陰陽太陽中風汗出脈緩者是中於鼓動之陽風此汗不出而脈緊者中於凜冽之陰風矣風能令脈浮浮緊而沉不緊與傷寒俱緊之脈有別脈浮緩而身重是傷寒之輕者非若陰陽俱緊而身疼為傷寒之最重也脈微弱自汗出為桂枝症不可與大青龍以中有麻黃石膏也若脈浮緊汗不出是麻黃症不可與桂枝以中有白芍能止汗也夫脈微而惡風寒者此陰陽俱虛不可用麻黃髮汗脈微弱而自汗出是無陽也不可與石膏以清裡綱仲景曰太陽病外症未解脈浮弱者當以汗解宜桂枝湯太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出目魏荔彤曰太陽中風固以桂枝湯為正治然有久在太陽並未傳裡是不可以日久而誤為里症也脈必仍浮浮者表症未解兼弱陰虛熱發陰何以虛陽盛也陽何以盛風入於衛助衛而盛也故當用桂枝使汗解喻昌曰陽浮者陽邪入衛脈外浮陽性本熱風又善行所以不待閉郁而熱發甚捷也陰弱者營無邪助比衛不足脈必內弱陰弱不能內守陽強不為外固所以不必覆蓋而脈自易出也綱仲景曰形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮當汗出而愈傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯目黃仲理曰脈當弦緊而反浮弱其本虛可知此勞倦內傷症也鰲按發汗解半日許是服麻黃髮之非桂枝也更發汗用桂枝是服麻黃後又與桂枝也綱仲景曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔圊便欲自可一日二三度發脈微緩者為欲愈也目柯琴曰八九日是當解未解之時脈微緩是有胃氣應不轉屬陽明綱仲景曰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也目方中行曰胃家濕熱本甚者復得桂枝之熱則兩熱相搏於中宮搏則必傷甘又令人中滿壅氣而上溢所以胃不司納反上湧而逆出也魏荔彤曰用桂枝者以陽助陽解衛分之風邪淺而逐之也用麻黃者以陽入陰發營分之寒邪深而奪之也判然兩途毫釐千里故風傷衛如賊入其疆順而逐之可耳寒傷營如賊近於郊必須強而奪之乃外在疆外把持則賊無出路惟有攻城掠郭而已此喻最明仲師所以示人從浮緊之脈汗不出之症認明寒邪之傷營與太陽中風同在一經而兩分不侔不可誤也綱仲景曰服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯目柯琴曰大汗出後脈洪大不煩渴是病猶在表桂枝症未罷如瘧日再發是風邪留其處故必倍加桂枝解肌少與麻黃開表此又服桂枝後少加麻黃之一法綱仲景曰發汗後身疼痛脈沉遲者桂枝去芍藥生薑新加人參湯目柯琴曰汗後身疼是表虛不得辛散故去生薑沉為在裡遲為在臟自當遠陰寒故去芍藥曰新加者見表未解無補益法今因脈沉遲而始用之與四逆湯治身疼脈沉之法同義彼在未汗前而脈反沉是內外皆寒故用乾薑生附大辛大熱者協甘草以逐裡寒而表寒自解此在發汗後而脈沉遲是內外皆虛故用人參之補中益氣以率領桂枝甘棗而通血脈則表裡自和也綱仲景曰太陽病二三日不得臥但欲起心下必結脈微弱者以本有寒分也目喻昌曰二三日不能臥但欲起陽邪熾盛逼處心胸擾亂不寧所以知其心下必結然但顯欲結之象尚未至於結也若脈微弱者此平日素有痰飲積於膈之分適與外邪相召外邪方熾其不可下明矣綱仲景曰太陽病桂枝症醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之目鰲按邪束於外陽不得伸不得伸必內擾故令脈促夫桂枝脈本弱促者誤下之過也但前條脈促是陽重下條脈促又為陽虛何則脈雖促而不汗出胸雖滿而不喘脈與上同而症自各異蓋促為陽脈胸滿為陽症固已不知陽盛脈促胸滿陽虛亦脈促胸滿故前由陽氣內擾後由寒邪內結將作結胸不可混也綱仲景曰傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之目方中行曰心下逆滿氣上衝胸寒湧於膈所以起則頭眩脈見沉緊明系飲中留結外邪若但發汗以強解其外外雖解而津液盡竭反足傷動經脈有身為振搖之患矣蓋人身經脈賴津液滋養今一傷於吐下再傷於汗經脈失養故身為振搖遇此等症必滌飲與散寒並施小青龍諸法全是此意但彼風寒兩受不得不重在表此症外邪已散止存飲中之邪故加桂枝於制飲藥中使邪盡散津液得四布而滋養其經脈千百年來孰解此微旨乎綱仲景曰脈浮者病在表可發汗麻黃湯脈浮而數者可發汗宜麻黃湯脈浮而數浮為風數為虛風為熱虛為寒風寒相搏則灑淅惡寒也諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也瘡家身雖疼不可發汗汗出則痙目柯琴曰脈言浮而不言遲弱浮而有力也若浮而大有熱屬臟者當攻之不令發汗若浮數而痛偏一處身雖疼不可發汗浮為風邪邪之所湊其氣必虛數本為熱而從浮見則數為虛矣浮為表而非風數為實熱而非虛故浮數之脈而見發熱惡寒之症即癰膿亦有然者當就痛偏一處飲食如常辨之庶瘡家之治不致誤作風寒綱仲景曰脈浮數者法當汗出而愈若身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便汗出自愈目魏荔彤曰下後脈尚浮數則知其人陽氣尚勃勃欲發所以應俟其自復也尺中脈微為裡虛見寸脈雖浮數陽可徐升尺脈必微弱陽慮內損特標裡虛二字知在表可徐圖在裡不應誤矣程注謂須用表和裡實之法治之而未出方愚謂建中新加之屬可斟酌而用綱仲景曰寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨肉煩疼當發其汗也太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗麻黃湯主之傷寒脈浮緊者麻黃湯主之不發汗因致衄太陽病脈浮緊發熱身無汗自衄者愈衄家不可出汗汗出必額上陷脈浮緊目直視不能眴不得眠脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗以營氣不足血少故也脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳目危亦林曰風先開腠理寒得入經絡脈亦應其象而變見於寸口緊為寒而從浮故汗之則愈黃仲理曰脈則浮緊症則無汗身疼痛與大青龍症同而異脈緊無汗陽氣內擾陽絡傷而衄血奪血者無汗故也喻昌曰脈浮緊發熱無汗純是陰邪傷營矣然寒邪輕微著營而不致涸沍其血且兼中風陽邪摻入易散此所以不致身疼腰痛骨節疼也如是則寒邪本輕而風入之陽邪變熱上衝其勢迅速血自鼻出者則中風陽邪既越而上出矣而傷寒之陰邪本在血分亦隨血而去必愈何以知其愈脈不浮緊身不發熱而濈然汗出即是愈也魏荔彤曰衄家血常上溢由陰不足血中素有熱以鼓蕩之使不循其經而常在顙過山也若復發汗以傷陰而動其熱於是邪熱上干諸陽之首陽隨汗而外亡額上氣遂陷入脈緊急無陽以制陰也直視不能眴無血以榮筋脈也不得眠無陰而陽亢也此俱應救其陰以維亡而未盡之陽所謂諸症宜救陽而傷寒獨宜救陰此其一也鰲按額上陷乃氣虛陷入腦內非如小兒之囟陷下也尺中遲血短而陰不足矣然遲則為寒非氣微而陽不足乎故必先理陰陽然後可發汗治表也但仲師言血少今言陽不足何哉以血少而尺遲正以少陰腎家之真陰不足非止如肝脾血短之症也夫腎陰不足非陽不足氣不足乎此而誤汗當與誤發少陰汗同忌則治之之法建中而外少陰溫經散寒之方尤不可不加意也喻昌曰緊反入里寒邪轉入轉深矣故作痞按之自濡則其所挾者止氣耳不同於挾飲之滿硬也鰲按上七條乃詳敘脈同浮緊而治各不同之故綱仲景曰太陽病十日已去脈浮細而嗜臥者外已解也胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯目柯琴曰脈微細欲寐少陰症也脈浮細嗜臥無少陰症雖十日後尚屬太陽此表解而不了了之謂兼脅痛是太陽少陽合病以少陽脈弦細也但浮不細是浮而有力無胸脅痛則不屬少陽但浮而不大又不屬陽明故仍在太陽也綱仲景曰太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯目柯琴曰本論無越婢方症金匱有之世本取合者即是也仲景言不可發汗則不用麻黃可知無陽則不用石膏可知若非方有不同必抄録者誤耳寧闕其方勿留之以滋惑也鰲按此是風寒兩傷症但無身疼腰痛骨節痛是寒之傷營也輕脈微弱即陽浮陰弱之脈是風之傷衛也重故雖未見有寒而發熱熱多寒少又不汗出其亦有寒在於營分明矣但脈已見微弱其無陽可知故曰不可發汗故不用大青龍之辛散而去其杏仁加以芍藥以桂枝主風多之治麻黃主寒少之治芍藥固攝虛陽之根主脈微弱之治名之曰桂枝二越婢一湯則此方能固真陰足以維陽之根蒂雖發汗驅邪而正陽不致上浮故本方既有芍藥雖麻黃亦無害也乃柯氏據不可發汗以麻黃為不可用據無陽以石膏為不可用其麻黃之無害已詳言之至石膏乃治上中焦邪熱與下焦腎虛之症無礙也又以本論無越婢方症惟金匱有之亦思仲景本合傷寒雜病為一書叔和分而為二則仲景當時金匱中所有之方即如本論中所有其合桂枝越婢成方奚不可不必闕之也特此症原非易認此方又難輕用醫者固當詳審而斟酌之與其蹈誤用之愆不如遵柯氏之說故存其說於前而又復辨之綱仲景曰病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也目張從正曰此節言當察症而消息其虛實不是據脈而論症蓋未發汗而脈浮數是胃氣實發汗後而脈浮數是胃氣虛綱仲景曰發汗已脈浮數煩渴者五苓散主之目柯琴曰病在表之表宜麻黃病在表之裡宜桂枝病在裡之表宜五苓病在裡之裡宜豬苓以利水不可用五苓兼發汗要知五苓是太陽半表半裡之劑歸重又在半表本條更加煩渴則熱已在裡而表邪未罷故用五苓也綱仲景曰小結胸正在心下按之作痛脈浮滑者小陷胸湯主之結胸症其脈浮大者不可下下之則死目柯琴曰大結胸是水結在胸腹故脈沉緊小結胸是痰結於心下故脈浮滑鰲按浮大在陽明脈心下硬者是浮大為心脈火必就燥須急下之以存津液太陽雖因熱入而成結胸而大而尚浮仍為表脈恐熱未實下之則利不止故必待沉緊乃可下也綱仲景曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者死目陶華曰關主中焦妄下而中氣傷故沉寒水留聚於胸脅之間故緊不及尺者重在關舉關可以統之也綱仲景曰心下痞按之濡大便硬而不惡寒反惡熱其脈關上浮者大黃黃連瀉心湯主之目程郊倩曰按之濡為氣痞者無形也其可下乎結胸症脈浮大不可下豈心下痞而關上浮可下乎小結胸之痛固未嘗用大黃何此比陷胸更峻是必有當急下之症比結胸更甚者方可用此峻攻之劑也恐此脈此症而用此方要語下咽立斃耳勿曲護其說而遺害後人也綱仲景曰病人無表裡症發熱七八曰不大便雖脈浮數者可下之假令已下脈數不解令熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯若脈數不解下利不止必協熱而便膿血也目龔信曰脈浮數而可下特以無表裡症之故則無表裡症句是此節要眼綱仲景曰風濕為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈浮而澀者桂枝附子湯主之目魏荔彤曰八九日或已發汗而不易衣衾不密掩覆致濕與風兼襲於表本乘陽虛而來者入而遂相搏為害仍是陽微不能御之故也夫濕與寒類再兼風雜合所以身疼體痛與傷寒相似然不嘔不渴知非表有寒邪里有鬱熱也況脈又浮虛而澀虛浮為中風虛澀為中濕而虛又專主陽微之義故不與傷寒相涉也傷寒症嘔逆而喘內熱盛也傷寒脈浮緊表邪在也無此二者而身疼體痛俱不作表治矣此一要諦也柯琴曰上條風勝濕輕故脈陰陽俱浮有內熱故汗自出宜桂枝湯下條濕勝風微故脈浮虛而澀內無熱而不嘔渴故可加附子綱仲景曰傷寒吐下後復發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿目龔信曰此從吐下復汗脈微看出是虛煩則其餘症象皆當於虛中求之而不得誤為實也綱仲景曰太陽病六七日表症仍在而反下之脈微而沉反不結胸其人發狂者熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之目黃仲理曰此病發於陽誤下熱入之症也脈微而沉宜四逆湯救之此因誤下熱邪隨經入腑結於膀胱致血燥而蓄於中惟攻其里而表自解也綱仲景曰太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血結症也抵當湯主之目喻昌曰小便不利何以見非血症耶蓋小便不利乃熱瘀膀胱無形之氣病為發黃之候也小便自利則膀胱之氣化行然後少腹滿者允為有形之蓄血矣庸工不能辨一實於此等處未著眼耳柯琴曰沉為在裡凡下後熱入之症如結胸發黃蓄血其脈必沉或緊或微或結在乎受病之輕重而不可以因症分也綱仲景曰其脈沉者營氣微也營氣微者加燒針則血留不行更發熱而煩躁也脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮熱盛反灸之此為實實以虛治因火而動必咽燥吐血微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中大氣雖微內攻有力焦骨傷筋血難復也傷寒脈浮醫以火劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之目程郊倩曰脈浮熱甚不可灸者以營分受邪束血為實故也若血少陰虛之人脈見微數尤不可灸虛邪因火內入上攻則為煩為逆陰本虛也而更加火則為追虛熱本實也而更加火則為逐實夫行於脈中者營血也血少被追脈中無復血聚矣艾火雖微孤行無御內攻有力矣無血可逼焦燎乃在筋骨蓋氣主昫之血主濡之筋骨失其所濡而火所到處其骨必焦其筋必損蓋內傷真陰者未有不流散於經脈者也雖更滋榮養血終難復舊此則枯槁之形立見縱善調亦終身為殘廢之人而已魏荔彤曰傷寒脈浮而不言緊此風多寒少之症應斟酌青龍越婢之間發汗乃以火迫劫取之火邪入而真陽出名曰陽亡真陽出而神明亂驚狂遂見程注所謂汗者心之液是也以火劫取汗火邪入心陽隨汗亡驚狂而起臥不安皆有傷心液無以養心之神而空虛之地邪火更易為害也法不可單治表當兼治里也或問汗陰液也誤發而何以陽亡所用桂枝及蜀漆等皆陽藥又何以益陰生液答曰汗液為陰而實由陽化故汗出而陽微諸藥為陽生陽所以安陰陽氣聚則陰斂生津陽氣亡則陰擾耗津陰陽相濟吉相悖凶雖陰陽皆有邪正初無二氣能於屈伸往來間調停均平此大壽之基也鰲按古來灸法本為虛症設不為風寒設首條固屬虛症但陰陽俱竭一加燒針必致發熱煩躁津液耗亡此虛者尚不可以火劫也下四條俱言灸之之變腰下重而痹腰以下不得汗也咽燥吐血由於陽盛比衄更甚也至焦骨傷筋血難復則無生理驚狂起臥不安並方寸元陽之神飛騰散亂矣燒針火灸不可妄用如此仲景所以再三告誡也後人每遇風寒即加針灸不大昧仲景之旨乎綱仲景曰太陽病發汗太多因致痙脈沉而細身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也目吳綬曰陽脈本當浮也今反沉非營氣微乎沉而兼細者非陽氣少乎其不成痙者幾希綱仲景曰太陽病關節疼痛而煩脈沉而細者此名濕痹目柯琴曰浮為風細為濕太陽脈本浮風濕為病脈陰陽俱浮浮虛而澀今關節煩疼脈反沉細者是發汗不如法但風氣去濕流骨節為著痹也綱仲景曰濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈目柯琴曰脈大不浮不關風矣脈不沉細非濕痹矣綱仲景曰太陽中暑者身熱疼重而惡寒脈微弱此以夏月傷冷水水行皮中所致也太陽中暑者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑毛聳手足逆冷小有勞身即熱口開前板齒燥目柯琴曰身熱脈微本是暑傷於氣而疼重惡寒實因寒水沐浴留在皮膚而然弦細芤遲不得連講言中暑夾寒之脈或微弱或弦細或芤遲皆是虛脈如脈浮而緊者曰弦弦而細則為虛矣脈弦而大則為芤芤固為虛芤而遲更為虛矣以此脈而見發熱惡寒身重疼痛等症雖當炎夏而虛寒可知綱仲景曰欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而自解也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必不汗出也目柯琴曰首條浮為陽盛之脈脈浮則陽自內發矣二條脈微二句承上之詞不與陰脈微對太陽病本陽浮而陰弱是陽強也今陽脈數即是陰陽俱微脈但浮者陽盛陽脈微者陽虛但陰脈微而陽脈仍浮陽重可知三條緊與數相似不同蓋有虛實之別又必按之芤不芤而虛實之真僞畢定四條內無津液陰陽豈能自和必當調其陰陽不然脈微則為亡陽將轉成陰症矣五條即傷寒三日少陽脈小為欲愈之義也此微與前條不同因未曾妄治津液未亡故三日自解陰平陽祕不須汗出正教人不宜妄汗耳附東垣辨脈李杲曰古人以脈上辨內外傷於人迎氣口人迎脈大於氣口為外傷氣口脈大於人迎為內傷此辨固是猶有未盡耳外感風寒皆有餘之症是從前客邪來也其病必見於左手左手主表乃行陽二十五度內傷飲食及飲食不節勞役不節皆不足之病也必見於右手右手主裡乃行陰二十五度故外感寒邪則獨左寸人迎脈浮緊按之洪大緊者急甚於弦是足太陽寒水之脈按之洪大而有力見乎少陰心火之脈丁與壬合內顯洪大乃傷寒脈也若外感風邪則人迎脈緩而大於氣口一倍或兩倍或三倍內傷飲食則右手氣口脈大於人迎一倍傷之重者過在少陰及兩太陰則三倍此內傷飲食之脈若飲食不節勞役過甚則心脈變見於氣口是心火刑肺其肝木挾心火之勢亦來薄肺經云侮所不勝寡於畏者是也故氣口脈急大而澀數時一代而澀也澀者肺之本脈代者元氣不相接脾胃不及之脈洪大而數者心脈刑肺也急者肝木挾心火而反克肺金也若不甚勞役惟右關脾脈大而數謂獨大於五脈數中顯緩時一代也若飲食不節寒溫失所則必右關胃脈損弱甚則隱而不見惟內顯脾脈之大數微緩時一代也宿食不消則獨右關脈沉而滑經云脈滑者有宿食也以此辨也豈不明白易見乎風傷衛寒傷營綱仲景曰太陽病發熱汗出惡風脈緩者名為中風太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨肉煩疼當發其汗也目朱肱曰脈浮而緩寸大而尺弱自汗體熱頭疼惡風熱多寒少其面光不慘煩躁手足不冷此名傷風也傷風之候當解肌宜桂枝湯輕者只與柴胡桂枝湯敗毒散獨活散選用又凡脈緊必無汗惟濡而緊卻有汗勿誤用小建中湯是脈浮而緩者方可用桂枝湯又項背強者桂枝湯加葛根也本草葛根主傷風有濕開竅解肌蓋桂枝加葛根謂中風有濕當加之取微汗以去風濕裡寒者桂枝去芍藥加附子湯也不飲水者是也又凡發汗汗不止為漏風桂枝加附子湯腹滿者太陰症脈浮者可服桂枝湯微發汗腹痛者桂枝加芍藥湯痛甚者桂枝加大黃湯雖然桂枝湯自西北二方居人四時行之皆驗江淮間惟冬及春初可行春末及夏至前桂枝症可加黃芩半兩陽旦湯是也至夏至後加知母一兩石膏二兩若病人素虛正用古方大抵用溫藥當避春熱藥當避夏脈浮而緊澀頭疼身體拘急惡寒無汗寒多熱少面色慘而不舒腰脊疼痛手足指末微厥不燥煩此名傷寒宜發汗解麻黃湯主之輕者桂枝麻黃各半湯人參順氣湯蔥豉湯蒼朮散麻黃葛根湯選用然太陽亦有熱多寒少者須仔細看脈症也熱多寒少不嘔清便自可宜桂麻各半湯若脈浮雖熱多寒少自可發汗若脈弱者無陽也桂枝二越婢一湯熱多寒少而尺遲者營氣本足血少故也先以小建中湯加黃耆最良尺尚遲再一劑又太陽症宜汗而其人適失血及下利則頻頻少與桂枝湯使體潤當自解假如淋家衄家法不可汗亦可以小柴胡之類和解之又問傷風與傷寒何以別之答曰傷寒者脈緊而澀傷風者脈浮而緩傷寒者無汗脈澀傷風者有汗脈緩傷寒者畏寒不畏風傷風者畏風不畏寒大抵太陽病者必脈浮發熱惡風惡寒也六經皆有傷風傷寒其症各異太陽脈浮有汗為中風脈緊無汗為傷寒陽明善飢為中風不食為傷寒少陽耳聾目赤胸滿而煩為中風口苦咽乾目眩為傷寒若三陰傷風無變形異症但四肢煩疼餘症同三陽風傷衛者病在皮膚之間也以衛行脈外為陽主外皮膚間衛氣之道路故其病淺寒傷營者寒氣中於肌肉也以營行脈中為陰主內肌肉間營氣之道路故其病深故桂枝麻黃各別慎勿誤用李梴曰傷風初症惟頭疼口和不惡食與傷寒同緣寒乃陰邪風乃陽邪所以傷寒鬱而後能發熱傷風即能發熱傷寒手足微厥傷風手足背皆熱傷寒無涕傷風流涕聲如甕中傷寒面慘身痛傷風面光聲重傷寒無汗惡寒不惡風傷風有汗惡風不惡寒甚者汗出不止灑灑惡風復嗇嗇惡寒冬月桂枝湯自汗小便數芍藥甘草湯自汗小便利腳蜷急桂枝加參附輕者柴胡桂枝湯自汗渴而小便難邪漸傳裡五苓散自汗不渴邪在表茯苓桂甘湯三時防風沖和湯柴胡桂枝湯或敗毒散去茯苓鼻塞通關散通用柴胡半夏湯古立六經傷風湯但三陰藥皆辛熱似非傷寒家法仲景治傷寒傷風表症分有汗無汗里症同於和解通利更無分別今詳桂附八物恐亦風邪直傳陰分其人素虛或房室後傷風則可若概作表藥誤人多矣蓋傷風發表辛熱不如辛溫辛溫不如辛涼也或疑六淫仲景特詳於風寒而略於暑濕且不及燥火何也蓋暑火同氣燥濕同源風寒傳遍六經暑濕性偏著人五臟壯者氣行則已怯者乃著為病故耳先傷寒而後傷風者症傷寒也而見傷風之脈先傷風而後傷寒者症傷風也而見傷寒之脈此乃營衛俱實故無汗而煩躁者大青龍湯不煩躁者麻桂各半湯通用大羌活湯九味羌活湯加人參大棗或神朮散香蘇散陳氏士鐸曰凡病初起用藥原易奏功無如人看不清用藥錯亂往往變症蜂起苟認得清用得當又何變症之生耶如傷風必然頭痛身疼咳嗽痰多切其脈必浮此傷風也即以防風荊芥柴胡甘草黃芩半夏各一錢服即止不再劑也傷寒初起鼻塞目痛項強頭亦痛然切其脈必浮緊此傷寒也若以傷寒治之即愈方用桂枝甘草陳皮葛根各一錢不再劑朱震亨曰仲景論傷寒而未及乎中寒先哲治冒大寒昏中者用附子理中湯其議藥則得之矣曰傷曰中未有議其異同者夫傷寒有即病不即病因其舊有鬱熱風寒外來肌腠自密郁發為熱病邪循經而入以漸而深初用麻黃桂枝輩微而安以病體不甚虛也若中寒則倉卒感受其病即發而暴因其腠理疏豁一身受邪難分經絡無熱可發溫補自解此氣大虛不急治則死矣傷風傷暑傷濕亦如傷寒之漸入者中風中暑中濕亦如中寒者之卒暴而受也陶華曰風傷衛氣寒傷營血者緣氣本屬陽風亦屬陽陽則從陽故傷衛氣陽主開泄皆令自汗故用桂枝湯辛甘溫之劑以實表血本屬陰寒亦屬陰陰則從陰故傷榮血陰主閉藏皆令無汗故用麻黃湯輕揚之劑以發表正所謂各從其類也附録胃風論李梴曰肺主皮毛通膀胱最易感冒新咳嗽惡風鼻塞聲重噴嚏是也柴胡半夏湯參蘇飲寒月麻黃杏仁飲重者頭疼身痛寒熱咽乾音啞柴胡桂枝湯防風沖和湯頭痛甚者川芎茶調散痰多者金沸草散挾熱人參敗毒散升麻葛根湯挾寒十神湯挾寒濕消風百解散挾濕神朮散挾暑香葛湯時行柴胡升麻湯服食過厚素有痰火時常鼻塞流涕聲重咳嗽略被外感則甚者防風通聖散或大黃芩等分為丸白水下素虛者只用防風羌活川芎隨宜加入補藥痰藥傷食加白朮青皮陳皮山楂麥芽挾形寒飲冷加薑桂挾房勞加參朮歸地挾勞役傷氣者補中益氣湯加羌防風虛甚者羌活丸加味烏金丸風中傳裡一同傷寒治法風能燥血散氣故古用桂枝八物等湯久不愈者只宜三白湯加減斂之切忌疏泄雖初起非寒月無汗麻黃禁用附録傷風見寒傷寒見風論朱肱曰有發熱惡寒躁煩手足溫而脈反浮緊者有寒多熱少不煩躁手足微冷而脈反浮緩者此名傷風見寒脈傷寒見風脈也蓋發熱惡寒煩躁手足溫為中風候脈浮緊為傷寒脈是中風見寒脈也寒多熱少不煩躁手足微厥為傷寒候脈浮緩為中風脈是傷寒見風脈也中風見寒脈傷寒見風脈宜服大青龍湯蓋大青龍症脈似桂枝反無汗病似麻黃反煩躁是也脈弱有汗為桂枝症脈緊不煩躁為麻黃症大青龍湯治病與麻黃湯症相似但病尤重而又加煩躁者用大青龍也以其風寒俱盛故青龍湯添麻黃作六兩又似合桂枝湯藥味在內添石膏所以為緊此治榮衛俱病若症不審誤用大青龍則發汗多傷人以其有煩躁一症故可用大青龍湯陶華曰熱盛而煩手足自溫脈浮而緊此傷風見寒脈也不煩少熱四肢微厥脈浮而緩此傷寒見風脈也二者為榮衛俱病法雖用大青龍此湯險峻不可輕用須風寒俱盛又加煩躁方可與之不若羌活沖和湯為神藥也一法用桂枝麻黃湯發熱綱仲景曰太陽病頭痛發熱汗出惡風者桂枝湯主之太陽病發熱而渴不惡寒者為溫病發汗已身灼熱者名曰風溫太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之傷寒脈浮緩發熱惡寒無汗煩躁身不疼但重乍有輕時無少陰症者大青龍湯主之目朱肱曰發熱而惡寒者屬太陽也蓋太陽主氣以溫皮膚分肉寒氣留於外皮膚緻密則寒栗而發熱宜發其汗故麻黃大青龍主之若溫病則發熱而不惡寒風溫亦灼熱而不惡寒也劉完素曰潮熱有時而熱不失其時寒熱寒已而熱相斷而發發熱則無時而熱也翕翕發熱熱在外也故與桂枝汗以散之蒸蒸發熱熱在內也故與調胃承氣下以滌之發熱屬表風寒客皮膚陽氣怫鬱也發熱屬裡陽氣下陷陰中也觀其熱所由來而汗下之若熱先自皮膚髮者邪在外也熱先自里生而發達於表者邪在裡也在表在裡俱有發熱邪在半表半裡者亦發熱也或始自皮膚而漸傳裡熱或始自內熱而外達於表蓋邪在表表熱里不熱也邪在裡裡熱甚而達於表也在半表半裡則表裡俱發熱也王肯堂曰凡病鮮有不發熱者內傷外感其大關鍵也人迎脈大於氣口為外感氣口脈大於人迎為內傷外感則寒熱齊作而無間內傷則寒熱間作而不齊外感惡寒則近烈火不能除內傷惡寒得就溫暖而必解外感惡風乃不禁一切風內傷惡風惟惡些小賊風外感症顯在鼻故鼻氣不利壅盛而有聲內傷症顯在口故口不知味而腹中不和外感則邪氣有餘故發言壯厲先輕而後重內傷則元氣不足故出言懶怯先重而後輕外感頭痛常常而痛內傷頭痛時止時作外感手背熱手心不熱內傷手心熱手背不熱東垣辨法大要如此或有內傷而無外感或有外感而無內傷以此辨之判然矣若夫內傷外感兼病者則其脈症並見而難辨尤宜細心求之若顯內症多者則內傷重而外感輕宜以補養為先若顯外症多者則外感重而內傷輕宜以發散解表為急此又東垣未言之意也陳士鐸曰人病發熱必先散其邪氣俟邪氣速去然後再扶其正氣則正氣不為邪氣所害方用柴胡荊芥半夏黃芩甘草各一錢煎服則邪散而身涼蓋四時不正之氣犯人必由皮毛而入營衛今用柴胡荊芥先散皮毛之邪邪既先散安得入里半夏祛痰使邪不得挾痰作祟黃芩使不得挾火作殃甘草和中邪既先散而正氣又不相虧人肯先服此藥何至由皮毛以入營衛入臟腑至傳經深入哉一方柴胡當歸山梔甘草陳皮各一錢花粉白芍各二錢此方凡肝氣鬱者一劑即快不必專治外感也治內傷初起者神效又方當歸二錢柴胡白芍茯苓甘草桂枝各一錢陳皮五分冬月加麻黃此方專治傷寒初起者神效乘其尚未傳經可從補正之中兼用祛邪之品而熱散之也蓋初起之邪尚不敢與正氣相敵故一補正氣而邪氣自消及一傳經則正氣遁入臟腑不敢與邪相爭愈補而愈不能出矣故一傳經藥即不可用補今用桂枝以散熱或加麻黃以祛寒寒熱相攻邪難內入又有正氣之健以助之所以一劑而愈也綱仲景曰太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之目朱肱曰此二湯乃治發熱而微惡寒者也張介賓曰邪氣在表發熱者表熱里不熱也溫散之邪氣在裡發熱者裡熱甚而達於外也宜清之柯琴曰熱多是指發熱不是內熱無陽是陽已虛而陰不虛無陽不可發汗便是仲景法旨柴胡桂枝湯乃是仲景佳方若不頭項強痛便不須合桂枝矣微惡寒便是寒少煩疼只在四肢骨節間比身疼腰痛稍輕此外症將解而未去之時也微嘔是喜嘔之兆支結是痞滿之始是在半表半裡矣外症微故取桂枝之半內症微故取柴胡之半雖不及脈而微弱可知發熱而煩則熱多可知仲景制此輕劑以和解便見無陽不可發汗用麻黃石膏之誤矣綱仲景曰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之目戴原禮曰陰經不發熱惟少陰能發熱然少陰發熱有二症初得病即見少陰症發熱惡寒頭不疼宜麻黃附子細辛湯若下利清穀身熱躁擾裡寒外熱仲景謂之反發熱此乃陰盛格陽宜四逆湯附子理中湯蓋陽氣傳陰經而下利者乃是熱利陽陷入里外所以無熱陰氣入陰經而下利者乃是裡寒自利寒既在裡為主則陽氣必客於外所以反發熱要知陰症發熱自是不同發於陽而發熱者頭必疼發於陰而發熱者頭不疼此為驗也又有汗下後陰陽不相入水火不相濟致餘熱未退不可更用冷藥內外俱未可妄治故宜小建中湯若其人已虛虛能生熱宜小建中湯加當歸或四君子湯加黃耆或十全大補湯調其榮衛虛者真武湯審是熱邪未解雖經汗下卻不畏寒宜竹葉石膏湯王肯堂曰汗後復發熱脈躁疾不為汗衰狂言不能食陰陽不交及下利發熱者死脈陰陽俱盛熱不止者死中風即發熱者風傷衛也傷寒不即發熱者寒傷營也其在少陰厥陰發熱者謂之反發熱惟太陰無發熱之候柯琴曰此太陽症合用桂枝卻用麻黃之類發汗者故多亡陽而仍發熱必主以真武湯也鰲按真武湯本少陰方陽亡則內虛寒故必用此也綱仲景曰太陽病重汗而復大下之不大便五六日舌上燥而渴日晡小有潮熱從心下至小腹硬滿而痛不可近者大陷胸湯主之目朱肱曰太陽有潮熱乎仲景大陷胸湯一症結胸有潮熱者為大結胸屬太陽也樓全善曰此妄汗下而將轉屬陽明猶尚未離乎太陽者也日晡潮熱陽明病然心下者太陽之位小腹者膀胱之室從心下至小腹痛是下後熱入水結所致非胃家實故不得名為陽明病綱仲景曰脈陰陽俱虛熱不止者死目朱肱曰大抵傷寒八日以上大發熱者難治綱仲景曰傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之目方中行曰傷寒汗不出得汗即解者以有風而誤於偏攻熱反入里所以變痞硬嘔吐而下利也故用大柴胡合表裡而兩解之魏荔彤曰發熱汗出不解太陽已傳陽明二者陽明症也夫太陽所感寒邪入心中作痞硬而寒鬱內生之熱邪作嘔吐而下利是病全離太陽而入陽明矣其不成胃實者惟心中素有痰飲故邪結於彼而成痞硬胃中自不能復結為實故是已傳陽明而未全在陽明未可以承氣下者故制此方於下之中兼升散開破二義陽明之邪柴胡驅之於少陽而表解大黃復通之於大便而里和尚何有陽明之症足留乎所謂兩解之法也是不必專言柴胡治少陽而柴胡之用已神不必專言胃實方可下而大黃之用已得矣非仲師孰能具此手眼乎綱仲景曰傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之目喻昌曰丸藥大下徒傷其中而不能蕩滌其邪梔子乾薑亦溫中散邪法也虞摶曰攻裡不遠寒用丸藥大下之寒氣留中可知心微煩而不懊憹則非吐劑所宜也用梔子解煩倍乾薑以逐內寒而散表熱寒因熱用熱因寒用二味成方而三法備綱仲景曰傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之發汗若下之而煩熱胸中窒者梔子豉湯主之目魏荔彤曰大下後身熱不去猶帶表症也心煩變為心中結痛是表症仍未解而里症已迫也在表原屬陰邪久未除在裡則為陽邪久成郁梔子苦寒治心中成郁之陽邪香豉香辛治在表未散之陰邪而此症可愈其胸中窒者雖未至於結痛而窒久必痛也亦可早為之計而仍主此一法也柯琴曰病發於陽而反下之外熱未除而心中結痛雖輕於結胸而甚於懊憹矣結胸是水結胸脅用陷胸湯水鬱則折之也此乃鬱結心中用梔豉湯火鬱則發之也綱仲景曰傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之目魏荔彤曰小青龍治水氣者治在裡久積之陰邪治風寒者治胸膈暫郁之熱邪程氏謂下寒者類多上熱一句破的矣學者識之綱仲景曰太陽病脈浮緊發熱無汗自衄者愈太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之目方中行曰純是寒邪傷營故脈浮緊發熱無汗然寒邪之著營輕微且兼中風陽邪變熱上衝故自衄愈若脈浮緊發熱無汗而身竟疼痛則寒重風輕當發汗矣其劇者必衄畢竟少帶中風之陽邪也綱仲景曰服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白朮湯主之目喻昌曰服桂枝治風而遺其寒所以不解而症變設更下之邪乘虛入里在表之風寒未除在裡之水飲上逆故變五苓兩解之法以茯苓白朮為主雖因已誤而去桂枝不得不用白芍以收陰甘草薑棗以益虛和脾胃也魏荔彤曰太陽傷風頭項強痛翕翕發熱而汗出今汗不出則中風而兼傷寒矣但與桂枝治風不效矣復下更誤矣心下滿微痛小便不利乃下藥陰寒之氣挾寒邪作痞挾風邪作痛動積飲而阻閉陽氣上下不流動故耳本方專主補土滲濕使在裡下藥之陰邪先除然後可治其表邪耳以表邪雖仍在而輕微故先以誤下之陰邪入里為患是急厥陰所云先溫其里乃攻其表亦此義也參觀之綱仲景曰傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表症者白虎加人參湯主之目張從正曰白虎湯但能解熱不能解表必惡寒身疼頭痛之表症皆除但渴而求救於水者方可與之樓英曰如其人渴欲飲水與之水果能飲是表邪已變熱而入之深矣再診其脈已無浮緩浮緊之表脈再審其症已無頭身疼痛發熱無汗之表症即可用白虎湯但加人參止其燥渴仍藉辛涼為半表裡之治耳綱仲景曰傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之目魏荔彤曰吐下俱非致風寒之邪久而變熱熱又久而結聚在裡而在裡之氣血亦鬱而生熱所謂表裡俱熱者也內熱盛則外陽疏時時惡風若似表症而大渴云云俱是一派實熱結里之象故不特陽虛之裡當急救陽即陰消之裡亦當急救陰也故仍用人參白虎兼內清外散之用綱仲景曰傷寒瘀熱在裡身必發黃麻黃連翹赤小豆湯主之傷寒身黃發熱者梔子柏皮湯主之目喻昌曰傷寒之邪得濕而不行所以熱瘀身中而發黃故用外解之法設泥里字豈有邪在裡而反治表之理哉熱已發出於外自與內瘀不同正當隨熱勢清解其黃俾不留於肌表間也前條熱瘀故用麻黃此條發熱反不用麻黃者蓋寒濕之症難於得熱熱則其熱外出而不內入矣所謂於寒濕中求之不盡泥傷寒定法此其一徵也方中行曰熱發於外則里症較輕故解之以梔子而和之以甘草以為退熱之輕劑
