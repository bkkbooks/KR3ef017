body:
  text: 卷十一少陽經症少陽經脈綱仲景曰傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而躁目朱肱曰足少陽膽經之脈起目外眥絡於耳遂分為四道下缺盆循於脅並正別脈六道上下主經營百節流氣三部故病人胸脅痛而耳聾或口苦咽乾或往來寒熱而嘔其脈尺寸俱弦者知少陽經受病也少陽受病口苦咽乾目眩宜小柴胡湯以解表不可發汗發汗則譫語譫語屬胃胃和則愈胃不和則煩而躁宜調胃承氣湯此屬少陽陽明也脈細頭疼嘔而發熱者屬少陽也小柴胡湯病人不渴外有微熱者小柴胡加桂枝也夫小柴胡加桂主表熱最良不特傷寒也仲景云表有熱者小柴胡加桂也里有熱者白虎加人參也大抵身熱不飲水者為表熱口燥煩渴者為裡熱二藥均治發熱然分表裡焉王好古曰辨表裡中三說假令少陽症頭痛往來寒熱脈浮此三症但有其一即為表也口失滋味腹中不和大小便或祕而不通或泄而不調但有其一即為里也如無上下表里症余皆虛熱也是病在其中矣張元素曰少陽膽經縈迂盤曲多於各經乃少陽篇中症治至簡又不聞何藥為本經正法何也夫經絡所據太陽在後為表陽明在前為里少陽在側夾於表裡之間故曰半表半裡治法表宜汗里宜下既居兩間非汗下所宜故治療無正法經云少陽不可發汗發汗則譫語又曰不可吐下吐下則驚而悸則汗吐下三法皆少陽所忌其劑不過和解而已所以仲景止用小柴胡至當也然而經絡未別雖多所行非由正道少陽所以病少之故故為病亦不多也喻昌曰少陽傷寒禁汗少陽中風禁吐下二義互舉其旨益嚴蓋傷寒之頭痛發熱似宜發汗者尚不可汗則傷風之不可汗不待言矣中風之胸滿而煩痰飲上逆似宜可吐下者尚不可吐下則傷寒之不可吐下更不待言矣脈弦細者邪欲入里在胃之津液必為熱耗重復發汗而驅其液於外出安得不譫語乎胃和者邪散而津回不和者津枯而飲結所以煩而悸也他條曰少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚鰲按潔古以少陽不可汗吐下謂治療無正法此蓋其語病也特其意義猶未乖耳蓋病在太陽之表固以汗為正法病在陽明之裡又以下為正法症在太陽陽明可上越者更以吐為正法今症在半表半裡之間既不可汗吐下因設立小柴胡和解法有和法則無須於下而自泄有解法則無須於汗而自達有和且解法則無須於吐而自升是汗為太陽正法下為陽明正法吐為太陽陽明俱用之正法者和解即少陽之正法而小柴胡湯即治療少陽正法之藥也豈必以汗吐下方為正法而舍汗吐下之外和解即非正法乎甚矣其語之為病也弦直也直而細是木初生之象故弦細之脈屬少陽得是脈而但見頭疼發熱無太陽脈症者便當從少陽而以和解為法不可作太陽治也綱仲景曰傷寒陽脈澀陰脈弦法當腹中急痛先用建中湯不瘥者小柴胡湯主之目魏荔彤曰陽脈以虛而反見澀陰脈以寒而獨見弦是陽微而陰盛之診若執一以用小柴胡恐半表者以虛而不能越於外半里者以寒而更且陷下故當其症見腹中急痛雖屬少陽病或中之一症亦且不治其表裡急治其裡虛仲師示人先用小建中以奠安內虛助其生胃陽使小柴胡之力有所憑藉然後能上升下降指揮如意所以服建中湯後少陽病不瘥仍與小柴胡湯主之法無改圖而道有先後亦即太陽陽明諸篇裡虛先治里之義柯琴曰尺寸俱弦少陽受病也今陽澀陰弦是寒傷厥陰而不在少陽矣寸為陽陽主表澀者陽氣不舒表寒不解弦為木邪必挾相火相火不能禦寒必還入厥陰而為患厥陰脈抵少腹挾胃屬肝絡膽則腹中皆厥陰部也尺為陰陰主裡弦者為肝脈必當腹中急痛矣肝苦急甘緩酸瀉辛散此小建中為厥陰驅寒發表平肝逐邪之先著也豈漫用著哉鰲按魏柯二家之說不同柏鄉專主虛寒謂與太陽陽明諸症同一裡虛先治里之義固非無識而韻伯據腹中急痛特揭寒傷厥陰不在少陽更為眼明手捷且少陽厥陰相表裡但病而傷及肝亦裡之常況脈陽反澀而陰獨弦其非專屬少陽受病而尺寸俱弦者可比矣且兩說雖異而理不悖故並存之閲者互參可也綱仲景曰傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈沉細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微結假令純陰結不得復有外症悉入在裡矣此為半在表半在裡也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解目朱肱曰假令病人心下滿口不欲食大便硬脈沉細是里症當下其人頭汗出微惡寒手足冷卻當汗此兩症俱見者仲景所謂半在表半在裡也小柴胡湯主之魏荔彤曰有太陽陽明二陽為病但見少陽脈即當從少陽法治者尤不可不辨明其陰陽虛實而妄為汗下與溫補也得屎而解有二義如其不了了旋覆自能得屎則不了了者亦了了矣此一義也如不了了而陽明之裡已有燥屎因用大柴胡兼調胃承氣蕩滌之則濁降清升不了了者始得了了此又一義也綱仲景曰得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔食谷噦者柴胡不中與也目柯琴曰浮弱為桂枝脈惡風寒為桂枝症然手足溫而身不熱脈遲為寒為無陽為在臟是表裡虛寒也法當溫中散寒而反二三下之故成太陽中風之壞病非柴胡症矣綱仲景曰本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈弦細者與小柴胡湯若已吐下發汗溫針譫語柴胡症罷此為壞病知犯何逆以法治之目朱肱曰太陽病不解轉入少陽云云以小柴胡主之者蓋脈弦細頭痛發熱屬少陽也方中行曰壞病之成不必若吐若下若溫針一誤再誤三誤方謂之壞病但應與而不與不應與而與以致病變他症者皆壞病也即屢誤至再至三而病未嘗變雖誤又何嘗壞乎仍以本症之法治之治其誤而壞痞亦同法也所以名之為壞者由於誤誤必救之救其逆而反於順也故壞病不必論其重輕視其本病及誤壞之治各有輕重焉治法亦救其可救不必震於壞誤之名遂束手也不能救其不可救者固以前醫藥之咎然人生有命正於此可參觀矣綱仲景曰陽明少陽合病必自下利其脈不負者順也負者失也互相剋賊名為負少陽負趺陽者為順也目魏荔彤曰仲師他處但言逆順此獨言勝負者知其勝負而後可言順逆也又獨言失而不言得以順逆之故明而得失瞭然矣請申互相剋賊之義此得失順逆之大關乎胃之本為陽土標為燥金能腐化水穀燥金之氣為用大矣今使少陽相火乘之則金氣柔而不剛烏能熟化水穀且有濕膩黏滯之物烏得不留停故人知胃土受木克賊者多而知燥金受相火克賊者甚少故特明曰互相剋賊示人切矣況胃陽土也雖津液與水穀相溷於內然實以津液消水穀而又以水穀化津液以消即為化以化即為消其理微妙苟非燥金之氣流動充滿何以為消化乎是此金氣即天一至清之氣又與津液相附而不相雜如在天之氣在地之氣共一理也有時此金氣為正氣而生津液有時此金氣為寒燥反耗津液此理至幻而至常非知此何以明陽明胃土為本燥金為用乎再者脾與胃表裡固為輸運之專司但終在胃外斡旋其燥金之氣則流行胃中而主消化之權者何容有負而致敗乎學者於六經標本由此推詳得解庶可言醫也夫勝負之機如用兵然必養之裕培之厚斯有勝無負若不培養必至負也非借外援以相救則另攻其要害使之自退而已小柴胡之用攻木之要害使自退也用黃芩借外救以蘇燥金之氣也危亦林曰兩陽合病者其脈必兼見兩陽也陽明之脈大少陽之脈弦此順脈也若但大而不弦則少陽負矣但弦而不大則陽明負矣皆不順之脈所謂互相剋賊也然木剋土是少陽為賊邪若少陽負而陽明不負亦負中之順脈也此不可不知綱仲景曰太陽與少陽並病脈弦頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門目魏荔彤曰考穴圖大椎為督脈之穴居身後肺肝俞俱屬膀胱之穴亦次第由大椎而下同居於背是皆太陽行身後之道路也於此三刺皆泄太陽經表邪而於肺肝膀胱之臟腑無涉諸家牽附總由不知刺三穴泄經邪之義耳李時珍曰脈弦為少陽頭項強痛為太陽眩冒結胸心下痞則兩陽皆有也綱仲景曰傷寒三日少陽脈小者欲已也目喻昌曰脈不弦大邪微欲解之先徵也魏荔彤曰少陽之脈本木形因邪在而增助其弦長今邪漸欲已故脈見小弱正為邪退之象不可誤以為正虛脈微妄為溫補也寒熱往來綱仲景曰傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之但見一症便是不必悉具目朱肱曰寒熱往來者陰陽相勝也陽不足則先寒後熱陰不足則先熱後寒然寒熱有三症小柴胡湯大柴胡湯柴胡桂枝幹薑湯有表症而往來寒熱者用小柴胡即本條是也有里症而往來寒熱者用大柴胡即傷寒十餘日熱結在裡往來寒熱者大柴胡主之一條是也或已表或已下而往來寒熱者皆用柴胡桂枝幹薑湯即傷寒五六日已發汗復下之胸脅滿小便不利渴而不嘔頭汗出往來寒熱心煩柴胡桂枝幹薑湯主之一條是也劉完素曰寒為陰熱為陽里為陰表為陽邪客於表為寒邪與陽相爭則為寒矣邪入於裡為熱邪與陰相爭則為熱矣其邪半在表半在裡外與陽爭而為寒內與陰爭而為熱矣表裡不拘出入不定由是而寒熱且往且來也是以往來寒熱屬半表半裡之症邪居表多則多寒邪居里多則多熱邪在半表裡則寒熱亦半小柴胡專主之也又有病至十餘日熱結在裡復往來寒熱者亦可與大柴胡下之不可不知也張介賓曰寒熱往來者陰陽相爭陰勝則寒陽勝則熱也蓋熱為陽寒為陰表為陽里為陰邪之客於表者為寒邪與陽相爭則為寒栗邪之傳於裡者為熱邪與陰相爭則為熱躁其邪在半表半裡之間者外與陽爭則為寒內與陰爭則為熱或表或里或出或入是以寒熱往來為半表半裡之症也故凡寒勝者必多寒熱勝者必多熱但審其寒熱之勢則可知邪氣之淺深也柯琴曰往來寒熱有三義少陽自受寒邪陽氣衰少既不能退寒又不能發熱至五六日熱鬱內發始得與寒氣相爭而往來寒熱一也若太陽受寒過五六日陽氣始衰餘邪未盡轉屬少陽此往來寒熱二也風為陽邪少陽為風臟一中於風便往來寒熱不必五六日而始見三也往來寒熱便有不寒熱時此病情之見於外者綱仲景曰血弱氣盡腠理開邪氣因入與正相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之目劉完素曰邪氣入正氣不爭則但熱無寒正與邪爭寒熱作矣爭則氣鬱不發於外而寒熱爭焉爭甚則憤然而熱故寒已而熱作焉茲乃寒熱之理也魏荔彤曰此總見婦人經來適斷之時血既出而必弱血室中之氣亦隨之盡矣此際內虛則表疏腠理開而邪氣易乘以入隨與正氣相搏正氣足則邪入可拒正氣虛則邪入相溷凡病皆然也既屬婦人血分之病則肝為血之專司其部位正在脅下正氣忽盛而拒正氣忽衰而迎與邪迎拒遂作分爭之勢且梗塞阻滯於陰陽升降道路之間於是往來寒熱休作有時兼見默不欲飲食純為少陽之症誰知此非傷寒由太陽而陽明而少陽遞傳之邪乎蓋熱入血室可以在太陽即入亦可以太陽罷而入迥非傷寒傳經必由太陽陽明方入少陽也此治法雖同於少陽病之由來大不同於男子之得少陽病也所以然者肝木屬臟為厥陰膽木屬腑為少陽二木同氣部位又相連熱入血室肝既司血肝必為邪所乘膽附於肝邪入肝分必侵膽為患一臟一腑體既相連病則俱病又不比於別臟腑表裡之義矣於是熱入而血結血結而為痛痛則氣沉氣沉則痛愈下然少陽之膽畢竟屬陽其性上升厥陰之肝畢竟屬陰其性下降膽有邪自高而上衝斯作嘔也肝有邪自下而沉結斯作痛也邪高痛下故使嘔也何非熱入血室血結少陽之所致乎症固非傷寒之少陽而婦人熱入血室邪在少陽之本位法寧不從少陽為治耶小柴胡主之其升清降濁之義已言之矣此申明婦人經來經斷熱邪易入血室與男子不同病之大旨也然男子有病即非傷寒之遞傳其病原屬少陽者亦未嘗不可即其法以通治之也此仲師專為婦人熱入血室明其來自太陽無關陽明病結少陽所以然之故也再繹熱入血室即結於血室亦能作寒熱往來如瘧狀何也亦是臟腑相連邪高痛下之義肝膽之血與血室之血一血也結於下則上亦不通不通則不能升降矣所以寒熱作而如瘧也不必謂熱入血室而血結於肝下也綱仲景曰太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈弦細者與小柴胡湯若已吐下發汗溫針譫語柴胡症罷此為壞病知犯何逆以法治之目陶華曰小柴胡專主往來寒熱如寒多者加桂熱多者加大黃此其大法也綱仲景曰傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之初服微煩復服汗出則愈目魏荔彤曰此亦三陽並見之症宜從少陽治之而少變其法也蓋已發汗而表未除復下之而里邪入胸脅滿微結是太陽外感之邪瀰漫於三陽胸滿太陽也脅滿少陽也因不專滿在胸故其結較結胸也微又可見陽明亦病小便不利渴而不嘔津液短而化氣衰胃病可知矣此所以三陽俱病也未解者不獨陽明少陽正太陽表邪未盡解也太陽未解似宜治表然陽明少陽已病不可復發汗法應三陽並治而以太陽少陽為兩路出邪之門戶蓋少陽之邪終亦必由太陽透表故治少陽亦所以治太陽也陽明更不必專治矣本方以柴胡為主意在少陽入桂枝太陽之治寓焉去人參加乾薑下藥寒結可開易半夏為栝蔞根已傷之津液可復牡蠣制水安神小柴胡升清降濁使半表解半里和者是又小柴胡加減法外神明之一法一了百當者也柯琴曰汗下後柴胡症仍在仍用柴胡湯加減此因增微結一症故變其方耳綱仲景曰傷寒十餘日熱結在裡往來寒熱者宜與大柴胡湯目柯琴曰里者對表而言不是指胃此熱結氣分不屬有形故十餘日復能往來寒熱若結在胃則蒸蒸發熱不復知有寒矣面色綱仲景曰太陽病得之八九日如瘧狀面色反有熱色者未欲解也以其不得小汗出身必癢宜桂枝麻黃合半湯太陽病醫發汗仍發熱惡寒復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針得胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈太陽病發汗太多因致痙脈沉而細身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈陽明病面合赤色不可下之必發熱色黃小便不利也目虞摶曰凡看傷寒必先察色內經曰聲合五音色合五行聲色符同然後可以知五臟之病也然肝色青其聲呼肺色白其聲哭心色赤其聲笑脾色黃其聲歌腎色黑其聲呻也且四時之色相生則吉相剋則凶如青赤見於春赤黃見於夏黃白見於長夏白黑見於秋黑青見於冬此相生之色也若肝病之色青而白心病之色赤而黑脾病之色黃而青肺病之色白麵赤腎病之色黑而黃此相剋之色為難治矣且以五臟之熱色見於面者肝熱則左頰先赤肺熱則右頰先赤心熱則額先赤脾熱則鼻先赤腎熱則頤先赤也至於面黑者為陰寒青為風寒青而黑主風主寒主痛黃而白為濕為熱為氣不調青而白為風為氣滯為寒為痛也大抵黑氣見於面多凶為病最重若黑氣暗中明準頭年壽亮而滋潤者生黑而枯夭者死此乃略舉其要內經以五色微診可以自察難經曰望而知之謂之神故色不可不察也楊士瀛曰凡看傷寒必先察其色然後切脈審症乃可合以決死生吉凶夫色有青黃赤白黑見於面部皮膚之上氣有如亂絲亂髮之狀隱於皮里也蓋五臟有五色六經有六色皆見於面以應五行相生吉相剋凶滋潤生桔夭死自準頭年壽命宮法令人中皆有氣色其潤澤而明亮者吉暗晦而枯燥者凶又當分四時生克之理而通察之庶無誤也鰲按面青之說詳於諸家俱據論太陽陽明少陰皆有面色可驗不獨少陽也當循各經驗之諸經之說獨載於少陽者從便耳綱仲景曰得病五六日脈遲浮弱惡風手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔食谷噦者柴胡不中與也目王肯堂曰青色屬木主風主寒主痛乃厥陰肝經之色也凡面青唇青者陰極也若舌卷囊縮者宜急溫之如夾陰傷寒小腹痛則面青也內經曰青如翠羽者生青如草葉者死青而黑青而紅相生者生青白而枯燥相剋者死脾病見青氣多難治黃色屬土主濕乃足太陰脾經之色也黃如橘子明者熱也黃如熏黃而暗者濕也凡黃而白黃而紅相生則吉黃而青相剋則凶內經曰黃如蟹膏者生黃如枳實者死若準頭年壽印堂有黃氣明潤者病退而有喜兆也若枯燥而夭者死凡病欲愈目眥黃也長夏見黃白則吉黃青剛凶赤色屬火主熱乃手少陰心經之色也在傷寒見之而有三陽一陰之分如足太陽屬水寒則本黑熱則紅也經曰面色緣緣正赤者陽氣怫鬱在表汗出不徹故也當發其汗若脈浮數表熱不汗出者面色紅赤而光彩也經言陽明病面合赤色者不可攻之合者通也表未解不可攻裡也若陽明內熱惡熱不惡寒或蒸蒸發熱或日晡潮熱大便祕結譫語面赤者此實熱在裡可攻之也如表裡俱熱口燥舌乾飲水脈洪而赤里未實者且未可下人參白虎湯和之如少陽經病熱半表半裡面赤脈弦者小柴胡湯不可下也經言少陰病下利清穀裡寒外熱面赤者四逆湯加蔥白此陰寒內極逼其浮火上行於面故發赤色非熱也若誤投涼藥即死又夾陰傷寒虛陽泛上者亦面赤但足冷脈沉耳又煩躁面赤足冷脈沉不能飲水者此陰極也宜溫之若久病虛人面兩顴頰赤者此陰火也不可作傷寒治然三陽之氣皆會於頭額其從額上至巔頂絡腦後者太陽也從額至鼻下於面者陽明也從頭角下耳中耳之前後者少陽也但有紅氣或赤腫者以分之蓋大頭傷寒症正要知此部分可也內經曰心熱則額赤脾熱則鼻先赤肝熱則左頰先赤肺熱則右頰先赤腎熱則頤先赤若赤而青而黃為相生則吉如赤而黑為相剋則凶內經曰赤如雞冠者生如衄血者死蓋準頭印堂有赤氣枯夭者死明順者生如肺病見赤氣者難治白色屬金主氣血不足乃手太陰肺經之色也肝病見之難治內經曰白如豬膏者生白如枯桴者死凡印堂年壽白而枯夭者凶光潤者吉若白而黑而黃相生吉也白而赤相剋凶也凡傷寒面白無神者發汗過多或脫血所致也黑色屬水主寒乃足少陰腎經之色也凡黑而白而青相生則吉黑而黃相剋則凶內經曰黑如烏羽者生黑如煤炲者死若準頭年壽印堂黑氣枯夭者死黑中明潤者生黑氣自魚尾相牽入太陰者死黑氣自法令人中入口者死耳目口鼻黑氣枯夭者死凡面命宮準頭明潤生枯暗死凡心病見黑氣在頭者死也華他曰凡病人面色相等者吉不相等者凶也如面青目白面赤目青面黃目青面赤目白面白目黑面黑目白面白目青皆為不相等故曰凶也相等者面目俱青俱紅之類也以上五色皆六經傷寒之要者頭痛綱仲景曰傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而躁目李杲曰假令少陽症頭痛往來寒熱脈浮弦此三症但有一者是為表也口失滋味腹中不和大小便或祕而不通或泄而不調但有一者是為里也如無上下表里症余者皆虛熱也韓祗和曰少陽初受寒邪病全在表故頭痛發熱與太陽同綱仲景曰傷寒五六日頭痛汗出微惡寒手足冷心下滿口不欲食大便硬脈沉細者此為陽微結必有表復有里也脈沉亦在裡也目陶華曰頭痛屬三陽乃邪氣上攻也太陽專主頭痛陽明少陽亦有之少陽頭痛脈弦發熱小柴胡湯鰲按舊本於此條有云頭痛汗出者有無痛字雲頭汗出者但此條原屬太陽陽明二陽合病但見少陽細脈因從少陽為治者如此則頭痛汗出微惡寒手足冷四項乃是太陽表症心下滿口不欲食心下硬三項乃是陽陰里症所以謂之有表復有里也前四項既屬太陽太陽主頭痛其見頭痛之症無疑不得曰頭汗出也綱仲景曰傷寒四五日身熱惡風頭項強脅下滿手足溫而渴者小柴胡湯主之目喻昌曰身熱惡風太陽症也頭項強太陽兼陽明病也脅下滿少陽症也本當從三陽合併病之列而用表法但手足溫而加渴外邪輻湊於少陽而向里之機已著倘更用辛甘發散是重增其熱而大耗其津也故從小柴胡和法則陽邪自罷而陰津以生一舉而兩得矣此用小柴胡湯當從加減法不嘔而渴去半夏加栝蔞根為是魏荔彤曰三陽俱見病仍尋少陽作驅邪之出路太陽在表之邪可附少陽之清氣上升而透於表陽明在裡之邪可附少陽之濁氣下降而泄於下主以小柴胡策勵半表之清氣逐太陽之表邪役使半里之濁氣驅陽明之裡邪是藉少陽半表半裡之正氣而治表裡之邪猶之用兵各因其勢而致之易為力也綱仲景曰太陽與少陽並病脈弦頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語若譫語不止當刺期門目柯琴曰是經脈之為眚汗吐下之法非少陽所宜若不明刺法不足以奏功耳聾目眩口苦咽乾綱仲景曰少陽之為病口苦咽乾目眩也目成無己曰咽乾口燥舌澀俱為熱症但有微甚耳惟太陽中寒桂枝附子湯症由誤汗咽乾作甘草乾薑湯以復其陽者隨其逆治壞病者也非治其本寒也然咽乾之由由汗下後而得者有不由汗下而得者其間治法或和解或微汗或急下或微下當察兼有之症而施輕重之治然其為熱則一也蓋經謂咽喉乾燥亦不可汗以其多有里症故也實無寒病善治者尤宜互參渴門乃獲全功焉王肯堂曰凡傷寒頭眩者莫不因汗吐下虛其上焦元氣之所致眩者目無常主頭眩者俗謂頭旋眼花是也眩冒者昏冒是也少陽口苦咽乾目眩者少陽居表裡之間以表邪漸入於裡表中陽虛故目眩也太陽少陽並病或眩者責其虛也傷寒有起則頭眩與眩冒者皆汗吐下後所致是知其陽虛也故針經曰上虛則眩下虛則厥眩雖為虛又陽明中風但頭眩不惡寒者此又風主眩也凡此皆水逆候及其諸逆發汗劇者言亂目眩則死矣治少陽目眩小柴胡湯加天麻川芎附録察口唇法張兼善曰凡口唇焦乾為脾熱焦而紅者吉焦而黑者凶唇口俱赤腫者熱甚也唇口俱青黑者冷極也口中苦者膽熱也口中甜者脾熱也口燥咽乾者腎熱也舌乾口燥而欲飲水者陽明熱也口噤難言者痙風也凡上唇有瘡為狐蟲蝕其臟下唇有瘡為惑蟲蝕其肛若唇青舌卷唇吻反青環口黧黑口張氣直口如魚口及口唇顫搖不止氣出不返皆不治也柯琴曰此為少陽病之提綱也口咽目三者不可謂表不可謂里是表之入里里之出表處所謂半表裡也三症為少陽經病機兼風寒雜病而言但見一症即是不必悉具綱仲景曰少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚目魏荔彤曰凡傷寒原兼傷風而言風寒之邪從類而投太陽營衛在肌膚之表而已感之者淺故曰傷所以日久不治漸入漸深有經盡而解者有過經而傳者皆有一定之道路此傷寒所以有傳經無傳經則非傷寒病矣若夫中風中寒則直突而來並無次第然風必中於三陽之少陽寒必中於三陰之少陰仍是各從其類又寓從少不從老之理其邪較太陽營衛之傷甚深且速故曰中所以卒遇即病有立盡者此與傷寒傳經之病大不同也附録察耳察目法張兼善曰凡耳輪紅潤者生或黃或白或黑或青而枯燥者死薄而白薄而黑皆為腎敗凡耳聾耳中疼皆屬少陽之熱而為可治若耳聾舌卷唇青此屬厥陰為難治也凡目睛明能識見者可治睛昏不識人或反目上視或瞪目直視或目睛正圓或戴眼反折或眼胞陷下皆不治也凡開目而欲見人者陽症也凡閉目而不欲見人者陰症也凡目中不了了睛不和熱甚於內也凡目疼痛者屬陽明之熱目赤者亦熱甚也目瞑者必將衄血白睛黃者將發身黃也凡病欲愈目眥黃鼻準明山根亮也結胸綱仲景曰太陽與少陽並病脈弦頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語或譫語不止當刺期門目朱肱曰夫結胸與痞蓋以病發於陽下之早即為結胸病發於陰下之早即為痞然結胸與痞相似但以痛不痛為異耳心下滿而硬痛者為結胸但按之滿不痛者為痞醫家不審一有差誤立致危殆結胸屬陷胸症痞屬瀉心症其詳各於逐門備論之心下緊滿按之石硬而痛此名結胸也傷寒本無結胸應身熱下之早熱氣乘虛而入痞結不散便成結胸若已誤轉了初未成結胸者急與理中湯服自然解了更不作結胸蓋理中治中焦故也此古人亦說不到後人因消息之若大段轉損有厥症者兼與四逆湯便安胃中雖和傷寒未退者即候日數足可沉緊名曰結胸也治結胸大率當下然脈浮與大皆不可下下之則死尚宜發汗也仲景云結胸脈浮者不可下只可用小陷胸湯大抵脈浮是尚有表症兼以小柴胡等先發表表症罷方用下結胸藥便安西晉催行功云傷寒結胸欲絶心膈高起手不得近用大陷胸湯不瘥者此是下後虛逆氣已不理而毒復上攻氣毒相薄結於胸中當用枳實理中丸與之服之先理其氣次療諸疾古今用之如神應手而愈綱仲景曰太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩目朱肱曰結胸有三種有大結胸不按而痛胸連臍腹堅硬大陷胸丸主之有小結胸按之心下痛小陷胸主之有水結胸在胸脅間頭微汗出但結胸無大熱小半夏加茯苓湯小柴胡去棗加牡蠣主之也又有寒熱二症有實熱結胸胸中煩躁心內懊憹舌上燥渴脈沉滑者皆熱症也大陷胸湯主之有寒實結胸其無熱症者是也三物白散枳實理中丸主之近世治結胸多行金針丸用硫黃陽起石者若寒實結胸行之或有瘥者或熱實結胸行之必死也臟結無陽症不往來寒熱其人反靜舌上苔滑者不可攻也病人胸下舊有痞連在臍旁痛引少腹入陰筋者亦名臟結死不治魏荔彤曰此條之上條曰太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之因病並於太陽治亦應並於太陽當仍用剌法以泄太陽之邪切戒以慎勿可下也醫者若用刺而不用下則得矣倘反下之前之風因時如結胸者必真成結胸前之寒因心下痞硬者必更堅且硬前之風寒兩因而時如結胸心下痞硬兼有者必如結胸者成結胸心下痞硬者愈堅硬皆不明並治於太陽經表而用刺法反誤下之為害也下之而下利旋止稟氣素盛猶可為也倘素稟虛虧下利不止上則結胸中心痞下則利不止或專見或兼見皆水漿必不能下之道也陽陷於陰分而不能升陰陷於陽分而不能降上下隔絶津液不通中焦枯竭心煩則必作躁其去結胸症下利躁死者不遠矣綱仲景曰傷寒五六日嘔而發熱者柴胡湯症具而以他藥下之若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者為痞柴胡不中與之宜半夏瀉心湯目張介賓曰凡心腹脹滿硬痛而手不可近者方是結胸若但滿而不痛此為痞滿凡痞滿症乃表邪傳至胸中未入於腑此其將入未入猶兼乎表是即半表半裡之症只宜以小柴胡之屬加枳殼之類治之或以本方對小陷胸湯亦妙至結胸仲景皆以大陷胸主之然以余之見惟傷寒本病不因誤下而實邪傳裡心下硬滿痛連小腹不可近或燥渴譫妄大便硬脈沉實有力者此皆大陷胸所宜其太陽少陽表邪未解因下早而致結胸者此其表邪猶在若再用大陷胸是既誤下而復下之此則余所未敢不若於痞滿門諸法酌其輕重而從乎雙解以緩治之或外用罨法以解散胸中實邪此余之屢用奏效而最穩最捷者也
