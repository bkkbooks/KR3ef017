body:
  text: 卷首總論脈症總論鰲按仲景自序云著傷寒雜病論十六卷仲景原書固合傷寒雜病而為一也逮叔和編次始分傷寒雜病為兩書於本論削去雜病然論中雜病留而未去者正多於是仲景原書後人不得一見叔和後注釋者不下什百家又各以意顛倒紛紜傳會更兼日久殘闕仲景之原文益失仲景之書益難讀矣鰲今輯傷寒論綱目分條析款各循六經分次而其論有不得分屬六經者因輯脈症總論六經主症陰陽表裡傳變愈解六篇冠於前以為卷首又輯諸寒熱症陰陽易勞復食復百合病狐惑病陰毒陽毒陰陽交瘥後諸病婦人傷寒十篇次於六經之後實不免剪綴割裂之譏然仲景原書既不復睹而苟可以發明仲景之書之旨將質諸冥冥仲景當亦曲恕而不以剪綴割裂為余首罪也閲者其更諒之綱仲景曰病有發熱惡寒者發於陽也無熱惡寒者發於陰也目朱肱曰太陽陽明少陽皆陽症也桂枝湯麻黃湯大青龍湯治太陽傷風寒也大柴胡湯大承氣小承氣調胃承氣湯治陽明傷寒也小柴胡湯治少陽傷寒也其他藥皆發汗吐下後症也若陽氣獨盛陰氣暴絶即為陽毒當以酸苦之藥投之令陰氣復而大汗解如苦參大青葶藶苦酒之類皆復其陰氣也微止用苦甚則兼用酸苦折熱復陰若熱極發厥陽症似陰者當以脈別之太陰少陰厥陰皆陰症也三陰中寒微則理中湯稍厥或中寒下利乾薑甘草湯大段重者四逆湯無脈者通脈四逆湯若陰氣獨盛陽氣暴絶則為陰毒急灸臍下服以辛熱之藥令復陽氣而大汗解如桂枝甘草乾薑附子之類能復其陽氣也微用辛甘甚則用辛苦若陰極熱躁陰症似陽者亦當以脈別之戴原禮曰凡治傷寒須辨陰陽二候陽經有三陰經亦有三經之陰陽以臟腑言腑陽臟陰也病之陰陽乃是外邪之陰陽陰氣陽氣也病在太陽則熱在皮膚之分翕翕怫怫而熱便有頭疼惡寒體痛其脈浮緊病在陽明則熱在肌肉之分或壯熱或熇熇熱或蒸蒸熱便有頭額痛或潮熱自汗其脈長大病在少陽則必半表半裡之熱或往來寒熱便有頭角痛口苦嘔而胸滿脅痛其脈弦數病在太陰則手足漸冷脈息漸沉或自利腹滿嘔吐不渴病在少陰雖發熱手足自冷其脈沉細病在厥陰則手足厥冷甚則舌卷唇青囊縮其脈微緩三陰症雖肌表有熱以手按之則不甚熱陰甚者則冷透手也陰陽二氣皆能犯臟腑故陽氣犯太陽則為傷風惡風而有汗陰氣犯太陽則為傷寒惡寒而無汗在太陽未得解轉入陽明少陽二經則純乎陽不如太陽之易治若陽氣未能罷以次傳入陰經則為陰中之陽蓋緣陽經之陽氣來入陰經雖有自利欲寐唇青厥冷舌卷囊縮等症亦不可妄投熱藥宜瀉其陽之在陰經也若陽病下之太過陽氣已脫遂變為陰所謂害熱未已寒病復起或初得病便是陰症此是陰中之陰蓋緣陰氣攻陰經陰自得傳非自陽經傳來只當以溫藥回其陽故陽入陰者變陽以救陰陰入陽者用陽以救陽二者不可不辨有傷寒正病有傷寒雜病傷寒雜病者難以正病治如病人症狀不一有冷有熱陰陽顯在目前當就其中大節先治其餘症則徐治然亦不可用獨熱獨寒之劑又如嘔渴煩熱進小柴胡湯嘔渴煩熱止矣而下利不休以小柴胡為非則嘔渴煩熱不應止以為是則下利不應見吐利厥逆進姜附湯吐利厥逆止矣而熱渴譫語昏不知人以姜附湯為非則吐利厥逆不應止以為是則熱渴譫語不應見此亦傷寒雜病雖無前項冷熱二症顯然並見之跡而陰中有陽陽中有陰潛伏其間未即發見用藥一偏此衰彼盛醫者當於有可疑之處能反復體認無舉一廢一則盡善矣樓全善曰素問云脈從而病反言症似陽者脈亦從症似陽而其病反是寒也症似陰者脈亦從症似陰而其病反是熱也故皆反其脈症施治如身熱微熱煩躁面赤其脈沉而微者陰症似陽也身熱者裡寒故也煩躁者陰盛故也面戴陽者下虛故也若不知脈誤謂實熱反與涼藥則氣消成大病矣外臺祕要云陰盛發躁名曰陰躁欲坐井中宜以熱藥治之故仲景少陰症面赤者四逆湯加蔥白治之李氏杲曰寒涼之藥入腹則周身之火得水則升走陰躁之極故欲坐井中是陽已先亡醫猶不悟復認為熱重以寒藥投之其死何疑焉或因吐因嘔因嗽而發躁蒸蒸身熱如坐甑中欲得去衣居寒處飲寒水則便如故振寒復至則氣短促胸中滿悶甚則口開目瞪聲聞於外而涕淚涎痰大作其發躁須臾而已如前六脈弦細而澀按之而虛此大寒症也以辛寒甘寒大瀉南方北方則愈張氏介賓曰傷寒綱領惟陰陽為最有純陽症有純陰症當宜分治也又有陰陽相半症如寒之即陰勝熱之即陽勝或今日見陰而明日見陽或今日見陽而明日見陰然以陰變陽多吉以陽變陰多凶凡病人開目喜明欲見人多談者屬陽閉目喜暗不欲見人懶言者屬陰論曰陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死又曰桂枝下咽陽盛則斃承氣入胃陰盛以亡此陰陽乃以寒熱為言也陽盛陰虛言內熱有餘而外寒不甚也夫邪必入腑然後作熱熱實於內即陽盛也故再用溫熱以汗之則死矣陽虛陰盛言寒邪有餘而鬱熱未深也夫邪中於表必因風寒寒束於外即陰盛也故妄用沉寒以下之則死矣所以陽盛者用桂枝則斃陰盛者用承氣則亡也鰲按三陽病俱有不發熱者便是發於陰三陰病俱有反發熱者便是發於陽綱仲景曰問曰脈有陰陽何謂也答曰凡脈浮大滑動數此名陽也脈沉弱澀弦微此名陰也寸口脈浮為在表沉為在裡數為在腑遲為在臟凡陰病見陽脈者生陽病見陰脈者死目張介賓曰按浮為在表沉為在裡此古今相傳之法也然沉脈亦有表症此陰實陽虛寒勝者然也浮脈亦有里症此陽實陰虛水虧者然也故凡欲察表邪者不宜單據浮沉只當以緊數與否為辨蓋寒邪在表脈皆緊數緊數甚者邪亦甚緊數微者邪亦微緊數浮洪有力者邪在陽分即陽症也緊數浮洪無力者邪在陰分即陰症也以緊數之脈而兼見表症者其為外感無疑即當解散然內傷之脈亦有緊數者但其來有漸外感之緊發於陡然以此辨之最切當其有似緊非緊但較之平昔稍見滑疾而不甚者亦有外感之症此其邪之輕者或以初感而未甚者亦多此脈又不可見症而不察之也若其和緩而全無緊疾意則脈雖浮大自無外邪之症陶節庵曰夫脈浮當汗脈沉當下固其宜也然其脈雖浮亦有可下者謂邪熱入腑大便難也使大便不難豈敢下乎脈雖沉亦有可汗者謂少陰病身有熱也使身不熱豈敢汗乎據此可見沉有表浮亦有里也傷寒之邪實無定體或入陽經氣分則太陽為首或入陰經精分則少陰為先其脈以浮緊而有力無力可知表之虛實沉緊而有力無力可知里之虛實中按而有力無力可知陰陽之吉凶所當問症以知其外察脈以知其內先病為本後病為標合參脈症而知緩急先後者乃為上工診法曰浮脈為在表凡脈見浮緊而數者即表邪也再加頭項痛腰脊強等症此即太陽經病當求本經輕重為解散之脈見洪長有力而外兼陽明症者即陽明在經之邪也宜求本經之寒熱散之脈見弦數而兼少陽之症者即少陽經半表半裡之病宜和解而散之沉脈為在裡病屬三陰但沉數有力是即熱邪傳裡也若表症深入而內見大滿大實陽邪熱結等症當下之沉緊無力而外無大熱內無煩渴等症此陰症也若或畏寒厥冷及嘔吐腹痛瀉利者此即陰寒直中宜溫中脈大者為病進大因邪氣勝病日甚也脈漸緩者為邪退緩則胃氣至病將愈也故以大為病進也然亦有宜大不宜大者又當詳辨如脈體本大而再加洪數此病進之脈不可當也如脈體本小服藥後漸見滑大有力者此自陰轉陽必將汗解乃為吉兆蓋脈至不數者由氣虛而然無陽豈能作汗也柯琴曰脈有十種陰陽兩分即具五法浮沉是脈體大弱是脈勢滑澀是脈氣動弦是脈形遲數是脈息總是病脈而非平脈二條寸口兼兩手六部言三條凡字不是承接語陽脈指胃氣言所謂二十五陽者是也五臟之陽和發見故生陰脈指真臟言胃脘之陽不至於手太陰五臟之真陰發見故死要知上條沉澀弱弦遲是病脈不是死脈其見於陽病最多若真臟脈至如肝脈中外急心脈堅而搏肺脈大而浮腎脈如彈石脾脈如啄距反見有餘之象豈可以陽名之若以胃脈為遲真陰為數豈不誤人綱仲景曰寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計余命生死之期期以月節克之也問曰脈病欲知愈未愈者何以別之曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈目張介賓曰陰病見陽脈者生陽病見陰脈者死脈純弦者死脈陰陽俱虛熱不止者死脈陰陽俱盛大汗出熱不解者死脈沉細手足逆冷譫語妄言者死脈症俱虛而見譫妄者死傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死傷寒下利日十餘行脈反實者死魏荔彤曰和而均平在脈則無過不及故大小浮沉遲數本皆病脈至於三處同等則為和脈也曰脈病以病時脈為問也今見此診竟可以和脈答之即或病寒或病熱而脈已同等陰陽和平即病劇亦直決之為愈而已此辨脈察病進退之機也綱仲景曰傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也傷寒六七日無大熱其人躁煩者此為陽去入陰故也目李梴曰三陰有中有傳故三陰最不可執有宜下者宜溫者自三陽氣分傳入三陰謂之傳經陰症夫傳非傳入脾腎肝也乃入三陰血分胃與大小腸之腑也仲景謂已入於腑可下之是也若不是陽經傳來直中三陰之經初起厥逆腹痛自利不渴太陰自受寒也上症加之嘔吐少陰自受寒也又加小便清利厥陰自受寒也熱藥溫之猶恐或遲陰陽一差死生立判雖然傳經直中先賢發之盡矣然豈無傳變者乎假如傳經之際輕生者或食生冷或犯房欲或粗工猛施汗下真氣衰弱陽症變為陰症如俗所謂陽症歸陰仍宜直中寒症法治故內經止言傳變而不言直中者蓋言變則包直中局方言傳陰傳陽則不是當言傳陽變陰夫傳經為裡熱直中與變為裡寒臨症察脈直中三陽傳經三陽病在於表脈浮長弦傳經三陰病在於里脈沉數實直中三陰病在於經脈沉微緩此表裡虛實大小分焉以陽為熱陰為寒也柯琴曰此是陽邪自表入里之症陰指裡言非指三陰也或入太陽之本而熱結膀胱或入陽明之本胃中乾燥或入少陽之本而脅下硬滿或入太陰而暴煩下利或入少陰而口燥咽乾或入厥陰而心中疼熱皆入陰之謂綱仲景曰風家表解而不了了者十二日愈目魏荔彤曰此病愈後風邪留滯之症十二日愈者陰氣復而自神清氣爽不須妄治也柯琴曰不了了餘邪未除也此雖舉風家傷寒概之矣仲景分別六經各經各有中風傷寒脈症治法叔和時太陽篇存者多而失者少他經存者少而失者多陽明篇尚有中風脈症二條少陽經只症一條而不及脈三陰俱有中風欲愈脈俱無中風欲愈脈症以傷寒論為全書不亦疏乎鰲按據柯氏說知仲景當時必六經皆有中風脈症治法今既非完書則此條亦不得強隸太陽矣故特列於總論中六經主症鰲按此篇非六經無歸者以並録六經之首故亦列總論中綱仲景曰太陽之為病脈浮頭項強痛而惡寒目李杲曰治不可越經假令治太陽陽明不可遺太陽而只用陽明藥余仿此用三陽經藥解後身反覆重者若煩則是有陽明也若不煩而反覆輕者知不傳三陰也不傳三陰則為解也大抵三陰之體靜重與濕相同傷寒五日後發熱無汗謂谷消水去形亡故下之三日前謂內有水穀故汗之太陽禁忌小便不利不可更利之是謂犯本則邪氣入里不能解此犯之輕也以是五苓散不可妄用大便不可易動動之是謂動血此犯之重也在表不可下下之是為犯禁此犯之尤重也下之而惡風惡寒頭痛待表症悉罷方可下之也脈浮緊者犯之必結胸脈浮緩者犯之必痞氣戰而汗解者太陽也不戰有汗而解者陽明也不戰無汗而解者少陽也若先瘥經必不爾矣太陽傳陽明其中或有下症陽明症反退而熱兼不渴卻退顯少陽症是知可解也太陽知可解者為頭不痛項不強肢節不痛則知表易解陽明知可解者為不發熱惡寒知里易解也少陽症知可解者寒熱日不移時而作邪未退也若用柴胡而移其時並氣移於血血移於氣是邪無可容之地知可解也病有里傳表者太陽病反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯至於大實痛者胃也桂枝加大黃湯己傳戊所以為里傳表即名誤下傳也傷寒誤下變無定體雜病誤下變有定體何則傷寒自外而入陽也陽主動雜病自內而出陰也陰主靜動者犯之其變無窮靜者犯之其變止痞與腹脅痛而已故變無窮者為重痞與腹脅痛者為輕也李梴曰太陽經症頭疼身熱脊強此太陽正病也以後凡言太陽症即頭疼身熱脊強也凡言表症者亦即太陽症也各經仿此陽從下起三陽之長曰太陽脈尺寸俱浮浮緊傷寒浮緩傷風太陽受病當一二日發以其脈上連風府故頭項痛腰脊強頭者諸陽之會氣病則麻血病則痛身熱者寒客皮毛鬱閉其陽而後發熱雖人身正氣鬱則為邪為熱熱雖甚不死蓋傷寒始於寒而終成於熱也惟不發熱而但惡寒者邪發於陰也或熱多寒少或不大便而泉清頻數或熱結膀胱而溺澀或汗多便難或汗後不解或汗漏不止或過經不解或蓄血發黃或喘或吐皆太陽所主鰲按仲景立論每經各舉其主脈主症以為一經之提綱雖病有變遷而苟未離此經即不離此主脈主症其大較也綱仲景曰陽明之為病胃家實也目李杲曰陽明症身熱目疼鼻乾不得臥不惡風寒而自汗或惡熱脈尺寸俱長白虎湯主之陽明禁忌不當發汗不當利小便以竭其津液致生蓄血症惟當益津液為上以其火就燥也益津液者連須蔥白湯是也汗多亡陽下多亡陰小便重利之走氣三者之變雖異亡津液一也汗者本所以助陽也若陽受陰邪寒結無形須當發去陰邪以復陽氣所謂益陽而除風寒也若陰邪已去而復汗之反傷陽也經曰重陽必陰故陽去自亡汗多亡陽此之謂也下者本所以助陰也若陰受陽邪熱結有形須當除去其敗壞者以致新陰所謂益陰而除火熱也若陽邪已去而復下之反亡陰也經曰重陰必陽故陰氣自亡下多亡陰此之謂也汗不嫌早非預早之早乃早晚之早也謂當午前為陽分當發其汗午後陰分不當發汗故曰汗無太早汗不嫌早是為善攻下不嫌晚非待久之晚謂當巳後為陰分當下之巳前陽分不當下故曰下無太晚下不嫌晚是為善守汗本亡陰以其汗多陽亦隨陰而走下本瀉陽以其下多陰亦隨陽而走故曰汗多亡陽下多亡陰也若犯發汗多蓄血上焦為衄若犯利小便多蓄血下焦為發狂其人如狂也傷寒有九經何謂也太陽陽明少陽太陰少陰厥陰是為六也有太陽陽明有少陽陽明有正陽陽明是為三也非九而何陽明者太陽少陽皆入於胃故曰正陽陽明也前三經者陽明自病不入於裡謂之在經不為正陽陽明矣三陽從中治何謂也太陽陽明大承氣湯少陽陽明小承氣湯正陽陽明調胃承氣湯以汗症言之以少陽居其中謂太陽症為表當汗陽明症為里當下少陽居其中故不從汗下以小柴胡湯從少陽也以下症言之陽明居其中謂太陽經血多氣少陽明經氣血俱多少陽經氣多血少若從太陽下則犯少陽若從少陽下則犯太陽故止從陽明也此三陽合病謂之正陽陽明不從標本從乎中也緣陽明經居太少陽之中此經氣血俱多故取居其中而不從太陽少陽也陽明自病調胃承氣湯三陽並病白虎湯是從乎中也如何是入陰可下答曰陽入於陰者可下非入太少厥陰之三陰乃入三陽也三陽亦非太少陽明之三陽乃胃與大小腸之三陽也三陽皆為腑以其受盛水穀傳導有形故曰入乎陰也仲景云已入腑者可下是也仲景太陽陽明大承氣少陽陽明小承氣正陽陽明調胃承氣是三陽已入於臟者泄之也太陰桂枝湯少陰麻黃附子細辛湯厥陰當歸四逆湯是三陰未入於腑者汗之也李梴曰陽明夾於二陽之中陽氣盛極故曰陽明脈尺寸俱長長而微洪經病長而沉數腑病太陽脈靜則不傳如脈數急欲吐者此寒邪變熱傳於陽明當二三日發以其經中客邪故目痛鼻乾身熱者陽明主肌肉邪甚則身前皆熱不眠者煩盛津干胃氣不和也太陽未罷者發熱惡寒太陽已罷者不惡寒而反惡熱煩渴作嘔津干便硬或即狂言謂之正陽明少陽陽明脅滿不大便而嘔或瘀血發黃或下血譫語或胸煩懊憹皆此經所主然亦有裡寒下利或寒氣結積而為痼瘕者不可不知柯琴曰陽明為傳化之腑當更實更虛食入胃實而腸虛食下胃虛而腸實若但實而不虛斯為陽明之病根矣胃實不是陽明病而陽明之為病悉從胃實上得來故以胃家實為陽明一經之綱領也陽明病外症身熱汗自出不惡寒反惡熱綱仲景曰少陽之為病口苦咽乾目眩也目李杲曰少陽症胸脅痛往來寒熱而嘔或咳而耳聾脈尺寸俱弦小柴胡湯主之須各隨仲景本條下加減用之少陽忌發汗忌利小便大便故名三禁湯乃和解之劑若犯之則各隨上下前後本變及中變與諸變不可勝數宜詳之如何是半表半裡答曰身後為太陽是陽中之陽陽分也身前為陽明為陽中之陰陰分也陽為表陰為里即太陽陽明二分邪在其中矣治當不從標本從乎中治此乃治少陽之法也太陽膀胱水寒也陽明胃經燥也邪在其中近後膀胱寒水則惡寒近前陽明燥金則發熱故往來寒熱也此為三陽之表裡非內外之表裡也俱不可認作宜下之裡故以此藥作和解之劑非汗非下也邪在榮衛之間謂之半表裡也太陽陽明之間少陽居身之半表裡也五苓散分陰陽膀胱經之半表裡也理中湯治吐瀉上下之半表裡也李梴曰少初也陽氣初嫩亞於陽明故曰少陽脈尺寸俱弦而滑數者陽極發厥弦而和者病欲散少陽受病當三四日發以其脈循脅絡於耳故風熱上壅不利則耳聾脅痛寒熱往來不食嘔而口苦咽乾目眩若不嘔吐而能食者為三陰不受邪也若身無大熱躁悶者陽去入陰無疑矣似瘧婦人血結皆此經所主柯琴曰太陽主表頭項強痛為提綱陽明主裡胃家實為提綱少陽居半表半裡之位仲景特揭口苦咽乾目眩為提綱奇而至當也蓋口咽目三者不可謂表又不可謂里是表之入里里之出表處所謂半表半裡也三者能開能闔開之可見闔之不可見恰合樞機之象故兩耳為少陽經絡出入之地三症為少陽一經病機兼風寒雜病而言但見一症即是不必悉具綱仲景曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬目李杲曰太陰症腹滿咽乾手足自溫自利不渴時腹痛脈尺寸俱沉細太陰病可汗可溫可下也脈浮可汗桂枝湯自利不渴屬太陰以其臟有寒故也可溫四逆輩此條雖不言脈當知脈沉遲而弱仲景理中湯丸暨易老人參黃耆湯其輕重或溫或熱視人之強弱虛實所宜者選用之太陰可下者以本太陽症醫反下之因而腹滿時痛者太陰也桂枝芍藥湯大實痛桂枝加大黃湯易老云此非本有是症以其錯下脾傳於胃故為誤下傳太陰禁忌太陰病腹滿而吐食不下自利益甚時腹自痛若下之則胸下結硬太陰病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也傷寒而脈浮緩手足自溫者系在太陰小便自利者則不發黃日久利甚必止者便硬乃入腑傳陽明也李梴曰陰從天降首曰太陰在陽為表在陰為里邪在表則見陽脈邪在裡則見陰脈故尺寸俱沉沉實有力當下沉細無力當溫太陰受病當四五日發以其脈布胃中絡於咽嗌故腹滿或痛而嗌喉下乾燥或大便不通小便如常或自利手足溫而渴者為傳經腑熱或自利不渴手足冷者為直中陰經或因內傷飲食冷氣入脾必腹痛胸膈不快然太陰乃三陽之終三陰之始陽經表氣未盡宜汗半表裡胸滿多痰宜吐傳經裡熱宜下直中陰經宜溫調脾勝邪正在此關柯琴曰陽明三陽之裡故提綱屬裡之陽症太陰三陰之裡故提綱屬裡之陰症太陰之上濕氣主之腹痛吐利從濕化也脾為濕土故傷於濕脾先受之然寒濕傷人入於陰經不能動臟則還於腑也綱仲景曰少陰之為病脈微細但欲寐也目李杲曰少陰症口燥舌乾而渴脈尺寸俱沉疾大承氣湯沉遲四逆湯太陰邪入於裡上接於心與火俱化而剋金惡候或上氣死入胃脈沉細而疾疾則大承氣湯下之下入於本與水俱化而為寒厥逆或見身冷靜重脈沉細而遲遲則四逆湯溫之疾雖可下若疾而無力者亦不可下為陽將盡也少陰症口燥舌乾而渴身表涼脈沉細而虛瀉心湯此有形無形之藥也傷寒外症全在下症大熱而脈反細小不可下瀉心湯少陰受病身涼無汗體沉或體輕脈沉有頭痛不厥麻黃附子瀉心湯其人病身熱而煩躁不寧大小便自利其脈沉洪而無力按之全無者附子瀉心湯其人病上吐下瀉不止當渴而反不渴其脈微細而弱理中湯渴而脈沉有力而疾者五苓散少陰病發熱脈沉者必當汗若緩汗之用麻黃附子細辛湯若微汗之用麻黃附子甘草湯少陰下利色青者當下之色不青者當溫之口中和者當溫之口中不和乾燥者當下之少陰脈沉細數病為在裡忌發汗脈微者忌發汗尺脈微弱澀者忌下麻黃附子細辛湯體沉加防己蒼朮勝濕也體輕加石膏知母乃勝熱也李梴曰少陰次於太陰故曰少陰脈尺寸俱沉沉實有力當下沉微無力當溫少陰受病當五六日發以其脈起於足心貫腎絡於肺系故舌乾口燥而渴或自利清水心痛腹脹或大便閉硬不欲厚衣者皆熱入里之深也若厥逆畏寒欲吐未吐腹痛自利小便自利或乾嘔亡陽咽痛脈微欲寐者乃陰毒入臟之深也或下利體痛咳嘔者水氣也或飲食入口則吐脈弦遲厥逆心下實者不可下也宜吐之或脈沉發熱者宜汗蓋有初得病直攻少陰不先自太陽傳次而入也柯琴曰三陽以少陽為樞三陰以少陰為樞弦為木象浮而弦細者陽之少也微為水象沉而微細者陰之少也衛氣行陽則寤行陰則寐日行二十五度常從足少陰之間分行臟腑今少陰病則入陽分多故欲寐欲寐是病人意中非實能寐也與少陽提綱各臻其妙鰲按仲景論病發熱頭痛脈反沉若不瘥身體疼痛者當救其里宜四逆湯此條舊本俱入太陽篇少陰病始得之反發熱脈沉者麻黃附子細辛湯此條舊本俱入少陰篇前人因有少陰症似太陽太陽脈似少陰而反用藥不同之說竊思頭疼發熱固是太陽表症然脈沉已為在裡則此條當是初起屬太陽及既入里虛陽之浮於表者雖仍發熱而寒邪據里實屬真陰難解故脈沉而必治以四逆也曰反者見得初起之時頭痛發熱脈宜浮而反沉其非專屬太陽明矣故雖治以麻黃而終不瘥必當以四逆救其里也夫四逆者少陰之劑則此條當屬少陰經症不得以初起之太陽遂列太陽篇中並以為太陽脈似少陰也至少陰病始得而無頭痛宜屬少陰症矣曰反熱者以寒邪尚在於表但皮膚腠理鬱閉為熱故用麻黃細辛以發表間之熱而尤必用附子以溫少陰之經其所以必溫之者以寒邪尚未入里內未作熱也若寒入里則必內熱而外不熱當見吐利厥逆等症不曰反發熱矣綱仲景曰厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐蛔下之利不止目李杲曰陽中之陽水太陽是也為三陽之首能循經傳亦能越經傳陽中之陽土陽明是也夫陽明為中州之土主納而不出如太陽傳至此名曰循經傳也陽中之陽木少陽是也上傳陽明下傳太陰如太陽傳至此為越經傳也陰中之陰土太陰是也上傳少陽為順下傳少陰為逆此為上下傳也如太陰傳太陽為誤下傳也陰中之陽水少陰是也上傳太陰為順下傳厥陰為生如太陽傳至此乃表傳裡也陰中之陰木厥陰也上傳少陰為實再傳太陽為自愈也太陽者巨陽也為諸陽之首膀胱經病若渴者自入於本也名曰傳本太陽傳陽明胃土者名曰循經傳為發汗不徹利小便餘邪不盡透入於裡也太陽傳少陽膽木者名曰越經傳為元受病脈浮無汗當用麻黃而不用之故也太陽傳少陰腎水者名曰表傳裡為得病急當發汗而反下汗不出所以傳也太陽傳太陰脾土者名曰誤下傳為元受病脈緩有汗當用桂枝而反下之所致也當時腹痛四肢沉重太陽傳厥陰肝木者為三陰脈不至於首惟厥陰與督脈上行與太陽相接名曰循經得度傳李梴曰厥陰陰盡則變而厥逆生蓋傳經至此已盡無復可傳再傳則逆於首經矣脈尺寸俱沉沉實有力當下沉遲無力當溫浮緩病自愈厥陰受病當六七日發以其脈循陰器絡於肝故唇青舌卷而煩滿者胸中氣滿急也或囊拳者陰囊縮也在女子則陰戶急痛引小腹此傳經厥陰風熱毒深於內也肝木移熱克脾脾受賊邪五臟六腑皆困榮衛不通耳聾囊縮而厥水漿不入不知人則死速下以救五死一生或下利譫語者內有燥屎也仍宜下之或嘔而發熱者和之或發熱惡寒如瘧囊不縮脈微浮微緩胃之脈脾氣既全不受賊邪榮衛將復水升火降寒熱作而大汗解矣或下利腹脹身疼者當先救表而後溫里若下利清穀大汗出而厥四肢疼小腹拘急或乾嘔吐沫或氣衝心痛吐蛔發熱消渴皆厥陰寒症也宜溫之以上正文六言乃萬病之祖非得之內經不能六言包括無遺如此凡言六經所見之症即此三陽三陰經症也凡雜病亦然柯琴曰太陰厥陰皆以里症為提綱太陰主寒厥陰主熱太陰為陰中之至陰厥陰為陰中之陽也鰲按厥者絶也厥陰者陰絶陽也陰既絶陽則本經所發自無熱症其或有之者厥陰之脈絡於膽皆少陽相火所化令也陰陽綱仲景曰病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也目許叔微曰傷寒六七日無熱脈沉緊而細煩躁不飲水此陰盛格陽也當用附子霹靂散飲水者不可服吳綬曰陰症似陽乃水極似火也蓋傷寒傳變誤服涼劑攻熱太速其人素本腎氣虛寒遂變陰症冷盛於內逼其浮陽之火發於外面赤煩躁身微熱渴欲飲而不能飲大便祕小便淡黃或嘔逆氣促鄭聲咽喉痛所以狀似陽症如妄投寒涼即死切其脈沉細微遲者急用通脈四逆湯倍參附以接真陽設或差遲則陰盛陽衰參附亦不救矣此與陰盛格陽例同王太僕所謂身熱脈數按之不鼓擊者名陰盛格陽非熱也陽症似陰乃火極似水也蓋傷寒熱甚失於汗下陽氣亢極鬱伏於內反見勝己之化於外故身寒逆冷神氣昏昏狀若陰症也大抵唇焦舌燥渴飲便祕溺赤澀設有稀糞水利出者此內有燥屎結聚乃旁流之物非冷利也再審有失氣極臭者是也脈雖沉切之必滑有力或時躁熱不欲衣被揚手擲足譫語此陽症也輕者人參白虎湯或小柴胡合解毒湯內實者調胃承氣湯潮熱者大柴胡湯加芒硝若大實大滿祕而不通大承氣湯必審輕重而酌用之此與陽盛拒陰亦同王太僕所謂病人身寒厥冷其脈滑數按之鼓擊指下者名陽盛拒陰非寒也趙嗣真曰仲景論陰虛陽盛陽虛陰盛理實深奧經曰邪氣甚則實精氣脫則虛因正氣先虛以致邪氣客之而為盛實於是有陰虛陽盛陽虛陰盛之別愚因括仲景之理而詳說之蓋盛指邪氣言虛指正氣言陰陽虛盛邪正消長之機也且正氣在人陽主表而陰主裡邪氣中人表為陰而里為陽若表之真陽先虛故陰邪乘陽而盛實表受邪者陽虛也脈浮緊陰邪盛於外也是謂陽虛陰盛所以用桂枝辛甘之溫劑汗之則陰邪消溫之則真陽長使邪去正安故愈又若里之真陰先虛故陽邪入陰而盛實里受邪者陰虛也脈沉實者陽邪盛於內也是謂陰虛陽盛所以用承氣峻苦之寒劑下之則陽邪消寒之則真陰長邪去正安故愈以是知仲景主此二症蓋一指表症一為里症指邪正消長而言非兼言表和里病里和表病而謂之陰陽虛盛也況和者無病也以和訓虛恐礙理李梃曰概言之三陽經病即陽症手之三陽從頭走足故頭疼身熱云云三陰經病即陰症足之三陰從足走腹故腹痛自利云云然陰陽俱有表裡二症陽症表裡同歸於熱而已陰症表郁似陽入里則有傳經直中之殊大抵陽症之表發熱惡寒清便自調面光聲亮鼻息如常手足溫陽症之裡唇焦舌燥爪甲紅活身輕易轉煩渴掀衣揚手擲足大便硬閉小便赤澀脈浮洪數用汗吐下和四法以治之陰症之表無熱惡寒面慘聲短鼻息氣冷手足厥逆陰症之裡唇紫舌卷爪甲青黑身重難轉不渴引衣臥多蜷足大便泄利小便清白脈細沉微每與陽症相反蓋陽症自上而下故初起有頭疼陰症則無也陽症自外傳入故鬱而為熱陰症則無熱而反厥冷也陽症揚手擲足陰症則臥多蜷足陽症內熱而渴陰症則不渴陽症二便閉陰症則二便清且利也惟腹痛與嘔陰陽二症俱有然陰脈沉微凡言陽症多得之風寒暑濕邪生於太陽也凡言陰症多得之起居飲食喜怒邪生於少陰也故云傷寒挾內傷者十居八九此陰陽正病也陽邪不深不能至於厥逆陰邪不甚不能至於煩躁此水極似火火極似水謂之反化亢極則害之義也陽症潮汗祕赤滿渴狂譫甚則斑血喘急然熱極忽然熱伏於內故身寒四肢厥逆狀若陰症但身雖冷而不欲近衣神雖昏而氣色光潤脈必沉滑而有力此陽極似陰也宜大柴胡下之或白虎湯竹葉石膏湯陰症厥冷吐利不渴靜蜷甚則咽痛鄭聲然寒極忽然火浮於外發躁擾亂狀若陽症然身雖煩躁而引衣自蓋口雖燥渴而飲水不下脈必沉細無力此陰極似陽也宜通脈四逆湯從治者反攻也熱藥冷飲冷藥熱飲或熱藥為君而佐以涼藥或冷藥為君而佐以熱藥亦非判然如庸醫之差誤也借有熱病服熱藥而愈者必先服寒藥過多寒病服寒藥而愈者必先服熱藥過多故耳若夫以寒治熱以熱治寒此為逆治逆治者正治也正治之法人孰不知之乎張介賓曰凡治傷寒須先辨陰陽二症若病自三陽不能解散而傳入三陰則寒鬱為熱因成陽症蓋其初病必發熱頭痛脈浮緊無汗以漸而深乃入陰經此邪自陽分傳來愈深則愈入雖則陰經亦陽症也脈必沉實有力其症必煩熱熾盛此當攻裡或清或下隨宜而用若內不熱安得謂陽症乎若初起本無發熱頭疼等症原不由陽經所傳而竟入陰分者其症或厥冷或嘔吐或腹痛瀉利或畏寒不渴或脈來沉弱無力此皆元陽元氣不足乃為真正陰症經曰發熱惡寒發於陽無熱惡寒發於陰此以傳經不傳經而論陰陽也陰陽之治又當察其虛實如下治傷寒凡陽症宜涼宜瀉陰症宜補宜溫此大法也但以經臟言陰陽則陰中本有陽症此傳經之熱邪也以脈症言陰陽則陽中最多陰症此似陽之虛邪也惟陰中之陽易辨而陽中之陰難知如發熱狂躁口渴心煩喜冷飲水無度大便硬小便赤喉痛口瘡身粗氣急脈滑實有力者此真正陽症也其有身雖熱而脈來微弱無力者此雖外症似陽實非陽症陶節庵云凡發熱面赤煩躁揭衣唇口赤裂言語善惡不避親疏虛狂假斑脈大者人皆誤認陽症殊不知陰症不分熱與不熱須憑脈下藥至為切當不問脈之浮沉大小亦是切脈要訣但指下無力重按則無便是陰脈不可與涼藥服之必死急與五積散通解表裡之寒甚者必加薑附又曰病自陽分傳入三陰者俱是脈沉須以指下有力無力為辨切脈要訣有力者為陽為熱為實無力者為陰為虛為寒此節庵出人之見也然以余觀之似陽非陽之症不必謂其外熱煩躁微渴戴陽之類即皆為陰症也但見其元陽不足而氣虛於中雖有外熱亦假熱耳設用清涼消耗則中氣愈散中氣既敗則邪氣愈強其能生乎附録樓氏節候用藥樓英曰治中風自汗用桂枝湯治傷寒無汗用麻黃湯此仲景表散之法百世不易者也元氣暴虧以參耆與桂枝麻黃等藥表散此丹溪補仲景之法亦萬世不易者也至韓祗和戒桂枝以中風傷寒通作一法治之者此當時之權變非百世之常行也傷寒病有可汗者仲景但統言其可汗症及汗脈或云脈浮而數或云脈浮緊或云脈浮無汗而喘或云脈浮為在表今略舉數條後人但憑其脈之大概並不分脈浮有陰陽虛實之理又不知有可汗不可汗之症誤投發表藥多成陽毒之症今舉病人有汗惡風無汗惡寒分二等及據立春以後立秋以前氣候輕重各立方治之庶學者易為開悟耳病人二三月以前兩手脈浮數或緩或緊按之差軟寸關尺若力齊等其力不甚大不甚小者亦未可便投解表藥此見里症未見表脈也宜候寸脈力小於關尺即可投解表藥大抵治傷寒見症不見脈未可投藥見脈不見症雖少投藥亦無害凡治雜病以症為先脈為後治傷寒以脈為先症為後病人兩手脈浮數而緊名曰傷寒若關前寸脈力小關後尺脈力大不惡風不自汗此乃陰氣已盛先見於脈也若不投藥和之必惡風自汗出若立春後至清明前宜調脈湯清明後至芒種前葛根柴胡湯芒種後至立秋前人參桔梗湯病人兩手脈浮數而緩名曰中風若寸脈力小尺脈力大雖不惡風不自汗此乃陰氣已盛先見於脈若不投藥和之必惡風自汗出若立春後清明前薄荷湯清明後芒種前防風湯芒種後立秋前香芎湯病人兩手脈浮數或緊或緩寸脈短反力小於關者此名陰盛陽虛也若汗出惡風是邪氣在表陰氣有餘也素問云陰氣有餘為多汗身寒即可投消陰助陽表劑以治之立春後清明前六物麻黃湯清明後芒種前七物柴胡湯芒種後立秋前發表湯病人脈浮數或緊或緩其脈上出魚際寸脈大於關尺者此名陽盛陰虛也若發熱冒悶口燥咽乾者乃是邪氣在表陽氣獨有餘也可投消陽助陰藥以解表立春後清明前人參湯清明後芒種前前胡湯芒種後立秋前石膏湯病人兩手脈浮數或緊或緩三部俱有力無汗惡風者此是陰陽氣俱有餘可用藥平之立春後清明前解肌湯清明後芒種前芍藥湯芒種後立秋前知母湯仲景云傷寒為病脈緩者名中風脈緊者名傷寒今分此二端何也始因冬天寒毒之氣中人其內伏之陽沉潛於骨髓之內每至春夏發時或因外傷寒而引內邪或因外傷風而引內邪既出而為病一也古人云立此二端恐後人疑其脈緊與緩治別也若中風傷寒脈異何故仲景無別法治之此乃後人不究仲景之心也病人始得病一二日至五六日尚有表邪及表症亦可依脈症投藥凡投解表及發表藥每一日可飲三服病甚可至五服外不可頓服藥也如症未解次日再投如症仍未解可作熱粥助之粥內加蔥白亦可如汗出勿厚衣蓋覆恐汗多作亡陽症也海藏云韓氏微旨可汗一篇有和解因時法言傷寒之脈頭小尾大傷風之脈頭大尾小李思訓保命新書亦分尺寸與仲景同非若前人總言尺寸脈俱浮而緊俱浮而緩緊則為傷寒無汗緩則為傷風自汗又有傷寒有汗者傷風無汗者脈亦互參與症不同前人已盡之矣惟韓李所言頭小尾大即為傷寒尾小頭大即為傷風又間有脈症未顯於尺寸者故韓子述為和解因時法也又恐後人疑其不與前聖合遂於本方內又立加減法數條亦不越前人之意何其當哉又寸口脈小飲冷與霧露所傷同作中焦治今韓李云傷寒寸小者勿認飲冷與霧露同傷一體也飲冷霧露所傷寸口舉按全無是陰氣在胃不和陽氣不能升越也傷寒寸口小者只於關部下至膀胱本部見之寸口雖小只是舉之微小沉按之有也若果寸口舉按全無即不可解表只宜溫中不可不知夫淺學者只云病在表可發汗病在裡可下或云不可汗下未嘗有溫中之說仲景傷寒例云尺寸俱沉細太陰受病也尺寸俱沉少陰受病也尺寸俱微緩厥陰受病也又辨太陰症云太陰病脈浮可發汗桂枝湯手足溫自利不渴者四逆湯腹滿時痛桂枝加芍藥湯辨少陰症云少陰病始得之發熱脈沉者麻黃附子細辛湯少陰病二三日麻黃附子甘草湯少陰病手足寒身體痛骨節疼脈沉者附子湯又厥陰病吐利手足厥冷煩躁欲死者吳茱萸湯又少陰病脈沉急溫之四逆湯今舉仲景論中數條最是三陰病之良法近今每夏至前有病傷寒人十中七八兩手脈俱沉細數多是胸膈滿悶或嘔逆氣塞腸鳴腹痛與仲景三陰病說理同而症不同因不敢妄投仲景三陰病藥若以脈沉及胸膈滿便數下藥往往不救常斟酌仲景理中丸與服之其病輕者胸中便快重者半日許滿悶依然或有病人脈遲細投仲景四逆湯溫之以藥力大熱後必發煩躁因校量此形症別立方以治之藥多對症不可不傳焉如病人但兩手脈沉細數或有力或無力或關脈短及小胸膈塞滿氣短不能相接者便可隨脈症投溫中藥以治之病人兩手脈沉遲或緊皆是胃中寒也若寸脈短及力小於關尺此陰盛陽虛也或胸膈滿悶腹中脹滿身體拘急手足逆冷急溫之立春後清明前溫中湯清明後芒種前陳皮湯芒種後立秋前七物理中丸病人脈沉細無力雖三部脈力停等亦是陰氣盛也更不須候寸脈短治之或胸脅滿悶身體拘急手足逆冷急宜溫中藥和之立春後清明前厚朴丸清明後芒種前白朮湯芒種後立秋前橘皮湯病人胸膈滿悶時時嘔逆肢節痛兩脅下痛腹中鳴此是停飲二苓湯病人服前藥胸膈不滿悶者此上焦有陽也或藥力太過上焦有熱腹滿虛鳴時時疼痛此被湯藥消逐得上焦陰氣併入下焦也雖是下焦積寒宿冷奈上焦陽盛反難用溫下焦藥也病人三部脈沉寸小於關尺此為陰盛宜用溫中藥以消陰氣厚朴丸神術湯亦治陰躁不渴不可誤用涼藥若熱藥冷服內有伏陽則可若脈已虛按之全無力或病人素無食養者只可溫服附録李氏大法李梴曰陰陽病者為虛不病者為實表病里和則邪出於外而為陽虛陰盛故發表不遠熱而用辛甘之劑所以扶陽也里病表和則邪入於內而為陰虛陽盛故攻裡不遠寒而用辛苦之藥所以扶陰也若陰經自受寒邪則為臟病設陰陽氣將脫急宜辛熱回陽抑陰故曰桂枝下咽陽盛則斃承氣入胃陰盛乃亡實實虛虛損不足而益有餘醫殺之耳此汗下之樞機汗吐下溫解五法各有不同汗有大汗發表微汗解肌以別重輕下有急下少與微和滲利以分清濁吐有宣湧探引或只寬利而不敢吐者溫有兼補者和解則一而已或曰傳寒無補法熱氣得補復盛更復下之是重困也惟虛煩裡寒陰症不在此例得中者立法動中肯綮太過者粗工猛進不及者中工從緩從輕凡傷寒汗下藥一服中病即止不必盡劑與雜病不同傷寒不過汗吐下三症若用之得當有何傳變全在醫者精以審處之耳有暫補法凡尺寸遲弱血少也不問風寒初症雜症俱忌汗吐下宜先以小建中湯或黃耆建中湯救之脈如素實者小柴胡湯亦可俟脈不遲方可施用傷寒題目未定之時不知有無風濕勞役痰食等項相兼似是而非最宜詳辨故不知者寧可不治班固有言曰有病不治得中醫倘一藥之誤悔將何及有不可吐者膈上寒飲乾嘔少陰病也四肢冷胃虧也脈微下虛也誤吐內煩損傷元氣遂致不救者有之若應吐而反溫之則毒氣鬱結於胃而為發狂等症鰲按樓氏溫法李氏補法必精審詳確如果病屬三陰為必當溫且果初病脈弱為有可補者方可依法治之不然誤溫誤補為害不淺故特表出閲者宜致思焉毋徒一例視之遂昧焉以為成法而用之也表裡表症綱仲景曰太陽之為病脈浮頭項強痛而惡寒太陽病發熱汗出惡風脈緩者名為中風太陽病頭痛發熱汗出惡風者桂枝湯主之鰲按通部中凡言太陽病及有表症或表未罷皆統表症中舉此二十條詳其正款耳非謂表症止於此也其他各款亦俱從此例目朱肱曰發熱惡寒身體痛而脈浮者表症也表症者惡寒是也惡寒者屬太陽宜汗之劉完素曰傷風表症頭痛項強肢節煩疼或目疼肌熱乾嘔鼻塞手足溫自汗出惡風寒其脈陽浮而緩陰浮而弱此為邪熱在表皆宜桂枝湯或汗出憎風而加項背強痛宜桂枝加葛根湯傷風及無汗者雖已服桂枝反煩不解而無里症者先刺風池風府卻與桂枝葛根湯服之不若通用雙解散免致有麻黃桂枝之誤傷寒表症頭項痛腰脊強身體拘急發熱惡寒不煩躁無汗或頭面目痛肌熱鼻乾或胸滿而喘手足指末微厥脈浮數而緊者邪熱在表皆宜麻黃湯或天水散之類甚佳無使藥不中病而益加害也風寒俱中頭項痛肢體疼手足溫為中風也反無汗惡風脈浮緊者為陰寒也或頭項痛腰脊強身體拘急肢末微厥不自汗為傷寒也反煩躁而脈緩者為傷風也風則傷衛而寒則傷榮陳士鐸曰邪入皮毛腠理將入榮衛急宜發散方用白朮三錢柴胡荊芥半夏蘇葉甘草蒼朮丹皮各一錢水煎服此方平和之中有妙理蓋木氣之郁最宜平散今所用俱是直入肝經之聖藥自然肝木疏通枝葉條達也柯琴曰六經皆有表症惟太陽主表故表症表脈獨得其全如浮脈為在表太陽首三陽其脈氣浮而有力與陽明之兼長大少陽之兼弦細三陰之微浮者不侔矣頭項主一身之表太陽經絡營於頭會於項故頭連項而強與陽明頭額痛少陽頭角痛者少間矣惡寒為病在表六經雖各惡寒而太陽應寒水之化故惡寒特甚與陽明二日自止少陽往來寒熱三陰之內惡寒者懸殊矣太陽只重在表症表脈不重在經絡主病綱仲景曰脈浮者病在表可發汗麻黃湯脈浮而數者可發汗宜麻黃湯傷寒發汗解半日許復煩脈浮數者可更汗宜桂枝湯太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮與麻黃湯目朱肱曰脈浮表陽也素問云寸口脈浮而盛病在外則知脈浮者表症也張元素曰傷寒之法先言表裡及有緩急三陽表宜急里宜緩三陰表宜緩里宜急又曰脈浮當汗脈沉當下脈浮汗急而下緩謂三陽表也脈沉下急而汗緩謂三陰里也麻黃湯謂之急麻黃附子細辛湯謂之緩內經云有漬形以為汗謂汗之緩里之表又云在皮者汗而發之謂汗之急表之表也急汗者太陽緩汗者少陰是臟腑之輸應也假令麻黃附子細辛湯是少陰始得發熱脈沉里和無汗故漬形無汗今麻黃湯是太陽症頭項痛腰脊強脈浮無汗里和是也在皮者汗而發之可也經曰治主以緩治客以急此之謂也李梴曰表病屬太陽凡見頭疼發熱惡寒清便自調腰項脊強脈浮緊者即是表症不拘日數多少便宜解表不宜下滲有汗為表虛宜解肌解肌是輕劑無汗為表實宜發汗發汗是重劑但發汗亦有輕重古謂春夏宜汗者借天時而喻陽邪在外也其實春月陽氣尚微秋月陽氣欲斂俱不可大汗夏月天氣熱元府開不必大汗冬月陽氣伏藏感冒輕者尤不宜汗惟傷寒重者時令嚴密皮毛堅緻非大汗無由得散不得已而從權也至於陰症但厥無汗者妄汗動經則死或有表邪辛熱微汗以散之可也鰲按首條但言脈浮而不言遲弱可見其浮而有力矣然必審其熱果在表乃可用麻黃湯此篇所舉仲景論亦非六經無歸者特以傷寒病宜首辨表裡故不得不列此款以冠於首耳綱仲景曰太陽病項背強𠘧𠘧無汗惡風者葛根湯主之太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之目王好古曰治傷寒須分表裡若表裡不分汗下差誤豈為上工且如均是發熱身熱不渴為表有熱小柴胡加桂枝厥而脈滑為里有熱白虎加人參湯均是水氣乾嘔微利發熱而咳為表有水小青龍加芫花體涼表症罷咳而脅下痛為里有水十棗湯均是惡寒有熱而惡寒者發於陽也麻黃桂枝小柴胡無熱而惡寒者發於陰也附子四逆均是身體痛脈浮發熱頭痛身體痛者為表未解麻黃湯脈沉自利身體痛者為里不和四逆湯以此觀之仲景表裡之法甚詳學者宜究心焉綱仲景曰結胸症其脈浮大者不可下下之則死目朱震亨曰潔矩新書謂有雜合邪者當以雜合法治之譬如惡寒發熱得之感冒明是外合之邪已得浮數之脈而氣口又緊盛明為食所傷病者又倦怠脈重按俱有空豁意而胸膈痞滿間引兩脅其脈輕取又似乎弦此平昔多怒肝邪之所為也細取左尺大而沉弱此又平時房勞之過也治法宜以感冒一節且放後先視其形色強弱厚薄且以補中化食行滯清涼胃火而以薑辣行之則中氣稍回傷滯稍行津液得和通體得汗外感之邪自解醫者不知詳審求之只顧表散外邪又不推究兼見之邪脈亦不窮問所得之病因如性情之著執巧施雜合治法將見正日虛邪日固皆拙工之過也鰲按雜合病以亦有表症故附此樓全善曰凡外傷風寒者皆先因動作煩勞不已致內傷體虛然後外邪得入故一家之中有病者有不病者由體虛則邪入而體不虛則邪無隙可入而不病也故傷寒為病屬內傷者十居八九後人泥於傷寒無補法一語但見寒熱不分虛實一例汗下必致夭傷者多矣里症綱仲景曰陽明之為病胃家實也目朱肱曰不惡寒反惡熱手掌心並脅下濈濈汗出胃中乾燥結聚潮熱大便閉小便如常腹滿而喘或譫語脈浮而滑者里症也里症者內熱也內熱屬陽明下之李梴曰里症始焉脈浮而大今則沉而數始焉惺而靜今則躁而動始焉頭疼發熱惡寒今則不惡寒反惡熱煩躁倍加胸連臍腹滿痛脅下掌心自汗濈濈以致胃干屎燥祕結小便赤澀口乾發狂譫語掀衣揭被揚手擲足六脈有力即是傳經熱症又謂陽盛誤汗即死或有初病即見此症者不拘日數多少便宜通利失下則血氣不通而發厥矣抑又有說純乎表而里無一毫病者當解表時勿攻裡純乎里而表無一毫病者當攻裡時勿解表如表裡俱見或表多里少表急里緩則先治表後攻里或里多表少裡急表緩則先攻裡後救表又表虛里實藥宜辛涼裡虛表實藥宜辛熱皆以里為主內氣正而後可以治表雖莫急於內表亦不可緩也表裡虛實而醫之大分明矣鰲按陽明雖亦有表病其根總在胃家實提綱是揭其根非意不在表也綱仲景曰傷寒四五日脈沉而喘滿沉為里而反發其汗津液越出大便為難表虛里實久則譫語渴欲飲水無表症者白虎加人參湯主之傷寒發汗已身目為黃所以然者以寒濕在裡不解故也不可下於寒濕中求之陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂表虛里實故也下之則愈宜大承氣湯目朱肱曰傷寒始發熱惡寒今汗後不惡寒但倍發熱而躁始脈浮大今洪實或沉細數始惺靜今狂語此為胃實陽盛再汗即死須下之愈發汗後不敢再表者為脈沉實耳脈若浮者須再汗也發汗後不惡寒只發熱脈沉實或狂語此為胃實陽盛即不可再汗須下之設令下後又不解表裡邪亦衰矣陽明病頭疼不惡寒反惡熱胃實故也陽明氣實故攻頭也調胃承氣湯病人無表裡症發熱八九日脈雖浮數宜大柴胡湯下之大便祕加大黃亦有始得病便變陽盛之症便須下勿拘日數更有心胸連臍腹大段疰悶腹中疼坐臥不安冒悶喘急極者亦不候他症便下之凡大便祕妨悶尚有表症者亦須少少飲小承氣湯解之不可過多令大泄也失下則氣血不通四肢便厥醫人不知反認是陰厥復進熱藥禍如反掌不可不察也劉完素曰凡里症脈實而不浮不惡風寒身不疼自汗譫語不大便或咽乾腹滿者可下不可汗也宜三承氣湯選用又不問風寒暑濕或表裡症俱不見但無表症而有可下者三一承氣湯此藥雖峻攻使無表熱入里而無結胸或痞之象也或熱結極深而諸藥數下畢竟不能通利以致將死者宜大承氣加甘遂一錢下之病在裡脈沉細者不問風寒暑濕或表裡症俱不見或內外諸邪所傷有汗無汗心腹痛滿譫妄煩躁蓄熱內盛但是脈沉者皆宜三一承氣湯合解毒湯下之解毒調胃湯及承氣湯皆能瀉大熱魏荔彤曰脈滑而疾滑雖熱盛於裡之兆而疾則熱未成實之徵蓋熱初傳入腑或由浮而變沉大兼遲滯方可攻下今脈滑疾是猶帶數熱變而傳入尚未堅凝結聚小承氣湯消熱調津足以已病矣以下尤斟酌盡善之處鰲按里症有虛有實有寒有濕有熱其邪之入里者皆為里症不專指邪實陽盛一邊說也綱仲景曰傷寒脈浮滑者此表有熱里有邪白虎湯主之目張介賓曰陽邪在表則表熱陰邪在表則表寒陽邪在裡則裡熱陰邪在裡則裡寒邪在半表半裡間而無定處則寒熱往來邪在表則心腹不滿邪在裡則心腹脹痛邪在表則呻吟不安邪在裡則躁煩悶亂邪在表則能食邪在裡則不食邪在半表裡則不欲食未至於不能食也邪在表則不煩不嘔邪在裡則煩滿而嘔凡初見心煩喜嘔及胸膈漸生痞悶者邪自表方傳裡也不可攻下凡病本在表外症悉具脈反沉微者以元陽不足不能外達也但當救里以助陽散陰為上策柯琴曰此論脈而不及症因有白虎湯症而推及其脈只據脈而不審其症雖表裡並言而重在裡熱所謂熱結在裡表裡俱熱者也鰲按發熱無汗口燥渴心煩舌上乾燥欲飲水數升大便祕皆白虎湯症也皆應得此脈綱仲景曰傷寒脈滑而厥者里有熱也白虎湯主之目鰲按脈滑而厥者陽厥也所謂陽極似陰也然必煩渴引飲能食而大便難乃為里有熱半表半裡症綱仲景曰傷寒五六日頭痛汗出微惡寒手足冷心下滿口不欲食大便硬脈沉細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微結假令純陰結不得復有外症悉入在裡矣此為半在表半在裡也脈雖沉細不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解目成無己曰邪之客於表者為寒邪與陽相爭則為寒矣邪之入於裡者為熱邪與陰相爭則為熱矣邪在半表裡外與陽爭而為寒內與陰爭而為熱是以往來寒熱邪居表多則多寒邪居里多則多熱邪半在表半在裡則寒熱亦半矣邪在表者必漬形以為汗邪在裡者必蕩滌以取利其餘不外不內半表半裡又非發汗所宜又非吐下所對是當和解則可矣小柴胡是也戴原禮曰論中有曰太陽經病者太陰經病者有曰傷寒者中風者有但曰厥者下利者有但曰病者有但曰某經者蓋以邪中其經故以經名之非特謂傷寒之候謂兼有雜病也凡云傷寒而不云經者故非雜病也謂六經俱有之症難以一經拘之中風亦然凡云下利及厥與夫稱病人等名症者謂六經傷寒中風雜病等候俱有是症也善治病者須要詳辨太陽傳經之邪各經直中之邪曾無汗吐下之症火逆水噴之症結胸發黃血滯痞利厥逆之症如中風傷寒雜病之候一切之疾不拘六經但分表裡蓋六經俱有表裡二症但有表症即發汗但有里症即攻下或表裡症俱見則宜以攻裡發汗之藥分表裡病症多少用之病在半表裡和解之此傳經之治也雜病寒症在表者辛溫汗之寒中里者大熱救之亦在明其表裡而已李梴曰凡病或渴或不渴或胸中煩不煩或嘔不嘔或腹脅痛不痛或咳或心下悸或小便不利少陽所主也或煩或嘔者邪在表方傳裡也若見耳聾脅痛寒熱嘔而口苦胸脅緊滿脈弦數即是半表半裡脈大胸滿多痰或挾宿食可吐百問云氣浮上部填塞心胸頭痛多涎此吐症也經云其高者因而越之脈雖大無甚痰者不可吐只宜和解表裡俱見症綱仲景曰中風發熱六七日不解而煩有表裡症渴欲飲水水入則吐者名曰水逆目朱肱曰傷寒表症當汗里症當下不易之法也發表攻裡本自不同桂枝承氣安可並進然使病人脈浮而大是表症當汗其人發熱煩渴小便赤即當下此是表裡俱見五苓散主之若不大便六七日頭痛有熱者是里症當下其人小便清者知不在裡仍在表也當鬚髮汗此是兩症俱見即未可下宜與桂枝湯若心下滿不欲食大便硬脈沉細是里症當下其人頭汗出微惡寒手足冷即當汗此兩症俱見仲景所謂半在表半在裡也小柴胡主之若太陽病表症未除醫數下之遂挾熱而利不止心下痞硬仲景謂之表裡不解桂枝人參湯本太陽病醫反下之因而腹痛是有表復有里仲景用桂枝芍藥湯痛甚者桂枝加大黃太陽病桂枝症醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩湯煩躁口苦腹滿而喘發熱汗出不惡寒反惡熱此陽明症也則脈反浮而緊是表裡俱見不可汗下宜梔子豉湯吐之此仲景治傷寒有表復有里之法也王好古曰大柴胡湯治表裡內外俱熱之症治有表者或脈浮或頭痛或惡風或惡寒四症中有一二尚在者乃十三日過經不解是也治有里者或譫語或妄見或擲手揚視此皆里之急者也若欲汗則里症已急欲下則表症尚在通用大柴胡湯無表裡症綱仲景曰傷寒六七日目中不了了睛不和無表裡症大便難身微熱者此為實也急下之宜大承氣湯目朱肱曰傷寒四五日後以至過經無表症又無里症未可下者皆可用小柴胡隨症加減治之以至十餘日亦可用十餘日外用小柴胡不愈者若大便硬看症可下則用大柴胡下之以過經其人稍虛當下者用大柴胡則穩恐承氣太緊病人不禁也如病人無表裡症發熱七八日脈雖浮數可用大柴胡下之假令已下脈數不解至六七日不大便者有瘀血也屬抵當湯柯琴曰傷寒七日不愈陽邪入陰矣目不了了晴不和何以故身微熱是表症已罷不煩躁是里症未見無表裡症也惟不大便而內實斯必濁邪上升陽氣閉塞下之而濁陰出下竅清陽走上竅矣傳變綱仲景曰傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也傷寒二三日陽明少陽症不見者為不傳也目鰲按一日約辭非定指一日也脈靜者太陽傷寒脈浮緊仍是浮緊之脈未嘗他變也故病仍在太陽而亦未他傳此據脈知之而太陽諸症自在可見若更驗之於症胸中之陽為在表之寒所郁因而欲吐躁煩脈又不靜而浮緊變為數急太陽之邪勢必入里而傳陽明蓋欲吐躁煩皆陽明胃症也此又兼審脈症而知之陽明少陽二經之症至二三日不見可知其脈仍浮緊而亦不變此又但據症而知之也可見一日太陽二日陽明以次相傳之日數未可泥矣綱仲景曰太陽病頭痛至七日以上自愈者以行其經盡故也若再作經者針足陽明使經不傳則愈目鰲按上條是就太陽傷寒之傳經不傳經辨之此條是就太陽傷風之傳經不傳經言之其舉頭痛包太陽諸症在內太陽經盡不再傳陽明故愈又言再作經云云者必有實欲再傳之勢方可用針不然勿妄施也綱仲景曰傷寒三日三陽為盡三陰當受邪其人反能食不嘔此為三陰不受邪也傷寒三日少陽脈小者欲已也目鰲按此二條申明少陽病傳不傳並愈不愈之故蓋傷寒一日太陽二日陽明三日少陽逮三日後三陽為盡三陰當受邪三陰必先太陰脾脾與胃表裡今能食不嘔皆胃之握固有力能以衛脾故雖脾當受邪而邪不能犯並邪之在少陽者亦得藉中州之力以為驅逐三陽之邪且由少陽而已矣故審其脈少陽本弦又邪在而更助其弦長今變為小故知其不傳陰而即從少陽解也不得以脈之小誤認為正虛脈微綱仲景曰傷寒六七日無大熱其人躁煩者此為陽去入陰故也目鰲按六七日者由少陽誤治延至日久也外無大熱似宜安靜忽內生煩躁其三陰之受邪必矣蓋三陽之熱作於表三陰之熱甚於里躁煩者裡熱盛也陽去入陰以少陽處於半表裡由陽入陰其機至速醫者不可不急圖於早也戴原禮曰凡人傷寒先犯太陽以次而傳此特言其概耳然其中變症不一有發於陽即少陰受之者有夾食傷寒食動脾脾太陰之經一得病即腹滿痛者亦有不循經而入如初得病徑犯陽明之類不皆始於太陽也亦有首尾止在一經不傳他經亦有止傳一二經而止者不必盡傳諸經也至如病之逾越不可泥於次第當隨症施治所以傷寒得外症為多仲景云日數雖多有表症者尤宜汗日數雖少有里症者即宜下吳綬曰陽邪以日數次第而傳者由一日至七日六經傳盡當汗出而解七日不解為之再經二七日不解為之過經過經不解則為壞病寒之傷人初無定體或中於陰或中於陽經言一二日發熱脈沉者少陰病也又一二日口中和背惡寒者少陰病也此皆直中陰經之寒非常而為變也活人書凡寒邪自背而入者或中太陽或中少陰自面而入者則中陽明之類亦不專主於太陽也又曰寒邪首尾只在一經而不傳者有之有間傳一二經者有傳過一經而不再傳者亦有足經冤熱而傳入手經者有誤服藥而致傳變者多矣故論曰一日太陽受之脈若靜者為不傳若脈數急躁煩欲吐者傳也蓋太陽為諸經之首傳變居多且熱邪乘虛之經則傳也若經實則不受邪而不傳也且太陽傳陽明陽明傳少陽皆妻傳夫為微邪少陽傳太陰太陰傳少陰皆夫傳妻為賊邪少陰傳厥陰太陽傳少陽皆母傳子為虛邪太陽越經傳太陰乃誤下傳亦虛邪太陽傳少陰乃陰陽雙傳即屬兩感太陽傳厥陰亦母傳子亦為虛邪又為首尾傳夫傷寒傳至厥陰為尾厥者盡也正將復而邪將解水升火降寒熱作而大汗解也若正不復邪無從解陰氣勝極則四肢厥冷舌卷耳聾囊縮不知人而死矣陶氏云傷寒傳足不傳手者俗醫之謬論也夫人之氣自平旦會於膻中朝行手太陰肺以次分布諸經所以一脈愆和則百脈皆病彼云傳足不傳手何據乎蓋傷寒者冬時感寒即病之名也冬時則足太陽少陰正司其令觸冒之則二經受病次則少陽厥陰繼冬而司春令而亦受傷何也蓋風木之令起於大寒正當十二月至春分後方行溫令故風寒亦能傷之足陽明太陰中土也土寄旺四季則四時寒熱溫涼之氣皆能傷之況表邪傳裡必歸脾胃而成燥屎用承氣以除去之胃氣和矣手之六經主於夏秋故不傷之足之六經乃受傷之方分境界也若言傷足不傷手則可謂傳足不傳手不可也況風寒中人先入榮衛晝夜循環無所不到豈間斷於手經哉仲景云無奇經則無傷寒緣奇經皆附足六經不附手經是以寒邪只傷足經也傷寒傳至五六日漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水與稀粥則咽不與則不思六脈細數而不洪大心下不痞腹中不滿大小便如常或傳十日以來形如醉人醫見神昏不已多用承氣誤矣不知此熱傳手少陰心經也然又未知自何經來答曰本太陽傷風風為陽邪陽邪傷衛陰血自燥熱結膀胱壬病逆傳於丙丙丁兄妹由是傳心心火上迫而熏肺所以神昏也謂肺為清虛之臟內有火邪致令神昏宜梔子黃芩黃連湯若脈在內者導赤散脈在心者瀉心湯若誤用涼膈散乃氣中之血藥也如左寸沉潛有力者則可用之或犀角地黃湯亦可若脈浮沉俱有力者是丙丁俱有熱也以導赤瀉心各半服此症膀胱傳丙足傳手經也下傳上也丙傳丁也表傳裡也壬傳丁者坎傳離也越經傳也又謂腑傳臟也活人書傷寒傳足不傳手此言不盡意也有從足經而傳手經者經云傷寒或止傳一經或間傳一二經不可拘以始太陽終厥陰也但憑外症治之此活法也與食則咽者邪不在胃也不與不思者神昏故也熱邪既不在胃誤用承氣必死只是邪蘊日久因足經實手經虛故冤熱耳有因汗下差誤而傳有因七情或勞倦等而傳大抵傳於手經必有所因所以古人有救逆復脈等法豈但切中病情實啓後人義例李梴曰表多里少為在經宜清肌解表里多表少為在腑宜和肌通里蓋陽明標雖主肌而其本則胃也各經絡為標各臟腑為本然豈獨陽明為十二經之長而有經腑之異乎仲景曰三陽受病未入於腑可汗而已三陰受病已入於腑可下而已則三陰有在經者仍宜微汗之蓋榮衛太陽主皮毛胃腑主皮膚之下肌肉之上及腸胃也胸脅屬少陽主血榮百節流行三部臟屬三陰主筋骨並兩足故太陽為陽之表陽明為陽之裡若但以臟腑分表裡則腑為表臟為里若合榮衛臟腑分表裡則表者榮衛之所行里者胃腑之所主而臟則又深於里但病入胃則亦不更傳王氏肯堂曰風寒客於人使人皮膚閉而為熱故傷寒為病熱也針經曰多熱者易已多寒者難已故熱雖甚不死若兩感於寒而表裡俱病者必死經云三陽受病未入於腑者可汗而已三陰受病已入於腑者可下而已若兩感於寒者死若五臟六腑皆受病則榮衛不行臟腑不通必死但按三陽受邪為病在表法當汗解然三陽亦有便入腑者入腑即宜下故云未入腑可汗素問腑字作髒字理勝蓋腑陽而臟陰且傳陽明即入腑也三陰受邪為病為里法當下然三陰亦有在經者在經則宜汗故云已入腑可下經又云其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身熱稍歇也九日少陽病衰耳聾微聞也十日太陰病衰腹減如故則思飲食也十一日少陰病衰渴止舌乾已而嚏也十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也若更感異氣變為他病者當依壞症治之若脈陰陽俱盛重感於寒者變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫陽脈洪數陰脈實大者遇溫熱變為溫毒為病最重也溫毒必發斑陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以冬傷於寒發為溫病閔芝慶曰傷寒傳經邪熱漸入而六經以次受之六經傳盡無出而再傳之理欲知其傳始末先別人身六經足太陽為三陽最在外陽明為二陽在太陽內少陽為一陽在陽明內此三陽為表也太陰為三陰在少陽內少陰為二陰在太陰內厥陰為一陰在少陰內此三陰為里也皆由內以數至外故一二三之次第如此傷寒由表入里邪氣以漸深傳故一二日始於太陽二三日傳於陽明三四日少陽四五日太陰五六日少陰六七日厥陰也此論其常耳變則不可拘以日數其傳至厥陰為傳經盡不復再傳成氏曰六日厥陰六日為傳經盡七日不愈者謂之再傳再自太陽傳至十二日再至厥陰為傳經盡十三日當愈十三日不愈者謂之過經言再過太陽經亦以次為傳也謬矣馬仲化云自太陽以至厥陰猶人由戶升堂入室厥陰復出傳於太陽奈有少陰太陰少陽陽明以隔之豈有遽出而傳太陽之理此斥再傳之非誠千載斷案惜乎釋七日病衰猶有未明使後人於傳經不能絶無障蔽耳辨見六經七日病愈篇在愈解門然則邪氣之入果無自里而出於表者乎無欲傳之出有欲愈之出也太陽篇曰欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也此以脈浮為邪氣還表知是向安之兆不待更用湯藥邪自外散者散則復何傳焉須知里邪不出則已出則欲愈非復欲傳也或曰太陽篇云太陽病頭痛七日以上自愈者以行其經盡故也若欲再作經者針足陽明經使經不傳則愈此非一日至六日傳三陽三陰經至七日當愈不愈則太陽之邪再傳陽明者歟曰傷寒始於太陽受病以次而終於厥陰為傳經盡諸經受病凡七日自愈者為行其經盡太陽病至七日頭痛自愈者以行太陽經盡故也邪氣行來始終只在太陽一經而盡其七日當愈之數也論云發於陽者七日愈以陽數七也若七日以上不自愈欲過太陽一經再傳一經當針足陽明迎而奪之使不傳陽明經則愈細玩行其經盡之句不曰傳經盡則仲景之意昭然矣成氏謬以行其經盡為遞傳六經乃有自太陽再傳之說耳若果傳遍六經厥陰之邪再傳太陽太陽再傳陽明則宜厥陰未傳太陽之前預針太陽矣何必待欲傳陽明而後針陽明哉或曰霍亂篇有曰十三日愈所以然者經盡故也此非傷寒六日傳遍三陽三陰後六日再傳經盡十三日當愈者歟太陽篇有曰傷寒十三日不解過經譫語者以有熱也當以湯下之此非十二日再傳經盡十三日不愈謂之過經者歟曰經盡者如太陽行其經盡之謂也由太陽受病於一日至七日為行太陽經盡之例推之則諸經皆可屈指而期矣陽明受病於二日至八日自愈者為行陽明經盡推之少陽及三陰經次第至十二日自愈者為行厥陰盡十三日當大氣皆去精神爽慧之期也故曰若過十三日以上不間尺寸陷者大危其曰十三日不解過經譫語止以當解之期不解乃過於經而入於裡譫語者此為內實而結於裡也當以湯下之此泛言過經不專指何經者也何嘗有再傳經盡謂之過經之旨哉詳考所謂過經者或有言過太陽經成里症或有專言過太陽經者或有泛言過經者敢引而證之陽明篇云汗出譫語者以有燥屎在胃中此為風也過經乃可下之蓋謂燥屎在胃中而譫語其風邪在表而汗出其燥屎在胃則當下過太陽無表症而結於裡乃可下之此言過太陽經而結於胃成里症者也果如成氏十三日再傳經盡謂之過經則燥屎在胃必待十三日乃可下乎於此則注曰須過太陽經無表症乃可下之則與再傳經盡謂之過經自相矛盾矣太陽篇曰太陽病過經十餘日反二三下之後四五日柴胡症仍在者先與小柴胡湯蓋謂過太陽經無太陽表症然里症未具本未可下反二三下之後四五日尚有少陽之柴胡症者亦須與小柴胡湯此專言過太陽經者也霍亂篇曰下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也此承上文而言霍亂下利後亡津液而當便硬硬則能食者愈屬陽明胃氣和也今反不能食傳入後一經中頗能食是復過一經能食矣如屬陽明氣和則其過之一日當愈不愈者暴熱使之能食非陽明氣和也此泛言過經者也何嘗有再傳經謂之過經之旨哉況邪傳六經豈有三度之理哉成氏釋仲景書闡明奧旨惠及後世多矣獨於傳經少達乃致穿鑿之甚蘊要祖成氏之注其過經不解例曰經言傷寒十三日不解謂之過經仲景焉有此語是以成注為經矣其六經傳變論又曰過經不解則為壞病矣夫仲景所謂壞病者言為犯逆所壞也蘊要之說訛上之訛矣陶尚文曰傷寒汗不愈而過經其症尚在而不除者亦溫病也此說更不可曉魏荔彤曰閔氏傳經之說亦能獨發微旨其六經盡傳不再傳之說實本於內經病邪遞傳一臟不兩傷兩傷則死之理其切要之語謂傷寒病傳經凡言日者概不可以日數拘也尤為破的但亦有應申明者經云一日太陽受之不過云太陽病始於此一日耳在太陽數十日不罷皆可謂之在太陽一日分內也故有始終生死於太陽者矣此傷寒論仲師設有過經不解專篇乃為傷寒論不傳經言也二日陽明受之者亦以太陽傳陽明之始為二日在太陽者暫即曰傳陽明固陽明之二日也在太陽者久七八日始傳陽明亦為陽明之二日也其餘各經遞言三四五六日概如是矣必言七日者自太陽始受病計至七日太陽愈藉日以明其遞傳之次耳如人自此起行至某處七日之程其行之遲速至之先後則不可計也此七日太陽病當愈之義也閔氏以為七少陽之數仍似執論余謂太陽病愈之日即為七日更覺明爽耳是凡陽明受邪之日皆為二日也不過太陽始傳於陽明之次耳然則在陽明為久為暫得愈之日皆八日也亦不必謂七日合少陽之數也諸經得愈之日亦皆如此似不合經文而深合於經旨也何也經文示天下萬世以成憲或不得不藉日以明其次第使人知六經受病及愈日之紀也其實病邪變遷倏忽無常加甚得愈且無定時諸病皆然傷寒尤甚何可以日計乎所以仲師又設合病專篇是兩三經同感則一日已滿三陽之分又烏從計日乎即直中陰經之寒邪亦嘗初起即遍三陰何必一日中太陰二日方及少陰三日方及厥陰耶寒邪常易中少陰以陰起於下腎經在下體也直中少陰常並及三陰少陰厥陰並中者更多豈以日可計乎鰲按不但直中少陰厥陰者為更多即傳經至少陰者亦往往即傳厥陰而此二經之症一半日間即已俱見以肝腎同部故易相連而及也知計日以言經卻不計日以察病斯可與言遵經治病矣及病邪已入厥陰重言復傳太陽則合內經靈素搜求再考仲師之論並無此說稍知醫理者可明其妄蓋人身內而腑臟外而經絡邪無自厥陰得入太陽之道路也如邪已透表則升散矣焉有自里透表復從表入里者哉試問古今來自厥陰復入太陽者何人曾治此傷寒病乎以余觀之今人患傷寒病在三陽經或生或死即決矣直中陰經者反有之傳經至陰經者已少況六經遍傳乎以今人氣稟虛弱者多世醫操術不明者更多不俟傳遍已死矣所以見治六經傳遍之傷寒病者竟無有也鰲按此論更精更快可以提醒世醫況傷寒病雖如是分別六經而病此者未必盡分疆畫界如此井井初得之時兩經皆病者三經皆病者甚多此未病而彼已傳者亦復不少陽經未盡亦有入於陰經者至陰經矣又嘗見太少兩經俱病也又嘗見三陰經俱病也所以仲景未嘗不設合病篇以論病並病篇以論治也合病並病雖獨有三陽乃舉一隅也寧不可推之三隅乎若不能推則雖有書充棟亦無用矣如能神明必於斯言有會耳鰲按自仲景論著傳經之說後來聚訟紛紛終不合經旨以總皆拘於日數故說來往往支礙也自有閔氏辨其理於前復有魏氏暢其說於後合二篇觀之而傳經一款千古遂有定案誠傷寒科之祕笈也愈解綱仲景曰太陽病欲解時從巳至未上陽明病欲解時從申至戌上少陽病欲解時從寅至辰上太陰病欲解時從亥至醜上少陰病欲解時從子至寅上厥陰病欲解時從醜至卯上目柯琴曰巳午為陽中之陽故太陽主之至未上者陽過其度也申酉為陽明之時即日晡也凡稱欲解者俱指表而言如太陽頭痛自止惡寒自罷陽明則身不熱不惡寒也寅卯主木少陽始生即少陽主時也主氣旺則邪自解矣辰上者卯之盡辰之初也經曰合夜至雞鳴天之陰陰中之陰也脾為陰中之至陰故主亥子丑時天以一生而開於子故少陰主於子木克醜旺於寅時故厥陰主醜寅卯三時綱仲景曰凡病欲知何時得何時愈答曰假令夜半得病者明日日中愈日中得病者夜半愈何以言之日中得病夜半愈者以陽得陰則解夜半得病明日日中愈者以陰得陽則解也目柯琴曰發於陽者七日愈發於陰者六日愈以陽數七陰數六故是論日期合陰陽之數而愈此論愈時於陰陽反盛時解何也陰盛極而陽生陽盛極而陰生陰陽之相生正陰陽之相得即陰陽之自和也然此指病在一二日愈者言耳如六七日愈者則六經各以主時解是又陽主晝而陰主夜矣綱仲景曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈為陰陽和平雖劇當愈目王肯堂曰針經云寸口人迎兩者相應若引繩大小齊等者名曰平人言手之寸口脈與喉旁之人迎脈等齊為平人他條云六脈陰陽俱停必先振栗汗出而解者是也鰲按脈三處同等只是純陰純陽偏勝之脈是仍為病脈是寒熱不解病猶未愈之脈故陰陽和平四字並非陰陽調和之義曰和者言或純陰或純陽無乖戾之象曰平者言純於陰純於陽無駁雜之形也然曰純陰究竟偏於陰矣曰純陽究竟偏於陽矣故非調和之義也雖劇當愈者偏陰則陰劇治其陰之劇則陰之病當愈偏陽則陽劇治其陽之劇則陽之病當愈正欲醫者知此為陰陽偏之脈而急早治之也綱仲景曰欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也目魏荔彤曰此與太陽病欲解時從巳至未上一條教人於愈期愈時之際當明辨其是傳經盡不復再傳否也於何辨其傳不傳解則不傳於何辨其解不解汗則解於何辨其汗不汗先煩則汗於何辨其欲汗之先煩脈浮則先煩為欲汗之煩而非入里之煩傷寒原無汗猶可以知其汗而解傷寒原有汗何以知其汗為必解之汗乎故當於脈浮二字求之而忽浮之脈必非入里傷風原脈浮有汗之症忽添一煩又不見入里之脈則為欲解然則入里之脈數急是也此煩與煩躁之煩不同脈靜者為不傳也脈數急者為傳也綱仲景曰風家表解而不了了者十二日愈目魏荔彤曰此明太陽中風病愈後風邪留滯之症當聽其自愈不必妄治也十二日愈者六七日推之也七日愈者太陽中風也連病愈之日計之更得六日其實五日除此病愈之後陰氣復於六而神清氣爽矣綱仲景曰陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也目魏荔彤曰脅下硬滿較胸脅滿少甚且不大便而嘔而舌苔是陽明病胃已成實而邪復轉傳少陽也諸症中惟不大便為正陽陽明余皆少陽陽明病是病在正陽陽明較前已甚即病入少陽陽明較前更深但俱屬未全成少陽也仍與小柴胡和解使正陽之邪由少陽出胃不成實陽明得罷總無異也上焦得通四語又言邪之結於有形者隨津液下而由腸以泄邪之溷於無形者隨汗而由表以透此所以正陽陽明之邪由少陽陽明半表半裡以和解為其出路一同於盡傳少陽治之之法也又何必俟傳少陽而後施治哉鰲按喻嘉言謂上焦得通津液得下八字關係病機最切誠哉言也其意以風寒聚膈中必挾津液而成喘逆嘔痞諸症故上焦風寒不解則津液必不得下惟和之於中而上焦通矣上焦通而津液亦和而下矣喻又推言雜病如痰火哮喘咳嗽瘰癧等症皆火勢熏蒸日久頑痰膠結經隧所以火不內熄則津液必不能下灌靈根而清華盡化為腐濁此旨更精蓋人之生全賴得水穀之氣以化津液流貫肢體若結則病竭則死矣凡治病者可不以救人之津液為急急哉綱仲景曰凡柴胡湯病症而下之若柴胡症不罷者復與柴胡必蒸蒸而振卻發熱汗出而解凡病若發汗若吐若下若亡津液陰陽自和者必自愈傷寒三日少陽脈小者欲已也目魏荔彤曰首條言少陽誤下而症不罷是下之誤未及於病也復與柴胡何疑焉特以誤下傷正故見蒸蒸而振之虛象然陽升表透陰降里和少陽之病亦解矣二條少陽為病必自太陽陽明遞傳而來積日必久治不合宜順逆之故已明之然有治雖逆而病不為逆則必秉質厚血氣充故藥邪不能使病邪浸加正氣且能驅病邪漸去故雖誤於汗吐下亡津液其人陰陽之脈和平必當自愈而毋庸好事妄治也曰凡病者雖言少陽實統三陽並六經且及百病言之故不專曰少陽曰傷寒也三條脈不弦大而小邪微欲解之先兆也綱仲景曰太陰中風四肢煩疼陽微陰澀而長者為欲愈目魏荔彤曰四肢煩疼陽微發熱陰澀汗出純乎太陽中風矣然腹滿時痛下利吐不能食如故是非太陽中風宜表散者乃太陰病而類於太陽之中風有陰症欲還復於陽症之機也若脈並見長則邪自太陰欲還少陽必矣經邪內陷因有腹滿等症若經邪欲出則症見四末而不久於內陷可知矣於是陽微陰澀邪已有漸透營衛之勢兼以弦長脈見少陽之門戶闢而生髮之氣已動矣更得四末之間蠢然煩疼汗出發熱邪純回太陽矣曰為欲愈亦見太陰之邪必由少陽越太陽而出也至脈見長在陽明篇屢言之曰脈弦者生長即弦也在陽明以少陽為出路者見弦長為生機豈太陰亦以少陽為出路者見弦長有異哉此余言長脈之據也綱仲景曰少陰中風陽微陰浮者為欲愈目魏荔彤曰少陰病不外直中傳經寒熱二邪然於其入也分寒熱必清於其外也則不必分寒熱竟言出而得愈而已然其症脈亦必明辨之本少陰病也何忽類太陽之中風少陰有直中之寒無直中之風如有直中之風則自為風中腎臟之症與傷寒中之傳經熱邪固不相涉即與直中寒邪亦不相干今曰少陰中風乃少陰症忽變為似乎太陽之中風也何以見之以其熱自發而汗自出也少陰病反發熱反汗出乃內真寒外假熱直中寒邪內所有之症此條未言發熱汗出而余言之非杜撰也乃原文中所有也何言之以脈見陽微陰浮而知必發熱汗出也在少陰直中寒邪之脈見沉緊是陽緊而陰沉也在少陰傳經熱邪之脈見沉數是陽沉而陰數也今陽見微是不緊也原為直中之寒邪將散故變緊為微且不沉也原為傳經之熱邪將散故變沉為微也且陰見浮是不沉也原為直中之寒邪將散故變沉為浮且不數也原為傳經之熱邪將散故變緊為浮也此足見少陰病不論寒邪熱邪見此陽微陰浮俱為欲愈之機矣又何以知其發熱汗出也太陽論曰陽浮者熱自發陰弱者汗自出少陰見陽微即太陽之浮脈也再陰脈浮而不沉非弱之義乎發熱則陰寒已微況脈不見沉緊則非內陰逼陽於外之反發熱也汗出則里病已除脈又不見沉細則非陰盛逼陽出亡之汗自出也於此知其陰病轉陽里邪透表必發熱汗出見欲愈之神理也綱仲景曰厥陰中風脈微浮為欲愈不浮為未愈目魏荔彤曰此言厥陰病得愈之脈本厥陰病脈應沉中見緊或見數俱非微脈亦有陽微而脈微者則浮沉取之皆微今沉取不見緊數知陰分之邪已雜浮取見微知陽分之表欲透此微即太陽中風之陽浮而陰弱也本厥陰病若真中風自有口眼歪斜等症今脈微浮既非無根之陽外脫亦非厥陰之陽內陷是厥陰之邪隨陽氣由少陽達太陽欲愈之機也故可以厥陰中風名其病見陽升邪脫可識經盡得解之候也是全於浮之一診決之浮則愈不浮則未全愈邪透表則愈邪未全透表則病未全已桂枝湯正吃緊法矣綱仲景曰問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也目柯琴曰治病必求其本本者其人平日稟氣之虛實緊者急也與數同而有別蓋有虛實之分焉又必按之芤不芤而虛實之真僞畢見綱仲景曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也問曰病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液待陰陽自和必自愈故不戰不汗出而解也目王好古曰戰而後解者太陽也不戰有汗而解者陽明也不戰無汗而解者少陽也綱仲景曰問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必不汗出也目鰲按太陽脈本浮數三日轉微即傷寒三日少陽脈小為欲愈之義也蓋此條微字與上其脈自微不同以上是妄治後亡陽之微此則未經妄治故必不汗而三日自解也綱仲景曰太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯凡病反能飲水者為欲愈目王好古曰太陽傳陽明其中或有下症陽明症反退而無熱與不渴卻顯少陽症是知可解也太陽症知可解者為頭不疼項不強肢節不痛則知表易解也陽明症知可解者為無發熱惡熱則知里易解也少陽症知可解者寒熱日不移時而作邪未退也若用柴胡而早晚得移其時是邪無可容之地知可解也可解之脈浮而虛不可解之脈浮而實浮而虛者只在表浮而實者知已在裡也汗多不解者轉屬陽明也閔芝慶曰七日病愈論曰夫六經以漸受病其愈皆以七日為期陽數七故也傷寒例曰其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛可愈也八日陽明病衰身熱可歇也九日少陽病衰耳聾微聞也十日太陰病衰腹減如故思飲食也十一日少陰病衰渴止舌乾已而嚏也十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也此論六經七日病愈本之素問熱病篇奈彼此注釋者皆不能無誤旨未明也敢重釋之曰其者指傷寒也不兩感於寒者非日傳二經之症也更不傳經者邪在此經更不傳彼經也不加異氣者傷寒病熱不重感寒感風感溫感熱感濕而變為他病也夫如是則可期六經愈日矣太陽篇曰發於陽者七日愈以是數計之乃知六經之病自一日受者七日當衰二日受者至八日亦是七日而當衰故七日邪在太陽幸而更不傳陽明更無變症則至七日太陽病衰頭痛少愈如或二日邪傳陽明更不傳變至八日陽明病衰身熱少歇又或三日邪傳少陽更不傳變至九日少陽病衰耳聾微聞又如四日邪傳太陰更不傳變至十日太陰病衰腹減如故思飲食又或五日邪傳少陰更不傳變至十一日少陰病衰渴止舌乾已而嚏又或六日邪傳厥陰經盡更不傳變大氣皆去精神爽慧此二句總承六經而言如在太陽更不傳變當七日病衰頭痛少愈漸而大氣皆去頭痛悉除精神爽慧也余經不傳之例同成氏注曰六經傳遍則與更不傳經之句背矣素問注證七日巨陽病衰頭痛少愈止以初時所感之邪太甚既於二日傳之陽明矣而其未盡傳者尚在太陽則至此而比之一日之際少愈焉果如傳之陽明云云則由此而六日傳至厥陰為傳經盡將曰七日傳何經其未盡傳者尚在厥陰至十二日比之六日之際少愈焉又思果如傳之陽明云云則由此而傳之厥陰當六日之時前之邪氣未盡傳者俱如太陽之尚在自頭痛以至囊縮諸症紛紛甚於兩感七日之際豈得不死反曰病衰乎況太陽受病若必傳遍六經則二日陽明三日少陽本經固有頭痛者至四日傳太陰太陰經不至頭當腹滿嗌乾之時不得有頭痛矣何必至七日而頭痛少愈也或曰太陽傳陽明其未盡傳者尚在太陽豈無是症歟曰有之是太陽陽明並病之症也若釋七日太陽病衰而曰傳之陽明如此則非矣由岐伯無更不傳經不加異氣二句而馬氏注素問失合仲景注耳或曰所謂更不傳經者謂六經傳遍七日當再傳太陽而不傳也噫此因成氏注釋之謬後世有是說耳已辨之詳矣或曰子謂更不傳經如曰太陽更不傳經者有據乎曰太陽篇云傷寒一日太陽受之脈若靜者為不傳也傷寒二三日陽陰少陽症不見者調不傳也少陽篇云傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也是皆當傳不傳者也要知仲景之論本諸素問舉其大體而已即六經病衰之期寧無先之者乎後之者乎傷寒原不可以日數拘也況傳經六日至於囊縮危且急矣得至十二日病衰囊縱者不可為常也學者當以圓通得之
