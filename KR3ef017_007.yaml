body:
  text: 卷五痙綱仲景曰太陽病發汗太多因致痙脈沉而細身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也目徐彬曰痙病概為風寒濕所中然原其因多由亡血筋無所榮邪得以襲之故仲景原痙病之由而曰太陽病果寒多本宜發汗太多則血傷不能榮筋而成痙也古人以強直為痙外症與傷寒相類但其脈沉遲弦細而項背反張強硬如發癇為異耳仲景既以無汗有汗分辨剛柔此則以脈沉細為辨謂太陽病發熱是表中風矣復加以濕纏綿經中內挾寒氣今筋脈抽急而項背強直脈反沉細沉細者寒濕用事邪欲侵陰之象也於是項背強直故名痙痙脈本伏弦細則元氣憊即難治中風症多角弓反張類痙者但中風強直其先必無太陽形症脈亦必浮大而非沉細弦遲故內經曰諸暴強直皆屬於風但陽主動陰主靜是當以強直而安靜主濕強直而搐搦主風此治中風辨法也千金謂濕病熱入腎中亦為痙小兒癇症熱盛亦為痙亦中風類也前人云傷寒痙症有五皆屬太陽若頭低視下手足牽引肘膝相搐陽明痙也若一目或左或右並一手一足搐搦者少陽痙也太陽固屬風寒陽明少陽亦風火熱之內作中風類也皆當兼養陰清熱為治若此所論痙雖外感風寒濕不同然由亡陽筋燥則一矣如無汗反惡寒為剛痙有汗不惡寒為柔痙此辨症之法非痙家本症也此乃舉痙症之最備者以詳病時之形狀且言治之不得過汗而脈有常體也身熱太陽表邪本盛乃因血液衰少寒邪復挾濕摶結衛中陽氣不下而寒濕隨太陽經下項稍侵陽明而頸項強急真陽不達於表而惡寒於是太陽經無非寒熱而格熱於上為頭熱面赤目赤獨頭動搖太陽主開寒濕摶之開闔不利不能發聲而卒口噤液衰邪盛筋失所養失養而背反張此痙病本然之形症也綱仲景曰太陽病發熱無汗反惡寒者名曰剛痙太陽病汗出不惡寒者名曰柔痙目李梴曰太陽病純傷風純傷寒則不發痙惟先傷風而又感寒先傷風而又感濕過汗俱能發痙重發太陽汗大發濕家汗皆能發痙外症寒熱類傷寒但脈沉遲弦細搖頭露眼口噤手足搐搦項強背反張如發癇終日不醒為異風性徑為剛痙因重感寒或冷故無汗宜葛根湯加羌獨活防風濕性緩為柔痙因先傷風故有汗宜桂枝湯加花粉葛根其或痰塞氣盛則茯苓星夏以消痰枳實陳皮紫蘇以順氣痰消氣盛然後分剛柔治之通用小續命湯有熱去附子自汗去麻黃剛痙二三日仰面壯熱胸滿如結胸狀便閉腳蜷臥不著席者大承氣湯下之輕者敗毒散小柴胡湯柔痙二三日不瘥汗多厥冷筋脈拘急者附子防風湯時發時止危者附術散又有剛柔不分之痙身熱譫語似剛微厥便滑似柔宜小續命湯加生附子有汗下後乍靜乍躁偏左眼左手足牽搦者少陽痙也小柴胡加防風又虛血之人及産後傷風過汗破傷風症發痙俱不可純作風治四物湯加防風或八物湯去茯苓加羌防黃耆救之凡痙脈如雨濺出指外者立死又戴眼反折瘛瘲汗出如珠或反張離席一掌許小兒離席二指許者無不死徐彬曰此二條即辨寒傷營風傷衛法也取以為痙病剛柔之別蓋痙即痓強直之謂也痙病必有背項強直等的症但治痙病剛柔之辨最為吃緊故特首拈無汗反惡寒為剛有汗不惡寒為柔以示辨症之要領謂發熱無汗惡寒本傷寒家症若痙而項強背直者見之乃衛陽與腎中真陽氣本相通今太陽經寒濕相摶而氣侵少陰真陽不達故反惡寒也寒性徑切故曰剛有汗不惡寒本傷風而並陽明症若痙而項強背直者見之是太陽陽明傷濕而兼風非寒邪內侵之比也風性溫和故曰柔非止項強而身體則軟為柔痙也栝蔞桂枝湯乃治柔痙主方也李中梓曰此太陽中風重感寒濕而致也仰面開目為陽合面閉目為陰燥渴為陽口中和為陰脈浮緊數為陽沉細澀為陰陽痙易治陰痙難治通用小續命湯陽痙去附子陰痙去麻黃柯琴曰此以表氣虛實分剛柔原其本而名之也亦可以知其人初病之輕重稟氣之強弱而施治矣金匱用葛根湯則謬綱仲景曰瘡家身雖疼不可發汗汗出則痙目徐彬曰瘡家血本虛燥以疼痛為風而發其汗則液亡筋燥而不能和調乃亦為痙雖汗下後或有邪乘然總以陰虛液脫為主故特詳其致痙之因如此鰲按瘡家病與風寒不同風寒外症必頭項痛身腰痛骨節痛非痛偏一處風寒內症必嘔逆或乾嘔不得飲食故發熱惡寒雖亦相同而辨其內外症則可知彼此之異不得誤認癰膿為風寒而錯治矣此仲景借瘡家以明治傷寒之法當發汗非論傷寒而雜及瘡家也其旨當明綱仲景曰太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之目徐彬曰剛痙之背項強直而無汗發熱又反惡寒原屬寒濕居中陰陽兩傷之象有如發熱而太陽病矣無汗乃寒傷營本症也此時邪尚在表不在裡而小便反少氣上衝胸明是太陽隨經之邪自腑侵臟動其沖氣且口噤不語是太陽主開而反闔聲不得發則陰陽兩傷勢必強直惡寒所不待言故曰欲作藥用桂枝全方加葛根麻黃風寒兼治也然足陽明脈起於鼻交頞中旁納太陽之脈故自太陽而侵及陽明勢將頭項強不已而漸胸滿特以葛根主之以杜兼併之勢為無汗剛痙主方且桂枝原能治沖氣也李中梓曰陰痙厥逆筋脈拘急汗多宜桂心白朮散閉目閣眼附子防風散胸滿口噤臥不著席咬牙攣急大承氣湯頭項強小腹滿小便不利五苓散風盛血燥防風當歸湯瘛瘲綱仲景曰太陽病脈陰陽俱浮自汗身重多眠鼻鼾語言難出不可下不可火若被火者微則發黃劇則驚癇瘛瘲目吳綬曰夫瘛瘲者一伸一縮手足相引搐搦不已大抵與嬰兒發搐相似古人以此症多屬於風風主動搖也駱龍吉言心主脈肝主筋心屬火肝屬木火主熱木主風風火相扇則為瘛瘲也若不因汗下所生者當平肝木降心火佐以和血脈之劑如羌防柴芍芎歸芩連生地天麻之類若兼有痰必加竹瀝星夏如風邪內煽加全蠍殭蠶若傷寒曾經汗下後多所傳變而得為病勢已過多難治也蓋因虛極生風所致須用小續命湯或大建中湯加減一二味主之凡傷寒汗出露風則汗不通流遂變筋脈攣急手足搐搦宜牛蒡根如本條由風溫被火宜葳蕤湯若瘛瘲戴眼反折絶汗乃出大如貫珠著身不流者此太陽終也不可治又有四肢漐習動而不止似瘛瘲而無力抽搐者此為肝絶蓋汗下後變生此症者多死凡用小續命湯有汗去麻黃無汗去黃芩要在通變而已綱仲景曰風濕為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲目成無己曰瘛者筋脈急也瘲者筋脈緩也急則引而縮緩則縱而伸或縮或伸動而不止者名曰瘛瘲俗謂之搐搦是也內經以瘛為契合之契瘲為放縱之縱以急為瘛以緩為瘲理至明矣瘛瘲者風疾也而癲癇則瘛瘲焉傷寒瘛瘲者邪實氣極也熱盛則風摶並經絡風主動故四肢瘛瘲而不寧也風濕被火而瘛瘲言熱氣之劇盛也傷寒至於發瘛瘲病勢已過矣內經曰太陽終者戴眼反折瘛瘲絶汗乃出大如貫珠著身不流是見其瘛瘲為已過之疾也瘛瘲之症雖劇若能以祛風滌熱之劑折其大勢則亦有生者若妄灼灸或與發表之藥必死經曰一逆尚引日再逆促命期鰲按此乃風熱甚之病宜祛風散熱為主然或有一二可生耳非謂其必生也不仁綱仲景曰脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也目張云岐曰不仁謂不柔和痛癢不知任其屈伸灸刺亦不知是謂不仁也由邪氣壅盛正氣為邪氣所閉伏鬱而不發血氣虛少不能通行故也內經曰榮氣虛則不仁針經曰衛氣不行則為不仁經曰營衛不能相將三焦無所仰身體痹不仁即此知營衛血氣虛少不能通行為不仁明矣又謂諸乘寒者則為厥鬱冒不仁言此厥者是正氣為寒氣所乘而為厥氣非四肢逆冷之厥也何也鬱冒為昏冒不仁為不知痛癢是為尸厥經曰少陰脈不至腎氣微少精血奔氣促逼上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥其乘寒之厥鬱冒不仁者即此可知矣昔越人入虢診太子為尸厥以鬱冒不仁為可治刺之而得痊實神醫也若如本條命絶雖越人其能救之耶陶華曰瘛則急而縮瘲則緩而伸熱則生風風主乎動故筋脈相引而伸縮傷寒至此死症也能去風滌熱治之幸有生者治法與痙病略同不仁謂不柔和諸虛乘寒為鬱冒不仁血氣虛弱不能周流一身於是正氣為邪氣所伏故肢體頑麻不仁厥如死尸用麻桂合半湯不愈補中益氣湯入薑汁李中梓曰瘛瘲者或縮或伸動而不定汗出時蓋覆不周腰背手足搐搦牛蒡根湯脈浮數有風熱防風通聖散血不養筋大秦艽湯發黃綱仲景曰病發於陽而反下之熱入因作結胸但頭汗出余處無汗至頸而還小便不利身必發黃也傷寒瘀熱在裡身必發黃麻黃連翹赤小豆湯主之目朱肱曰頭汗出而身發黃者茵陳蒿湯十分五苓散五分拌和每服一錢水下日三服張云岐曰寒氣侵人人即發熱以拒之是為發陽助陽散寒一汗而寒熱解矣不汗而反下故熱內陷而成結胸炎上而但頭有汗且小便不利致濕熱內蒸黃色外見也解表清火利水麻黃連翹赤小豆湯一劑而三善備且以見太陽發熱之治與陽明迥別也綱仲景曰太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血結症也抵當湯主之目朱震亨曰寒熱在裡不散熱蓄於脾胃腠理不開瘀熱與宿谷相薄鬱蒸不消化故發黃發黃與瘀血外症及脈俱相似但小便不利為發黃小便自利為瘀血要之發黃之人心脾蘊積發熱引飲脈必浮滑而緊數若瘀血症即如狂大便必硬此異耳樓全善曰此蓄血在下焦而發黃者也柯琴曰太陽病發黃與狂有氣血之分小便不利而發黃者病在氣分麻黃連翹赤小豆症也小便自利而如狂病在血分抵當湯症也綱仲景曰太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼身體則枯燥但頭汗出齊頸而還其身發黃目朱肱曰病人服湯得小便利如皂莢汁赤一宿腹減則黃從小便中出也古人云治濕不利小便非其治也麻黃連翹赤小豆湯梔子柏皮湯可選用之陶華曰內經云濕熱相交民多病疸發黃是也謂單陽而無陰也太陰脾土為濕熱所蒸色見於外曰發黃濕勝則如熏黃而晦熱勝則如橘黃而明傷寒至於發黃熱勢已極且如蓄血大抵相類設或寸口無脈鼻出冷氣與夫形如煙燻搖頭直視環口黧黑舉體發黃是皆真臟氣絶也綱仲景曰太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣煩躁心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余無汗齊頸而還小便不利身必發黃也目方中行曰此條本言結胸之症敘其由繪其狀而明其治也若不結胸以下乃就變症之輕者言之但頭汗出者乃諸陽之本陽健故汗出也余無汗者陰脈上不過頸也小便不利者陽不下通陰不任事化不行而濕停也濕停不行必更滲土而入胃胃土本濕得滲則盛既盛且停熱氣鬱蒸發為身黃也綱仲景曰傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之目魏荔彤曰傷寒發汗已得治而表邪可愈矣何以身目為黃知非寒邪在表為患而外感寒邪挾在裡之濕邪為患也故仲師明示以寒濕在裡不解之故見人當於里求治也喻氏以里為軀殼之裡與臟腑無涉蓋此症非在表亦非在裡特在表之裡而不在臟腑之裡故仲師又以為里而不可下也於寒濕中求之不出方者方不外麻黃連翹赤小豆湯茵陳蒿湯梔子柏皮湯可選用也夫寒濕俱陰邪二陰相搏於裡何以不發青白色而成黃色則寒邪鬱而變為熱邪合之濕邪相蒸而見於外也故總無治寒之藥學者詳焉陶華曰濕家之為病一身盡痛發熱身雖似熏黃小便不利五苓散小便自利朮附湯身頭痛麻黃湯加蒼朮脈浮身重汗出惡風防己黃耆湯初發黃以瓜蒂末口噙水搐鼻中黃水出愈綱仲景曰傷寒六七日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之傷寒身黃髮熱者梔子柏皮湯主之目喻昌曰黃色鮮明其為三陽之熱邪無疑小便不利腹微滿乃濕家之本症不得因此指為傷寒之裡症也方用大黃佐茵陳梔子建中驅濕除熱之功以利小便非用下也熱已發出於外自與內瘀不同正當隨熱勢清解其黃使不留於肌表間也前條熱瘀故用麻黃此條發熱反不用麻黃者蓋寒濕之症難於得熱熱則其勢外出而不內入矣所謂於寒濕中求之不盡泥傷寒定法也綱仲景曰風濕為病脈陰陽俱浮若被火者微發黃色目朱肱曰中濕一身盡痛發熱身黃小便不利病人中濕因而傷風風濕相搏一身痛重是名中濕亦當於風濕中求之李中梓曰小便不利四肢沉重似瘧若不飲而發黃茵陳五苓散傷寒脈虛小便如常變為陰黃理中加茵陳湯如下之太過脾虛津竭飲水自傷此陰濕變黃茵陳茯苓湯茵陳四逆湯鰲按風濕相摶於內而以火劫之受火氣之輕者濕不得越必因熱而發黃如瘧綱仲景曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔圊便欲自可一日二三度發脈微緩者為欲愈也桂枝麻黃合半湯目楊士瀛曰瘧狀作止有時非若寒熱往來或疏或數而作止無定時也凡感冒之人忽覺毛寒股栗筋節拘攣百骸鼓撼嘔不欲食其寒不可御未幾即轉而發熱者此即溫瘧不必謂如瘧脈自弦或洪數或緊實或虛緩或刮澀皆為瘧狀但以外症別之用藥固有本條小柴胡湯如加減法亦是活法然血虛能生寒熱敗血亦作寒熱陰陽相勝一症雖各有一方皆當以川芎為佐柯琴曰寒熱如瘧是虛實互有之症太陽以陽為主熱多寒少是主勝客負有將解之兆矣不嘔胃無邪圊便胃不實脈微緩有胃氣應不轉屬陽明一日二三度發是邪無可容之地正勝邪卻可勿藥也綱仲景曰服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯目魏荔彤曰與桂枝湯如前法者仍是太陽風傷衛所用之桂枝湯如前法者仍是服桂枝湯啜熱粥勿令大汗出如水流漓之法何必另求深文耶蓋初為風多寒少之症而脈見微弱故用桂枝二越婢一湯今寒去風留而脈見洪大類於浮緩之象故獨用桂枝湯桂枝升陽固衛而解肌既無礙於脈之浮大且能護救陽之虛浮豈非恰合之劑仍自始終不悖哉然病機不一或者其人服桂枝二越婢一湯而大汗不出但形如瘧日再發者此即上條如瘧狀之謂也方喻俱言少有之寒邪持多有之風邪欲出不能出者是也又變一法用桂枝二麻黃一湯倍桂枝以治風多少麻黃以治寒少又一方兩治而不失輕重之分者也陶華曰婦人熱入血室其血必結亦如瘧狀小柴胡湯綱仲景曰病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈虛浮者宜發汗下之宜大承氣湯發汗宜桂枝湯目王肯堂曰雖得陽明症未可便為裡實審看脈候以別內外其脈實者熱已入腑故可下其脈浮虛者是熱未入腑猶在於表也可發汗柯琴曰煩熱自汗似桂枝症寒熱如瘧似柴胡症然日晡潮熱則屬陽明而脈已沉實確為可下是承氣主症主脈也綱仲景曰婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之目龐安常曰經水適斷於寒熱時是不當止而止也必其月事下而血室虛熱邪乘虛而入其餘血之未下者乾結於內故適斷耳用小柴胡和之使結血散則其寒熱自除而愈矣鰲按上條本陽明症此條又少陽症下條又厥陰症以其如瘧故類書於此若少陽乘陰熱多寒少而尺脈遲者亦往往作如瘧狀先以黃耆建中湯養其營衛待脈不遲卻以小柴胡和之凡少陽症中往來寒熱休作有時者多半是如瘧之狀仲景雖未言學者以意會之可耳綱仲景曰厥陰病脈浮緩囊不縮必發熱惡寒似瘧為欲愈桂枝麻黃合半湯目樓全善曰病雖厥陰而脈見浮緩則邪有欲出之勢故寒熱交作如瘧而愈也鼻衄綱仲景曰傷寒不大便六七日頭痛有熱者與小承氣湯其大便圊者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯傷寒脈浮緊者麻黃湯主之不發汗因致衄目成無己曰病源云心主血肝藏血肺主氣開竅於鼻血得熱則散隨氣上從鼻中出則為衄是雜病衄者責在裡熱也如仲景此二條之論知傷寒衄者責其表分熱故也戴原禮曰古論鼻衄屬太陽經風寒皆有之既衄而表症仍在於寒當用麻黃湯於風當用桂枝湯且謂發煩目瞑是太陽侵入陽明汗下俱難若衄已而熱不退者惟升麻葛根湯敗毒散陽旦湯為妥衄而煩渴飲則吐水先服五苓散次服竹葉石膏湯大衄不止茅花湯或黃芩芍藥湯加茅花一撮柯琴曰此辨太陽陽明法也太陽主表頭痛為主陽明主裡不大便為主然陽明亦有頭痛者濁氣上衝也太陽亦有不大便者陽氣太重也頭痛必衄者陽邪盛於陽位陽絡受傷故必衄也衄乃解矣宜桂枝句直接發汗來不是用桂枝止衄亦非用在已衄後也此旨要明綱仲景曰太陽病脈浮緊無汗發熱身疼痛八九日不解表病仍在當發其汗麻黃湯主之服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也陽盛則欲衄陰虛則小便難言衄為經中陽盛也目朱肱曰傷寒衄血者乃解蓋陽氣重故也仲景所謂陽盛則欲衄若脈浮緊無汗服麻黃湯不中病其人發煩目瞑劇者必衄小衄而脈尚浮緊者宜再與麻黃湯也衄後脈已微者不可行麻黃湯也若脈浮自汗服桂枝湯不中病桂枝症尚在必頭疼甚而致衄小衄而脈尚浮者宜再與桂枝也衄後脈已微者不可行桂枝也大抵傷寒衄血不可發汗者為脈微故也治法衄家不可發汗汗出額上陷脈緊急直視不能眴不得眠然而無汗而衄脈尚浮緊者再與麻黃湯有汗而衄脈尚浮緩者再與桂枝湯脈已微者黃芩芍藥湯犀角地黃湯張元素曰或謂經言衄家不可發汗汗必額上陷今衄血之症皆綴麻黃於其下何也夫太陽脈浮緊發熱無汗自汗者愈此一定之論也何故復用麻黃汗之仲景豈有前後相反之理哉然本條麻黃湯主之五字合當用於當發汗之下蓋以汗之文法用藥諸方皆贅於外條之末且如大青龍湯症既云脈微弱汗出惡風者不可服服之厥逆筋惕肉瞤此為逆也又以大青龍湯主之皆此例鰲按柯氏引黃氏將真武湯改正大青龍湯之謬已詳在前王好古曰仲景言衄家不可發汗者蓋為脈微也若浮緊者麻黃湯浮緩者桂枝湯脈已微二藥不可用犀角地黃湯主之韓祗和曰千金翼云吐血有三種一曰肺疽二曰傷胃三曰內衄既吐血家謂之內衄則鼻中出血可謂之外衄是經絡之血妄行也經絡熱盛陽氣擁重迫血妄行上出於鼻則為衄柯琴曰血之與汗異名同類不得汗必得血不從汗解而從衄解此與熱結膀胱血自下者同一局也太陽脈從目內眥絡陽明脈於鼻鼻者陽也血雖陰從陽氣而升則從陽竅而出故陽盛則衄汗者心之液是血之變見於皮毛者也寒邪外斂腠理不開陽氣內擾迫血妄行假道肺竅故稱紅汗綱仲景曰衄家不可發汗汗出必額上陷脈急緊目直視不能眴不得眠目成無己曰衄家雖為邪熱在經而又不可發汗如此前用桂枝麻黃者非治衄用以發散經中邪氣也若邪不得散擁盛於裡逼迫於血因而致衄即不可用此二湯以治衄矣吳綬曰凡吐血衄血無表症脈不浮緊者不可發汗也東垣云脈微者宜黃芩芍藥湯脈滑數者犀角地黃湯熱甚血不止者河間地黃湯古方四生丸血虛者東垣麥門冬飲子三黃補血湯若不止者活人茜根散茅花湯主之也以上皆治吐衄之良方但在出入通變耳大抵吐衄脈滑小者生脈實大者死吐衄後脈微者易治若熱反盛脈反急數者死也若衄而頭汗出或身有汗不至足者難治凡血得熱則行得冷則凝見黑則止所以犀角地黃湯中加好京墨汁一二匙攪藥令黑最效也張介賓曰雜病衄血積熱在裡傷寒衄血積熱在表論曰傷寒小便清者知不在裡仍在表也當發其汗若頭痛者必衄宜桂枝湯曰傷寒脈浮緊不發汗因致衄者麻黃湯主之此以傷寒之衄為其熱不在裡而在表也然論又曰衄家不可發汗而何以復用桂枝麻黃等湯蓋衄由乎陰者以陰虛火動也故不宜再汗以亡陰衄由乎陽者以表邪未解故當用桂枝麻黃以發散論又曰太陽病脈浮緊發熱身無汗自衄者愈此以表邪欲解不從汗而從血所以衄後當愈也由此觀之則有因衄而愈者以經通而解散也有治衄仍當發散者以邪之將解未解而因散其餘邪也若寒氣不甚而用麻黃桂枝似屬太剛易以柴葛之類可也柯琴曰已脫血而復汗之津液枯竭故脈急緊而目直視亦心腎俱絶矣綱仲景曰太陽病脈浮緊發熱身無汗自衄者愈目成無己曰此經中之邪已隨而散解故愈故知衄者不待麻黃桂枝發散者也陶華曰衄血固為欲解若衄不止而頭汗出其身無汗乃發熱汗不至足者亦為惡候當明辨之李中梓曰血紫黑成塊脈遲細口不渴小便清理中湯加丹皮汗後熱退鼻血不止新汲水浸草紙數層貼項上及項脊溫則易必止鰲按李氏草紙外治法施之雜病則穩妥若治傷寒還宜酌量鼻鼾鼻鳴綱仲景曰太陽中風陽浮陰弱陽浮熱自發陰弱汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯發汗已身猶灼熱脈浮自汗身重多眠鼻鼾語言難出不可下不可火目趙嗣真曰風溫則鼻鼾中風則鼻鳴由風氣壅塞衛氣不利所致陽明少陽三陰雖亦有中風然亦不在表故鼻不鳴而不鼾也吐血綱仲景曰脈浮熱甚反灸之此為實實以虛治因火而動必咽燥吐血目朱肱曰傷寒吐血由諸陽受邪熱初在表應發汗而不發汗毒熱入深絡於五臟內有瘀積故吐血也瘀血甚者抵當丸輕者桃仁承氣湯兼服犀角地黃湯三黃丸假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也抵當湯李杲曰余治一貧士脾胃虛致補劑愈繼而居曠室臥熱坑咳而吐血數次余謂此久虛弱外有寒形而有火熱在內上氣不足陽氣外虛當補表之陽氣瀉里之虛熱蓋冬居曠室衣服單薄是重虛其陽表有大寒壅遏裡熱火邪不得舒伸故血出於口因思仲景治傷寒脈浮緊當以麻黃髮汗而不與之遂成衄卻與麻黃湯立愈與此甚同因與麻黃人參芍藥湯鰲按此言誤灸所生之變也吐血比衄更甚矣綱仲景曰凡服桂枝湯吐者其後必吐膿血也目朱震亨曰雜病吐血咯血責為實邪傷寒吐血咯血皆由誤汗下併火逆而致誠非傷寒病熱之微甚者也是為壞病宜隨其逆而調之惟少陰厥竭誤汗一症強動經血故云難治也樓英曰吐血者諸陽受邪其邪在汗當汗不汗致使血毒入臟積瘀於內遂成吐血凡見眼閉目紅神昏語短弦冒逆妄煩躁漱水驚狂譫語吐衄背冷足寒四肢厥逆胸腹急滿大便黑利小便頻數皆瘀血症也雖有多般不必悉具但見一二便作血症主張初得此病急宜用藥至於絡續不已經數時而腹痛者此又難於料理也陶華曰經曰服桂枝湯吐者其後必吐膿血犀角地黃湯大下後寸脈沉遲尺脈不至咽喉不利唾膿血者此有兩症一為陽毒宜陽毒升麻湯一為陰毒宜甘桔湯加半夏生薑血熱者黃連阿膠湯地榆柏皮湯三黃瀉心湯咽喉閉塞不可發汗發汗則吐血氣欲絶手足厥冷蜷臥不能自溫當歸四逆湯鰲按此指凡熱淫於內者言也故桂枝湯反能助陽使熱勢湧越致傷陽絡而吐膿血也蓄血綱仲景曰太陽病六七日表症仍在而反下之脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡也抵當湯主之太陽病脈沉結少腹硬小便自利其人如狂者血結症也抵當湯主之傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結乃可攻之宜桃仁承氣湯目朱肱曰太陽症下焦有熱少腹必滿應小便不利而小便反利者下血症也抵當湯張介賓曰觀仲景諸論則知傷寒蓄血者以熱結在裡摶於血分留於下焦而不行故易生煩躁也然又有陽明症喜忘亦為蓄血之症故診傷寒但見少腹硬滿而痛便當問其小便若小便自利者知為蓄血之症蓋小便由於氣化病在血而不在氣故小便利而無恙也血瘀於下者血去則愈其在仲景則以抵當湯丸主之愚謂但以承氣之類加桃仁紅花以逐之或其兼虛者以玉燭散下之則蓄血自去而病無不除矣柯琴曰此亦太陽病誤下熱入之症也太陽病六七日不解脈反沉微宜四逆湯救之此因誤下熱邪隨經入腑結於膀胱故少腹硬滿而不結胸小便自利而不發黃也太陽經少氣而多血病六七日而表症仍在陽氣重可知陽極則擾陰故血燥而蓄於中耳血病則知覺昏昧故發狂此經病傳腑表病傳裡氣病傳血上焦病而傳下焦也少腹居下焦為膀胱之室厥陰脈所聚衝任血海所由瘀血留結故硬滿然下其血而氣自舒攻其里而表自解矣沉為在裡凡下後熱入之症燥血結於膀胱而發狂營氣不敷之故也有熱即表症仍在少腹但滿而未硬其人未發狂只以小便自利預知其為有蓄血故小其制而丸以緩之陽氣太重標本俱病故如狂血得熱則行故尿血血下則不結故愈衝任之血會少腹熱極則血不下而反結散結先發表而用桃仁承氣不用抵當者以少腹未硬滿也首條以反不結胸句知其為下後症末條以尚未可攻句知其為未下症結急者易解只須承氣硬滿者不易解必仗抵當李中梓曰少陰下血桃花湯腹滿身熱下膿血黃連阿膠湯地榆散王肯堂曰按犀角地黃湯以治上血如吐血衄血是也桃仁承氣湯以治中血如蓄血中焦不利膿血是也抵當湯丸以治下血如血症如狂之類是也上中下三焦各有主治此條當作三症看起至下者愈是一症至當先解外是一症蓋其人如狂是下焦血非桃仁承氣症也自外解至末又是一症恐是下只去得下焦血而中焦道遠未能盡去故尚留於少腹耳又抵當湯丸其中虻蟲水蛭性為猛厲不若四物湯加酒浸大黃各半下之為妙下血便膿血綱仲景曰太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血目魏荔彤曰此條兼言太陽中風傷寒邪仍在表誤下而變症不一也脈促而不結胸陽氣猶充不為陰藥所結旋欲透表而愈故為欲解此下之無害者幸也外此則脈浮病雖在表而風邪已為陰藥引之入胸與陽相結故成結胸也若脈雖浮而緊此寒傷榮而誤下也故寒邪與肝熱相激而咽痛結胸者不咽痛陷胸之症也咽痛者不結胸非少陰甘草桔梗湯之症仍太陽麻杏甘石湯之症也此猶下後之易審治者也至脈弦者陰藥引寒邪入脅而拘急然非少陽柴胡之症惟宜於太陽脅下滿諸條內比類求治脈細數似少陰然頭痛不止症仍太陽乃下後之陽伏鬱而為細數仍應於太陽誤下諸條內求表裡兼治之法然此數者其脈俱仍帶浮猶易認也更有脈沉緊全非太陽矣然誤下後之沉緊陽為陰鬱逆而上衝作嘔則仍應從太陽諸條內求表裡兼治之法更有沉滑而協熱利應於太陽下利諸條求治此二者不可因脈沉而不浮遽謂非太陽也至脈或浮滑為表為里又難認矣然於必下血知其為太陽犯本惟應於太陽犯本下血諸條求治也總之誤下變症多端要人細為審諦總不容舍太陽別求一誤再誤促人命期綱仲景曰太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃仁承氣湯目鰲按此小便尿血也緣陽氣太重標本俱病血得熱則行故尿血若熱極則血反結少腹為膀胱之室故膀胱之熱結少腹必急結用桃仁承氣以攻其里之結血所以解之也綱仲景曰淋家不可發汗發汗必便血目魏荔彤曰膀胱氣化何以有血以素日膀胱腑中原有蓄熱以傷寒水之化元再發太陽經汗標傷連屬於本水不足而血妄溢此血與傷風犯本之圊血相類而實不同彼為標表不解所郁犯及本府陰分此為標表汗出所纍傷及本經陽分陰分之血屬在下焦血海所注故從大便出陽分之水化氣不充血熱溢入故從小便出鰲按此條便血亦是小便尿血也蓋淋家之膀胱本為熱所素閉又發其汗故膀胱愈擾血從小便出也凡論中所言下血有大便小便之不同學者審之綱仲景曰太陽病以火熏之不得汗其人必躁過經不解必圊血名為火邪目柯琴曰他條以火發汗而衄血是陽邪盛於陽位故在未過經時此條以火熏不得汗而圊血是陽邪下陷入陰分故在過經不解時綱仲景曰病人無表裡症發熱七八日不大便雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯若脈數不解而下利不止必協熱而便膿血也目柯琴曰合熱協熱內外熱也內外熱極陽盛陰虛必傷陰絡故不大便者必有蓄血熱利不止必大便膿血宜黃連阿膠湯
