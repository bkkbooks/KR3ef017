body:
  text: 卷二惡熱綱仲景曰心下痞按之濡大便硬而不惡寒反惡熱其脈關上浮者大黃黃連瀉心湯主之目戴原禮曰發汗後只惡寒者為虛虛乃表虛發汗後只惡熱者為實實乃里實只惡寒者早發其汗或汗出太過謂陽微則惡寒宜芍藥甘草附子湯只惡熱是表已解而里不消所謂陰微則發熱宜大柴胡湯或小承氣湯柯琴曰濡當作硬夫按之濡為氣痞是無形也則不當下且結胸症其脈浮大者不可下則心下痞而脈上浮者反可下乎小結胸按之痛者尚不用大黃何此比陷胸更峻此必有當急下之症比結胸更甚故制此峻攻之劑也鰲按關上脈浮是陽明少陽火勢熾矣不惡寒反惡熱是陽氣盛而外越極矣大便硬是陽邪固結而不解矣此即柯氏所謂必有急下之處也如此則濡字非簡編之誤歟惡寒綱仲景曰太陽之為病脈浮頭項強痛而惡寒太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒目朱肱曰大抵太陽病必發熱而惡寒惡寒家慎不可過當覆衣被及近火氣寒熱相薄脈道沉伏愈令病人寒不可當但去衣被微火兼與以和表之藥自然不惡寒矣婦人惡寒尤不可近火寒氣入腹血室結聚藥不能治劉完素曰惡寒者不待風而寒雖身大熱而不欲去衣也是由陰氣上入陽中或陽微或風虛相搏之所致惡寒一切屬表雖里症悉具而微惡寒亦是表未解也治法當先解外王肯堂曰惡寒者風寒客於營衛非寒熱之寒又非惡風也不待見風而後怯寒也甚則向火添被亦不能遏其寒經云發熱惡寒發於陽可發汗無熱惡寒而蜷臥脈沉細發於陰可溫里惡寒雖悉屬表亦有虛實之分若汗出而惡寒為表虛無汗而惡寒為表實表虛解肌表實發汗傷寒太陽病在表故惡寒少陽在半表裡亦微惡寒陽明在裡本不惡寒而或惡者與太陽合病也綱仲景曰病有發熱惡寒者發於陽也無熱惡寒者發於陰也目劉完素曰惡寒者必繼之以發熱此發於陽也惡寒而蜷臥脈沉細而緊者發於陰也在陽可汗在陰可溫其止稱背惡寒者背為陽腹為陰陽氣不足陰寒氣盛則背為之惡寒若風寒在表而惡寒則一身盡寒矣張元素曰惡寒有發陽發陰二症發於陽者脈必浮數宜解表屬桂枝湯桂枝二越婢一湯麻黃湯青龍湯症也綱仲景曰發汗病不解反惡寒者虛故也芍藥甘草附子湯主之目楊士瀛曰汗後反惡寒表雖不解急當救里若反與桂枝攻表此誤也故去桂薑棗加附子以溫經散寒助芍藥甘草以和中腳攣急與芍藥甘草湯本治陰虛此治陰陽俱虛故加附子皆仲景治里不治表之義綱仲景曰脈微而惡寒者此陰陽俱虛不可更發汗更吐更下也目朱撝曰若其人熱雖多而脈甚微無和緩之意是陰弱而發寒雖少而惡之更甚是陽虛而惡寒陰陽俱虛當調其陰陽勿妄治以虛其虛也綱仲景曰傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯目朱肱曰太陽陽明少陰皆有惡寒要之惟太陽病不問已發熱未發熱必惡寒也柯琴曰心下痞是誤下后里症惡寒是汗後未解症裡實表虛內外俱病皆因汗下倒施也表裡交持仍當遵先表后里先汗後下正法蓋惡寒之表甚於身疼心下之痞輕於消穀與救急之法不同綱仲景曰心下痞大便硬心煩不得眠而復惡寒汗出者附子瀉心湯主之太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也目柯琴曰心下痞下當有便硬心煩不眠故用此湯但心下痞而惡寒表未解也當先解表宜桂枝加附子而反用大黃誤矣但以醫下之而心下痞猶發熱惡寒故屬太陽症綱仲景曰陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯目朱肱曰此陽明之表症也同於太陽而屬之陽明者不頭項強痛耳要知桂枝麻黃二湯專為表邪而設不為太陽而設見麻黃症即用麻黃湯見桂枝症即用桂枝湯不必問其為太陽陽明也若惡寒一罷則二方必禁鰲按仲景云陽明病脈浮無汗而喘者發汗則愈宜麻黃湯一條乃言陽明之表脈其症亦同太陽故用麻黃湯發表當與本條同看綱仲景曰傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈沉細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微結假令純陰結不得復有外症悉入在裡矣此為半在表半在裡也脈雖沉細不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解目王肯堂曰三陰惟少陰有惡寒之症然少陰惡寒又有二症發於少陰者無熱而惡寒宜溫之四逆湯理中湯少陰無熱惡寒似與太陽經未即熱一條相似所謂寒未即熱者為太陽症具而未熱耳少陰之無熱惡寒蓋無太陽頭痛等症知為少陰也若少陰惡寒而蜷臥時時自煩欲去衣被者活人書用大柴胡下之趙氏以為宜溫散經邪導引真陽汗而解可也若下之非惟不能解表反虛其里使惡寒之邪乘虛內陷縱使其脈沉滑而實亦未可遽用大柴胡必須先解表使惡寒症罷而後可用也少陰病惡寒身蜷而利手足逆冷者不治少陰病四逆惡寒而身蜷脈不至不煩而躁者死有太陰自利不渴厥陰下利厥逆俱或惡寒太陰宜理中湯厥陰宜四逆湯前既言二陰不惡寒今又言或惡寒者要知太陰厥陰本不惡寒此陽傳陰者也三陰皆能惡寒者陰入陰者也特在少陰為多耳陶華曰惡寒者寒邪入營衛則灑淅惡寒雖一切屬表尚在腑陰陽所分若發熱惡寒兼之頭疼脊強脈浮緊寒邪在太陽表症也宜汗之照時令用藥若無熱惡寒體蜷脈沉遲無力者寒邪入少陰里症也宜溫之四逆湯鰲按此條但就脈言曰沉曰細俱是少陰固不得與柴胡湯惟推出頭汗則猶有少陽現症而非盡在里矣雖脈已屬少陰而仍與柴胡也且三陰脈不至頭其脈止在身三陽脈盛於頭陽結則汗在頭今陽微結雖曰少陽而微惡寒畢竟尚有太陽表症之意所以此條仍列入太陽惡寒門類惡風綱仲景曰太陽病發熱汗出惡風脈緩者名為中風太陽病頭痛發熱汗出惡風者桂枝湯主之太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之目劉完素曰惡寒有屬陽有屬陰惡風則悉屬陽三陰症並無惡風者以此也惡風雖悉在表而發散又不同無汗惡風為傷寒當發汗汗出惡風為中風當解肌里症雖具惡風未罷當先解外趙獻可曰惡風者衛中四時之虛風所以惡風也其人當汗出而脈緩也數與桂枝湯桂枝加葛根湯使遍體微潤連日當自解矣王履曰衛氣者所以溫肌肉充皮膚肥腠理司開闔者也故風邪中於衛也則必惡風惡寒惡風俱為表症但惡風比惡寒為輕耳惡寒者雖不當風而時自怯寒惡風者居密室幃幕中則無所畏或當風或揮扇則淅淅然而惡也柯琴曰風為陽邪風中太陽兩陽相搏而陰氣衰少陽浮故熱自發陰弱故汗自出中風惡風類相感也風性散漫脈應其象故浮而緩若太陽初受病便見如此脈症即可定其為中風而非傷寒矣二條是桂枝湯本症合此症即用此湯不必問為傷寒中風雜病也四症中頭痛是太陽本症頭痛發熱惡風與麻黃症同本方重在汗出汗不出者便非桂枝症三條乃太陽中風之桂枝症非謂凡中風者便當主桂枝也明瞭二條脈症是概風寒雜病而言三條加中風二字其脈其症悉呈風象矣綱仲景曰太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之目朱肱曰此症當溫其經故桂枝加附子也劉完素曰汗多亡陽則衛不固是以惡風也桂枝加附子溫其經而固其衛也陶華曰惡風者風邪傷衛腠理不密由是惡風悉屬於陽非比惡寒乃有陰陽之別者鰲按此四症並見卻以汗不止小便難為重以二者由於心腎故專治之而惡風四肢急俱痊也蓋太陽雖當汗汗不止則亡陽風乘虛入故又惡風汗多必津竭故小便難四肢者諸陽之本陽亡則不能榮筋故筋急而屈伸不利也綱仲景曰風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之目劉完素曰濕勝自汗而皮腠不密是以惡風也甘草附子湯所以散其濕而實其衛柯琴曰身腫痛劇不得屈伸濕感於外也惡風不欲去衣風淫於外也汗出短氣小便不利化源不清也君桂枝以理上焦而散風邪佐朮附甘以除濕而調氣鰲按此風濕為病而濕尤中於周身營衛之間不能推布其患為尤重者故小便不利身腫二句最宜著眼振戰栗綱仲景曰傷寒若吐若下後心下逆滿氣上衝心起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之目成無己曰振者森然若寒聳然振動者是也傷寒而振皆由虛寒蓋以欲汗之時其人必虛必蒸蒸而振卻發熱汗出而解振近戰而輕者為振矣戰為正與邪爭爭則為鼓栗而戰振但虛而不至爭故惟聳動而振也下後復發汗振寒者為其表裡俱虛也亡血家發汗則寒栗而振者謂其氣血俱虛也諸如此者止於振聳耳其身為振振搖振振欲劈地二者皆發汗過多亡陽經虛不能自主持故身為振搖也又非若振栗之比矣此二湯皆溫經益陽滋血助氣之劑經虛陽弱得之未有不獲全濟之功者綱仲景曰問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發汗以脈浮故當汗出而解若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也目韓祗和曰汗下後戰者與救逆湯微減與羊肉湯再投而戰解若陰氣內盛正氣大虛心栗鼓頷身不戰者遂成寒逆宜灸之或用大建中湯仲景治尸厥戰而栗者刺期門巨闕吳綬曰凡戰者大抵氣血俱虛不能榮養筋骨故為之振搖而不能主持也須大補氣血豫曾用人參養榮湯得效又一人身搖不得眠者以十味溫膽湯倍加人參而愈內經曰寒之傷人使人毛髮畢直鼓頷戰栗而無汗按此表寒而戰栗也此言病有戰而汗出因得解其脈浮而緊按之反芤此為本虛故當戰而汗出也又曰脈陰陽俱停以三部浮沉遲數脈同等必先振栗汗出而解若脈浮數按之不芤其人本不虛者則汗出解不戰也若不戰而心栗此陰中於邪必內栗也凡正氣怯弱寒邪在內必為栗也宜詳究焉綱仲景曰太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯目成無己曰戰與栗二者形相類而實非一有內外之別焉戰者身為之搖栗者心戰是也經曰胃無穀氣脾澀不通口急不能言戰而栗即此觀之戰之與振振輕而戰重也戰之與栗戰外而栗內也戰栗者皆陰陽之爭傷寒欲解將汗之時正氣內實邪不能與之爭則便汗出而不發戰邪氣欲出其人本虛邪與正爭微者為振甚者則戰戰退正勝而解矣其戰而汗因得解者其人本虛是以發戰邪氣外與正氣爭則為戰乃其愈者也邪氣內與正氣爭則為栗是為甚者也經曰陰中於邪必內栗也表氣虛微裡氣不守故使邪中於陰也方其裡氣不守而為邪中乎中氣正氣怯弱故成栗也戰者正氣勝栗者邪氣勝也傷寒六七日欲解之時當戰而汗出其有但心栗而鼓頷身不戰者已而遂成寒逆似此症多不得解何者以陰氣內盛正氣大虛不能勝邪反為邪所勝也非大熱劑與灼灸又焉得而御之張介賓曰戰與栗異戰由外栗由內也凡傷寒欲解將汗之時若其人正氣內實邪不能爭則但汗出不作戰所謂不戰應知體不虛也若其人本虛邪與正爭微則振甚則戰正勝邪則戰而汗解矣夫戰則正氣將復栗則邪氣肆強故傷寒六七日有但栗不戰竟成寒逆者多不可救此以正氣中虛陰邪內盛正不盛邪而反為邪勝凡遇此症非大溫熱不可柯琴曰陽脈微二句承上之辭不得作三段看太陽病陽浮而陰弱是陽強也今陽脈微即是陰陽俱停病雖不解已是調和之脈其解可知矣脈但浮者為陽盛必先煩而有汗陽脈微者為陽虛必先振栗而汗出振栗是陰津內發之兆汗出是陽氣外越之徵此陰陽自和而愈也身熱惡寒身寒惡熱綱仲景曰病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也目趙嗣真曰詳仲景論中止分皮膚骨髓而不曰表裡者蓋以皮肉脈筋骨五者素問以為五臟之合主於外而充於身者也惟曰臟曰腑方可言表裡可見皮膚即骨髓之上外部浮淺之分骨髓即皮膚之下外部深沉之分與經絡臟腑屬裡之例不同況仲景出此症在太陽篇首其為表症明矣是知虛弱素寒之人感邪發熱熱邪浮淺不勝沉寒故外怯而欲得近衣此所以為熱在皮膚寒在骨髓藥宜辛溫至於壯盛素熱之人或酒客重感邪之初寒未變熱陰邪閉乎伏熱陰凝於外熱鬱於內故內煩而不欲近衣此所謂寒在皮膚熱在骨髓藥宜辛涼必也一發之餘既散表邪又和正氣此仲景不言之妙若以皮膚為表骨肉為里則麻黃症骨節疼痛其可名為有表復有里也乎危亦林曰熱在皮膚一條仲景不立方治宜先與陽旦湯寒已次以小柴胡加桂溫其表鰲按本條自成注以表裡釋皮膚骨髓後人宗之誤也仲景論言表熱裡寒表寒裡熱症甚多寧此條不曰表裡而偏曰皮膚骨髓耶其可知矣故獨趙氏之說披剝精當識見過人足以破千古之惑至表熱裡寒乃少陰症詳少陰篇中熱多寒少綱仲景曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔圊便欲自可一日二三度發脈微緩者為欲愈也宜桂枝麻黃合半湯太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯目朱肱曰太陽熱多寒少有此二症其用藥皆不同也二條以脈微弱故不可發汗若脈浮雖熱多寒少亦可發汗也大抵傷寒寒多易治熱多難愈傷寒發熱者以寒極則生熱治法多用冷藥故令熱不去仲景熱多寒少用桂枝二越婢一湯不渴外有微熱者用小柴胡加桂湯皆溫表之義也近時多用小柴胡湯不問陰陽表裡凡傷寒皆令服此藥往往有因服小柴胡而成陰症者仲景雖云傷寒中風有小柴胡症但見一症便是不必悉具此為是少陽症當用小柴胡不必少陽症悉具耳況本方又有隨症加減法古人方治審諦如此趙嗣真曰詳論中熱多寒少止此二症其一症仲景之意蓋以得病七八日如瘧狀發熱惡寒熱多寒少十六字為自初至今之症以下乃是以後擬議防變之辭當分三截看若其人不嘔圊便欲自可一日二三度發脈微緩為欲愈此一節乃里和無病而脈微緩者邪氣微緩者陰陽同等脈症皆向安之兆可不待汗而欲自愈也若脈微而惡寒者此陰陽俱虛不可發汗更吐更下也此一節宜溫之若面色反有熱者未欲解也以其不能得小汗出其身必癢宜各半湯此一節必待汗而後愈也活人書未詳文義卻將其人不嘔清便欲自可九字本是欲愈之症反以他症各半湯汗之又將不可汗吐下及各半湯症語句並脫略而不言反將其中欲愈之症而用彼藥汗其所不當汗何也其一症仲景云太陽病發熱惡寒熱多寒少脈微弱者亡陽也不可發汗宜桂枝二越婢一湯活人書於脈微弱上添都大二字豈以仲景論脈為未足而故加之也乎劉完素曰仲景一書只有熱多寒少之條無寒多熱少之症下之熱不退綱仲景曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗使陽氣微又大下者令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知亡血也目柯琴曰此條病因全在妄汗下以致亡血而脈微澀夏月四句是寫寒熱發作時狀是設辭勿以無休止時作連綿冬夏解也頭痛項強綱仲景曰太陽之為病脈浮頭項強痛而惡寒太陽病頭痛發熱汗出惡風者桂枝湯主之太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之目朱肱曰頭疼者陽症也太陽症頭痛必發熱惡寒無汗麻黃有汗桂枝若已發汗或未發汗頭疼如破者連須蔥白湯服湯不止者葛根蔥白湯成無己曰頭痛邪氣外在經絡上攻於頭也傷寒頭痛者太陽專主也故陽明少陽亦有頭痛不若太陽專主也蓋太陽為病屬表而頭痛專為主表症雖有風寒之不同必待發散而後已李杲曰太陽膀胱脈浮緊直至寸口所以頭痛者頭與寸口俱高之分也蓋厥陰與督脈會於巔逆太陽之經上而不得下故壅滯為頭痛於上也左手浮弦胸中痛也沉弦背痛也右手浮弦亦然頭痛者木也最高之分惟風可到風則溫也治以辛涼秋克春之意故頭痛皆以風藥治之總其體之常也然有三陰三陽之異焉故太陽宜川芎陽明宜白芷少陽宜柴胡太陰宜蒼朮少陰宜細辛厥陰宜吳茱萸王肯堂曰傷寒頭痛雖屬三陽惟太陽經獨多蓋太陽為病屬表而頭痛專主表雖有傷寒六七日頭痛不大便有熱而與承氣湯下之者卻云若小便清者知熱不在裡仍在表是知頭痛屬表明矣太陰少陰之脈從足至胸而還不上循頭故無頭痛惟厥陰脈循喉嚨之後上連目系與督脈會於巔亦有頭痛乾嘔吐涎沫吳茱萸湯一症卻無身熱亦與陽症不同也然風溫病在少陰濕溫病在太陰而頭反痛至於陰毒亦然是又不可拘者內因頭痛作止有時外因頭痛常常有之直須傳入里方罷鰲按太陽經脈營於頭會於項故頭連項而強痛者為太陽也綱仲景曰濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈目朱肱曰內瓜蒂散鼻中也柯琴曰種種皆是表症鼻塞而不鳴脈大而不浮不關風矣脈不沉細非濕痹矣腹初不滿非瘀熱在裡矣重於頭痛是頭中寒濕可知寒濕從鼻而入故鼻塞亦當從鼻而出故內藥鼻中塞因塞用也綱仲景曰太陽病發汗太多因致痙脈沉而細身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也目王肯堂曰太陽傷寒項背強其或太陽中風加之寒濕而成痙者亦項強金匱云太陽病項背強𠘧𠘧然脈反沉遲者此為痙桂枝加栝蔞湯主之陶華曰項背強者太陽表邪也發散則解結胸項強大陷胸湯下之太陰結胸項強大陷胸丸或頻與理中丸損甚者兼與四逆湯項強脅下滿身熱惡風手足溫而渴小柴胡湯陰毒初得病項背強咽痛心腹痛短氣厥逆吐利身如被杖附子湯陰毒甘草湯正陽散天行復作熱至晚則腰痛頭項強身重葛根生薑豉湯鰲按痙病由來不一而傷寒發汗不如法者亦能致之本症頭痛雖止而頭項強急尚屬傷寒頭面搖以下乃言痙病也此汗多亡液不轉屬陽明而成痙者綱仲景曰太陽病項背強𠘧𠘧無汗惡風者葛根湯主之太陽病項背強𠘧𠘧而汗出惡風者桂枝加葛根湯主之目成無己曰太陽別脈下項挾脊故太陽感風寒則經脈不利而項為之急頸為之強是太陽表症也必發散而解之此二條均是項背強而發散有輕重者蓋發熱汗出惡風者為表虛可解肌無汗惡風者為表實可發汗也王肯堂曰此二方皆發散之劑也而有輕重以表虛表實之不同也鰲按太陽脈自絡腦而還出下項挾脊背此從風池而入不上干於腦而下行於背故頭不痛而項背強也𠘧𠘧項背牽動之象動中見有強意綱仲景曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之目張兼善曰或謂十棗湯與桂枝去桂加茯苓白朮湯二者皆屬飲家俱有頭項強痛之病何也此經絡所繫非偶然也針經曰太陽膀胱之脈起於目內眥皆上額交巔上其支者從巔上至耳上角直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱絡腎者即三焦也夫三焦者為陽氣之父決瀆之官引導陰陽開通閉塞水導得出以氣化而言也緣太陽經多血少氣既病則氣愈弱其時表病而裡熱未甚微渴而恣飲水漿為水多氣弱不能施化遂停伏於內則本經血氣因而凝滯致有頭痛項強之病若伏飲流行經絡疏利而頭痛自愈方中行曰頭痛本表症此因心下水氣泛溢上攻於腦也與傷寒不大便六七日而頭痛與承氣湯同綱仲景曰太陽病頭痛至七日以上自愈者以行其經盡故也若欲再傳經者針足陽明使經不傳則愈陽明病表裡大熱煩渴引飲頭痛如破者宜竹葉石膏湯陽明病頭痛不惡寒反惡熱大便實調胃承氣湯目吳綬曰陽明病頭痛額前目疼鼻乾脈長也無汗者葛根湯加蔥白白芷汗之有汗曾經發汗頭痛不解者葛根蔥白湯不惡風反惡熱自汗煩渴脈洪數飲水頭疼者白虎加白芷湯內有燥屎蒸蒸發熱頭痛者調胃承氣湯凡陽明頭痛無汗者葛根麻黃蔥白白芷石膏之屬有汗則白芷石膏葛根川芎少陽經頭痛頭角或耳中痛脈弦數口苦發熱往來寒熱者並用小柴胡湯和之加川芎尤妙蓋川芎亦膽經藥也凡少陽頭痛不分有汗無汗皆以柴胡湯主之非次頭痛及發寒熱脈緊不大即是上膈有痰瓜蒂散吐之王好古曰太陽頭痛有汗桂枝湯無汗麻黃湯陽明頭痛白虎湯少陽頭痛小柴胡湯太陰頭痛脈浮桂枝湯脈沉理中湯俱加川芎細辛少陰頭痛小柴胡湯麻黃附子細辛湯厥陰頭痛外傳本經桂枝麻黃合半湯嘔而微吐苦水者吳茱萸湯李杲曰太陰頭痛者必有痰也少陰頭痛者足寒而氣逆也蓋此二經雖不至頭然痰與氣逆壅於膈中則頭上氣不得暢降而為痛也張云岐曰如脈浮而頭痛過在手足太陽刺完骨京骨脈浮而長過在手足陽明刺合谷衝陽脈浮而弦過在手足少陽刺陽池丘墟風府風池此刺頭痛之法也頭眩鬱冒綱仲景曰太陽病下之而不愈因復發汗此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出邪和故也得里未和然後復下之傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿太陽病發汗太多因致痙脈沉而細身熱足寒頭項強急時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也目成無己曰眊為眼花眩為眼黑眩也運也冒也三者形俱相近有謂眩運者有謂眩冒者運為轉運之運世謂頭旋者是冒為蒙冒之冒世謂昏迷者是少陽病目眩以少陽居表裡之間表邪所傳漸行於里表中陽虛故時時目眩也二陽並病或眩運眩冒者以少陽與太陽並病故眩者責其虛也傷寒有起則頭眩與眩冒者皆汗吐下後所致是知其陽虛也故針經曰上虛則眩下虛則厥眩雖為虛而風家亦有眩者風主運動耳陽明中風亦有頭眩諸如此者皆非逆也及其諸逆發汗劇者言亂目眩必死之症也吳綬曰太陽中風頭眩頭搖者脈浮弦而急也羌活神術湯加天麻防風之類若血虛頭眩四物湯加人參天麻痰火上攻加黃芩竹瀝內傷勞倦陰虛頭眩補中益氣湯加川芎天麻防風蔓荊子下焦元氣虛脫作眩人參養榮湯或大建中湯加天麻易老曰頭旋目黑非天麻不能除故必加之鰲按妄汗下亡津液致表裡俱虛而其陽邪仍在故表裡不解而成冒冒者如物矇蔽欲汗之兆也故汗出冒自解妄吐下後而表陽虛因致起則頭眩又復妄汗而經絡虛因致一身振搖也吐汗下三者齊備致脈微而虛煩則眩冒動惕皆虛煩之所發也此亦半夏瀉心湯之症汗多亡液不轉屬陽明而成痙因有頭面動搖口噤反張等症其時胃家津液未乾故變見者仍是太陽表症如頭項強急等也當滋陰以和其里勿用溫藥炙甘草湯主之綱仲景曰太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎肺俞肝俞諸乘寒者則為厥鬱冒不仁目成無己曰郁為鬱結而氣不舒冒為虛冒而神不清鬱冒之來皆虛熱而乘寒也金匱云新産婦人有三病一者病痙二者病鬱冒三者大便難亡血復汗寒多故令鬱冒又曰産婦鬱冒其脈微弱嘔不能食大便堅所以然者血虛而厥厥而必冒冒家欲解必大汗出即此觀之鬱冒為虛寒可知矣喻昌曰少陽之脈絡脅肋間併入太陽之邪則與結胸症似是而實非也肝與膽合刺肝俞所以瀉膽也膀胱不與肺合然肺主氣刺肺俞以通其氣斯膀胱之氣化行而邪自不能留矣魏荔彤曰考之穴圖大椎為督脈之穴居於身後肺俞肝俞俱屬太陽膀胱之穴亦次第由大椎而下同居於背是皆太陽行身後之道路也於此三刺皆泄太陽經之表邪而與肺肝膀胱之臟腑無涉焉諸家牽扯傅會總由不知刺三穴泄經邪之義耳原文當刺大椎第一間考穴圖大椎穴在背後脊骨第一節之間也為督脈自項而下之第一穴鰲按魏氏刺三穴皆泄太陽經之表邪一句誠為破的蓋病雖太少二陽相併而治必歸於一經也仲景論當刺大椎第一間肺俞肝俞之下接云慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門考期門亦是太陽經穴仲景云然者以太陽陽明並病者則宜汗若太少二陽並病有少陽在不宜汗也即三陽合病中亦無汗法故仲景深戒為慎不可發汗蓋汗之則太陽之經邪不除徒傷陽明之腑以致譫語故雖見少陽之弦脈而少陽不宜汗仍刺太陽經期門之穴以代汗不傷陽明少陽而太陽治此以刺法為並病之治法也頭項強痛或眩冒時如結胸心下痞硬其症全是太陽而少陽之眩冒亦為太陽所有故治之全從太陽也搖頭直視綱仲景曰太陽病發汗太多因致痙脈沉而細身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也目成無己曰此以風盛於上風主動搖故也頭者諸陽之會諸陽之脈皆上於頭諸陰之脈皆至頸胸中而還陽脈不治則頭為之搖矣柯琴曰陽氣者精則養神柔則養筋汗多則無液養筋筋傷則攣急而反張矣太陽主筋所生病也要知痙非無因因傷寒發汗不如法耳今頭痛雖止而頸項強急惡寒之症未罷更見面赤目赤是將轉屬陽明然諸症皆與傷寒相似而非痙獨頭面搖動口噤背反張與傷寒不相似故名曰痙此汗多亡液不轉屬陽明而成者治當滋陰以和其里用炙甘草湯金匱用桂枝湯加栝蔞根恐不勝任綱仲景曰搖頭言者里痛也目成無己曰里有痛者言語則劇欲言則頭為之戰搖也里痛非邪也痛使之然痙病非逆也風使之然綱仲景曰陽反獨留形體如煙燻直視搖頭者此為心絶也目許叔微曰心藏神而為陰之本陽根於陰陰根於陽陰陽相根則榮衛和上下相隨矣絶則神去而陰竭陽無根者則不能自主持故頭為搖也心絶者真病也風痙里痛者邪氣也觀其頭搖又當明其否藏焉綱仲景曰衄家不可發汗汗出必額上陷脈急緊目直視不能眴不得眠目戴原禮曰直視者視物而目睛不轉動也水之精為志火之精為神目者心之使也神所寓焉肝之外候也精神榮焉針經云五臟六腑之氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑睛血之精為絡氣之精為白睛肌肉之精為約束裹擷筋骨血氣之精與脈併為系上屬於腦五臟血氣調和精氣充足則目和而明矣傷寒目直視者邪氣壅盛冒其正氣使神智不慧藏精之氣不上榮於目則目為之直視傷寒至於直視為邪氣已極症候已逆多難治人以肝受血而能視今衄家亡血肝氣已虛目氣已弱又發汗亡陽陰陽俱虛所致虞摶曰目睛上視名戴眼此足太陽經之症蓋太陽目之上綱而與少陰為表裡少陰之腎氣大虧則太陽之陰虛血少故其筋脈燥急牽引而上若直視不轉者尤為凶候速當以培陰養血為主今人不知俱云是風若用風藥則陰愈虛血愈燥矣附録傷寒看目法張介賓曰凡治傷寒先看兩目或赤或黃赤者為陽症若兼六脈洪大有力或燥而渴者其熱必盛輕則三黃石膏湯重則大承氣湯之類凡目色青白而無昏冒閃爍之意者多非火症不可輕用涼藥眼眵多結者必因有火蓋凡有火之候目必多液液干而凝所以為眵即如肺熱甚則鼻涕出是亦目液之類也綱仲景曰風濕為病脈陰陽俱浮自汗出身重多眠鼻息急必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲目危亦林曰本條風濕法當汗解而醫反下之大便利則小便必不利肺之氣化不宣胃家之關門不利脾土之承製不行故直視失溲也綱仲景曰若汗出發潤喘不休者此為肺先絶也陽反獨留形體如煙燻直視搖頭者此為心絶也唇吻反青四肢漐習者此為肝絶也環口黧黑柔汗發黃者此為脾絶也溲便遺失狂言反目直視者此為腎絶也目樓英曰夫至臟氣脫絶其錯逆為不可救矣柯琴曰五臟相生一臟受災四臟不救陰陽相須彼氣先絶此氣不存醫者可不調於未災未絶之先乎目中不了了綱仲景曰傷寒六七日目中不了了睛不和無表裡症大便難身微熱者此為實也急下之宜大承氣湯目吳綬曰目中不了了者能視物但見一半而不見一半有所譫妄而胡言者是也其內實不大便者宜下之內虛者多難治也若戴眼反折者此為上視絶汗乃出大如貫珠不流此膀胱絶也楊士瀛曰直視與目中不了了形症相近一可治一不可治也
