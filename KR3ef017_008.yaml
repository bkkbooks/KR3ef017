body:
  text: 卷六嗜臥不臥綱仲景曰太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯目朱肱曰多眠有四症有風溫症有小柴胡症有少陰症有狐惑症黃仲理曰脈浮頭項強痛而惡寒者太陽症也此必兼有諸症虞摶曰少陰有脈微細但欲寐之症今無少陰症而脈浮細而嗜臥者雖十日後尚屬太陽此即表解而不了了之謂也設見胸滿嗜臥亦太陽之餘邪未散兼脅痛則太少二陽合病矣故和之以柴胡湯倘若脈浮不細是浮而有力也無胸脅痛則不屬少陽但浮不大則不屬陽明仍在太陽太陽為開開病反合故嗜臥故開之以麻黃綱仲景曰太陽病二三日不得臥但欲起心下必結脈微弱者此本有寒分也目朱肱曰其傷寒瘥後不得眠者熱氣與諸陽相併陰氣未復所以病後仍不得睡也梔子烏梅湯主之王肯堂曰本條宜桂枝加厚朴杏仁湯陳士鐸曰不得臥但欲起在二三日似乎與陽明並病必其人心下結故作此狀然結而不硬脈微弱而不浮大此其人素有久寒宿飲結於心下非亡津液而胃家實綱仲景曰傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之目柯琴曰傷寒者寒傷君主之陽也以火劫汗並亡離中之陰此為火逆矣妄汗亡陰而曰亡陽者心為陽中之太陽故心之液為陽之汗也驚狂者神明擾亂也陰不藏精驚發於內陽不能固狂發於外起臥不安者起則驚臥則狂也綱仲景曰衄家不可發汗汗出必額上陷脈緊急目直視不能眴不得眠目鰲按太陽脈起目內眥上額故此條脈症皆從目上見得蓋榮行脈中衄家則榮血已脫脈無所養而又汗之是重竭其液故脈見緊急之象脈無所養則脈所自起之目眥亦必枯澀而不能轉運故直視而不能眴不得眠也蓋眴必其目之能轉而動眠必其目之能運而合也綱仲景曰太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈目許叔微曰大汗之後精氣不能遊溢以上輸於脾脾不能為胃行其精液胃不和故不得眠也內水不足思外水以相濟故欲得水飲之此便是轉屬陽明症陶華曰多眠者以人之衛氣晝則行陽夜則行陰行陽則寤行陰則寐陽氣虛陰氣盛則目瞑故多眠乃邪氣傳於陰而不在陽也昏昏閉合者陰自闔也默默不言者陰主靜也不得臥者陽氣盛陰氣虛則晝夜不得眠蓋夜以陰為主陰氣盛則目閉而安臥若陰為陽所勝故終夜煩擾而不得眠所謂陰虛則夜爭者是也汗出鼻乾不得臥則邪在表也葛根解肌湯若胃有燥屎與大熱錯語反大汗胃中汁干而不得臥則為邪在裡也大承氣湯胃不和則臥不安故宜散熱和胃也若汗下後虛煩不得眠者梔子豉湯以湧之下後復熱晝日煩躁夜則安靜無大熱乾薑附子湯吐下後心中懊憹不眠梔子豉湯陽勝陰狂言不眠亂夢心煩乏氣酸棗仁湯陰勝陽驚悸昏沉大熱乾嘔錯語呻吟不眠犀角地黃湯三陽合病欲眠目合則汗譫語者有熱也小柴胡湯其胃熱者亦臥也犀角解毒湯風溫狐惑亦有此症無汗綱仲景曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之目朱肱曰傷寒有連服湯劑而汗不出者死如中風法蒸之溫熱之氣於外迎之無不得汗也其法用薪火燒地良久掃去火可以水灑之取蠶砂柏葉桃葉糠麩皆可用相和鋪燒地上可側手厚上加席令病人臥溫覆之夏月只布單覆之汗移時立至俟周身至腳心皆汗漐漐乃用溫粉撲止移上床最得力者蠶砂柏桃葉也無蠶砂單桃葉亦可用糠麩乃助添令多耳不用亦可傷氣亦有氣虛不能作汗者劉完素曰腠理者津液腠泄之所為腠文理縫會之中為理寒邪中經腠理致密內滲則無汗無汗之由有數種如傷寒在表及邪行於里或水飲內蓄與亡陽久虛皆令無汗其傷寒無汗則腠理致密也風中衛則腠理開而自汗寒中營則無汗腠理閉也本條與太陽病脈浮緊無汗麻黃湯症太陽中風脈浮緊大青龍症及陽明病反無汗而小便利二三日嘔而咳手足厥若頭痛鼻乾不得汗脈浮無汗而喘與剛痙無汗是數者皆寒邪在表而無汗者也其邪行於里而無汗者邪氣內傳不外熏發經所謂陽明病無汗身發黃及發熱無汗渴欲飲水無表症者與夫三陰為病不得有汗是數者皆邪行於里而無汗者也楊士瀛曰太陽主一身之表風寒客於表則皮毛閉密故無汗綱仲景曰太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗麻黃湯主之服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之目柯琴曰此兩條脈症相同而異者上條外不惡寒內不煩躁耳發於陽者七日愈八九日不解陽氣重可知脈緊無汗發熱身疼麻黃症未解仍與麻黃只微除在表之風寒而不解內擾之陽氣發煩目瞑可知陽絡受傷必逼血上行而衄不得汗解必從衄解太陽中風汗出脈緩者中於鼓動之陽風此汗不出而脈緊者中於凜冽之陰風風令脈浮浮緊而沉不緊與傷寒陰陽俱緊之脈有別綱仲景曰傷寒脈浮緊者麻黃湯主之不發汗因致衄太陽病脈浮緊發熱身無汗自衄者愈衄家不可發汗汗出必額上陷脈緊急目直視不能眴不得眠目鰲按脈緊無汗本當發汗以泄陽氣若不發汗致陽氣內擾而陽絡受傷因而成衄則陽邪即從汗解矣故既衄即不當用麻黃再發汗故仲景既於他條言已服麻黃微除而仍致衄此又恐人衄後再汗故特提明以見衄家不可再發汗也若身無汗而自衄者愈正言陽從衄泄之故脈急緊四句正言既衄復汗之變其變見於額與目者以太陽脈起目內眥上額故也綱仲景曰太陽病項背強𠘧𠘧無汗惡風者葛根湯主之目鰲按風傷衛分者皮毛閉而無汗不得以本條之無汗為傷寒也蓋以太陽脈自絡腦而還出下項挾脊背本條風邪乃自風池入不上干於腦故不言頭疼而下行脊背故但見項背強𠘧𠘧也綱仲景曰傷寒脈浮緩發熱惡寒無汗煩躁身不疼但重乍有輕時無少陰症者大青龍湯主之目張從正曰寒有重輕傷重脈陰陽俱緊而身疼傷輕脈浮緩而身重亦有初時脈緊漸緩初時身疼漸不疼者當用活看然脈浮緊者身必疼脈浮緩者身不疼中風傷寒皆然無少陰症者仲景正因少陰亦有發熱惡寒無汗煩躁之症雖與大青龍症同然彼則法當溫補不得與麻黃必細審其所不用然後不失其所當用也綱仲景曰太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出不惡寒者名曰柔痙目張兼善曰此以虛實分別剛柔也綱仲景曰脈浮而遲遲為無陽不能作汗其身必癢目劉完素曰陽為津液之主陽虛則津液虛少故無汗若陽明病反無汗其身如蟲行皮膚之狀則又久虛矣自汗綱仲景曰太陽病發熱汗出惡風脈緩者名為中風欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也太陽病未解脈陰陽俱停必先振栗汗出而解傷寒三日脈浮而解濈然汗出也目朱肱曰衛不和自汗傷風自汗亡陽自汗寇宗奭曰風陽邪風中太陽兩陽相搏而陰氣衰弱陽浮故熱自發陰弱故汗自出張云岐曰欲自解便寓不可妄治意汗為陽氣外發汗出則陽勝而寒邪自解矣言未解便有當解意停者相等之謂太陽病陽浮而陰弱是陽強也今陽脈既微謂非陰陽之俱停者乎陰陽俱停便是調和之脈雖今猶未解不可卜其必解乎樓全善曰傷寒三日脈浮而解此傷寒之本輕者故不必合太陽六七日病解之期而自解也曰濈然汗出亦寧必再求其汗乎綱仲景曰太陽病頭痛發熱汗出惡風者桂枝湯主之目魏荔彤曰太陽中風病而發熱汗出惡風與他條同兼患頭痛即頭項強痛而專言於頭者也風邪少盛諸陽聚處必多亢烈之患正為桂枝對症之病用之無疑矣必指出頭痛者見無身疼體痛骨節疼痛所以不同於寒邪之治也柯琴曰此是桂枝本症頭痛發熱惡風與麻黃症同本方重在汗出汗不出者便是麻黃症綱仲景曰太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之目方中行曰脈浮為傷寒在太陽初感風寒未定故本條揭示中風之脈症甚細則陽強陰弱與脈之陽浮陰緊而不弱者其異如是也陽浮之熱為自發而快捷陰弱之汗為自出而直易熱為翕翕之溫熱與或已發或未發遲遲之熱鼻鳴乾嘔與嘔逆而喘同為陽郁而大分緩急其異又如是辨之既詳桂枝一方不容再疑柯琴曰此太陽中風之桂枝症陽浮因風中於衛兩陽相搏故熱自發是衛強也陰弱因風中於營血脈不寧故汗自出是營弱也兩自字便見風邪之迅發綱仲景曰太陽病發熱汗出此為營弱衛強故使汗出欲救邪風者宜桂枝湯主之目柯琴曰此釋中風汗出之義見桂枝為調和營衛而設陰弱不能藏陽強不能密故汗出綱仲景曰形作傷寒其脈不弦緊而弱弱者必渴蓋火者必譫語弱者發熱脈浮解之當汗出而愈目柯琴曰此為挾虛傷寒之症形作見惡寒體痛厥逆脈當弦緊而反浮弱其本虛可知此東垣所云勞倦內傷症也解之者與桂枝湯啜熱稀粥故汗出愈也綱仲景曰病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之病嘗自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧耳營行脈中衛行脈外復發其汗和營衛則愈宜桂枝湯目李梴曰營行脈中在血脈其病深衛行脈外在皮膚其病淺營血陰也主閉藏故寒喜傷營而無汗衛氣陽也主開泄故風喜傷衛而有汗然豈獨太陽為營衛之會而有風寒之別乎陽明善飢為傷風不食為傷寒少陽耳聾胸滿而煩為傷風口苦咽乾目眩為傷寒三陰傷風俱四肢煩疼耳太陽為之先者傷寒因腎水虧損至春木無生意故發為溫病至夏絶生化之原故發為熱病所以太陽少陰二經受病最多最先也柯琴曰臟無他病知病只在形軀發熱有時則汗出亦有時不若外感者發熱汗出不休也內經曰陰虛者陽必湊之故時熱汗出耳發熱汗即出其營氣不足因陽邪下陷陰不勝陽故汗自出無熱而常自汗其營氣本足因衛氣不固不能衛外故汗自出不和見衛強不諧見營弱弱則不能合強則不能密皆令自汗但以有熱無熱別之惡法以時出常出辨之總以桂枝湯啜熱粥汗之綱仲景曰太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出不惡寒者名曰柔痙目鰲按剛者實也柔者疏也無汗則皮毛閉而實汗出則腠理泄而疏盜汗綱仲景曰微盜汗出反惡寒者表未解也目劉完素曰若邪氣一切在表於衛則汗自出此則邪氣侵行於里外於表邪及睡則衛氣行於里乘表中陽氣不致津液得泄故但睡而汗出覺則氣散於表而汗即止矣綱仲景曰三陽合病脈浮大在關上但欲睡眠合目則汗目劉完素曰合目則汗是知邪氣在半表半裡之間明矣且自汗有虛有實其盜汗之症非若自汗有實者悉當和表而已韓祗和曰陽入於陰故但欲睡眠衛氣行陰故合目則臥熱淫於內故臥則汗出陶華曰無汗者寒邪中經腠理閉密津液內滲而無汗也若風濕暑干之皆令汗出惟寒邪獨不汗出則當汗之若與麻黃湯三劑而不汗者此必不可療也自汗者衛氣所以肥腠理而固津液者也衛為邪所幹不能衛護於外由是而汗出焉且自汗有表裡虛實之分若自汗出而惡風寒為表未解當解肌冬用桂枝湯余月沖和湯加減汗後惡風寒痛為表虛黃耆建中湯若汗出不惡風寒則為表解里未和下之設或汗出發潤如油如珠凝而不流皆不可治盜汗者睡中則汗出覺則不出雜病責於陽虛傷寒責在半表半裡故知膽有熱也附録李氏汗後不解治法李中梓曰汗後不解者或表邪未盡或邪傳於裡或邪氣乘虛內客故雖汗而病仍不解也汗後脈大如瘧狀再汗之桂枝二麻黃一湯汗後心下痞硬嘔吐不和大柴胡湯大汗大煩渴而脈大人參白虎湯汗後惡熱脈實調胃承氣湯汗出而喘無大熱麻黃杏仁甘草石膏湯大汗出胃干欲飲水少少與之汗出脈浮小便不利微熱消渴五苓散汗後脈洪數煩渴五苓散汗後脹滿厚朴生薑人參湯汗太多心悸發顫桂枝甘草湯汗後惡寒表虛也脈細神倦芍藥甘草附子湯太陽汗出不解發熱心悸肉瞤真武湯汗後身痛脈沉桂枝加芍藥人參湯汗後熱不去內拘急四肢疼下利惡寒四逆湯汗後臍下悸欲作奔豚茯苓桂枝甘草大棗湯可汗綱仲景曰太陽病外症未解脈浮弱者當以汗解宜桂枝湯目許叔微曰太陽表症者惡寒是也問三陰有可汗者乎答曰陰病不當發汗發汗則動經然太陰脈浮少陰發熱亦須微微取汗但不正發汗耳大抵風寒中人與營衛俱薄而發熱又未曾行諸汗藥雖無陽症須少汗解逐之王叔和云表中風寒入里則不消故知初病脈沉細數雖里不消本表中風寒須溫覆少汗而解柯琴曰此條是桂枝本脈傷寒中風雜病皆有外症太陽主表表脈咸統於太陽然必脈浮弱可用此解外如但浮不弱及浮而緊便是麻黃症要知本方只是外症之虛者綱仲景曰傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯目王肯堂曰凡發汗欲令手足俱周漐漐然一時間許益佳不可令如水流漓若病不解當重發汗汗多者必亡陽陽虛不得重發汗也凡服湯發汗中病即止不必盡劑也仲景論凡云可發汗無湯者丸散亦可用要以汗出為解然不如湯隨症良驗柯琴曰此條因餘熱衛解而營未解故用桂枝更汗也凡曰桂枝湯主之者定法也服桂枝不解仍與桂枝汗解後復煩更用桂枝者活法也麻黃脈症但可用桂枝更汗不可先用桂枝發汗且服麻黃復煩可更用桂枝用桂枝復煩不得更用麻黃又活法中定法也綱仲景曰太陽病先發汗不解而復下之浮脈者不愈浮為在外當須解外則愈宜桂枝湯目張元素曰仲景凡為汗症關防無所不備且如太陽中風桂枝湯主之加喘者桂枝加厚朴杏子湯有汗惡風者桂枝加葛根湯形如瘧且二三度發桂麻合半湯日再發者桂枝二麻黃一湯脈微弱者不可汗桂枝二越婢一湯至於傷風𠘧𠘧無汗惡風者葛根湯惡風無汗而喘者麻黃湯復加煩躁者大青龍湯隨其所感輕重用衆理以應之可見汗症中間其周詳整密無所不至矣張兼善曰誤下後脈仍浮可知表症未解陽邪未陷只宜桂枝解外勿以脈浮而用麻黃下後仍可用桂枝乃見桂枝方之力量綱仲景曰傷寒不大便六七日頭痛有熱者與承氣湯其大便圊者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯目朱震亨曰傷寒前三日法當汗可用雙解散連進數服必愈李梴曰服藥而不得汗當用蒸法陶氏再造散主之柯琴曰此辨太陽陽明之法太陽主表頭痛為主陽明主裡不大便為主陽明亦有頭痛濁氣上衝也太陽亦有不大便陽氣太重也七日不大便病在裡則頭痛身熱屬陽明外不解由內不通也若下之大便去則頭痛身熱病仍在表仍是太陽宜桂枝汗之也本條當有汗出症故合用桂枝承氣綱仲景曰脈浮者病在表可發汗麻黃湯脈浮而數者可發汗宜麻黃湯目李梴曰太陽病脈浮緊者宜汗汗之不解者再汗之若失其汗則寒邪傳經當看傳過何經變出何病若因汗而反下滲表邪乘虛內陷則熱蓄於裡變為瘀血懊憹痞氣結胸等症鰲按脈言浮浮而有力者言數是由於發熱者故為熱在表故可發汗綱仲景曰太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗麻黃湯主之服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也目張介賓曰各經表症凡有汗出不徹者皆未足言汗蓋邪未盡去其人必身熱不退而仍覺躁煩或四肢痠疼坐臥不安者以汗出不徹故也何從知之但診其脈緊不退及熱時乾躁無汗者即其症也仍宜汗之如果汗透而熱仍不退或汗後身熱愈甚者是即所謂陰陽交魂魄離大凶之兆凡汗之不徹者其故有三如邪在經絡筋骨而汗出皮毛者此邪深汗淺衛解而營不解一也或以十分之邪而出五分之汗此邪重汗輕二也或寒邪方去猶未清楚遽起露風因虛復感此新舊相踵三也凡遇此當詳辨而因微甚以再汗也取汗之法當取於自然不宜急暴但服以湯劑蓋令溫暖使得津津微汗令稍久之則手足俱周遍身通達邪無不散矣若一時逼之如淋如洗則急遽間衛氣已達而營氣未周反有不到之處且恐大傷元氣非良法之綱仲景曰太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃仁承氣湯目柯琴曰此陽氣太重標本俱病者然病自外來者當先審表熱之重輕以治其表繼攻其里之結血此以尚未可攻知其為未下症讀書之法不可汗綱仲景曰太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯目朱肱曰春不可大發汗以陽氣尚弱不可急奪使陰氣勝於時天寒初解營衛腠理俱緩可用小柴胡湯之類治之冬不可汗者以陽氣伏藏不可妄擾不論傷寒中風以輕藥解利之傷寒無汗者只與桂枝麻黃合半湯傷風有汗只與柴胡桂枝湯或得少汗而解或無汗而解勢甚者不拘此夏月天氣大熱玄府開脈洪大宜正發汗但不可用麻黃桂枝熱性藥須麻黃桂枝湯加黃芩石膏知母升麻也夏月有麻桂症不加黃芩輩轉助熱氣便發斑黃也白虎湯雖可用然治中暑與汗後一解表藥耳白虎未能驅逐表解況夏月陰氣在內或患熱病氣虛人妄投白虎往往有成結胸者以白虎性寒非治傷寒藥也其人當汗而衄血下血者不可表也桂枝湯壞病者不可表也知犯何逆臨症治之婦人經水適來不可表也表則鬱冒不知人此為表裡俱虛故令鬱冒也風溫者不可表也葳蕤湯濕溫者不可表也蒼朮白虎湯虛煩者不可表也竹葉湯以諸虛煩熱與傷寒相似然不惡寒身不疼故知非傷寒不可汗也頭不疼脈不緊故知里不實不可下也病人腹間左右上下有築然動氣者不可汗也方治詳在動氣本條以此見古人慎用表藥也張云岐曰太陽症非頭疼項強不可發汗非身熱惡寒不可發汗非脈浮不可發汗綱仲景曰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也當須識此勿令誤也目李中梓曰無表症不可汗脈沉不可汗尺脈遲不可汗脈微弱雖惡寒不可汗汗家不可重汗太陽少陽並病頭項強痛或眩冒心下痞不可汗脈弦細頭痛而熱屬少陽不可汗綱仲景曰瘡家身雖疼不可發汗汗出則痙目汪昂曰瘡家雖傷寒身痛不可發汗發汗則痙表虛熱聚故生瘡汗之則表愈虛熱愈甚而生風故變痙也衄家亡血家不可發汗發汗則陰陽俱虛也淋家不可發汗發汗必便血亡耗津液反增客熱也尺脈遲不可發汗以營弱血少故也脈沉遲為在裡反發其汗則津液越出大便難表虛里實必譫語也咽燥喉干不可發汗津液不足也咳而小便利若失小便者不可發汗發汗則四肢厥冷肺腎虛寒也下利雖有表症不可發汗汗出必脹滿走津液而胃虛也汗家重發汗必恍惚心亂汗者心之液心亡血液故亂也綱仲景曰脈浮數者法當汗出而愈若身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和使汗出愈目閔芝慶曰可汗者脈症全在表也若太早太過津液竭而變生焉有不可汗者諸虛百損咽乾口燥咽痛瘡瘍淋瀝經水適至諸失血吐沫咳嗽壞病脈遲微澀或厥而脈緊俱宜和解不宜汗若強發之病微者難瘥劇者言亂目眩而死鰲按本條曰裡虛只重在裡表裡實表字帶言耳蓋表者身也里者心也表裡字即頂上身重心悸身心二字言若心悸由於水氣者亦須發汗但曰尺脈微則明言心液虛矣如何與悸由水氣者同用汗法綱仲景曰脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗以營氣不足血少故也目鰲按此與上條單論脈法本當發汗者然上以尺中微為裡虛而不可汗此以尺中遲為營氣不足亦不可汗蓋此二者雖發其汗而一則心液虛一則營氣虛俱不能作汗徒使正氣益耗耳綱仲景曰脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也目張介賓曰脈有忌汗者如論曰脈微而惡寒者此陰陽俱虛不可更汗吐下太陽病發熱惡寒熱多寒少脈微弱為無陽不可發汗弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗汗則寒栗不能自還傷寒四五日脈沉而喘滿沉為里不可汗汗亡津液必大便難而譫語少陰病脈微不可發汗以亡陽故尺脈弱而無力切不可汗下尺中遲不可汗以榮氣不足血少故按以上忌汗諸脈可見仲景大意故凡治傷寒但見脈息微弱及沉細無力者皆不可任意發汗然欲去外邪又非汗不可而仲景云脈微弱者不可發汗夫脈弱非陽既不可用寒涼而寒邪在表又不可用攻下然則舍汗又將何法以治此表邪乎不知溫中即所以散寒強主即可以逐寇此仲景之意豈不盡露於言表乎且凡病外感而脈見微弱者其汗最不易出其邪最不易解何也以元氣不能托送即發亦無汗邪不能解則愈發愈虛而危亡立至夫汗即血由於營也營本乎氣由乎中也未有中氣虛而營能盛者未有營氣虛而汗能達者脈即營之外候脈既微弱元氣可知元氣愈虛邪愈不解所以陽症最嫌陰脈也凡治表邪之法如果邪實無汗則發散為宜有汗而熱不除則和解為宜元虛而邪不能退則急培其根本以待其自解自汗此逐邪三昧萬全之法也若但見其外不見其內不論症之陰陽脈之虛實但知寒涼可以退熱但知發散可以解表不知元陽一敗危立至矣凡發汗太過一時將致亡陽或身寒而栗或氣脫昏沉惟煎獨參湯飲之甚者或以四味回陽湯庶可保全又有邪本不盛或挾虛年衰感邪等症醫不能察但知表症宜解而發散太過或誤散無效或屢散不已遂被其害者有之或邪氣雖去竟至胃氣大傷不能飲食漸至羸憊不振者有之皆過汗之戒也柯琴曰脈微而無和緩之意此太陰虛矣但惡寒而不惡熱是二陽虛矣陰陽俱虛當調其陰陽綱仲景曰發汗後不可更行桂枝湯無汗而喘大熱者可與麻黃杏仁甘草石膏湯下後不可更行桂枝湯若無汗而喘大熱者可與麻黃杏仁甘草石膏湯目李時珍曰仲景每於汗下後表不解者用桂枝更汗而不用麻黃此則內外皆熱而不惡寒必其用麻黃湯後寒解而熱反甚與發汗解半日許復煩下後而微喘者不同發而不得汗或下之而仍不汗喘不止其陽氣重也若與桂枝加厚朴杏仁湯下咽即斃此湯使溫解之方轉為涼散之劑也綱仲景曰酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也目危亦林曰酒客不喜甘平日蓄有濕熱也病雖中風應與桂枝以不喜甘而不與正以善桂枝湯之用也言外當知有葛根芩連之法鰲按危氏補出葛根芩連之法若魏伯鄉柯韻伯輩俱宗之凡遇酒客病使人知所以用藥自利綱仲景曰太陽與陽明合病者必自下利葛根湯主之太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯目成無己曰三者皆為合病下利一者發表一者攻裡一者和解所以不同者蓋以六經言太陽陽明為表少陽太陰為半表裡少陰厥陰為里今太陽陽明合病為在表者也雖曰下利必發散經中邪氣而後已故以葛根湯汗之太陽少陽合病為半表裡雖曰下利必和解表裡之邪而後已故以黃芩湯散之陽明與少陽合病為少陽邪氣入腑者也雖曰下利必逐去胃中之實而後已故以承氣湯下之是三者所以有異也雜病自利多責為虛傷寒下利有由協熱者表邪傳裡裡虛協熱則不應下而便攻之內虛協熱遂利皆是協熱而利之故也下利家何以明其寒熱耶自利不渴屬太陰以其臟寒故也下利欲飲水者以有熱也故大便溏小便自可者此為有熱自利小便色白者少陰病形症悉具此為有寒惡寒脈微自利清穀此為有寒熱後重泄色黃赤此為有熱皆可理其寒熱也凡腹中痛轉氣下趨少腹者此欲自利也自利家身涼脈小為順身熱脈大為逆少陰病脈緊下利脈暴微手足反溫脈緊反去者此為欲解下利脈大者為未止脈微弱數者為欲自止雖發熱不死是知下利脈大為逆脈小為順也自利宜若可溫理中白通諸四逆輩皆溫臟止利之劑其腸胃有積結與下焦客邪皆溫劑不能止之必攻泄之或分利之而後已經曰理中者理中焦此利在下焦宜赤石脂禹餘糧湯復不止當利小便是利在下焦而聚利者也少陰病自利清水色純青心下必痛口乾燥與下利三部皆平按之心下硬或脈沉而滑或不欲食而譫語或瘥後至年月日復發此數者皆腸有積結而須攻泄者也內經注曰大熱內結注泄不止熱宜寒療伏結須除以寒下之結散利止大熱凝內久利泄溏愈而復發綿歷歲年以熱下之寒去利止謂之通因通用喻昌曰下利不下利可以辨主風主寒之不同他條太陽陽明合病不下利但嘔者葛根加半夏湯主之蓋主風者風為陽風性上行故合陽明胃中之水飲而上逆此條主寒寒為陰陰性下行故合陽明胃中之水穀而下奔然上逆則必加半夏入葛根湯滌飲止嘔若下利則但用葛根以解兩經之邪不治而利自止太陽陽明合病下利表症為多陽明少陽合病下利里症為多太陽少陽合病下利半表半裡之症為多故用黃芩甘草芍藥大棗為和法按太陽陽明合病陽明少陽合病俱半兼陽明所以胃中之水穀不安而必自下利其不下利者亦必水飲上越而嘔與少陽一經之症乾嘔者大不同然或利或嘔胃中之真氣與津液俱傷急須散邪所以安其胃更慮少陽勝而陽明負即當急下救陽明其取用大承氣湯正迅掃外邪而承領元氣之義也設稍牽泥則脈之滑數必變為遲軟下之無及矣魏荔彤曰太陽陽明有合病俱屬二經之表同感外邪然又有太陽少陽二經合病則三陽首尾同感陽明豈能絶類離群獨不病乎是太少二陽之合病即三陽俱感之合病矣或問三陽同病為溫症子何混入傷寒合病內不知溫症之三陽俱病乃冬傷於寒春必病溫蘊蓄已久之邪也傷寒之合病三陽同感即時俱病倏忽不時之邪也其受病之源有不同者如此既為三陽同感雖名為太少合病其實陽明獨受其邪其少陽邪多者則下利風木克胃土也其太陽邪多者則嘔表陽鬱熱而陽明氣逆也下利者與以黃芩湯以苦泄少陽之邪而陽明之邪得下行嘔者加半夏生薑以辛散太陽之邪而陽明之邪不上逆此黃芩即治挾熱利之餘法此半夏生薑即治結胸之餘法變而用之不過使邪或自上越或自下泄之意耳此又見病專受於陽明而治之仍從太少蓋陽明無所復傳之邪仍自太少宣泄別無出路與少陽陽明篇及少陽篇所言無二也太少二陽合病病必連及陽明固已如其人太陽病全罷獨陽明少陽合病則又當另為審辨而後可出治無誤或問太陽罷而陽明少陽病非所謂少陽陽明乎何為另名為合病曰少陽陽明乃自太陽已傳陽明自陽明又欲傳少陽故名曰少陽陽明今本三陽同時俱感而太陽表邪已罷陽明少陽專受其患所以另名曰陽明少陽合病未可即謂少陽陽明也或又問太陽表邪已罷非傳經乎曰太陽表邪已罷自是傳經而此合病原系三陽同時受邪即太陽已罷為傳經入里與太陽遞傳者理同而名異況陽明少陽二經亦尚各有表邪未解非同於太陽獨受邪者表邪已罷傳入陽明少陽皆屬裡症也表裡之間迥乎不同者如此知之則陽陰少陽合病之下利為陽明合少陽在經表邪作祟二經同受邪已見木動剋土腸胃虛風鼓煽作利之義非同陽明傳經腑里藏邪作利明矣是當診以諦之按乾剛至健之氣運於地外而貫於地中所以統天地而資始生者故胃中之燥金即乾金之貫於坤土中者也所以生化乎萬物者也陽明燥金司秋令萬物悅於兌戰於乾二金之氣漸次生水為貞下起元可以知人胃中之金氣矣綱仲景曰下利不可攻其表汗出必脹滿目蘇頌曰下利雖有表症又不可發汗以下利為邪氣內攻走津液而胃虛也張介賓曰凡雜症下利多積於寒傷寒下利有寒有熱蓋熱邪傳裡則亦有下利之症但寒利最多熱利則僅見耳治者當辨寒熱若誤用之則為害最大凡傷寒下利由熱邪者必有煩躁大熱酷欲冷水等症亦必有洪滑強盛數實等脈如果表裡俱熱方可作火症論若脈雖數而無力雖外熱而不惡熱內雖渴而不喜冷此其內本不熱而病為下利者悉屬虛寒宜四逆湯理中湯溫胃飲胃關煎五苓散之類或表裡寒邪俱盛則當以麻桂飲相兼用之為最要若以寒利作熱利妄用寒涼再損胃氣必死表裡俱病而下利者雖有表症所急在裡蓋里有不實則表邪愈陷即欲表之而中氣無力亦不能散故凡見下利中虛者速溫其里裡實氣強則表自解溫中可以散寒也脈數又欲飲水是誠熱矣然寒邪在表脈無不數數而有力者為陽症數而無力者為陰症矣瀉利亡津液無有不渴但渴欲飲水愈多愈快者為陽症口雖欲水而腹不欲咽即非陽症矣此外如渴欲茶湯者瀉渴之當然也不得悉為熱症凡傷寒表邪未解脈實滑數喜冷氣壯內外俱熱而下利者宜柴苓煎主之凡傷寒下利者本非陽明熱邪不當譫語今譫語故知有燥屎當去也又若少陰下利心下痛或硬必有所積故亦當下凡利家身涼脈小者為順身熱脈大者為逆此以外無表症而病之在臟者言也大抵下利一症惟脫氣至急五奪之中惟此為甚金匱曰六脈氣絶於外者手足寒五臟氣絶於內者利下不禁臟氣既脫不能治也陳士鐸曰傷寒發熱六七日不下利忽變為下利已是危症若又汗不止是亡陽也有陰無陽死症急以人參三兩北味一錢救之可生若不得參另用白朮黃耆各三兩當歸一兩白芍五錢北味一錢此方補氣補血以救陽氣之外越陽回則汗止汗止則利亦止也綱仲景曰下利日十餘行脈反實者死發熱下利至甚厥不止者死直視譫語下利者死下利手足厥冷無脈者灸之不溫脈不還者死少陰病自利復煩躁不得臥寐者死目成無己曰大抵下利脫氣至急其或邪盛正虛邪擁正氣下脫多下利而死陳士鐸曰下利日十餘行脈反實者死何也蓋下多亡陰宜脈之虛弱矣今不虛而反實現假實之象也須認清則是正氣耗絶為邪氣所障則正氣消故必死救之必仍補其虛不必論脈之實與不實也用還真湯人參白芍各一兩茯苓二兩此方參固元陽苓止脫瀉芍生真陰陰生而陽長利止而脫固則正強而邪自敗矣假象變為真虛則死症變為真生矣綱仲景曰問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白滑苔者難治傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便目鰲按上條病俱重在關脈一曰沉雖沉而實大是寒水留結於胸脅之間者一曰沉緊是結在臟而不在腑者故見症各不同前賢謂能食而利亦謂之結結在無形之氣五臟不通故曰臟結是也下條服湯藥而利不止是病猶在胃以他藥下而利不止則病在大腸矣石脂餘糧湯所以固脫利小便所以分消其濕此又理下焦之二法也協熱利綱仲景曰太陽病二三日不得臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之必作協熱利太陽病外症未除而數下之遂協熱而利利下不止心下痞硬表理不解者桂枝人參湯主之太陽病桂枝症醫反下之利遂不止脈促者表未解也喘而汗出葛根黃連黃芩湯主之目張兼善曰仲景言表症未除而誤下之因致外熱未退內復作利故云協熱下利此一熱字乃言表熱也非言內熱也夫協者協同之協非挾藏之挾即表裡俱病之謂故治此者止有桂枝人參湯一方其又顯然可見即如成無己曰表邪傳裡裡虛協熱則利是亦以表邪為言也奈何後學不明止因協熱二字但見作利者無論表裡虛實即認為內熱便云協熱下利且近有不必誤下而妄用芩連治表熱者表症得寒熱愈不退力致下利或脾素弱逢寒即泄者皆是此症既見下利蓋云協熱其謬甚矣獨不觀仲景桂枝人參湯豈治內熱之劑乎寒熱倒施殺人多矣柯琴曰首條論協熱之因二條明下利之治桂枝人參湯雙解表裡也三條利遂不止所謂暴注下迫皆屬於熱蓋微熱在表大熱入里者故與首條脈弱而協熱下利不同綱仲景曰太陽病下之其脈促不結胸者為欲解脈沉滑者協熱利脈浮滑者必下血目王肯堂曰協熱利熱病也小便自利小便數綱仲景曰太陽病六七日表症仍在脈微而沉反不結胸其人發狂以熱在下焦小腹當硬小便自利者下血乃愈抵當湯太陽病身黃脈沉結小腹硬小便自利其人如狂血症也抵當湯傷寒有熱小腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸目成無己曰小便自利有在表者有在裡者有熱而利者有寒而利者六經俱有之症難以概治宜隨所犯而施藥可也綱仲景曰太陽中風火劫汗後發黃欲衄小便難頭汗出腹滿微喘口乾咽爛或不大便久則譫語甚者至噦捻衣摸床小便利者可治傷寒八九日風濕相摶身作疼煩不能轉側不嘔不渴脈浮虛而澀者桂枝附子湯若其人小便自利去桂枝加白朮湯目陶華曰小便自利者為津液滲漏大便必硬宜以藥微下之其陽明自汗者復發其汗津液內竭屎雖硬尤不可攻縱大便難蜜煎導之太陰當發黃其小便利則濕熱內泄不能發黃惟血症則腹急而如狂腎與膀胱虛不能約制水液二者皆小便自利若腎與膀胱虛而挾熱熱則水道澀小便不快故澀淋而數起也若自汗而小便數雖有表症不可用桂枝以其亡走津液也若誤服之以甘草乾薑湯為治可也若太陽病小便自利以飲水多心下悸茯苓桂枝甘草湯脈浮自汗小便數胃不和譫語者少與調胃承氣湯綱仲景曰傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯目柯琴曰小便數者腎與膀胱俱虛而有客熱乘之也太陽陽明二經既虛致受於客熱熱則不能制水故令數小便熱則水行澀澀則小便不快故令數起也診其趺陽脈數胃中熱即消穀引飲大便必硬小便即數也鰲按小便數或在表或在裡惟三陽有之三陰則無此症也小便不利小便難綱仲景曰病發於陽而反下之熱入因作結胸若不結胸但頭汗出余無汗至頸而還小便不利身必發黃也目蘇頌曰小便不利有數種有因被下者津液耗於內也有因汗者津液亡於外也有因發黃與痞及熱病者熱鬱所致風濕相搏與夫陽明中風其小便不利寒邪所乘其小便難者亦多由汗下而然宜詳辨之鰲按濕鬱發熱能下行則便利即內亦解若小便不利則濕熱內蒸於臟腑者因黃色外見於皮膚而發黃矣綱仲景曰傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之目陶華曰小便不利者邪氣聚於下焦結而不散甚則小腹硬滿而痛此小便所以不通也大抵有所不利者行之有所滲泄也若飲水過多下焦蓄熱或中濕發黃水飲停留皆以利小便為先惟汗後亡津液胃汁干與陽明汗多者則以利小便為戒設或小便不利而見頭汗出者乃為陽脫關格之疾矣鰲按水氣留而不行故小便不利小便不利故少腹滿此條言小便不利正欲明少腹滿之故也綱仲景曰太陽病發汗後若脈浮小便不利微熱消渴者五苓散主之太陽病飲水多小便利者必心下悸小便少者必苦裡急也目柯琴曰發汗後脈仍浮而微熱猶在表未盡除也雖不煩而渴特甚飲多即消小便不利水氣未散也便利便少雙頂飲水多火用不宣致水停心下而悸水用不宣致水結膀胱而裡急也綱仲景曰本以下之故心下痞與瀉心湯痞不解其人渴而口躁煩小便不利者五苓散主之大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈目鰲按與瀉心湯而痞仍不解小便仍不利心下之水氣停結甚矣綱仲景曰太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血結症也抵當湯主之目吳綬曰凡傷寒小便不利當分六經治之固已若陰虛火動小便赤澀不利者加知柏木通生地凡內熱盛大便不通小便赤澀不利者八正散治之凡不渴小便不利者熱在血分也宜知柏生地之類夫膀胱為津液之府氣化而能出也若汗多者津液外泄小便因少不可利之恐重亡津液待汗止小便自行又小便自利亦不可妄利之恐引熱入膀胱則變蓄血又為害也綱仲景曰風濕為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之目鰲按下則大便利故小便反不利何者以肺家之化源不清胃家之關門不啓也綱仲景曰太陽病發汗遂漏不止其人惡風小便難四肢拘急難以屈伸者桂枝加附子湯主之目朱肱曰傷寒發汗後汗出多亡津液胃中干故小便不利醫見不利往往利之誤矣傷寒有不利者行之取其滲泄也有渴而停飲者有躁而煩渴有病氣去而水氣不得行者其表裡得見煩躁口燥欲飲水水入即吐病名水逆及霍亂頭痛發熱身疼痛欲飲水者有發熱汗出復惡寒不嘔但心下痞者並宜五苓散問小便難何也曰陰虛故也陰虛者陽必湊之為陽所湊也故小便黃者中有熱也宜滑石瞿麥輩瀉之趙嗣真曰傷寒小便難仲景論有發汗漏不止桂枝加附子湯者有陽明中風或脈浮弦大而潮熱噦者或脈浮而緊誤下而成腹滿者又有陽明脈浮遲飽則微煩頭眩者活人問中當以傳經邪熱與漏風亡陽分作兩條其桂枝加附子湯乃亡陽經虛所致豈得均謂之陰虛陽湊為有熱耶要當以陽明小柴胡症及誤下症谷疸症次於陽湊傳邪之下卻別出一條云外有汗多亡陽津液不足亦有小便難者還以桂枝加附子症屬之若太陽中風以火劫發汗則邪風被火熱血氣流溢身黃陽盛陰虛欲衄小便難也若少陰以火劫汗者則咳而下利譫語小便難也若下後小便難有二一脈浮遲弱惡風寒下之者則脅滿身黃項強小便難一陽明胃實發熱惡寒脈浮緊下之者則腹滿小便難遺溺綱仲景曰三陽合病腹滿身重難以轉側口中不仁面垢譫語遺尿自汗者不可汗不可下宜少與白虎湯風溫病脈浮自汗出體重多眠若下之則小便不利直視失溲寸口脈微而澀微者衛氣不行澀者營氣不逮榮衛不能相將三焦無所仰身體痹不仁榮氣不足則煩疼口難言衛氣虛則惡寒數缺三焦不歸其部上焦不歸者噫而吞酸中焦不歸者不能消穀下焦不歸者則遺溲目楊士瀛曰膀胱瀦水下焦不攝則亦遺溺經云邪中下焦陰氣為栗足膝逆冷便溺妄出合用四逆湯下焦蓄血小腹結急小便自利不禁輕者桃仁承氣湯重者抵當湯綱仲景曰咳而小便利若失小便者不可發汗汗出則四肢厥冷太陽病火尉其背大汗出譫語十餘日振栗下利欲小便不利反嘔而失溲者此為欲解也遺溲狂言目反直視者此為腎絶目吳綬曰遺尿者小便自出不知也其熱盛神昏遺尿者為可治若陰症下寒逆冷遺尿脈沉微者難治宜附子湯加乾薑益智以溫其下若厥陰囊縮逆冷脈微遺尿者四逆加吳萸湯溫之陽不回者死凡傷寒汗下後熱不解陰虛火動而遺尿者人參三白湯加知柏或補中益氣湯加知柏麥冬生地五味之類若狂言直視譫語遺尿此為腎絶內經言膀胱不利為癃不約則遺溺又曰水泉不止者膀胱不藏也言腎與膀胱為表裡腎虛則膀胱之氣不約故遺尿也要在滋補膀胱之氣東垣謂溲便遺失為肺金虛又當補肺氣也大抵肺虛腎虛熱甚者皆可治惟腎絶遺尿則不可治此下焦氣絶不歸其部故也
