body:
  text: 卷八陽明經症陽明經脈綱仲景曰傷寒三日陽明脈大目朱肱曰足陽明胃之經從鼻起挾於鼻絡於目下分為四道並正別脈六道上下行腹綱維於身蓋諸陽在表陽陰主肌肉絡於鼻故病人身熱目疼鼻乾不得臥其脈尺寸俱長者知陽明經受病也戴原禮曰脈大者兩陽合明內外皆陽之象也陽明受病之初病為在表脈但浮而未大與太陽同故亦有麻黃桂枝症也至二日惡寒自止而反惡熱三日熱大盛故脈亦應其象而洪大此為胃家實之正脈若小而不大便屬少陽內經云陽明之至短而澀此指秋金司令之時脈言也又曰陽明脈象大浮也此指兩陽合明之病脈言也喻昌曰傷寒一日太陽二日陽明三日少陽乃傳經之次第其實不以日拘此三日陽明脈大正見二日之陽明傳自太陽必兼乎浮緊浮緩未定是正陽陽明也若正陽陽明氣血俱多其脈必大而與太陽別矣言外見三日症連少陽則其脈必大而弦又不得為正陽陽明也魏荔彤曰陽明之為病胃家實何以驗之驗之於脈如其人本太陽傷寒三日之久表邪不解致變熱傳裡入陽明成胃家實則其脈浮緊浮緩者忽變為大浮與緊緩俱不見矣既不浮則沉可知也既云大則沉而兼滑又可知也嚮者太陽之浮候於寸者既多今者陽明之沉候於關者必多也關脈大而沉滑恰是中脘為病則胃家之實可決也綱仲景曰脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻以上論胃實目柯琴曰此治陽明之大法也夫脈之浮而緊浮而緩浮而數浮而遲者皆不可攻而可汗此浮而反不可汗而可攻者以陽明三日之脈當知大為病進不可拘浮為在表也又曰脈遲尚未可攻者以症有虛實脈有真假假令脈遲便非臟實是浮大皆為虛症矣特為妄攻其實者禁也朱肱曰問傷寒何以須診衝陽脈答曰衝陽脈是足陽明胃之經人受氣於谷谷入於胃乃傳與五臟六腑臟腑皆受氣於胃其清者為營濁者為衛營行脈中衛行脈外陰陽相貫如環無端胃為水穀之海主稟四時皆以胃氣為本是謂四時之變病死生之要會故傷寒必診衝陽以察其胃之有無也衝陽二穴一名會源在足跗上五寸骨間動脈上去陷骨三寸綱仲景曰陽脈微而汗出少者為自和也汗出多者為太過陽脈實因汗出多者亦為太過太過為陽實於裡亡津液大便因硬也目危亦林曰此雖指太陽轉屬然陽明表症亦有之綱仲景曰太陽病寸緩關浮尺弱其人發汗出復惡寒不嘔但心下痞者此以醫下之也如不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不大便十日無所苦也渴欲飲水少少與之但以法救之宜五苓散傷寒脈浮緩手足自溫者系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也以上論他經轉屬目柯琴曰上條病機在渴欲飲水利水是胃家實而脈弱之正治不用豬苓湯而用五苓散者以表熱未除故耳此為太陽陽明之並病下條病機在小便太陰受病轉屬陽明以陽明為燥土故非經絡表裡相關所致總因亡津液而致也綱仲景曰問曰脈有陽結陰結何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇以上論陰陽結症目張云岐曰此條本為陰結髮論陽結即是胃實為陰結作伴耳陰結無表症當屬之少陰不可以身重不能食為陽明應有之症沉遲為陽明當見之脈便硬為胃家實而不敢用溫補也綱仲景曰陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出脈浮而遲面熱赤而戰惕者六七日當汗出而解遲為無陽不能作汗其身為癢也目魏荔彤曰太陽中風傷寒解肌肌不盡解發汗汗不盡出外邪氣變熱內正陽生熱陰燥陽絶太陽病已轉屬陽明矣然病有已入陽明而未離太陽者則中風傷寒二條尚在表而未盡除也豈可遽舍太陽表治而從陽明裡治乎故仲師特舉此首條二條以立法也蓋此乃太陽陽明之症入陽明未深故令其邪仍自表出不致歸於胃而無所復傳是解肌發汗二法始終井井者也三條乃陽明病仍帶太陽深恐陽明病去太陽漸遠而成陽明漸多非就脈症以明之不審也脈浮緊由太陽傷寒而成為寒傷營而致成陽明之脈症者脈但浮由太陽中風而成為風傷衛而致成陽明之脈症者陽明病至此已將離太陽八九矣而尚有一二太陽在主治者猶當以下之太早為戒而防結胸與痞也四條乃陽明之虛脈虛症也汗者陽氣遲者陰脈無陽不能作汗又當助陽發汗者也綱仲景曰脈浮發熱口乾鼻燥能食者則衄以上論陽明在表症目樓全善曰此條主治宜桃仁承氣湯犀角地黃湯之類也綱仲景曰傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死以上論陽明譫語症目朱撝曰表虛里實譫語之由也譫語脈短譫語之脈也汗多則津脫營虛故脈短若津雖脫而不甚脫營雖虛而不甚虛則脈自和綱仲景曰陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也目鰲按脈浮而緊潮熱有時之候此為陽明初病在裡之表也綱仲景曰陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈弦緊者與小柴胡湯脈但浮無餘症者與麻黃湯若不尿腹滿加噦者不治以上論陽明中風目朱肱曰問十二經皆一而陽明有三何也有太陽陽明有少陽陽明有正陽陽明也太陽陽明者本太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明也少陽陽明者本傳到少陽因發汗利小便已胃中燥實大便難也正陽陽明者病人本風盛氣實也三陽明俱宜下惟惡寒及中寒為病在經與太陽合病屬表可發其汗蓋太陽與陽明合病脈必浮大而長症必頭疼腰痛肌熱目痛鼻乾也脈浮大者太陽也長者陽明也頭疼腰痛者太陽也肌熱目痛鼻乾者陽明也尚惡寒者可升麻湯汗之若不惡寒反惡熱大便不祕者可白虎湯解利之不惡寒反惡熱大便祕或譫語者屬胃家實也可調胃承氣湯下之身熱汗出漐漐然者屬陽明也張介賓曰太陽陽明者邪自太陽傳入於胃其名脾約以其小便數大便硬也正陽陽明者邪自陽明本經傳入於腑而邪實於胃也少陽陽明者邪自少陽傳入於胃也胃本屬土為萬物所歸邪入於胃則無所復傳鬱而為熱此由耗亡津液胃中乾燥或三陽熱邪不解自經而腑熱結所成故邪入陽明胃腑者謂之實邪土氣為邪王於申未所以日晡潮熱者屬陽明也論曰潮熱者實也是為可下之症然雖可下若脈浮而緊或小便難大便溏身熱無汗此熱邪未全入腑猶屬表症仍當和解若邪熱在表而妄攻之則禍不旋踵綱仲景曰陽明病脈遲腹滿食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也目鰲按陽明中風其脈則浮而弦大今脈則遲是中寒且無陽矣綱仲景曰傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中虛冷當不能食今反能食此名除中必死若脈遲至六七日不欲食此為晚發水停中故也為未解食自可者為欲解以上論陽明中寒目陳士鐸曰傷寒脈遲自然是寒誤與黃芩湯則益加寒矣寒盛宜不能食今反能食病名除中仲景謂是死症者何也夫能食是胃氣有餘如何反曰死症不知胃寒而加之寒藥反致能食者此胃氣欲絶轉見假食之象不過一時能食病名除中者正言胃中之氣除去而不可留也雖是死症猶有生機終以其能食胃氣將除而未除可用藥以留其胃氣也方用加減參苓湯王履曰凡言陽明病者必身熱汗出不惡寒反惡熱也今但言傷寒則惡寒可知非不惡寒者也況脈遲為無陽必其裡寒特甚綱仲景曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒而譫語若加燒針心怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之目吳綬曰細繹脈浮而緊一條乃陽明半表裡症也邪已入腹不在營衛之間脈雖浮不得以為在表而發汗脈雖緊不得以其身重而加溫針胃家初實尚未燥硬不得以其喘滿惡熱而攻下陽明梔子豉湯猶太陽桂枝湯既可驅邪亦可攻誤虞摶曰上條是不肯令胃燥下條是不肯令水浸入胃總為胃家惜津液也綱仲景曰病如桂枝症頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散目鰲按寸脈微浮尚是陽明之表脈用瓜蒂散即是陽明之表劑綱仲景曰病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當吐之宜瓜蒂散目鰲按緊本為寒今言乍緊者正與厥應不厥時未必緊是寒結胸中之脈症也綱仲景曰太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也此為小逆一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也目柯琴曰言太陽病頭項強痛可知以脈辨之關上者陽明之脈細弦數而不洪大雖自汗而不惡熱則不是與陽明並病不口乾煩滿而自汗出自不與少陰兩感原其故乃庸醫妄吐所致則自汗為表虛脈細數為裡熱也綱仲景曰傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表症者白虎加人參湯主之服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之目黃仲理曰此二條必合看乃得蓋前條症也後條脈也脈浮發熱無汗本麻黃症尚存即是表不解更兼渴欲飲水又是熱入於裡此謂有表裡症當用五苓散綱仲景曰三陽合病脈浮大在關上但欲睡眠合目則汗目程郊倩曰脈而浮大陽脈也關上陽所治是為重陽矣與少陰脈沉細而但欲寐者自異綱仲景曰傷寒脈浮滑此表有熱里有邪白虎湯主之傷寒脈滑而厥者里有熱也白虎湯主之目柯琴曰此條論脈而不及症因有白虎症而推及其脈也切勿據脈而不審其症脈浮而滑為陽陽主熱內經云脈緩而滑曰熱中是浮為在表滑為在裡此雖表裡並言而重在裡熱所謂結熱在裡表裡俱熱者也脈微而厥為寒厥脈滑而厥為熱厥陽極似陰之症全憑脈以辨之綱仲景曰傷寒十三日不解過經譫語者以有熱故也當以湯下之若小便祕者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微今反和者此為內實也調胃承氣湯主之目張云岐曰脈調和而不微是脈有胃氣也內實者胃實也胃實則腸虛故必以調胃承氣湯調其胃也綱仲景曰陽明病脈遲微汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下目方中行曰脈遲汗出等八症乃陽明之外邪欲解可以攻裡而不為大誤也然曰欲解曰可攻不過用小承氣調胃承氣法耳必手足濈然汗出方可驗胃實便硬外邪盡解而當從大承氣急下之法也申酉戌間獨熱余時不熱者為潮熱若汗出微發熱惡寒是陽明症尚兼太陽縱腹大滿胃終不實只可微和胃氣以從權而已綱仲景曰陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也目柯琴曰脈滑而疾有宿食也明日仍不大便脈反微澀微則無陽澀則少血此為裡虛故陽症反見陰脈也然胃家未實陰脈尚多故脈遲脈弱者始可和而久可下陽脈而變為陰脈者不惟不可下更不可和脈滑者生脈澀者死故為難治然滑有不同又當詳明夫脈弱而滑是有胃氣此脈來滑疾是失其常度重陽必陰仲景早有成見故少與小承氣試之若據譫語潮熱而與大承氣陰盛已亡矣此脈症之假有餘小試之而即見真不足憑脈辨症可不慎哉綱仲景曰傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服目張兼善曰此本壞病也但不可不辨其微劇微者是邪氣實當以下解一服利者止後服只攻其實毋乘其虛也劇者邪正交爭也當以脈斷其虛實弦者是邪氣實不失為下症故生澀者是正氣虛不可更下故死綱仲景曰脈滑而數者有宿食也當下之宜大承氣湯目龔信曰數為在腑故滑為有食數以至數言是本來面目疾以體狀言在譫語潮熱時見故為失度綱仲景曰病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之與承氣湯目柯琴曰煩熱自汗似桂枝症寒熱如瘧似柴胡症然日晡潮熱則屬陽明而脈已沉實確為可下是承氣主症主脈也綱仲景曰得病二三日脈弱無太陽柴胡症煩躁心下硬至四五日雖能食以小承氣少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯目王肯堂曰二三日尚在三陽之界脈弱者無陽故也無陽者無太陽桂枝症無少陽柴胡症也如是則病不在表而陽邪入陰病在陽明之裡也七日後乃可攻者以脈弱是太陽中風能食是陽明中風以此為風也潮熱譫狂綱仲景曰傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語此便是狂如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服目朱肱曰脈弦者陽也澀者陰也陽症見陰脈者死病人有陽症而脈澀者慎不可下下症悉具服湯已更衣者止後服不爾方盡劑服之下後慎勿中服補藥孫真人云服大承氣湯得利瘥慎不中服補藥也熱氣得補復盛更復下之是重困也宜消息安養之仲景有宜下者有微和其胃氣者蓋傷寒里症須看熱氣淺深故仲景有宜下之症如大承氣湯小承氣湯十棗湯大柴胡湯是也有微和其胃氣如調胃承氣湯脾約丸小承氣微和之之類是也金匱云虛者十補勿一瀉強實者瀉之虛實等者瀉勿大瀉之故叔和序傷寒有承氣之戒又問轉藥孰緊答曰大承氣最緊小承氣次之調胃承氣又次之大柴胡又次之仲景治法蕩滌熱積皆用湯液不得用丸子不可不知也大柴胡加大黃小柴胡加芒硝方為轉藥蓋為病輕者設也鰲按潮熱譫狂俱見症之極重者矣閲仲景陽明症論中有單言潮熱者有單言譫語者有單言發狂者此條乃獨舉潮熱譫狂而備言之明乎其症之重且憑脈以決其生死也大約病至此其脈必弦者少而澀者多故弦者生句輕看專重在澀者死句欲醫者於此急審其脈或猶見弦象則猶有下之一法以救之不然可勿藥也仲景特提此條以為世告余亦因獨摘此條另立一款不雜入單言潮熱單言譫語單言發狂款中也潮熱綱仲景曰陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出目劉完素曰潮熱屬陽明必於日晡時發者乃為潮熱若日三五發者則是發熱非潮熱也王好古曰脈浮而緊是惡寒將自罷將發潮熱時之脈也此緊反入里之謂不得拘緊則為寒之說綱仲景曰陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈弦浮者與小柴胡湯脈但浮無餘症者與麻黃湯若不尿腹滿加噦者難治目鰲按本條不言發熱但曰有潮熱是明兼少陽矣故可與小柴胡湯綱仲景曰陽明病脈遲微汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣微和胃氣勿令大泄下陽明病潮熱大便硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便硬而少也以小承氣湯和之不轉失氣者慎不可攻也目朱肱曰潮熱者大率當下仲景云潮熱者實也大承氣湯症云其熱不潮未可與也則知潮熱當下無疑矣雖然更看脈與外症脈若弦若浮及外症惡寒猶有表症且與小柴胡湯以解之若腹大滿不通者可與小承氣微和其胃氣勿令大泄縱使潮熱當行大承氣亦須先少與小承氣若不轉失氣不可攻之後發熱復硬者大柴胡湯下之若胸脅滿而嘔日晡發潮熱者小柴胡加芒硝又有日晡發潮熱已有微利者又有微發潮熱而大便溏者或潮熱而咳逆者皆當用小柴胡也冬陽明潮熱當行黃芩湯陽明病俱宜下惟惡寒中寒為病在經與太陽合病屬表發其汗耳若吐若下後七八日不解熱結在裡表裡俱熱時時惡寒者白虎症也柯琴曰胃實諸症以手足汗出為可據而潮熱尤為親切以四肢為諸陽之本而日晡潮熱為陽明主時也後條必因脈之遲弱即潮熱尚不足據故又立試法以小承氣湯為和即以小承氣湯為試仍與小承氣湯為和總是慎用大承氣耳綱仲景曰傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服目鰲按此潮熱而又不大便不惡寒俱是可下症也綱仲景曰陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜大承氣湯目魏荔彤曰能食不能食二者俱知津必立枯屎必盡燥日久愈耗液傷正自宜大承氣湯此於不能食而辨其已有燥屎於能食而辨其將來必有燥屎俱宜攻下也他條言雖能食雖不能食俱應斟酌不可大為攻下此條又言反不能食者若能食者俱應直捷而大為攻下非自體認能得仲師之心從孰問津乎凡傷寒論中仲師既恐人不應下而下又恐人應當下而下之太早太甚今且恐人應下而不下或不敢大下故就燥屎以示之令人既知詳慎又忌遲疑中庸所以不易能也夫綱仲景曰二陽並病太陽症罷但發潮熱手足濈濈汗出大便難而譫語者下之則愈宜大承氣湯目方中行曰太陽症罷分明全屬陽明首必先言二陽並病者見未下時便有可下之症見得太陽一罷其餘皆可下之症矣綱仲景曰陽明病譫語發潮熱脈滑而疾者小承氣主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日不大便脈反微澀者里症也為難治不可更與承氣也目魏荔彤曰脈滑而疾滑者大之漸而疾者數之稱病由太陽轉屬陽明必在表之邪變熱入里脈之浮者必變大其緊與緩者必俱變疾疾數也數熱也非變熱入里無以致成陽明也凡病邪入經脈必變緊緩為數病邪入腑脈又易數疾稍遲熱入血室綱仲景曰陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈目成無己曰此熱入血室蓋言男子不止謂婦人也室者可停止之處血室者榮血停止之所經脈留會之處即衝脈也起於腎下出於氣衝並足陽明經挾臍上行至胸中而散為十二經脈之海王冰曰沖為血海言諸經之血朝會於此男子則運行生精女子則上為乳汁下為月水內經曰任脈通衝脈盛月事以時下者是也王冰又曰陰靜海滿而去血謂衝脈盛為血海滿也即是觀之沖為血室可知矣傷寒之邪婦人則隨經而入男子由陽明而傳以沖之脈與少陰之絡起於腎女子邪感太陽隨經便得入沖之經並足陽明男子陽明內熱方得而入也沖之得熱血必妄行在男子則下血譫語在女子則月事適來適斷皆以經氣所虛宮室不闢邪得乘虛而入針經曰邪氣不得其虛不能獨傷人者是矣柯琴曰血室者肝也肝為藏血之臟故稱血室女以血用事故下血之病最多若男子非損傷則無下血之病惟陽明主血所生病其經多血多氣行身之前鄰於衝任陽明熱甚侵及血室血室不藏溢出前陰故男女俱有是症必刺肝之募即期門穴引血上歸經絡推陳致新使熱有所泄則肝得所藏血不妄行矣按蓄血便膿血總是熱入血室入於腸胃從肛門而下者為便膿血蓋女子經血出自子戶與溺道不同門男子精血溺三物內異道而外同門精道由腎血道由肝溺道由膀胱其源各別而皆出自前陰也鰲按肝藏血腎生血心主血脾統血而其源則匯於沖衝起腎下與腎貼近血之由沖而出者即如由腎而生故曰腎生血言腎所生以沖即在腎下也由是上行至脾脾之為地寬廣故得而統之再上行至肝為營氣凝聚之處一身之血皆歸焉故曰藏也心為君主血脈皆朝宗而聽命故曰主也然則血室之說成氏主沖柯氏主肝二說雖異其實則同主沖者就其源頭處言主肝者就其藏聚處言血必由源而出不有源則無根血必聚處而藏不有聚則散漫無所收於此二處而為血之室其旨同也假如脾而曰統統者屬也不過為其所屬非根源處非藏聚處故不得曰室即心為營血之主亦非根源處非聚藏處故亦不得曰室也茲故並録二人之說復為發明之閲者亦可知其言之皆是而無背而讀古人書貴有融會貫通處者此類是也若執一家言以為此是彼非則毋論不能尋究古人之書即人一身之臟腑經絡先不得明又何以治人之病矣譫語鄭聲綱仲景曰傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死譫語直視喘滿者死下利者亦死目李杲曰問邪入陽明為譫語妄言錯失此果陽明乎答曰足陽明者胃也豈有其言哉傷寒始自皮毛入是從肺中來肺主聲入於心則為言胃即戊也戊為火化下從肝腎王肯堂曰譫語症有補虛一法如素問云譫語者氣虛獨言也難經曰脫陽者見鬼仲景謂亡陽譫語即此義也故樓英云余用參耆歸術等劑治譫語得愈者百十數豈可不分虛實一概用黃連解毒大小承氣等湯以治之乎王海藏亦云黃耆湯治傷寒或時悲哭或時嘻笑或時太息或語言錯亂失次世疑作譫語狂言者非也神不守舍耳兩手脈浮沉不一舉按全無力浮之損小沉之亦損小皆陰脈也甚者調中丸或理中丸有陰症手足冷脈細微而譫語者宜四逆湯活人用白通湯海藏用黃耆加乾薑湯有人患此症脈極沉細外熱內寒肩背胸脅斑出十數點語言狂亂或曰發斑譫語非熱乎余曰非也陽為陰逼上入於肺傳之皮毛故斑出神不守舍故錯語如狂非譫語也肌表雖熱以手按之須臾冷透如冰與姜附等藥數日約二十餘兩得大汗而愈後因再發脈又沉遲三四日不大便與理中丸三日其病全愈以是知此人之狂非陽狂之狂乃失神之狂即陰虛也柯琴曰首條譫語之由二條譫語之脈脈短是營衛不行臟腑不通故死也二條言死脈三條言死症蓋譫語本胃實則不是死症若譫語而一見虛脈虛症則是死症而非胃家實矣綱仲景曰夫實則譫語虛則鄭聲鄭聲者重語也目朱肱曰病人有譫語鄭聲二症鄭聲為虛當用溫藥白通湯主之譫語為實當調胃承氣湯如服之而譫語止或更衣者止後服不爾再與之仲景云實則譫語虛則鄭聲世多不別然亦相似難辨須憑外症與脈別之若大小便利手足冷脈微細者必鄭聲也大便祕小便赤手足溫脈洪數者必譫語也以此相參然後用藥萬全矣大抵傷寒不應發汗者汗之必譫語譫語屬胃和中則愈不和則煩而躁宜調胃承氣湯然亦有三陽合病譫語者有胃實譫語者或汗多亡陽譫語者有下利譫語者有婦人熱入血室譫語者成無己曰鄭聲不正之音也汗後或病久人聲轉者是也蓋為正氣虛而不全故使轉而不正也若以重語為重疊之語與譫語混而莫辨殊失仲景之旨李杲曰狂言者大開目與人語語所未嘗見之事也譫語者合目自言言所日用常見常行之事也鄭聲者聲戰無力不相接續造字出於喉中也吳綬曰大都鄭聲乃因內虛正氣將脫而言皆不足之貌如手足並冷脈息沉細口鼻氣息短少所說言語輕微無力氣少難以應息者皆元氣將脫也或吃忒不止神昏氣促不知人事者死或氣息不促手足頗溫其脈沉細而微者急以附子湯倍人參主之或以接氣丹黑錫丹兼進一二服以助其真氣也或濃煎人參徐徐與之或未可用附子者以三白湯倍人參主之戴原禮曰譫語屬陽鄭聲屬陰經云實則譫語虛則鄭聲譫語者顛倒錯亂言出無倫常對空獨語如見鬼狀鄭聲者鄭重頻煩語雖謬而諄諄不已年老人遇事則誶語不休以陽氣虛故也此譫語鄭聲虛實之所以不同也二者本不難辨但陽盛裡實與陰盛格陽皆能錯語須以他症別之大便祕小便赤身熱煩渴而妄言者乃里實之譫語也小便如常大便洞下或發躁或反發熱而妄言者乃陰格陽之譫語也裡實宜下調胃承氣湯熱躁甚而妄言不休大渴喜飲理中湯陰格陽宜溫膽湯四逆湯附子理中湯又有不繫正陽明似困非困間時有一二聲鄭語者當隨症施治外有已得汗身和而妄言者此是汗出後津液不和慎不可下乃非陽非陰者宜小柴胡和建中湯各半帖和榮衛通津液若陽傳入陰自利手足厥逆語或錯亂此雖已自利其中必有燥屎猶當下之陰中之陽宜調胃承氣湯瘀血在裡大便黑小便利小腹痛其人如狂譫語者桃仁承氣湯婦人熱入血室亦能譫語小柴胡湯病後血氣未復精神未全多於夢寐中不覺失聲如魘此不繫譫語鄭聲宜溫膽湯去竹茹入人參五分或用六君子湯魏荔彤曰陽明胃病固多譫語矣然譫語亦有虛實不同不可概施攻下夫譫語固譫語惟胃中實熱津液不足方神明昏昧而胡亂作語此譫語也若胃熱不實則神明不至甚亂而口語亦不甚糊塗但說了又說繁言絮語失其常度耳蓋其中虛氣弱詞不達意故語至再三此真為虛歉之象不止傷寒症中有此雜病氣虛者多有之以此為譫語而攻下賊夫人之子矣仲師必詳為立辨令人認明譫語是胡言亂語鄭聲是重言復語故自解之曰鄭聲重語也重字當作平聲張介賓曰實則譫語虛則鄭聲此虛實之有不同也夫二者總由神魂昏亂而語言不正又何以分其虛實但譫語者狂妄之語也鄭聲者不正之聲也譫語為實實者邪實也如傷寒陽明實熱上乘於心心為熱冒則神魂昏亂而譫妄不休者此實邪也實邪為病其聲必高其氣必壯其色必厲其脈必強凡登高罵詈狂呼跳擾之類皆是也此之為病有由燥屎在胃者有由瘀血在臟者有由火盛熱極者有由腹脹便祕口瘡咽爛者察其果實即當以三承氣或白虎湯涼膈散之類治之鄭聲為虛虛者神虛也如傷寒元神失守為邪所乘神志昏沉而錯亂不正者此虛邪也虛邪為病其聲必低其氣必短其色必萎其脈必無力凡其自言自語喃喃不全或見鬼怪或驚恐不休或問之不應答之不知之類皆是也此之為病有因汗亡陽因下亡陰者有因焦思抑鬱竭蹶心氣者有因勞力內傷致損脾腎者有因日用消耗暗殘中氣者凡其病雖起倒而遏之即止終不若實邪之難制者即虛邪也察其果虛最忌妄行攻伐少有差謬無不即死治此者速宜察其精氣辨其陰陽舍其外症救其根本稍遲猶恐不及而況於誤治乎甚至有自利身寒或尋衣撮空面壁啐啐者尤為逆候蓋虛損之人最忌譫妄故凡身有微熱脈見洪滑者生心多煩躁脈見微弱細急而逆冷者死綱仲景曰陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之婦人傷寒發熱經水適來晝則明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦必自愈目朱肱曰問仲景云無犯胃氣何也答曰熱因經水適來乘虛入室故血室有熱遂令譫語當以小柴胡解之卻與胃實譫語不同胃實有燥屎故宜調胃承氣下之若血熱有譫語非胃家實仲景恐人作胃實攻之故曰無犯胃氣也大抵譫語是熱屬陽而反見陰症者逆劉完素曰血病則肝傷肝藏魂肝傷則魂無所歸心神無主此所以發譫語也要之此非胃實因熱入血室而肝實也肝熱心亦熱肝與心相近也熱傷心氣既不能主血亦不能作汗故但頭有汗而不能遍身此三條皆因譫語而發不重熱入血室更不重在傷寒中風須知譫語有不因於胃者故不可以譫語定為胃實之症而犯其胃氣綱仲景曰三陽合病腹滿身重難以轉側口不仁而面垢遺尿發汗則譫語下之則額上出汗手足冷若自汗出者白虎湯主之目寇宗奭曰譫語者真氣昏亂神識不清之所致也心藏神而主火病則熱氣歸焉傷寒胃中熱盛上乘於心心為熱冒則神昏亂而語言多不知所以言出無次而成譫妄之語輕者睡中呢喃重者不睡亦語言錯亂有譫語者有獨語者有狂語者有語言不休者有言亂者此數者皆因熱之輕重也譫語與獨語雖間有妄錯若與人言猶有倫次是熱未至於極者也經曰獨語如見鬼狀若劇者發則不識人是獨語病猶未劇也狂語者熱甚者也由神昏而無所見甚則至於喊叫也語言不休則更甚矣至於亂語者妄言詈罵不避親疏為神明亂極經曰諸逆發汗微者難瘥劇者言亂是難可復製也譫語之由又自不同有由火劫者有由汗出者有由下利者有由下血者有由亡陽者有由過經者有由燥屎在胃者如此條則由三陽合病者凡諸此類脈短則死脈和則愈又身微熱脈浮大生逆冷脈沉細不過一日死實則譫語收斂在內而實者本病也或氣上逆而喘滿或氣下奪而自利者皆為逆經曰直視譫語喘滿者死下利者亦死謂其正氣脫絶也鰲按尿蓄於膀胱故遺尿為太陽本病少陽經行身之側故難以轉側為少陽病其餘口不仁面垢譫語額上出汗手足冷自汗皆屬陽明故雖三陽合病實是陽明病而略兼太少二經所以專從陽明主治其用白虎湯者以胃熱而非胃實也綱仲景曰若胃氣不和譫語者少與調胃承氣湯目王好古曰治老幼及虛人傷寒五六日昏冒言妄小便或淋或澀起臥無度或煩而不得眠並宜白虎湯加山梔一錢治熱病及時疫心躁狂亂奔走狀似癲癇言語不定久不得汗及時疫不知人者以人中黃不拘多少入罐內泥封固武火煅半日放地去蓋半日研細新汲水調下三錢或未退再服愈吳綬曰治傷寒熱甚心煩有痰神昏譫語者以竹瀝生花粉汁各一盞服之按此方內熱不禁下者可用綱仲景曰傷寒十三日不解過經譫語者以有熱故也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之目王肯堂曰經文內實之實當作熱此段有五反一對熱與厥反湯與丸反硬與下利反脈微與脈和反藥下與自利反小便利與大便硬為一對讀者詳之下利譫語其曰脈調和手足和小便利者陽也故用承氣下之其脈當微厥及少陰但欲寐被火氣劫汗譫語小便難者陰也故當用補劑和之綱仲景曰陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與小承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也目朱肱曰潮熱脈滑疾者必譫語也小承氣湯大便祕小便赤手足溫脈洪數者必譫語也調胃承氣湯譫語不惡寒反惡熱白虎湯已得汗身和譫語者柴胡桂枝湯火迫而致譫語亦白虎湯鰲按此以裡虛句為主蓋通節所言形症皆是假有餘脈微澀乃是真不足故譫語潮熱下症雖具仲景於此慎之又慎只以小承氣試之也綱仲景曰傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服目柯琴曰微者但發熱譫語是邪氣實當以下解一服利止後服只攻其實無乘其虛也綱仲景曰下利譫語者有燥屎也宜小承氣湯汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂表虛里實故也下之則愈宜大承氣湯陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也宜大承氣湯下之若能食者但硬耳陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫後服目陶華曰大熱乾嘔呻吟錯語不得眠犀角解毒湯得病無熱但狂言煩躁不安精來不與人相當新汲水調五苓散三錢探吐之一法用豬苓湯瘀血狂言譫語漱水大便黑小便多身黃腹滿此為當汗不汗蓄熱在裡輕者犀角地黃湯重者桃仁承氣湯抵當丸柯琴曰首條下利是大腸虛譫語是胃氣實胃實腸虛宜大黃以濡胃無庸芒硝以潤腸末條陽明主津液所生病故陽明病多汗多汗是胃燥之因便硬是譫語之根一服譫語止雖未利而胃濡可知矣綱仲景曰二陽並病太陽症罷但發潮熱手足濈濈汗出大便難而譫語者下之則愈宜大承氣湯目鰲按本條全屬陽明可下之症故本二陽並病而開手即揭清太陽症罷句也頭痛頭眩綱仲景曰陽明病頭痛不惡寒反惡熱大便實宜調胃承氣湯陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛目王肯堂曰內經云巨陽受邪少陰為里得熱則往從之從之則厥也太陽與少陰為合此症當是太陽未全罷耳經又云陽明病則喘而啘啘則惡人小便利者寒邪內攻肢厥頭痛者寒邪外攻也喻昌曰陽明病本不頭痛若無汗嘔咳手足厥者得里因而邪熱深也然小便利則邪熱不在內而在外不在下而在上故知必苦頭痛也魏荔彤曰此手足之厥與頭痛互見非少陰之手足厥也故嘔而汗出與反無汗亦不同正見少陰之手足厥冷有汗而不頭痛嘔而不咳與陽明之嘔咳而無汗頭痛而手足厥有別此陽明病有類少陰而又微帶太陽後學皆茫然不知下手處故仲師苦心標出問少陰亦有咳何以辨曰少陰所云咳而下利譫語者被火氣劫故也原文詳之矣不然何能上炎而咳其言或咳而嘔渴不得眠者則必兼嘔渴不得眠而見少陰之陰躁不與陽明之嘔咳兼頭痛類也其言或咳或悸或小便不利或腹中痛或泄利下重然必兼四者諸症雖有似陽明而頭痛一症必非少陰所有也此少陰之咳與陽明所以不同也故太陽之頭痛入於陽明之小便利嘔咳厥逆中總屬陽症又見陽能統陰一陽存而群陰悉化為陽在病氣亦如此正氣之在人身者可識矣綱仲景曰陽明病表裡大熱煩渴引飲頭痛如破者竹葉石膏湯陽明病身熱頭痛漱水不欲咽必發衄目楊士瀛曰將發衄而脈數者宜犀角地黃湯茅花湯亦可吳綬曰陽明頭痛額前目疼鼻乾脈長也無汗者葛根加蔥白白芷汗之有汗曾經發汗頭痛不解者葛根蔥白湯若不惡風而反惡熱自汗煩渴脈洪數飲水頭疼者白虎加白芷湯內有燥屎蒸蒸發熱頭痛者調胃承氣湯凡陽明頭痛無汗者葛根麻黃蔥白白芷石膏之類也有汗則白芷石膏葛根川芎湯也綱仲景曰陽明病脈遲食難用飽飽則微煩頭眩必小便難欲作谷疸須下之腹滿如故所以然者脈遲故也目魏荔彤曰本條之上條云食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也與本條俱言胃虛然虛寒與虛熱又迥不同虛固不可作實而攻下熱可遽作寒而溫補乎故仲師就上條食谷欲嘔中又示人以推類詳義之法如陽明病脈遲似屬虛寒但寒則不能食此能食而但難用飽飽則微煩頭眩者胃惟不寒故能食胃惟氣虛故不用飽不用飽者不受飽也微煩頭眩俱虛而兼熱之象以此辨胃之虛與食谷欲嘔條同而熱則本條獨異夫遲為寒脈何云是熱不知此乃兼澀之遲非沉遲之遲謂之虛而兼濕熱則可謂之虛寒則大不可也故又見小便難一症虛則氣不充而濕不除濕則氣不化而熱不消胃中谷氣不能化正養身卻蘊釀濕熱蒸作疸黃之兆如不清熱除濕培土消疸而妄下之將濕愈增而虛愈甚腹滿如故胃纍及脾表裡受病而發黃身腫矣故又曰脈遲故也言遲則濡澀而不滑利虛而濕之義為主而熱副之主治者以除濕培土補中為君以清熱消疸為臣佐之用斯為得仲師心法者綱仲景曰陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛目王肯堂曰陽明病身不重但頭眩而不惡寒者陽明中風而風內攻也經曰陽明病若能食名中風風邪攻胃胃氣上逆則咳咽門者胃之系咳甚則咽傷故咽痛若胃氣不逆則不咳其咽亦不痛也鰲按此與前頭痛款中反無汗一條俱是陽明病而有類少陰者然彼條之嘔咳而無汗頭痛而手足厥所以異於少陰之手足厥冷有汗而不頭痛及嘔而不咳此條之咳而咽痛亦所以異於少陰之咽痛為不咳而痛也鬱冒綱仲景曰病人小便不利大便乍難乍易時有微熱喘冒不能臥有燥屎也宜大承氣湯目王好古曰傷寒傳至五六日間漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思六脈細數而不洪大心下不痞腹中不滿大小便如常或傳至十日以來形貌如醉若用大承氣則誤矣不知此熱傳少陰心經也然又未知自何經而來答曰本太陽經傷風風為陽邪傷衛則陰血自燥熱結膀胱壬病逆傳於丙丙丁兄妹由是傳心心火自上迫熏肺所以神昏也蓋肺為清肅之臟內有邪故令神昏宜梔子黃連黃芩湯若脈在丙者導赤散脈在丁者瀉心湯若誤用涼膈散此乃氣中之血藥也如右手寸脈沉滑有力者則可用之或用犀角地黃湯如無犀角以升麻代之是陽明經藥也解陽明經血中之熱若脈沉俱有力者是丙丁俱有熱可以導赤瀉心各半服之
